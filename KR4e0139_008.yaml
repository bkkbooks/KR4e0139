body:
  text: 圭峰集卷八明羅玘撰序賀侍御林君考最被恩序御史滿三考有升秩再考間有之然迄無增俸者今有之實惟林君蓋特恩也君按廣西上得廣西所上平苗捷以苗之平也實自君意有他屬兵部持法論止是而君亦還報命會自蘇郡推官召入為御史至是滿三載為初考得殁贈生封其父母妻及已告身七品之官六品之祿白金文綺旌功之賜北面拜稽首而受在廷臣工萬目張視覺吾人潝潝生氣百倍皆屬目君君榮哉然聞君去時苗已逼重戍割臠我有名位者二人夜入臺獄劫俘酋以出截遏津郵沈舟仆乘百里隔越如絶域外亦廣西一眚也議者皆竊歎君徒行及君來請兵議者又笑曰飛巖斷潢實生苗獠猺獞是不一種殆天遺之以與魑魅猱玃猩狒諸物雜處也魑魅喜於得人而猱玃猩狒見人則號跳以侮彼其飲齕牝牡絶與人異者且然而况苗之嗜欲食飲與人一耳而生獰異甚有不逼人者乎又况布諸其境者凡幾洞而幾寨乎御史者馳至境屬之大吏出入謁見尚未熟其面將誰使哉旌節所指即日搖搖於道未必頓能以周流也而倐已及期代者至矣請兵胡為乎及是捷至議者皆愕然而曰君實智也雖然吾以為苗直鼠耳奧有穴窒而築之又穴則熏且灌又窒築之其邃孔而穴羣遊於庭齕盎穿篋穢食溺漿則不恤吾墉發掘及泉焉而後室可安也君今亦熏灌窒築之而且逭夫他日發掘之擾議者則狃於茍安俟其羣遊而發掘之不已勞且費乎君可謂為國持得算者非舞智掠功以盜恩者也夫天下事皆吾人為也使皆乘其機而計其勞與費持得算以臨之獨苗之足平而君獨受賞哉聞吾言者亦幾人矣吾友謝邦實獨喜曰有警也謀於進士鄭希大書為賀君考最被恩序壽朱君六十序豫邑水東淨土院舟船之泊往往當其門故四方之客或館焉豫少嘗過之客有漢語而髯澤而廣顙豐下而殺不及其腰之二美衣輕裾粲然笑而揖豫以入步謖謖進趨益恭僮過其傍屏息耳語迭出漿飲豫也豫時內顧野氣勝未即出聲氣相勞問辭去僧愕豫騃追來問豫何默也豈不識朱本清乎出三日歸金陵矣豫亦不顧手航而渡僧曰是必有憶吾言者踰年豫偶過市市之羣儈走逐逐肆之張列一望若黼焉舁且任者壅於郭門不可入皆匭也出而臨於河則連艫於涯人曰本清之舟也而邑之豪且半至焉移時豪畢集涯莫容則徙而寓於涯之舍豫亦往即席頷僧言久之自是嵗必一至至必見豫豫益覺其髯之于思于思莫匪豫愛也豫既官京師里之丁仕隆好以其館館士士樂有所弛擔也而豫宗人今進士鳴盛始試南宮時亦主之豫往勞焉鳴盛尊豫以其舅出則本清也相與一笑而顧其髯也白之三矣本清曰别已二十年豫私念豫邑時有數米而炊者大賈安能鬱鬱久居乎其别久也亦宜又三年自金陵拿舟偕鳴盛來復試豫又往勞焉顧其髯之白又加矣鳴盛已得俊人皆謂本清智者也故能得鳴盛如此哉鳴盛則語其同為進士者曰人有不重其生之日者乎出於外嵗必尅其期而奔入室至則喜矧六十乎夏之季吾舅其期也若不聞顧吾僕馬之弗飾室廬之弗安衣履之弗修僦且賃皇皇也亦果何人乎於是進士皆義之而為之詩以寓祝祝宜也雖然豫亦欲祝也豫見淨土時詎意豫之若而人乎而豫邑之豪亦詎盡以賄來乎豫一人也豫邑一邑也其行四方其遇豈一人一邑人乎其欲祝如豫者必多矣矧鳴盛為之甥而獲其戀戀若是者乎然鳴盛祝假諸進士之詩善矣豫無所假也假諸詩之首為之序亦可乎鳴盛喜書之函丈别情詩序劉忠愍公孫景素憲使公之季子也大以三傳教京師僦館才數筵問業以貫魚入户外屨獵獵日暝有徒返者以其指歸取解取進士一舉手耳至其自取之則以庚子造士厯丁未庚戌癸丑丙辰皆輒黜庚戌有司者第其文當九十揭名景素也嫌以忠愍為監臨賣公地此何説也丙辰之黜吾友伍朝信實校之朝信景素戚也易書無情豈天不欲以嫌纍忠烈之裔耶抑以昭朝信之公也然景素自是亦漠然立乎虛舟以遊於大海而略無所繫著曰吾姑歸哉會南京祠部君以郎中來考績祠部於景素為兄思省太淑人且拜忠愍公憲使公之墓也則中流仙舟鼓枻同邁詵詵羣生尚可以留户外屨乎乃相聚謀曰以贐何如曰吾先生廉擯以行何如曰吾先生廬在楚恐辭醵金以飲何如曰吾先生峻不取羣飲者然亦不可以虛也又合而言曰今兹吾儕實合九州之人子是也吳故以歈越故以調楚故以辭秦故以聲鄭衛故以音請自擇焉獨鄭衛之音無應者蓋今太平之世其革久也已又合歎曰博矣哉是合九州之音也於此可以觀先生之大可無序乎以吾宗生暘來請噫景素之舉庚子也吾實同棘舍知在羣生先非暘請將序之矧暘請之勤勤乎為之序送傅冠卿歸新喻詩序今少宗伯體齋先生為翰林學士時豫在講下每不豫愚也以嗣子冠卿俯而友豫冠卿固奇士其穿貫浩漫馳騁為古文辭逼豫至欲棄而走豫大畏也曰何物主司而不驚耶戊申之歸豫日望之來試南宮耳而所謂驚驚南宮之主司固非謂江西也於今八年矣而冠卿尚仍儒生來省都下先生於是制適當得廕冠卿乃不敢違依依入太學然出其業益洶湧奔放譬之河決焉必破山拔木怒激震撞噴薄百里聲呼動坤軸簸蕩渤碣而後已蓋不止於驚主司而已也豫疑之豈其在江西也不屑與之角而逐耶將主司者其識下而固未之識耶世固有驚愕之過而遂眩惑倒置莫之適從者有司者抑嘗驚耶或造物者姑齟齬之而有所待也若造物者吾嘗試百里之途焉蹩躄其行者或相之以必至而於趨者或蹶焉或僵焉不至也寅而騎者酉且未必至已而步者申或已至之飢而跣者畏暮而先至裹飯而屨者屢休而暝失道焉而於人也亦必如是而已吾何為為冠卿戚戚乎冠卿每語人曰我未至也先生亦不以是少冠卿其亦有待乎冠卿有子選如成人先生以古禮冠之命曰爾以吾孫歸見廟冠卿行行將復來造物者果若豫言己未之試預南宮之校者誰乎豫懼其驚且至矣贈冠卿之詩妙極一時之選而皆未及此也豫固補而序之賀同知傅君恩榮序鄧州同知傅良佐前九年宣武衛經厯也未為經厯前十年吏部需次官也未需次前十年武昌學宮失意人也其為經厯能其官與薦剡制當封其父母妻而已遷于鄧鄧大州也賦重大而道逺小吏恐不任遣故良佐自馳至闕下時羣臣之制適頌也良佐亦與焉武昌仕者遊于是者皆曰吾境濱大江入水泅遊赤手奮爭探鮫室搗鰌穴索取鮮食出騎浪山以舟為馬此其凡也胥商之族蓋不入吾編伍中縣吏至曳客寄為之土居之史晨星耳斑白之老衣白衣而歸有矣就仕焉倉庫氏耳臺輿氏耳有能入品流者乎就有之或嵗而罷或再嵗而罷或三數嵗而罷非墨則罷耳有能至九載者乎就有之璺見而瘢明勞寸而過尺而亦終稿木而已耳有能被寵光而及其父母妻者乎良佐斯奇矣哉實光吾境吾境自今其勸耳矣蓋觴之駢然入良佐邸則繡幄密羃文茵普蒙置以丹函飛以金虬焚之氛氛􅌊之熒熒如霧如雲如星如日跽啓仰觀或瞭或眯或蹈或抃舉欣欣然如與有榮也其甚喻者又揚言曰使良佐不蹉跌為學宮良即奮蜚取甲第其淪滯下位未可必也幸而登躋亦或過是又不若是特偉人尤詫訝也是不宜黯黮然亦誰能襮之皆推豫豫序之送侯典史之任文登縣序文登縣侯典史台人也於今刑部主事為仲父主事豫為主司時所得進士也於今為知已故典史亦得入豫室講主賓禮然亦甚文語當世事若貫珠注水文亹亹有可采者至論其給事方伯二父赫赫當正統景泰中如目覩及仲父檢討君之文學閎縱令人耳卓卓宛然三君者參乎前始慶豫之得主事也為世家子其必矜持門閥為令人而豫為主司者亦與有榮乎主事筮仕未期月法家者書盡通察差稽貌即老吏所深避豫於是私度門閥之驅人果如此胥商之族古所以棄也意典史雖陷他途當末調其亦有所顧籍而矜持歟不然則其論世也不若是九年冬典史始得今官之文登文登相謠古不夜城今雖未必然要其名自美典史自今贊其長能以明明之政燭乎幽是即不夜矣然明生於公公始於無私無私始於無欲世未有有欲而能明者也亦未有有內顧之憂而能無欲者也吾不知典史內顧其何如然聞侯氏土田食千口窮餓者尚資之則典史抑何憂耶而又知重其門閥以自多主事方立朝以撑拄之是雖餌金如山直以為糞壤正懼其汚耳而况視之又動心者乎明兹可為典史許也且天下今皆用明偉者為令長不夜之謠或於是乎驗矣主事問所以别典史者於豫豫亦重門閥者故以是告之壽山福海圖詩序錦衣李侯暨張宜人並年五十實侯進指揮之明年正月也子譯賓麟率弟孺生鳳鵾孺子鵬婦若孫躋堂為壽張圖其上閲之崔崔嵬嵬洶洶湧湧而已麟之言曰崔嵬者山也吾願吾親壽如斯洶湧者海水也吾願吾親福如斯或譏麟曰子居京師肄翰林間矩率禮如處女然初未嘗有登山之屐齒出郭之鳴鑣泛湖之輕艑而又不假終軍之繻郭丹之約盛年華階所厭飫者警蹕之清塵陛戺之列仗耳烏識所謂山與海者福壽之譬無乃其借聽乎麟曰然麟嘗入職方披輿地圖見天下之峙而髙者曰山環而瀦者曰海則固不必瞻岷峨航渤澥而後謂之識山與海也顧吾兹之日見焉者亦有丘垤矣畚鍤之相仍則夷矣足為吾親壽耶亦有溝洫矣雨水之暴至則盈溢矣足為吾親福耶吾為吾親貪且侈耳奚容計吾之識不識耶或乃笑曰山以鎮靜為體海以茹納為量侯之地宥密鷙擊地也多動則多利多構則多功侯不以動為利而曰寂寂吾所嗜其志於山者歟不以構為功而乃恢恢乎有容其志於海者歟而獨不知天之貺之將以其為山也耶將以其為海也耶聞者皆以是言為知本有繫於侯也丐豫書其事而又各為詩以歌之送吳先生歸宜興序吳心逺先生有田百畝山百峰園以畦計泉池以泓計者稱是樹株千竹荻葦束千牛羊蹄千僮指千在宜興豫嘗過宜興宜興人曰此假封君也豫謁之不即見見今封君太史公公先生兄吾僚克溫父也公曰吾弟樵南山漁西溪穿虎豹麋鹿之羣探鮫鱷黿鼉之宮味津津日若不足蓋忘返者焉吾東西封之人嵗不一見里胥導縣官入吾舍迎飲射于學卒不得怒而去者屢矣雖然其亦入乃租募乃庸百其征需視諸編氓獨先焉故縣官者匪徒恕之亦且髙之豫曰噫隱者也吾亦俗之奔奔者耳其可見也耶去之至京克溫方徙東宅虛其西以居豫實相比次旦但言笑晏晏甘雨和風浸漬沃若忽而觸其圭角則飈起􅀈發甚犯顏面曰吾何為依依於此而不從吾叔遊耶人或瑕疵之吾獨以為世亦有為世類汩之不以三公易者是獨足怪哉今年春先生至克溫舍之中堂幄其傍自休焉以便候問朝夕語刺刺不能休賓至堅拒不納見以豫之甚昵也見之野服癯叟也瞳炅炅出碧光坐移時不言亦不聞其有息氣頃之克溫牽一秀使揖豫曰此吾弟也吾叔之息子俾學于斯者也他日其將大吾延陵之世其究也而豈吾匹乎豫退而疑焉先生身隱也而使其子學而仕也克溫身仕也而志遂其叔者也其隱果隱乎其仕果仕乎豫愚不能辨也然豈可遂已哉故於先生之歸也飲之以酒而問之喜雪倡和詩集序喜雪倡和詩一卷𢎞治十年十二月成詩凡百二十篇或曰其可傳也鋟之宜或曰潞之河天子令之頒也政之出也由是而逺之天下也詩之作也實於斯而曰喜是為天下喜之先也喜而以雪之瑞是為天下瑞之先也其鋟之也信宜潞河之農亦曰吾嘗聞商人之頌姚君矣曰良户曹也幸駐於斯吾判楊君吾父吾母也進士趙君吾鄰也而王君吾長老也吾且見雨雪之瀌瀌也而訝其過逢之僕僕也而吾農奚聞知實不知其喜喜且為之詩若是也然吾藝是野吾亦喜其有獲乎吾願得是詩歌之以幸教我子孫楊君時行來於斯不能拒也繼而來者又不能拒也於是楊君患之或為楊君謀曰盍鋟諸來斯授之其可也楊君曰吾始讀姚君之詩若琚焉又若瑀焉又若珩璜焉之在縣也而趙君左以衝牙副之而右則王君也而風之過也振之雪之乘風也亦擊之不知琚瑀珩璜之撞衝牙耶抑衝牙之撞之也耶抑風雪之相乘而和琚瑀珩璜衝牙而雜擊耶亦風與雪之相遭而幸有是聲也而吾且欲以瓦礫焉旁擲之曰吾亦有助於聲也其可也楊君遂辭而止而潞之好事謂其可傳者已丐豫序其端亦終不免於鋟耳蓋民之欲之楊君亦不能禁也雖然民亦有不待鋟者其口有碑焉而善惡由之速于置郵莫能禁者多矣嗚呼其亦可喜也夫其亦可畏也夫慶汪君七十壽序歙之老汪敦實九月二十五日七十壽豫始不知之也武選黃君曰吾歙令人也越公之胄於是為最其始也萍梗之迹半天下而其采拾也無險無艱若沒人之入于淵泉無所底止而其既獲也若裒金之復于冶鐘鼎之器由是成焉今老矣若碇之棲于岸而以子文昭嗣為之若舟也季子文暐繼焉亦若舟也謹紼維之無不如志於是而食厥素封若實封然雖然不以厲人驕人而以利人吾孔慕焉然兹去歙三千里也敢割籍乎而歸為之壽乎抑二子也其亦無徯吾之歸而惟徯吾言之歸噫吾言奚足取也吾幼見吾室之覆瓿者矣取視之鄉先生之文半焉又見吾室之棄帙矣鼠餘也或風雨之所􅝚也取視之以質吾長老焉則盡近世之名能文者也以其無為吾之重輕故棄之或曰以其非若古賢人之作也故棄之以吾室之棄之也知汪氏之將棄吾也奈何以其今日之取吾也而取其他日之棄吾乎豫曰嘻世豈有盡棄者乎歙新安郡也不見篁墩之志乎固有可棄而未棄者也黃君曰篁墩恕然則豫為試序之安知後不有恕如篁墩者耶則豫文與敦實之名固將壽于天地間不獨今日之為壽而已其可尚也黃君喜曰然黃君嘗宰吾金溪有舊愛而喜為之役云送鄧君之任雲南副使序吾嘗靜居而念今之藩翰惟雲南之參佐厯夷地治夷民為多其長不與焉蓋其地古純夷也長居會府城府之尊侍衛之嚴甲兵之多貨貝之集帑藏之輸入公牒之關移賓客之宴會軍師之犒饗搜選閲試之勤過逢迎候之頻同中國然雖居夷地孰見其為夷也惟四出之驛則參政副使之乘也參議僉事之驂也分岐而往各有攸司焉究其職雖鬼窟可探而雪山可登也菰茭之田可質也人而鬼之獄可鞫也繡面之酋可唯諾于前而啖虺之蠻可輿可皂也孰為身熱頭痛之地可譯而知也則其快心縱目顧不灑然飄然凌厲而曠達耶而胡為府居若是之涼涼也古所謂奇男子之事蓋如此吾固心慕焉而吾友鄧良臣今年秋得副使正其地也夫副使官於參議僉事之上而又得以其風紀肅百僚貞百度呼吸之際有風霆焉其權豈參政匹也况其下者哉吾嘗與良臣為布衣交矣又同為進士矣又見其為御史矣厯試之可謂有志之士也夫以有欲為之志操得為之權適可為之地誠一時之遭宰物者知人之明也而亦豈非逺人之幸皇澤之旁被乎要非偶然而已也而或者猶隨世附和嚬呻咨嗟以逺為戚正自庸人耳良臣將亦不謂其然或且嗤之故於其同官之請贈行也為良臣道之送吳克溫序吾友吳克溫今內相少師公之甥也少嘗依公學及為翰林庶吉士公大學士也又以其官學如初為編修預史事侍講帷入校東宮又以其職學焉是其於親則舅與甥也於道則師與弟子也於分則長與屬吏也夫天下之為甥舅多矣而未必為師與弟子也為長與屬吏也為師弟子亦多矣而未必為甥與舅也為長與屬吏也為長與屬吏也亦然然則克溫於公宜何如哉然克溫真具奇氣吾嘗隂竊評其為人少同而多異屹乎萬物之表無可得而奪也即有不可雖其封君味菜先生而不免於幾微之諍而况於其舅乎即其志之邁往雖堯舜之君遇有闕遺而不免於漆器之諫而况於其官之長乎况於其師乎吾恆自負以是為權衡之的無爽錙銖而亦不敢公然道之及是公之去人皆曰克溫為之故此其決也吾亦從而尤之曰胡為乎然哉是之為公謀而不知為天下謀也賢者固如是乎忽而覺焉道固當如是也而亦惟其氣之克志之果者能之而顧可謂非賢乎或公之賢克溫不止如吾而已敢私以為公賀而又將觀克溫從公之歸也惟天子之念公知其懿親也果遣以行是其在公家也以屬吏侍其長也其在吾道也以弟子侍其師也其在身也以甥侍其舅也其在心也期以全君臣之義也而其至家也又得以子拜其父也兹行也其於世道豈曰小補之哉故吾朋友之義喜不自禁也咸推豫以言其别賀監察御史胡君考最序御史之官其品正七其在侍從之列孰同乎編修也都給事中也其在部寺之屬孰同乎大理評事也太常博士也其在外之庶官孰同乎推官也知縣也是皆由進士起焉者也他不與焉然推官知縣品則同矣而其陟固御史之陟之也其黜固御史之黜之也其在外勢然也廷則比肩矣然評事局於獄博士拘於祠非通與於天下之事者也編修得紀天下之事矣而不得言天下之事都給事中得言天下之事矣而不得行天下之事得言之而又得行之御史而已嗚呼御史可以品論其官也乎不可以品論則不宜以資拘不宜以資拘又奚以考績為哉雖然黜陟者天子之權也而御史得行於外而在廷之臣善者又得言之天子陟之是亦御史陟之也惡者又得言之天子黜之是亦御史黜之也而顧於其身獨無所與焉其亦何以責於人哉其勢必歸之與於庶官之考績有殿最焉亦有黜陟焉而後外之黜耶陟耶不敢參以私焉必公也人亦曰公也在廷之黜耶陟耶不得參以私焉必公也人亦曰公也而天下治之端實自是始焉則御史考績其豈庶官之考績乎天下之政有大於此者乎嗚呼今天下固日由之而不知也雖御史者亦汩沒於其中而不自知也而御史考績者之見於文字亦多矣亦無為之言也豫也暗亦奚敢昌言哉胡君惟峻同年友也一嘗私發焉君曰然及君以御史滿三載臺中之僚必欲豫言其最君最在考功也人皆可得而知也然使人知御史考績繫於天下忽於君之考績始白焉此豫之厚君也亦豫紀天下之事其職也送通判孫君致仕榮歸序建昌府通判孫君徽之婺人也𢎞治庚申五月白于涖事者引年致政去歸其鄉豫居山始不知之也南城縣大夫鄭君使以告豫豫躍然髙君之獨出于人也夫人之仕也相處有僚屬焉和矣然四海九州之人也孰與吾父兄宗族之親趨走有吏胥𨽻兵焉順矣然以勢而相軋也孰與吾僮僕之便居息有廣厦邃宇焉安矣然以代而傳也孰與吾廬舍之世守登眺有池亭臺榭焉適矣然過則非其有也孰與吾鄉井山川之舊遊是其仕也宜非其情也歸也宜其情也然而世之人勸之留於仕也非必能有以使之留也而已德之有若飲以醇醪之甘勸之歸也非必能有以使之歸也而已讎之有若啖以荼毒之苦何哉吾嘗思而試之矣吾坐而飯粲茹鼎之習也吾驟而飯疏茹菜不能也吾出而髙蓋安車之尊也吾驟而徒步踽行不能也吾怒而叱吒又怒而鞭箠人不吾拒也吾驟而齊民之敵體不能也吾妻妾之文衣貝飾吾懼其驟有井臼之勞不堪焉吾子弟之脆膚弱質吾懼其驟有耒耜之勤不堪焉則夫仕也其情也歸也非其情也於乎世安求其有歸者乎幸而有歸者使出乎將相公卿侍從之臣則天下以為勸而恬退之風成矣其美孰大焉今而若君者則又出于偏方鬱職之中無以風動當世美而弗揚豫雖高之又以為歎也雖然吾郡與徽庶幾其亦有勸乎鄭君使還書以為孫君别送亞參王君之福建任序今制給事中諫官也其秩中士也與天子宰執分天下之責秩卑而責重故嘗拔甲科之英于百二以充必出特降而非序銓署列于掖門之左右無所於屬亦無所屬使若天子之親吏然示優異也又懼其內顧而撓也內庶府之佐外藩司之佐或虛焉間於是甄其年勞而登其良凡受節度之司雖尊秩不屑以授而其聲稱行實之孚及再遷也又追敘其初官而不牽于其曹蓋寄天下之公於平日而天下之敵有不勝其隂伺而非他官比者所以護往勸來亦不得不如是其至噫是列聖所以慮天下也非私是官也然則居是官者雖遷而去也固是官也又可始終自取異乎哉今閩藩右參議王君實兵科給事中以簡命往君嘉善人嘉善於浙為屬邑浙於閩為比藩並南服也以比藩之人而參議比藩之政於其民蓋情與習適事與俗宜非若秦越之懸隔然雖不入其境而已若入其境入其境雖不下堂陛而已得其半吾見政之無難成也閩之郡八其賦之大約僅當君鄉郡之一耳而又留輸折實之難易相懸君之先世世總其鄉以轉輸于司農鮮有敗事迄兹號為良氓君學於家以其精微蘊奧之餘舉於鄉取髙第給事禁中成補拾之功至為明天子赫其有擢有事於兹雖邦計之大抑用其粗者足矣而况君世處其難而今自處其易乎推是以往雖極君今日之職不足以盡君也惟其周流八郡海山萬里天晶日明登髙望逺島嶼諸夷隱隱于目睫之表而貢舶降幡可數可見披禁中輿地圖似不似又君思禁中時也思禁中則思吾君矣又安知乙夜之覽有及前之疏牘而心賞之賞其言而閲其名閲其名有不思其人乎噫君今可以登車矣送王生侍親之晉序虹邑王生侍其父户部君往參晉藩之政金臺王生其友也欲豫序其别豫邑子章孜師之因以請之豫固未嘗知生也知户部君耳虹邑百餘年來登甲第者君之前陳司徒也司徒之前誰乎君今為户部分曹序進與司徒同司徒為方伯君今為參政又同晉地也司徒之後復為司徒者誰乎君之性行孔良為户部十五年邦計考為比曹最用能有今擢其進未可量也夫人有所得未有不遺其子孫者則其式穀之似有在矣而况器類之似有不期然而然者乎然則由今而後虹有登甲科必生也生其勉乎哉噫居今之世其不以甲科而致通顯者亦難矣生其勉乎哉豫縻於是固未有遊晉日也梁惠王曰晉國天下莫強焉雖其當時之盛有不可考而山河之固自若也昔人亦有誇之者歸而見語亦探禹穴之遺意豫當為生快之郡閣承顏詩册序郡閣承顏詩一册東光教諭劉君為河間守謝侯作也侯守河間六年家在金金𨽻陜於北土最為隔越守之有事惟入覲考最得以出郡取便道以便其私法亦無曰當然迂道有譏有遣而河間又密邇輦轂當有事三日騎達有餘力無緣至金亦六年矣母太夫人居金然則六年不見也夫為人子未有頃刻不念其親不必六年也况侯早擢髙科官祕閣為御史宦聲卓然敻出人表拘於宦轍有六年不見之母安乎就如隔絶異域舟車不至人力不通猶思以計致之况金雖逺水道漢川陸出襄鄧太夫人所以至郡即中人可以指日不必侯即卑官可以易為不必太守也至之日維春之仲侯時亦覲還飾邸掃閣委政其僚前婦後孫自旦及暮既不可以嚴君又不可以大賓悼故以悲對時以嬉瀛水陸會也珍味以適口纎縞以便體盡太守之力要無不致者矣况六年孝思之渴如侯者寧無過用其情乎夫過不過未論也侯於十八州縣之民父母也十八州縣之民侯子也太夫人十八州縣之大父母也十八州縣之民太夫人之孫也父迎其大父母而養之為之孫者有不説乎士以郊迎女以户窺老以少扶幼以壯攜咸曰吾大父母至矣然亦非侯所得而強也無乃侯凡所施皆過用其厚而不獨其親也於此亦可以觀政矣東光教諭劉君教東光在理下以侯之位君子也語曰君子之德風侯之德孝德也經曰孝以治天下用侯之位達侯之德東光足教乎河間足教乎於是為詩一章為倡和者凡詩幾章册成因進士王世顯來問名豫名之曰郡閣承顏而又為之序名以頌侯郡人之教固於是乎在陶峰主人挽册序陶峰主人江君為南部營繕郎中年六十一殁於官營繕於部為劇曹君發其姦弊疏為節目吏不得逞皆不悅君者而僚之或忌或怠乘之故自大司空而外有悅有不悅者焉及是殁皆來會哭哭以詩者其未為郎中也守信陽州州舊為縣柅於兵衛新為州庶事草草而兵之噬民尚酣縣之抗州仍舊也君至一釐正之皆不悅君者而臨蒞者之來又無所攸為故自其公且恕而外有悅有不悅者焉及聞君殁莫不駭然興歎或歎以詩者其未為州也為進士乙未進士三百人其矯為虬龍降為淵泉噓為飄風君皆欲麗澤焉皆不悅君者而况君臞儒楚語取譏釣笑時亦有之故自其孚先之外有悅有不悅者焉及聞君殁近以車來逺以賻至皆哭哭必以詩者其未為進士也為江西鄉進士凡九十五人是為同舉未為鄉進士也為金溪縣學生凡學於學者是為同學同舉也同學也悅不悅不足言而詩之有無又繫於時之死生位之升沈人之能不能也然而亦已多矣其子縣學生珏懼其汗渙而不能聚也於是收於其鄉既免喪遍走四方而得之至京師而始備而其勞矻矻又可言乎於呼若君者可謂骯髒不茍合者矣不然始于人也未必不合合於其始未必不棄於其終又焉求其死而哭哭而詩詩而若是之多也耶詩必有序珏以屬豫豫合吳司諫之狀徐宗伯之銘傅宗伯之表董奉常劉宮諭之誄總為一卷而序之且謂珏曰百世之下當有知子之先君者送王必懋知宜都序成化壬辰豫同內弟王廷光學於撫次其學舍其旁舍則王君必懋與其弟必充肄其中知海州君必融其兄也時方家居誦其先侍御君之遺訓約二弟非嵗時伏臘不得輒休沐潛歸蔗餳茗荈蔬菹脯醢僕迭至焉亦飽及豫二人豫益喜其久相磨礪不厭也再明年甲午廷光必懋必充皆獲薦北上獨遺豫豫固喜三君之逸舉也乙未廷光登進士出宰虹入為南臺郎丙午豫始至京得舉順天丁未亦忝進士入翰林為庶吉士必懋必充方俟選天曹天曹授必懋知梧之興業必充判滇之廣南廷光亦免喪適至違十數年而一旦四人者天涯相會合歡然如初人事之適然不至若是也豫與廷光各為詩一章道其行壬子冬豫釋先君之喪還翰林明年夏必懋必充亦免太夫人之喪來謁選三人者别而復合又七年獨廷光僉事浙江計未可驟至耳既而必懋改知宜都必充改判寧波曽無幾何又為别端噫豫四人者其生也相距百有餘里初無形神影響之接戚屬延施之階而盍簪於邂逅之間兄弟師友合異為同計其當時所造豫之滅裂瞪乎三君之後而三君者亦蚤揚鑣上道翛然羽儀于彼雲外豫退然分甘陸沈而已而二十年來廷光僅佐外臺二君尚淹州縣之職造物者之無常人事之若沈若浮殆未可預期也如此然二君始任皆窮裔人為之顰顣不平而二君欲速化其冠服為母心悅故有不暇擇而今兹宜都楚之劇縣寧波浙之大郡也昔處其窮今處其通昔當其隘今當其大究其才而為之必聞必躋豈真終沈者耶必懋既行豫與司諫吳君懋徵追而送之酒壺既傾因與之話舊圭峰集卷八
