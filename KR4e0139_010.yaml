body:
  text: 圭峰集卷十明羅玘撰序慶南京守備掌左軍都督府事魏國公六十壽序正德四年冬十月戊申實維前南京守備掌左軍事魏國公六十之辰前事南京守備掌中軍事成國公偕駙馬都尉楊公晨至坐寺燕居之堂謂玘曰子宜序以頌公玘謝弗得至再又弗得乃進而言曰昔周之武王以有道伐無道撥亂而反之正寥寥千載我太祖髙皇帝出又以有道伐無道而俾亂復為治蓋又一武王也武王佐命之臣十人而詩歌尚父獨曰師而我太祖佐命之臣六王獨中山武寧王為第一蓋又一尚父也尚父封國于齊十傳至于桓公王封國于魏五傳至于公擬倫比類蓋又一桓公也成公曰善哉子之匹公之世玘又曰凡人臣之盛者務致其君于無為之化而會盟征伐乃其不得已者耳桓公九合諸侯汲汲乎人臣之不得已者公當全盛之時垂紳正笏于根本之地而措南服於泰山之安蓋公不屑為桓公而桓公欲為公而不可得者也成公曰善哉子之品公之遭然公世王孫也爵上公也而其本真不鑿純孝天至雖古獨行之士或難之桓公能之乎玘曰否曰然則孰同乎玘曰均世臣也乃心罔不在王室而功在社稷是則同成公曰然玘曰孔子之作春秋也於世臣之主夏盟者屢書焉孔子奚取乎取其心在王室為周之社稷計也又必二百四十二年僅得五人焉而孟子稱其獨盛又僅桓公一人焉不其難乎獨惜今之世無續孔氏之筆者繼桓公者幸有公其人也而續與不續固未害其為同矣是以從而曰又一桓公也今也世有嘗識桓公者乎無也何至語桓公人人如見焉桓公壽於天地間固如彼其久也公與桓公之始如彼其同也有不同其終乎公壽亦未易量也成公笑而起贊曰至矣哉頌人不當如是邪可書遂書之為序以獻壽貝母毛孺人七十序正德庚午元朔戊午之丁卯金陵壽母貝之毛七十壽豫序之按其世也毛六合故大家以六禮渡江來女于貝及今耕釣翁始任戴冠時相之越二年而鵬生為之子又越二十六年鵬生山為之孫蓋貝之瓜瓞繫焉豫前此未一至金陵而亦烏知之及丁卯豫以六月至間從龍山冢宰飲于江濱之墅蓋翁墅也始識翁翁見山于杖屨間遂識山明年飲于其室又見鵬識鵬焉又明年夏翁與豫經營東崖少宰之終至不愛時制之具推以畀之而或裏言外出那可能乎豫於是覘貝有令妻之助鵬時見豫豫見其冠鄉人也易之而聽其言也則非鄉人也驚焉曰鵬不能卒熊膽之志而今也強冠鄉人之冠忸怩耳豫於是又覘貝有慈母之教豫攝太學也山班諸生朝暮見明日之朝暮又如之其在他門也髙堂一任暖姝焉不曰赤日之鑠肌也則曰暑雨之膠髮也而論堂之庭無孌婉之迹矣豫於是又覘貝有大母之嚴雖然豫心度之則然耳而人之言之皆曰翁之少也鋭於學意謂毛曰若丐吾吾其學學既貫穿泛濫紆餘矣則又曰吾壯矣若丐吾吾其逺遊遂濟自江踰淮泝濟折而航乎東海之洋極日之所出入往而復者數四而後快志焉則又曰吾老矣若丐吾吾其耕釣于大江之濱若遂衣服飲食豫衆嵗日月至焉而已矣至則相對如賓焉由人之言之易家人之彖曰女正位乎內男正位乎外貝氏有焉由豫之度之家人九三之象曰婦子嘻嘻貝氏則無之繼自今有其所有乎無其所無乎所謂貝之瓜瓞其將不在兹乎而鵬之請豫序其亦將不在兹乎山乎其識豫之頌禱如此乎送刑部尚書何公赴召序正德辛未春正月丁丑軍吏馳自闕下告于南京守備兵部尚書何公曰天子其召公以入明日戊寅吏部傳所以命公者曰其以公為刑部尚書乘傳以來公瞻望宸極謝既乃齊戒筮日走陵下辭行一時部院寺之長二舉欣欣然為朝廷得公賀意若贊公上道毋宿命者而畿甸之民吏戎衛之帥數十萬之卒又愀然形諸色不樂與幕下文武之士色如之又甚焉意若欲尼公之行者同留務太子太傅成國公察知之西寧侯宋公又知之相與合謀於豫曰贊公之行也者是乎則尼也者非也尼公之行也者是乎則贊也者非也何居盍定之將以告夫公以為公别豫曰昔周公之居東也東人有無以我公歸之歎無他欲久其惠也而已兹而畿甸戎衛之心不有東人之心歟諸葛武侯之治蜀也參署事至于十反不厭而終身依依焉無他欲久其託也而已兹而幕下士之心不有蜀參署之心歟是皆私公於一身然也若部院寺之長二則憤夫嘉石肺石之近易位於大憝也而公昔嘗平之達之也且今之視昔何如也而顧可緩公乎是蓋公公於天下然也雖然幕下近也其為類尚寡也畿甸戎衛則逺也其為類也衆矣幕下戎衛卑也其為選未必賢也部院寺則尊也其為選也賢矣而人亦於是乎盡矣公亦可以聲音笑貌於其間哉公既然矣何道也抑聞之人也者參天地而為三才者也隂陽者天地之氣也周官品官之職曰寅亮天地曰燮理隂陽不知所謂寅亮燮理者亦於人焉推乎無也抑不知當是之時人宜其職君則官之若虞廷則固有讓者矣且今非虞周之世乎宜以贊公之行者為是二公以豫言告公而别公公去資軒詩序資軒詩凡二十有六首翰林庶吉士詠傳冠卿之號也如其人之數故不增冠卿意也吉士非達官冠卿奚取焉冠卿之尊甫體齋先生時祗命為吉士師余冠卿友也友有忠告之勸詩不以頌而以規逆先生心也余何以無詩余以窮齟齬幾終棄巖壑洎以國子生得與畿士試時先生握文柄誤在所録中往拜先生因得交冠卿而辱厚在人右是作也咸曰豫宜序之夫喻之與旴鄰境也然以湖而東西之道出大府不相值故耳相聞而目不相矚軒之有無廣狹華朴不可知也而資之云者易曰大哉乾元萬物資始至哉坤元萬物資生君子愛且尊其身名命於親不敢辱也有字焉字表於友又必自志也有號焉冠卿名元而號必以是愛且尊其身者宜爾也嗚呼君子匪其愛且尊其身之難也惟充其愛且尊之難也兑之象曰麗澤兌君子以朋友講習説之者曰澤以蓄水為德而二澤相麗焉其出也其鍾也其勢不能以兩敵而其相資浸灌必不至於此涸而彼盈也君子體此之象附麗朋友而講習之彼此相資而德器成焉言資之於人也孟子曰自得之則資之深資之深則取之左右逢其原言已之有所資也不知冠卿姑文以乾坤之資乎實以兌之資乎抑躐於孟氏之資乎為兌之資則是軒也殖殖其庭噲噲其正軒日益闢友日益來資日益廣將自得之自得之則資之深資之深而固左右逢其原矣萬物之資其具在我然在善擇焉擇焉如二十六人者其麗澤也擇焉如余也則先熇然其涸而幾終棄矣冠卿其何望於余乎詩云他山之石可以攻玉非是詩也余何敢序資軒太子太保吏部尚書許公七十壽圖序太子太保吏部許公當上改元五月之三日七十壽而被命入兵部為尚書亦維其時太史廷綸侍御廷美合羣子姓為圖以慶廷綸豫同官曰子其序之憶豫初冠聞公為御史在墀下有周子諒之節時豫居僻不能通知中朝事以為無復為公執鞭日也恨之暨來京師道河濟青齊間凡吏於其土者去而人思之若父母然或神明之慌惚公姓者以為公時或如張蒼之免故至此試問之果公也私念蒼厯百世公其亦然繼今可以為役矣後官于朝而公竟棲遲不齒朝籍思一見之而不可得豫且得告歸而西事大創議竟起公公翩然西驅猝有班超虎穴之入豫聞出汗浹背而公乃若旋蟻封有霍去病狼居胥之捷驚曰是何神也豫既反闕下公又翛然翔去口不言兵有韓世忠西湖之興然而裴晉公天下安危之繫又誰代公耶公亦不能卒私其身也豫之願至是始償焉由是而觀文潞公之大耋在廷北使之驚他日公有不得而辭者其理然也竊嘗因是而有以覘天之為人國其成一人之難如此蓋非始之以子諒之節無以聳天下之聽而非以蒼之免如身何非中之以超之勇無以駭天下之觀而非以去病之捷如人何非終之以世忠之退淡無以必天下之信而非以晉潞二公之重且壽焉如國何於以見天之成公蓋非私公實所以為天下國家而豫之序之亦非私於許氏將以為天下賀也顧其事體大故其説長其説長故踰年而後成之其遲遲如此云送冢宰王公歸餘姚序正德丁卯冬留都冢宰王公得謝事奉母太夫人去歸其鄉時年始六十餘也留都公卿大夫士相與祖公於都門外酒三行有起言公之歸者曰仕者之究惟歸之榮有以州縣歸有以部屬歸有以方嶽歸有以卿二歸莫不曰榮然孰與冢宰歸之榮有以妻妾侍歸有以子姓孫曽侍歸莫不曰完然孰與侍其母歸之完其年也有以四十五十歸有以七十八十歸然四五十傷於遽七十過於拘而八十又其衰也孰與六十為強且健夫當強健之年以冢宰之榮養既歸之親公亦樂哉斯歸也歟衆皆曰然公笑而不言豫因起釋公曰公之樂固也要以為盡公可乎公越人也少有重名勾吳以西湖湘以東使日月爭迎聘致以公至卜寵辱焉及起而魁天下朝之大夫士與天下之人以何如人望公哉豫辱遊久竊嘗窺之其無所蓋覆淵然萬頃之波而其徑情直遂則騏驥之騁康壯也卒然犯之壁立萬仞而不可即時而甚疾痛之切身以脫人之急其既也忘之至其身教於庭要似與異世人語而氣低髙雲為主本此其志視天下憂樂為何如而於一進退之間公顧樂乎顧愛日之晷千金自北而南南而不家焉勢不可也况當明天子以孝理天下清明無事之朝而留都之庶職有最而無殿可固縻公乎公故得自諉曰吾今往也汲汲而行徐徐而來也夫豈無其日也耶衆又皆曰然擊鼓傳觴命書豫言為公贈公又笑而不言蓋其於二説必有擇而處者也贈監察御史聶君廷器考績序留都朝天宮有大儀於是乎習之冬十一月已酉日南至丙午豫班監察御史吳君李君坐於西廡下以俟東白尚微臚句末興二君投瓊屑玉於豫如平生歡既而推移權衡以定錙銖古今人髙下又若推而內豫胸中者豫於是而得其院之寮且半而聶君廷器則豫踵之舉順天者然不知其資也幾何矣因私問之吳君曰君困禮部十有四年而其試户部也視禮部四之一比終婺源之事而入院視户部又幾倍之沈鬱困抑人也今始考三載矣豫曰物有之松柏之生其始也困於蓬蒿厄於牛羊及其終也閲千嵗而不改其鬱久然也嵗寒後雕聖人豈欺我哉吳君曰然李君復曰天下詬之易集惟令為然而弊之牢若石者其屯師之田乎師之所在犒之則衆盎之承溜而滲漏者之常涸也君在户部命兩犒焉無涸漏者在院以屯事出廬揚之田固師之田也去婺之日久矣巍然穹碑有慕德亭焉如君者豈易得哉豫曰物有之牛刀非為割雞與刲凡牲也時小試耳他日要不見有全牛焉李君曰然語未竟會禮作而起丁未又坐如初豫欲竟君而問其世二君曰君籍平原有以功官指揮使于燕者其髙祖也始為燕人有以功入督府為都督僉事者其翁也遂為今之名將家豫曰物有之易之象曰山上有木漸言積小以髙大也譬如為山未成一簣是在君而已矣二君愕然曰是為君針他日二君過豫曰悉矣先生前日之論聶君也院故例凡考必有書書聶君考無踰先生前之論君者請書之遂書為聶君廷器考績序送黃生歸石城詩序石城黃生𢎞治乙丑會豫京師生起縣貢當試內廷豫院主其試凡士之畢試冀再試得校官者十九生獨不然豫奇生也生南士也例業南太學而以行告豫簡司成章公俾器生别不聞者二載矣正德丁卯豫來二南寺生來如初明年畢事歸省其親太學友圖其行且詩之虛其上而見豫以請豫德生之不豫老也又病生之不豫憊以見釋也雖然閲其詩不獨太學友也有臺中之英焉蓋生甫卒業試事于臺有重名臺中之英其初亦太學生也不能不如太學生以友生然則言於生之行宜也生兹歸拜其親畢出其庭揖同業之士入與為禮且觀是詩焉俾知生入太學友四方太學之生入臺又友臺中之英則士氣聿興恍而寤曰鄉邑之士轉而則太學之生也太學之生轉而則臺省之英也臺省距台輔則近矣然後又恍而寤曰太學之生前日鄉邑之士也臺省之英前日太學之生也台輔之任前日臺省之英也翕然皆有台輔之望將自是始豫何得以病憊辭哉遂題其上嵗寒圖詩序戊辰季冬朔日甲子大行魏子坐豫清風之亭披圖焉曰是謂嵗寒之圖視之木也軀虬蜷而偃蹇枝蠖屈以盤拿葉奮蝟刺膚甃龍鱗貌者設巧亦本其真旁睨瞬較實傷厥神而竟莫得其名也大行覺豫良苦作而謂曰柏其仲也叔檜季杉橡樟楩柟椅桐梓杞未且朋籍而樗櫟柞楢入𨽻之伍猶未也衆木之宗其名曰松吾郡槎溪王姓耐翁吾私卜之松與之同嗣正壬子八十其逢吾縻於此餼牽壺觴孰為我致其惟非言而言郵而致之其代豫言謂斯之圖其庶幾乎羅子曰子欲求翁於松乎豫與子言松以懸定翁夫衆木之有液也柏則臭矣而明難桕則明矣而臭難兼之者松也詩曰左之左之君子宜之右之右之君子有之於翁何如大行曰不聞琥珀之生乎松之液是也是為世珍與玉爭衡而翁既韞櫝而藏之矣兼之云乎哉羅子曰人有貴耳而賤目者請置其形而象其聲其始微作也淅淅瀝瀝蕭蕭瑟瑟而已既其甚也呼號為狂奔放為虐若風雷之噴薄是之謂松濤或五里聞焉又或十里亦聞焉語曰在家必聞在邦必聞於翁何如大行曰嘻是未覩其絲之著于地也千嵗之苓伏焉醫師餌之頽齡以制而鄰之待翁以舉火者其去餌猶邇也獨未聞乎羅子曰窮冬沍寒衆木凌削退然索然如戰北之兵獨松於是時也鬱鬱蒼蒼如以端委揖讓乎明堂孔子曰嵗寒然後知其後雕也翁殆如斯而已矣大行曰先生之言信辨矣正豫之所謂庶幾者其在兹乎請書以為序而繫以羣公之詩遣使郵歸而獻焉望雲祝壽圖詩序髙安胡斯靖既得以已官封其父為南京工科給事中母劉為孺人喜拜稽首授制詞于歸伻曰吾親荷恩榮矣而今仲秋之十日封君於年為七十則又以不得歸為壽為戚又憶明年仲冬朔不得歸壽孺人如封君者于是步彤墀坐瑣闥則局蹐踧踖退而休于邸又呻吟於邑喪厥常度妻噤不得以言子驚不敢以問者久之劉景瞻其友也覺往調之曰書曰肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒樂乎斯靖喜曰子亦常知豫心若是乎吾欲從之而奚若曰服有君命在吾欲以請而奚若曰有制然則遂休乎曰惡有父母在而自為仕止者乎於是又大戚景瞻曰無傷也吾而使子無牽于制如身親之而親將見之可乎於是又喜跽請所以曰吾為圖子端委拜啓為壽者狀授嗣器歸曰其以而代文名之曰望雲藉重於古之大賢歟曰善則善矣又何加焉曰吾為子倡諸南朝之彥出其瓊琚玉佩之鏘鏘者鳴厥盛焉使人曰胡宗之雅頌歟曰善益善矣又何加焉曰詩不盡言圖不盡意若綱在網提斯張之序則綱也豫將焉往斯靖遂來而以圖見觀之意象梁公耳矣圖窮而詩見誦之組繪梁公耳矣疑之忽而諦觀之而沈吟斯徘徊斯覺若見公魁然長者也又覺若知公親所在也又覺若英英白雲忽往而忽來也蓋嗣聖中公也若法曹時公也逐雲而歸養河陽焉老已矣周牝之鳴孰消息之既移之鼎孰納之李氏之廟乎而世且無是公久矣况其親乎今之圖之重公也重公斯重其身矣重其身斯顯其親矣庶衆之養末也亦為之而已矣斯靖悚然起拜曰鎮雖不敏請事斯語矣豫乃樂書之亦以勸也擬河南鄉試録序河南鄉試録成是為𢎞治十七年八月日其晨監臨官暨提調官監試官率諸考試官諸執事官北面稽首拜手授使者乘傳以獻于闕既已然後乃敢撤棘揭曉張宴于藩堂進諸士以賓禮見由是諸考試官得各識其所取士為得人賀藩臬諸臣綱維于內外者董學政者諸被簡以充執事者諸秉簡書有事于此而贊襄者舉欣欣然快於其監臨有裨益之美又莫不喜夫河南中州也甲子科得人為文治之更端將汪洋演迤而布之天下自兹始其士也一旦出草萊得揖讓獻酬于冠裳間為發軔之初而自是登進士為士為大夫為卿為孤為公至功塞天地其終焉將以稱於天下後世曰𢎞治甲子科中州人也則是録也亦孰不願附名其間哉而或反是即諸在事者舉將避之恐後况柄是事者乎時柄是事者實巡按監察御史某所謂監臨官者提調官監試官所謂綱維于內者考試官同考試官印卷而下九官凡若千人所謂諸執事者題例三十七首文取可試者二十篇士之登名者若干人蓋制額不敢過也而録之所及止此是為録成然其先事固勤于提學副使某董領而胚胎之而臨事又密于布政使某參政某副使某參議某僉事某於外綱維之時巡撫副都御史某乃駐節會府闢翕以觀清戎監察御史某鎮守大監某亦有孚凝志以俟畢事所謂贊襄者蓋其志協故其事成可書也當序諸首故備書之不敢遺焉雖然諸士於此其欲人之願附名於是歟抑亦欲人之求避於是歟嗚呼其亦在自擇而已矣壽黃翁八十序八十翁黃尚德歙人也汪生璽稱外舅氏為之壻者於今十餘年始生未豫遇豫烏知生况翁也豫在太學生班諸生日揖焉生固豫面豫安能名諸生况生也及博士設講儀月有旬旬有日日至則舉班有籖籖有名名呼則出經有疑則趨而問問有難則跽而聽繹然秩然縱橫上下于堂廡間豫喜自是得遍名諸生乎匝二旬果然而生尤以善説詩得燕侍因以訪其山川土風人賢物産之槩而生也之門地戚屬尤其所欲先入於豫者也藉是知翁為令人為多藏之室生忽避席曰外舅之壽值重九前之三辰豫曰八十古曰大耋易離之九三鼓缶為樂時也子則謀之而已耳生乃默然去既而豫去復諸部生來卒業如初面有矜色曰孔子之言詩也曰多識於鳥獸草木之名信夫豫試問之植物也鄭之舜華云何動物也曹之蜉蝣云何曰舜木槿也蜉蝣渠略也而必曰顏曰掘閲者言其容也既已蹙然不悅曰天保之詩不有乎如松柏之茂無不爾或承非植物乎鶴鳴之詩不有乎鶴鳴于九皋聲聞于天非動物乎夫子之教何為取諸彼而遺諸此也豫曰是固豫之先子也物有不容乎容之澤乎外者其中必稿見有稿其中而能免於旦夕者乎舜與蜉蝣是已旦夕久之反也是以君子不貴焉物不有本乎傳曰其本深者其末茂茂則貞不有實乎傳曰其實大者其聲宏宏則逺貞與逺悠久無疆之禎也松柏與鶴是已而自古及今君子貴之生憮然曰聞命矣明年秋生入銓次告歸書豫松鶴之辨請曰以是壽諸外舅可乎豫追懲向也之拒之今弗忍奪也聽之壽萱堂詩序仙遊縣功建里壽萱堂成於𢎞治元年之二月仙遊閩土也余未至其地不能知張叔昭為余道之叔昭之言曰炫兄輝作之以奉吾母也吾母之年今七十有五矣乳吾兄弟四人吾父不及見吾兄弟之有頭角也吾母辟咡詔之前者勝衣後者冠後者婚前者抱子矣吾四人者視吾鄉人之嶄嶄者不敢軒且軒其於蕩覆或後焉烜也願食粵祿炫也魯困于鄉兹幸玷賢書與子同也尚惟縻此菽水不能進一匕蚤夜背負芒集于髙木之上不意輝也成此其楹之奠多也寡耶其垣之周厚也薄耶其制度之陳麗也質耶雖吾不能知而其方位廣隘縱橫崇卑吾以心度之亦不能言也曩而吾未來時吾兄弟之志先諸龜蓍矣未果也而今也始克遂事之成也有數乎吾兄書來曰萱忘憂草也吾樹之吾雖憂滿懷登斯堂仰吾母視其膳無噎哽候其步無欠伸瞻其顏無顰顣舒舒然不知憂之去吾體也不猶愈於萱也乎義名斯堂以壽萱爾炫其使斯堂少有白耶噫炫也魯罔聞知顧吾兄之命弗可置其以纍子可乎余既拜且賀又合能言之士為詩以歌之書所聞於其首以為敘洊恩光壠詩序監察御史新安吳君清甫始知胙城縣至縣縣之民若瘠土之葭牛羊牧其上而莫之能茁也居一年又若尫新瘥之痏痂則脫矣而瘢則隱隱也居三年又若餾餴氣之撲鼻滃滃然􅀢籥之煽而罏之焰烜烜也甫曰異哉胙城何昔者之涼涼而今者之熇熇也上其事于行院行院會于都撫以上于朝遂最君治縣功當贈其父如君官母如其妻會君尋召入臺中其官御史也前之奎章未成下今皇帝嗣位詔廷臣誥制一時頒之君請曰願易臣親銜如臣銜制曰可而君父鈍遂贈監察御史母江暨何也並孺人焉君歸焚黃壠上一時臺中之寮咸出顏色榮君之遭也有為之歌曰水洊至坎恩湛湛濡幽􅀢九原可作持琬琰洊雷震震匪迅聲殷殷天閽孔高今也近人生可死不可無庭訓有繹其義者曰是謂恩至而又至如水如雷然如曰洊恩是乎皆曰然又有為之歌曰墓門之夕兮下則磷與上星墓門之旦兮啼鼯與􅀈忽羽葆之擁笳鼓兮行行天丁龍亭屹函虬鱗羊一豕一秬鬯馨開函宣制谷應山鳴又有繹其義者曰是謂寂如暗如而忽喧如焚如如曰洊恩光壠是乎又皆曰然於是羣寮彚矣各奏能矣琯若林矣蟾蜍涸矣而乃英英雲升矯矯虬騰霄虛星熒江白瀾驚富矣麗矣君喜曰若是足矣虛其右方謁豫書之為序齊壽圖序翠渠周先生去蜀歸莆幾草年年亦八十矣而豫則念莆未嘗一日置也或知之問曰公於先生舊乎有德乎抑麗澤之資乎豫曰無之未嘗一日識拜先生其前也曰然則胡為若是惓惓也豫曰先生釋褐守廣德豫時家食也有傳祠山之辨至者覽之驚曰兹非有虞之時乎胡為重黎氏出也繼其以儀部來守撫撫之屬縣宜黃與豫疆錯忽而保伍聮屬之法浸淫逼我牆屋矣覺之驚曰兹非成周之時乎胡為舉大司徒之職也無何移而守鎮逺鎮逺羅施鬼蠻接境也又得所著府志讀之歎曰是謂箕子之教也去鎮逺而參蜀之政生致安氐覆其巢而置王官焉又歎曰王然于之開西南夷是過乎彼亦屈兵威而然也此嘗一矢一鏃之遺乎均之治鎮逺也俾夷為華而已矣若其治廣德與撫也則均之復古而已矣誠使世之為吏者人人俾夷為華焉人人復古焉其裨益世道何如哉吾為世道惓惓也或又曰世亦嘗有復古者矣卒之不可復而亂生鶴鳬之脛有言不可續斷之言華夷之大辨也况無若咻之者之衆也豫曰必若子言是懲新周而右捐之也宜咻之者之衆也雖然孔孟亦病乎咻而卒老于行耳於先生也何尤監察御史林雲從先生館甥也適齊壽圖成聞之喜曰是可以壽翁于世世矣請書其上為序歸獻之曰齊壽者且壽吳宜人也豫念無拒理從而聽其請送二守何君考績序吾少時讀昌黎文知道有何之姓堅其秀出賢者也及官于朝則慕東洲熊公之清簡壯何道亨之敢言至拜其廬賞劉質純之長於輔導為同年光三君子皆道人也獨右堅賢耶遂不能忘懷於道以道告者受也積久之道在吾目中矣因悉其麻灘所從入之道古鑿絶壁腰腹間以通行人其突兀犖確則以踵曳而匍匐撑獰其缺􅀈坎坷則以趾先而凌兢躑躅視閣道險倍之特近焉爾水經其下雷霆震于地中險於是稱曰小瞿唐則宜噫異哉在堪輿家法是之謂地軸地軸密厥壤吉道或以之吾縻留都時除目報下建昌同知得何君君道州人吾時求道急道幸亦有臨我者乎既休歸卧山中君入山講主賓禮語達旦弗求休乃知堅其遙遙胄也東洲其外舅氏也道亨其同姓而質純其先大夫同年也伯兄髙薦梓文以式仲兄亦梓其文也然後益自慶若有潛通焉以得君者方將與之泛西池追逐雲月為勝賞而宣使之牒且晨下不果留莫而憲牒又下匪輸餉則平反也由是府之席虛館之突黔者多矣無何巡院最上曰才都撫最上曰賢繼為之最上率若是民亦曰最當若是安之及是滿三載當上考行太守韓君契君深知吾之意屬道及君也屬言其行吾方隱度君之成也其本諸家世戚屬父兄歟抑地之靈使然歟道之賢今方彚征闕下必有能辨之者君既至為我問之平冦録序正德十二年秋上命都察院左僉都御史王守仁為提督召官裒兵開軍門于南安用翦平諸冦孽為民害者于時應召而來都指揮僉事許清至自司知府邢珣至自贑某淳至自汀伍文定至自吉李斆治通軍門指揮郟文如之指揮余恩自贑至知縣王天與自寧都至張戩自程鄉至南康縣丞舒富先立戰功亦在選胥集纛下軍門審分之為十道道與卒千釐為左右翼兵備副使分守參議以精兵衛餉道比遊擊軍門隨以推官危壽指揮謝昶馮廷瑞卒千殿中軍下令曰惟天子不鄙夷守仁俾與二三臣承兹大役顧就緒不就緒國有彞典在卒其曹誅伍畀在守仁又曰兵法攻堅則韌乘瑕則神吾度桶岡逺左溪橫水逼且屢衄瑕果乘之則且瑕易與耳衆喜曰得乃十月已酉馮中軍趨橫水則清珣天與右翼趨左溪則文淳斆恩富左翼趨文定戩且趨且擊以遏奔衝約與中軍會甲寅中軍逼橫水而陳以緣旅猱升絶巘用夜半燎起炮訇林壑震駴兵環蹙之賊愕不能兵走至黎明破壘五遂破橫水各道乘勝破壘二十有三遂破左溪中軍則閉營休兵以先各營會湖廣巡撫院約犄角桶岡不為應戊午令各道縱進至己巳凡破壘二十有五諸附橫左者悉平乃領兵笑曰五日桶岡耳牒匙龍入利十一月癸亥令十道俱發冒雨吾疾登酋已背絶壁阻水陳珣亂而前戩衝其右文定繞其傍急擊之賊少却富王天與疾趨接戰賊奔淳迎擊賊敗甲戌合兵大戰賊遂大敗破壘十有八乙亥合湖兵追奔遁者至丁丑破壘十有一凡六十日破壘凡八十得大酋凡八十六於是百年逋誅之冦隤然土其崩矣嘻宸樞廟算一何神耶然而江西巡撫院帑銀兼萬之齎巡按院紀驗著功之詳副使參議餽餉之周湖廣巡撫院參合之勢可少哉方嶽羣僚大悅裒詩次為平冦録於以為國賀為天下賀來屬玘序玘懼或塵乙夜之覽名氏不敢諱也乃燧孫氏金秦氏兩巡撫副都御史僑屠氏巡按御史璋楊氏副使海黃氏參議又推本吏部尚書華守仁父也用獻吾君益重世臣焉是為序長興曽氏族譜序譜云者譜吾之所自出以逮於吾也吾之所自出有至於忘焉者逺故也吾之所自出至於逺且忘之則凡分吾之所自出有至於忘焉者無怪也矧分日益多逺日益甚其或遂至於虐且亂焉者亦有之矣當是時使譜法素明又寧有是哉長興曽氏金溪大宗也旰水一出境委焉有江都君者又與豫好其子漢故在諸生中豫特寄目焉庚午季冬漢北上持宗譜一編來請曰先君嘗欲釐正此漢不意庶幾成之先生若念先君而幸賜之序以為曽氏規先君即不死也豫受而觀之先之曰小宗譜自洪而上距孟昭凡五世凡孟昭之所出皆與焉大槩從睂山譜也次之曰通譜自洪之孫而上距澩凡十八世凡澩之所出在長興者皆與焉大槩倣廬陵譜也又次之曰源流曰會譜有二其一為陶原祖南豐其一為南豐祖撫州吉陽南武城自千而上距受氏之始凡若干卷而受氏以來遷徙開闔留其大都焉大槩述陶原南豐譜也漢又曰先生賜之序以言漢志漢即不利猶利也噫漢何汲汲於譜也如是哉雖然自南武城生大其學紹孔顏開思孟使後世均公而祀之而三氏之子孫或官其人或復其身曽氏獨不與往往能自奮起為世名人與彼三氏抗今復有如若人者出焉豈特不忘其所自出而已哉漢明年南歸書以歸之圭峰集卷十
