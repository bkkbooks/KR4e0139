body:
  text: 圭峯集卷二十七明羅玘撰詩七言古黎太監永思詩大家東征逐子回子如從龍母當來龍飛在天隨百雷蠎衣玉帶晏清陪有羮可遺答涓埃髙凉墓水黃猿哀榖異死同趨夜臺慈烏啞啞傷痛哉負土封丘如黃能長楸森森手自栽寺人孟子心未灰凡百君子詩可裁戲贈楊蘄邵三君子楊十二嵗中舉蘄丹徒人卲許州守蜾螺螟蛉侍側豪江漢浮萍刺眼毫酒狂自大心陶陶曽同靈均怨作騷一腹奚足吞江濤古言聚灰曽止滔此事何異海可舠四䕫標榜不與臯直追那頌置我鼗冥搜罔象歸籠牢火炮鐡柱沃以膏灼膚熸骨焦皮毛钁天大斧斬鬼刀支祈可繫百丈絛荼壘畏避潛栖桃叱穆借駿手指騊擲下轡把造父操崑崙險幽龍鬼韜命赤郭食日幾遭入幽探怪氣愈驕陋彼嗜瑣溲溺槽歸來疑仙或疑妖女妻驚怕僕妾逃詞源如井引桔橰倚馬可待書者勞調髙和寡中路號曵我鷦鷯出蓬蒿關西夫子披錦袍鹿鳴初歌髧中髦大弓水犀鐡甕􅋶許昌使君秉干旄燈前促膝吞醇醪狂夫大呌仍嗷嘈載鼷以車向我嘲岱宗為卑此㑹髙送王院判弟醫官歸宜興蘜藭在山杏在林虎其守之爾誰侵伯也視垣目彌深執神之機為國琛跂豫望之如望霖猛於縮地天顯心入門爆麻發吳音飲以清夜橫斗參劇談醉戲雜五禽夜䦨曉合聞球琳海噴祥旭清妖祲光翻丹極射黃金眼飫興狂殊不禁走馬宜蹴隂山隂丈夫骯髒肯陸沉誰家萬杵秋風砧故山無人洗藥鬵有力如虎僕可任手牽餘皇疾飛鵀我重其别臨岐吟送竹坡歸真州江邊飛將猛如虎手持神臂二石弩白叟呼之立少許立竹之隂不知午叟初栽竹栽一母母生兒孫孫縷縷竹知叟恩叟不語試離竹行數十武誑竹無知遂飄舉百里千里析津府竹誰灌之畚以土將有兵士環如堵叟前呼之竟何取叟今疾趨若風雨蟠桃夀圖江侍讀先生母八十花開花謝花成桃穆昔花下聽雲璈狡兒擺手攫不得屑屑覆射空饞叨水晶之盤照日月星宮之君手所操傳聞此實妙辟榖三千嵗齕凡一遭五城十城博尺璧較之此更如毫毛况人生有母在閣南山配彼端匪髙肉飛上崑崙絶嶺奪虎爪下懸萬猱或承九龍自西極王母晝下驂六鼇氷盤照室光閃爍勾吳水府鯨鯢􅂒紫微垣髙見天目駝槖螭首今誰曹欲驅飛車離帝所兩耳鏜鞳錢塘濤曉呼黃耳負圖去便覺青鳥聲嗷嘈送呂知縣之太寧山行有虎溪有蛇人行百里無人家村氓生怕到縣市更有蛇虎紛如麻朝廷養人如養子此輩毒人蛇虎似明朝忽報新尹來震驚百里飛狂雷虎耶蛇耶在何所山翁隔溪相喚語此縣百年無此舉日磾調馬圖為吳克溫題秺侯熟知馬牝牡不識蛾眉形好醜低頭摸馬恐馬瘦膽碎渾忘身有首玉趾之前盧令令耳邉亦覺怒猊吼欲拚百死問金人雷霆在上敢開口挽鄧屹菴詩屹菴先生墓上石飛蚪蹲龜新勒額妖狐不敢卧其下山鬼呵護火通夕樵夫驚見走折足過客仰觀讀如譯久之意象度百過奉政大夫字飛白前時石小字畫刓秪今字大銜亦易乃知生男如仲謀胸中豈乏還珠䇿聖皇褒賢常及親用此照耀賁幽宅先生蚤嵗兩振鐸庭館春風歌朴棫况當聞禮聞詩餘橋梓隂陽真一脈都勻苖獠等猺獞賣刀買犢笑啞啞先生墓石行又鐫百年劍水增載籍題潘以正杖化龍圖葉公好龍所翁畫晚嵗取次真龍下青綃綘綃相戰時九子弩力江中射人龍雜揉古其然此杖是龍久當化狂巫姦夭萬鬼泣兒嬉造化任呼吸動搖坤軸上帝怒褫杖殛死復何及騤騤龍飛雲雨濕荒陂幽湫人莫汲夀丁坦翁七十詩非僧非童頭亦髠行年七十口自言十二月吉置髙尊天瓢酌翻麻姑源忽驚趵突噴火敦當壚彪􅀈犢鼻褌霓裳舞隊集良媛西河渾脫傳黎園曼延眩人雜黎軒緣椿飛空弋縣猿遏雲仲箎和伯塤王母欲下雲旗翻委以錦組綴璵璠彼姝翩翩駐西奔靈藥詎恣蟾蜍吞刀圭入口到骨恩羣仙騎鯨上朝元鯨饞吸尊涸無痕褫其荼壘無司閽遂令鬅鬙百孟賁中道而立要朱轓誰更口大張如盆坐之上座享禮繁勇能吞海為世婚尊邉尾閭幸我存飲河飲渭真吾孫王克承按江西道姚江省母惠文岸岸山立齊直當黼扆之東西猛腦鶻擊赤狐走虎豹在山誰采藜虞門四闢集鳴鳯周道蕩蕩驊騮嘶重瞳尚疑紞黈塞日暮幽屋啼寡妻又疑隂隂出寵賊敗甕臭腐生醯雞盱睢一種老鶩鴈以死博利無噬臍官曹如在伎兒子眩亂黑白眼著眯皇威震動誓無赦漢熂北讋曽庭犁君當一面江之右此實餌筆之壑溪仰思簡在明並日况柄以斧斧以携舜江東頭大門屋未到百里為㑹稽倚門星星笑且語鵲噪繞屋旋而棲前驅兩兩赤鞾袴察院銀字分明題照山欲動水欲沸旌節婀娜人填蹊鄰兒詫見衣上獸云是虎豹麒麟犀升堂一笑見顔色昔在地上今登梯入㕑飣餖執匕鬯自曵薪入妻掃􅀢官貧未具黃金􅕌有酒且注青琉璃南山雖髙未足祝有過一劫南浮提劉母七十封安人兩慶詩贑灘二十四至此舟人落帆趨入市木鐸道人呼淨街白頭病嫗出呼豕掃除如砥到縣門五步十步一結綺舟人眼眩腳顫掉屛立背面人如蟻縣官身騎六駁馬短亭五里長十里龍幢雲旌羽葆纛日月虹霓分旖旎黃衣聖人坐紫宸黃麻飛下泥金紫卯金之家太安人兵曹之祿寧馨子恩波浩浩沃所生母以子貴亦其理天門使人若神仙安人夀域坐一几東筵坐令西坐丞附耳竊語嘖不已操觚丐飰道傍嫗雲泥懸隔未足擬四百四十甲子餘先庚後甲良有以縣官持觴天使醉誇吾縣有德爵齒兒童浪看舟人記如飽飲食誰禁止到京細向兵曹言兵曹亦喜吾亦喜圭峯集卷二十七
