body:
  text: 圭峯集卷二十四明羅玘撰賦西成賦庶吉士時作噫呼嘻天地之大也其惟稼穡之功乎南金提銀海貝蠙珠瓊英琅玕玻璃火齊炫眸晄目豈不班如玩之不可以潤渴把之不可以療飢况夫萬類瑣瑣以賦形百工矻矻以支離如沙如泥如纇如疵何重何輕何補何裨微此稼穡者吾不知天地其何如故洪範陳而歸諸土性無逸作而戒乎不知乃若招搖指牝牡平太白出辰角明潦水欲涸白露其零時則黃雲滿野冉冉離離彪兮駁兮黼兮黻兮甌婁汙邪凹凸昻低既因地而錯落亦隨風而紛披斯亦竒觀也至其種種異狀色色殊科縷數毛舉不勝其多總之名曰禾雖然亦有可名者載諸周詩見於爾雅糜芑稙稚兮秬秠稻秫菰粱兮粳稌審重穋於早晚配稂莠於稗荑淄澠美惡皂白真假皆馮藉乎先農與古之司稼更僕興論兹固未暇且今觀之豐年穰穰伊誰主張實倚怙乎帝力而冥受於蒼蒼然而天與不取或承之殃麋鹿猿猱狌鼯山􅀈猳􅜏之與㕙䨲常渴嘯而飢號口張囊而腹槖齒截鋸而牙刀一有蹂躪遂成糜糟農乎農乎寧不懼乎於是協比伍告族閭手銍腰鎌整箱飭車或千其耦或萬其夫或徂隰以徂畛或遵道而遵途足駢駢以蹀躞聲沸沸以喧呼較昆陽之戰而少緩視鄒魯之閧而頗粗列秉穧於櫛比斂穎栗於貫魚滌滌乎烈焰之焚漭濸粼粼乎狂飈之捲鄱湖遂乃以裒以束是任是負我車我牛連連截路敞堅場以谽谺各奔門而竄户所餘僅存幾何亦遺䆅之與剩穭諒非暴殄乎天物豈無飢烏兮餓鼠但所惜碾磑之聲方殷而催租之吏已塞於環堵雞豚一空庶脫箠楚其或破甔殘罌秒存合纍倒輸富屋寧俟陳腐異哉富屋之兼并也亘環數里且藩且牆亦有髙廪以相屬或崇露積而上襄列行行而稛庾綴磊磊而倉箱從其手可釋矢衡不倚如截肪唯知封殖而漁獵寧恤枝瘁而本傷夫民邦之本也母乎上食民之天也生於農一人有慶天下為公貢賦粢盛厥有常供固匪桀而匪貉一皆酌乎厥中奈何兼并之徒奪天之功而肆兹窮凶徒使百萬元元苦骨勞筋痀僂胼胝皴皺瘃龜舌未餂乎肥脆腹未識乎甘葷衣飛蚤虱面涅埃塵雞鳴出以為或晚帶月入以為猶曛知有父子或忘主賔子露膝而出汲婦蓬首而曵薪迄無分於老稚乃終嵗而勤勤比有生而酌量伊孰甘而孰辛嗚呼鵲之巢也鳩則居螟之子也螺則負世固有此竭其力彼享其功者也而何獨農乎謂豫不信請質天公寬齋賦楊方震兄方大號齋索豫賦之寬齋主人將營齋廬召匠阿剌忽鹵計之忽鹵曰粵昔古初巢處穴居棟腐於藪瓦璞於塗孰店孰楔孰牖孰樞明胡取諸離婁巧何用乎公輸吾匠用之未聞也聖人取諸大壯而棟宇興焉烮山澤取煆礪液滿擁腫痱癗樛瘤過之弗睨仆之弗收苯尊而􅣈嵑者必斬修竦而翹翛者必斬川以浮之輦以致之斧之鑿之方之斫之磶支泗濵之浮甓礱河濵之埴工不移時役不終日峩峩乎明堂峞峞乎衢室吾匠氏之能事也今兹主人爰舉是役寬乎隘乎崇乎卑乎窔奧乎敞明乎朴素乎靡曼乎惟意所都吾將是圖主人曰若亦知有崑崙乎吾將往搆其顛焉忽鹵曰吾聞崑崙之顛上負太虛沆瀣陸離靈光葳㽔日月至其背而蔽虧星躔繞其腹而縈紆黃河奔如絲之脫軸五嶽峙如母之餔兒昔夸父逐而不利其反博望遡而竟迷其途鵬飛兮翅必折駿騖兮幹斯瘏雖有良材萬章健步千夫不過舉手揶揄撮脣胡盧而已主人之志寬則寬矣而忽鹵弗之任也主人又曰若亦知有渤澥乎吾將往搆其中焉忽鹵曰吾聞渤澥之水衆瀆所瀦爰有天地是為尾閭湯旱七年而不涸堯水九年而無餘其湛天也萬象灼於經緯其浮地也九州連於舳艫龍伯深宫而養怪鮫人晝出而泣珠毒霧浡潏兮羃罩腥風鬱律兮呶呼即假桴於宣尼借助於馮夷亦何勝其鏜􅝅受其支吾也耶主人之志寬益寬矣雖有粟忽鹵得而食諸乎主人曰噫是非若所知也雷之伏於地也無聽耳至其震而鼓萬物披金石搜夔魖簸蕩六合有不勝其聲者藏也雲之腹於山也無見耳至其出而布萬狀冒泰華翳日月瀰漫八極有不勝其形者斂也是故斂必有散弛必有張或至眇而不覿或至巨而靡藏一吸一呼忽炎倐涼若其欲聞吾之齋乎維天吾瓴維地吾甓兩曜炅炅實牖吾室八方幢幢實監我墉彩雲漫漫雕榱畫椽明星煌煌燈龕炬堂四時遞傳而不觸吾之竅隙萬彚繁夥而不充吾之步廊吾於是闢禮門由義路啓智閫敞仁户忠信兮吾之藩籬詩書兮吾之府庫不鑰不扃不干不櫓於何不充云胡外取乃若疾霆破柱不暇掩耳而吾以為豆之堛於鐺也靈鼇震掉無所措躬而吾以為蟻之緣於盎也筆之卓也匡廬之嶢嶕硯之瀦也洞庭之漭漾閲冬夏於朝昏瞅方輿於指掌吾方有事於斯也若亦能預吾事乎忽鹵帖然自失仰而歎曰吾聞至人幕天席地飢飱風露渴飲涇渭吾始以為遺誑也信有之刓吾斧不足以發其柿絶吾徽不足以銷其疻涸吾思不足以究其制始知曲藝之不可角於君子也於是俯而慙趨而退而主人方且優哉悠哉不有於物任其去來雖栖遲於一几一榻實夢古帝而外形骸惟其心也無畔無岸無涘無涯亦可俟乎結構而後謂之寬齋調伏以瑞合聞韶計升觀鼎溥天率土同軌殊途乃眷牧守舒侯閣下辭白雲司作赤子母霹靂手吾方樂聞魏闕心乃其屬念命倌人以夙駕差吉日以于征四邑四民一德一心皆曰執言在士吾徒吾道同聲同氣敢謂讓職於他第恐淮陽長孺難再卧於郡中忍使河內雍奴不借留於闕下是用效顰樂府從兹代刻口碑詞曰江上漾金波波光渺渺紅日初升萬方曉驛前楊栁盡繫金鞍腰裊驪歌唱發得雕梁繞天上麒麟人間鳳鳥萬口歡聲使君少此行去也留作中朝儀表甘棠在歲長青青杪右調感皇恩竊聞錦因何製琴以宓彈順江漢下而朝宗同辟公趨而述職所以明府鄭侯閣下以蠻觸視縣境等燕蝠為民爭秉燭龍之明藉仙鳬之疾俾夜作書自旴徂燕氓𨽻固比屋而興思儒紳聊陳詞而寫意詞曰風拂桂况直黎明雨霽旭曈曈穿睥睨沙頭人語彩鷁如飛誰繫空負攀轅留計但恐此行留作礪遺愛碑當製右調謁金門秋染霜林萬里絢天張赤幟水歸寒壑千尋徹底浸琳宫况雨畢則梁成可星言而夙駕兹遇邑大夫髙侯閣下秀出岷峨世基蜀益弓冶擅專門之業橋梓承趾美之芳懲雲途屢蹶霜蹄乃花封暫淹驥足朅來無愠出治有方惟屬詞比事藴諸平時故剸繁治劇乃其能事甑雖生塵不顧圄惟有草則安以法令為師視蒸黎如子赤棒在其左右陽鱎不敢誰何人徒感之鏤骨銘心士則知其通今博古頃者書最藩司飛鳬帝里孰不願執鞭而向導人皆欲截鐙而攀留其如鷁首既東蕩破碧波之月遂使葵心傾北仰穿紫閣之雲舉旄倪畢來瞻之矧宫牆在所督者竊效輿人之頌用配蒸民之詩其詞曰昨夜山頭明月照四郊如書曉來車騎如雲向郵亭分手飄飄兩袖天風醉數明春宫栁定留金鼎調羮肯南天回首右調好事近圭峯集卷二十四
