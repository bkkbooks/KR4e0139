body:
  text: 圭峰集巻二十二明羅玘撰襍著襍說一首贈韓君國器歸省華亭楚人有賣卜於卭僰之區者其隣之商室于僰人之地且十歲矣僰之貝璣鐐組羽毛齒革盡輸之東之藏盈䭾而出之辰西之藏溢舟而下之梧二藏之鑰牡如杵然僰善狙亦無窺其際者楚人僦其廡下居之日累其直三年得百金焉夜夢入其家父呼之休母飲食之寤而泣焉旦告之商槖金裹糧接淅而起商曰噫吾一年而夢是者三二年而殺一焉三年而又一殺焉今則無矣以其僮槖千金儐之既至而二室之親尚無恙楚人之室屨之蹀于户稯稯然轡之繫于楹簇簇然而商之室門之甃苔覆之簷之隙蔓刺之聞有泣者矣楚人曰咄吾始入僰而肩之縮者三日居三日而始敢喘息又三日飲謦欬始敢望其門至授吾以廡已十日矣於其謝而歸也終不敢視其面况其僮之槖兼數人之力而吾之槖若槁葉之在吾臂也吾以為僮將揚揚其聲光人亦多其金也吾將挾吾龜策而徙以避之而今若此吾惑焉間過東家之叟而問之叟曰商胡為乎不偕若之來也曰根盤厚病於遷叟曰然則日念其親也幾何矣曰忘之叟曰是鄉之梟獍也不腰於市而已逭於天之戮僮何為者邪其能招招也若安矣若之室已馨矣是之謂天全是之謂泉原是之謂濯纓而又何憧憧邪院中小吏亦楚人道其事於予予方為是說㑹韓君國器來院告歸强予書之而去襍說送王資博山氓患虎也凡可以制之無不用也至坎地以穽其身虺穴其墉而伏焉不知也川氓患蛟也凡可以制之無不用也至沉鐵以臭其居蜮伺其影而射焉不知也舟師急風也至呼嘯以招之及其傾檣絶繂曰風之罪也田夫急雨也至雩祀以招之及其破畎決洫曰雨之罪也夫虎蛟虺蜮皆殺人之蟲也而人有避焉有不避焉見之蔽也風雨人之所取於天以利用也而或以生害焉乘之過也嗚呼見之蔽乘之過一夫有之且以禍其身如此百乘之宰千乘之諸侯天子之宰相葢亦一夫之積而至此其大獨不爾邪同年王君資博出宰平陽政其此始可觀也見不蔽乘不過可以為相况於諸侯乎予以是說堅之襍說贈呉獻臣宰順徳鵲之鳴也福來烏之鳴也禍至未必然也人之信之有不好鵲而惡烏者乎直之言也興邦諛之言也喪邦必然也人之聽之有不惡直而好諛者乎嗚呼禍福之未必然者則泥之興喪之必然者則忽之惑之甚也賀卦夀呉封君賀利見大人亨彖曰賀王明庭實旅百大往小來用上吉用下不利君子貞稱物平施其道不窮也象曰加貝賀君子以聚朋友祝頌宴樂初九門有禽或益之十朋有孚于室吉象曰有孚于室禽可入也九二以其𤣥纁吉象曰𤣥纁之吉其志遂也六二賀之駢駢萬目睢如厲无咎无譽象曰萬目睢如羣恭敬也九四西鄰殺牛以其濡于饋亨象曰時然之饋用相濟也九五朋用玉斚醻于中庭書日三頌有孚貞吉象曰孚主之吉頌以正也醻用玉斚匪夷器也上六壺矢班如不溺以其鄰征無咎象曰以其鄰征不盡人之歡也西溪漁樂說漁與樵牧畊均以業為食者也其食之隆殺惟視其身之勤惰亦無以異也然天下有傭樵有傭牧有傭畊而獨無傭漁惟其無傭於人則可以自有其身作吾作也息吾息也飲吾飲而食吾食也不亦樂乎葢樂生於自有其身故也若夫傭則身非其身矣吾休矣人曰作之吾作矣人曰休之不敢不聽命焉雖有甘食美飲又焉足樂乎豈惟傭哉食人之祿猶傭也故夫擇業莫若漁漁誠足樂也而前世淡薄之士託而迯焉者亦往往於漁舜於雷澤尚父於渭濱然皆為世而起從其大也而樂不終至於終其身樂之不厭且以殉者古今一人而已嚴陵是也義興呉心逺先生漁于西溪亦樂之老已矣無它心也寗庵編修請曰仲父得無踵嚴之為乎先生曰吾何敢望古人哉顧吾鄉鄰之漁于利者樂方酣吾愚不能效也聊以是相配然耳有聞而善之為之說其事以傳者羅玘也南城人何德彰字說地之隆然坌突與夫㟝嶁坡陁可以生植者皆山也有山之德也而楩柟橡樟虎豹犀象生焉琳球琅玕出焉極其用至於出雲氣雨下土則無與五嶽爭功而嶽亦用是以華且尊凡有目者皆曰是嶽也山之德必如是而後彰不則天下之山而已矣山之德不足也地之窪然停瀦與夫潦泓潢澗可以灌載者皆水也有水之德也而黿鼉蛟龍吞舟之魚生焉江河淮漢天下之水洩焉極其大至於涵列星浴日月而出之則無與四海爭能而海亦用是以華且尊凡有目者皆曰是海也水之德必如是而後彰不則天下之水而已矣水之德不足也惟於人也亦然一善之士天下之山與水者也聖賢者山之五嶽水之四海者也德不足而不能以華者一善之士也德彰於身而自華者聖賢也吾友汪昇之謂金臺何氏子景華字德彰而求其說於予噫德彰其有志於聖賢而不畫於一善者邪雖然萬古一聖千古一賢聖人吾不得而見之矣得見君子斯可矣登泰山而小天下觀於海者難為水此則聖人事也德彰以為何如何氏二子字說金臺何景華二子伯讚仲謙生富屋習不侈居通㕓言不嚚如在簴之鐘而未鳴也如飭轅之車而未載也其既冠也友人汪昇之用之偕來徵字於予適有鐘鼓于宫而車過於前焉舉鐘而謂讚曰若知鐘之為器乎金以質之火以鎔之土以笵之血以釁之追蠡以縣之筍鐻以登之而非木以發之簴上之一物耳毁之可也棄之亦可也訇然之聲誰知之邪人之有德猶鐘之有聲也其藴而不自彰也猶其聲之藴而不自鳴也及其一遇於人而讚以揚之則近知之逺知之最逺而天下後世亦知之而德斯彰矣猶鐘之擊於木而聲之無不聞也請象於鐘而字讚曰德彰可乎指車而謂謙曰若知車之為器乎輻以幹之輪以運之轍以持之葢以覆之狶膏以澤之牛馬以駕之而非收以載之道上之一物耳毁之可也任其敝亦可也致逺之用誰取之邪人之有德也猶車之有收也其虚而足容衆善也猶其收之虚而足以多載也故凡衆善之來而謙以承之則小不遺大不遺焉又最大而天地事物之理亦不遺焉而德斯美矣猶車之虛其中而收之無不備也請象於車而字謙曰德美可乎升之兄弟喜起揖曰實大者鳴惟爾德彰之行器虚者容惟爾德美之充顧二子再拜受教而去伍全字思謹說伍全伍朝信子也年十八學將世其家朝信速賓冠之以冠必有字來丐予予字之曰思謹而告之曰耳目口鼻髭睂毛髪四肢具焉然後於人為全體故聾瞽跛躄齁瘖􅀢鬜皆全之累也駢拇枝指縣疣附㾲癭腫瘢黶之類若或益焉卒亦累也然有生而隨焉者有誤而致焉者有自取焉者生而隨焉者天也誤而致焉者不期然而然者也自取焉者不宜然而然者也不期然而然與不宜然而然者父母與已參焉葢自童而前而吾躓吾陷吾灼吾溺吾螫吾怖而致吾之聾邪瞽邪跛躄邪齁瘖邪􅀢且瘢邪有父母在吾烏知之童而後父母不吾屑屑也而吾或兩搏焉批其耳或交射焉中其目或逮獄焉刖其足或馳而蹶焉或緣而顚焉而聾也瞽也跛躄也齁瘖也􅀢且瘢也不免矣而尚可諉諸父母乎然則童而後盍思謹其體之所以全而不敢毁傷矣而况於冠矣成人乎且古人以聞善不慕與聾瞶同見善不敬與昏瞽同知善不言與瘖嚚同推此類也則身不行道與跛躄同不辯美惡與齁塞同䝉被醜惡與疣㾲􅀢瘢同是體雖全亦不可恃也孟子曰從其大體為大人全乎其思謹於此乎然後無媿於全之名此亦而父之意也蘆泉龍牧說武昌城東七十里有泉焉曰蘆華泉泉旁之人有龍牧子言斯泉於羅子曰泉之穴其深叵測有物焉蟠之氣直上變見有光為靈怪歲大旱能為泉旁之人出雲雨泉旁之人傳曰龍也及吾即之數歲矣驗也果然其泉冬燠如湯可盥也歴夏則寒如氷不可以齒投之以穢立出焉而俯視之則其底之石隱隱可數也吾甚愛之因念吾之動與時違自以為天下之獨愚奚意泉之愚亦如吾之戾乎時不能包荒自以為天下之獨隘奚意泉之隘亦如吾之吐乎穢無為形迹自以為天下之獨拙奚意泉之拙亦如吾之示其實然則斯泉也宜其泉旁之人置之以遺我也於是竊號曰龍牧以自託焉羅子曰噫凡泉旁之人愛龍不愛泉也而子之託於是也在泉不在龍也奚取於龍哉龍牧子曰非也吾之於泉也取其始之適吾類耳而不與其終終則同於龍也取其飛而有澤物之功耳而不與其潛潛則一泉旁之人而已矣故曰龍牧牧之云者順適之義云耳而因以寓吾權也豈若彼擾龍氏者眞制之若犬羊然而後謂之牧哉羅子聞之不復與辨為之著其說龍牧子由司勲員外郎知鎮江好古而文劉其氏云白巖子說為喬希大作白與黑色之賓配也而巖以白名必其齦齶谺然天光下燭一物無遁其形亢爽潔修神僊居之而為好竒之士物外之觀是為天地間勝處反是則黯黮幽仄黑巖也虺虵之所蟠魑魅之所憑天地間之惡區耳矣而太行之麓必均有之是一常人能去取之况白巖子乎或曰白巖子方將以其去取夫巖者去取夫天下之士此特其寄意耳則吾不知矣修庫志後語錦衣房侯予愛重之天下莫不聞然至索予康樂公新廟記以石既竪摹之艱而止於今奉命守潯梧則又索予修庫志曰於至潯治兵之隙對閱之若有以對夫子也予實有剩摹隨帙而遺之然不識侯差以其句讀中繩墨邪或詫其𨽻畫而異於世俗之書也是二者皆惑也噫今之世何世邪而置斯志也於作者之伍直書人者之編籍記其凡而已耳何句何讀之云乎且白巖尚少予老悖也廹而遺是二惡播於後世莫予䘏也而已矣侯亦未為得也或釋予曰侯於政若公署若象室若艤所若鑾輿庫無乎弗舉者葢取乎其類而益鞭其後而已耳予益大慙欲巻而懐之歸業已置其囊太息與别而反聾訓聰語呉子將行羅子送之三揖而謂之曰諺有之聾訓聰聾者之不知量也然使聰者從而借聽之得則無矣然亦無所損其聰也子亦試聽之乎吾為子告之公庭出政如大刀如濶斧惟其盤錯之就吾規矩而略其痱癗之細閭閻望之如方諸如陽燧取火得火取水得水朝夕資以活焉而屹乎其有恃稠人廣衆如春風如和氣使人人若得而掬焉及其掬之也又不見其渣滓退而思義如牛毛如蠶絲當辨其肩尻抽其端緒而後出以應物如鑑空如衡平不至乎倒置於是乎充其量也如長江如巨澤納汙含垢汪汪洋洋無涯無涘庶幾用馮河焉而成天下之亹亹此何足以盡子也聾訓聰之言如此而已矣吾子以為何如董子問答羅子謂董子曰子非楚雄守乎曰然其地逺而且僻知之乎曰然其俗夷而未華知之乎曰然然則易其俗乎曰否易之之甚變也然則因其俗乎曰否因之之甚痼也然則無所易而亦無所因乎曰否易之而不示以易之之道因之而不示以因之之情非齊惟齊非教惟教吾以是自克焉而不知其可不可也羅子曰子前守重慶保定乎曰然殆亦用斯術乎曰否重慶柔其發也多嚚吾而撲之以威保定剛其發也多暴吾而鎮之以靜羅子曰嘻我固知子之善用時也崇卑逺近簡劇卑卑之論非所宜陳於子矣唐書大風㧞木斷臣謹按周公居東之未迎也天大雷電以風大木斯㧞而林甫之將用也亦然然則善人之退小人之進皆天下將亂之幾也故天為垂戒使君人者於此警寤而改移之其心仁愛之也至矣然成王知寤而迎周公而𤣥宗昧焉益進林甫而極用之此周之所以將亂而復治唐之所以將亂而遂亂不可救也歟磁龜興復求記狀磁龜者有石蹲于溪心若龜焉其石磁石也故名在南城南八十里重岡複嶺盤鬱中北阻芙蓉西阸連珠南連軍都接南豐之境東則靈峰萬嶂截而北迤中通一逕以達于旴芙蓉之北為臨川連珠之西為宜黄寔為四集要害地地多堊多赭黄石脂多雲母之石孔洞多礦礫而湫泥中其蜯間吐珠似合浦而微赤土人以為祥故其人有以自食且能主人而食之人故聚唐宋來至千四百户七都七十二屠肆他肆稱是市列兩廊雨無張葢行者亭臺樓觀擬城邑吏部選除齎縣令牒者嘗一日至二十一云元季酷刳于兵入國初繼以疫家靡孑遺屋敗骸積灌莽其上日入于蔚薈蒙翳不可以居鬼晝嘯于木上虎兕豺豕以强弱為食積數歲絶行者永樂中先祖耕隠府君始披荆棘立門户招逋亡且焚且芟先太史君益勤安輯由是復土著者客寄者販者遊者日源源來今僅較十之一然其故跡已垂無可尋者玘兹幸從士大夫之後知舊東西行取道者或停驂焉案牘之寄貯胥𨽻之頓舎散以寓䙝公露以處或事洩皆弗宜於是為館于衢之北曰駐驂堂門庖湢寢食之具供給之役皆私具如官又為館于衢之南如駐驂曰寅賓庶幾所謂賓至如歸者寅賓之北四十武折而西有樓焉曰御書必樓者尊之也御書之西二百武有橋焉曰聚奎橋之上曰望逺之樓樓之南聯而為門曰翰林者私宅之門也樓之上凡連珠羣峰之北屬于芙蓉者皆于是乎見見之窮而下際蒼翠中為石嶺峽水束流其中右鑿其壁半靣為磴延緣為路有樓曰逍遙跨峽中其下為門西出為里之委駐驂之西築土如堂隍樓其上曰迎暉當里之㑹曰迎暉者志其處也迎暉之東為石門曰解元門之前列二亭左曰鼎新右曰復古復古云者貯所得舊記于篁墩程公者故云也又其前為市區以處為市者區之外為小橋橋南折並山而東三百武登阪之上為義倉為圭峯書院院之阯東二百武翼然跨于溪之上者龍門之橋也橋凡二甕上為屋凡十七楹東西凡二門中有樓曰濟川二泉邵國賢所名也又折而北二百武少東兩山復合如門然因而亭且門之曰迎恩里從以出入焉者也迎恩之西以迄于逍遥之東為門者六皆跨衢為樓者五跨衢者三跨橋者二焉凡衢之夾民居者無不甃門若樓之無分於衢之跨不跨無不丹青焉始事于𢎞治庚戌之十月迄于甲子之某月其續為之尚未可既也雖然使玘也為之玘也之子孫續為之其復前日之盛可必也縣之人行出其途者或知之求他縣人知之可得乎况天下乎其自盛轉而之衰若前日之盛而衰者雖里之人今亦不得而知之况後世乎此無他無為之記之者也或雖記之無信天下後世决然無疑者為之記之也今也不知里之其亦有遭乎而使玘也幸生先生之時乎而先生則信天下後世而無疑也而漫不之圖焉且曰姑以竢後之子若孫後之子若孫又有可冀萬一信天下後世無疑者乎玘也所以丐焉不敢後也前之所謂鼎新亭者謹虚之以竢樹斯文其中庶㡬天下後世不必至磁龜焉而凡誦斯文者如至磁龜焉玘也所以丐焉不敢後也謹狀磁龜引得古磁龜記于篁墩學士遂以此引求記磁龜者有石伏于溪之心若龜焉人以其石磁石也故名在旴城之西南八十里其地突然若舟之艤于絶巘而其水之㑹而出也若門焉門之外人可躍而過也自是犬牙隴塞水行嵌竇間衝齧怒號凡二里復為平疇凡袤四里滙而為潭汪洋演迤自高而注下為瀑其聲四時如雷鳴瀑之下兩涯嶄削自是幽深𤣥黑獸蹄鳥跡之所莫至其上常覆以黑青之雲俗傳其下為九龍之窟春夏之交白晝晦㝠飄雨時至自上世來未有窮其處者如是凡十五六里山始開水始平又凡十里乃達于旴之江故磁龜達旴之路必由它陸葢避是險也而茲記之所未及者其遊自西北而來而其反亦必如之宜不得而記也磁龜自唐危全諷之亂始祖侍御史袍字德稱徙居之而始有聞宋遂以富顯此記相傳燬于紅巾之兵或曰紅巾之前已失之曽祖司稅府君求之祖畊隱府君又求之先西莊太史公如二府君之志皆不能得於今百六十餘年矣意者天其有待乎不然侍先生素矣不知緒論其幾聞也而迄未及及必以風雷之變而若是其竒也噫天於斯文其果無意乎哉故敢補記之所未及者焉先生發焉曰得游磁龜記記將勒之貞珉歸樹于里之通衢以示于無窮惟俯垂允賜實斯文幸甚吾里幸甚吾氏幸甚曽孝義先生挽章引曽孝義先生既殁殁幾四十年士大夫作為歌詩且盈巻帙又得少宗伯徐公追銘之於乎是何其晦于初而耀于今乎於乎死如有知寧不展顔於九原如無知乎亦因以託於不朽不猶愈於不齒于人而泯泯無聞者乎彼萬乘之君千金之子其在當世威權貨利求則得之快心適意曾何遑恤至於乖禮離義固無足怪訝然亦自畏其名之靡臧也一旦不諱猶為無爵者之幸不幸有爵爵彌尊而惡彌著孝子慈孫雖欲葢藏粉飾於百世之下末由也已抑而安稔厥惡用沉其宗先聲之美黯黮寂寥下伍閭左雖有周孔之賢亦何益矣是三者均也要之吾獨以為後之說勝不然先生雖孝且義於人葢塗人也塗人則生不慶死不弔而况後三四十年忽爾而崛作乎曰為其孫作之也孫為誰名英字世傑恢然長者也今丞江都人皆樂從其請云夜氣箴木本暢也伐之牧之暢者以屯泉本潔也汨之汲之潔者以渾不伐不牧不汨不汲伊何時乎惟日之入日之入兮是之謂夜寂焉翕焉二氣融冶凡厥有形無不生者仁義良心人孰無之蔽交於前以誘以移至夜則息始惕而思維其有思善念克還孰為禽獸孰為聖賢一念頓殊判然天淵嗟此夜氣養之則全不日不月繼之以年觸類而長萬善足焉毁譽箴聞譽而喜其譽轉浮聞毁而喜其毁自銷與其聞譽孰若聞毁譽或敗德毁可成已彼何人哉四國流言彼何人哉書頌萬千慕萱操為當塗李琪作有草惟萱兮能忘我憂我顧我身兮惟母之由我身匪傷兮我母在堂入見我母我憂則忘今不見母涕泣于野誰衣誰食誰恤我者悠悠蒼天我哭為何題劉東之雙喜小畵為鳩之巢女拙知來之風女工司人之吉吾不女禁一枝為家兮吾哀女窮具曰予聖誰知女之雌雄擇遜於乎自夫父有殺其子者則父子爭國世可有也况兄弟乎由是兄弟有遜國者遜為吉而爭為㐫自夫子有弑其父者則父子遜死世可有也况兄弟乎由是兄弟有爭死者爭為吉而遜為㐫是故遜君子吉德也在小人為㐫爭小人凶德也在君子為吉古台陳廷幹問遜齎之義予作擇遜以貽之審力臨川樂鳴殷出知宣城縣行與羅子别羅子揖而謂之曰昔秦武王將修宗廟之薦為鼎者三上千鈞中百鈞下十鈞進羣臣謀之曰寡人欲置是于先王之廟必衆人舉之恭乎必一人舉之恭乎羣臣伏思之對曰必一人者王於是下令國中曰有能舉千鈞與車百乘百鈞十乘十鈞一乘烏獲過之睥睨焉舉十鈞者獲車一乘歸舎人尤之曰咄胡不舉千鈞而獲百乘也不然亦百鈞爾獲曰不然獲非難於千鈞也顧獲之幹固衆人之相差爾而王亦奚信邪王如愛其鼎疑獲之折其足也改而收其令而以衆人舉之均之至廟而已爾獲雖欲一乘且不可况百乘乎居三日善飲食之進而舉百鈞者獲十乘歸又居三日益善飲食之進而舉千鈞者獲百乘歸卒如獲言秦人於是知獲不獨其力也其用力亦已審也今宣城子之千鈞鼎也慎而舉之積信而待之無欲速焉不如獲之獲一乘以至十乘十乘以至百乘吾不信也鳴殷喜曰吾茲從事於審力矣紀異成化甲辰先是關中大饑冬予應入粟往賑例明年三月還至謝埠舟中大疫亦及予四月至青泥灣勢轉熾予以錐刺手無血自度必死遂與弟經訣訣已正冠瞑目果奄奄若入深泥中臭腐不可當自卯及已矣忽聞呼天妃至目遂開覺舟之篛篷壓若足之垂而䧟者宛一婦人聲呼曰一有學之士病在孤舟灘上無一神道救之者我來送他一陣好風言畢足舉篷遂起頓覺舉身冷顫須臾顫掉不已雖舟亦為之動經乃以數簑壓之葢自已至未出臭汗而衣席皆濡漸覺少甦由是得全殘喘其秋北上過祠下進謝今越十八年又過湖上仍進拜焉因紀其事丐同年都昌尹前監察御史王君廷瑞為刻之懸置于梁間以志神之靈貺若是而其偶及於予之不肖者則又不知何如云𢎞治十五年壬戌歲冬十一月日圭峰集巻二十二
