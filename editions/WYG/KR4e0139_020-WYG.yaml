body:
  text: 圭峰集巻二十明羅玘撰祭文祭丘文莊公文不肖玘慕公於草野間幾二十年及識公年已四十矣公在太學時而不肖又以例進凡例進之士既以庸濁混淆清流人所鄙棄雖有卓然自㧞亦時無以自明况公宏博雄大之聲又先有以蓋吞一時而凡私相標榜盜名者皆屏息歛藏惴惴然恐露頭角如素負其妍而寔未自决者惟恐鑑之縣于前也况遐外寡昧兼以荒落困憊之餘如不肖者尚何敢影響於公乎不意公之包荒納汙遂以盈尺之紙𤨏屑之辭援不肖汙溝之中濯以清波襲以芳馨而又風而飄之不肖至今靜思之不知何以得此於公也不肖之心自以為父母生之有此身也若微公也則將委棄沉淪於昧昧中與無是身等耳而父母亦何賴焉用是思欲效絲毫之報於公前年丁先人憂家居私作一書首以公歸為勸情頗激烈及來拜公公首肯前語不肖感公之不疑也凡懇章一再上皆從更不敢依違同於衆人然天子方確然留公公之去志雖久决矣卒亦無如之何而至於此公之文章不肖將與蔣冕成之而刻以行又將出管窺之見㨂以為私抄以成公志公之喪天子使臣䕶焉可歸也若公之名在後世當必有聞而興起者不肖何足以知之因拜奠之頃涕泣不知所云公尚鑒哉祭仲松東先生文於乎凡人仕不得於君祿不逮養其親教其子而不能以成身罷則無所於歸而食貧是皆有憾乎於其為人若乃紆金垂紳入兮以寅出兮以昏高振國手保聖躬于天閽有母在閤食大官之膳而白頭出則以魚軒當龍飛之首有仲以吹箎矣而伯又繼以吹壎逮夫明農歲入飽及比鄰噫吾未見其人也於先生獨云然人寄以生母恃以終子仰其教隣忘其窮今先生忽如是也嗟誰之不逢耶我二三子弔于祠部之邸祠部於先生子也於我友也重以文奠焉伏惟尚饗祭故呉母沈孺人文於乎靈之為兒比及勝笄既笄來歸所不及知及夫子有聲奮翼南畿以其鄉書唾手禮闈與天下士大廷齊驅何物中秘汪洋而能遍窺古稱三長為作史者之樞霈然有餘者誰歟夫子也人亦有言若䁥以宴私牝鳴于塒雖有剛腸孰能與於斯噫是非女德之良者乎副笄六珈偕老是宜南院之行留養舅姑何遽奪之俾夫子之不獲訣於其廬天乎抑人乎南天遥遥安能止夫子之悲聊寄奠焉且將以辭尚饗祭封少詹事翰林侍讀學士王公文人有恬退之心以立乎其位難能也而怵之以利害掣之以朋疑雖畢竟於遂也然或無以快其超然之髙此繫其志之勇與不勇有豪傑之才生于其家難遇也而拘之以世類狃之以習尚雖畢竟於成也然或無以完其天然之全此繫其父兄之賢與不賢若公之仕也齟齟不合超然而歸無復顧忌而且優游於山之巔水之涯者尚數十年非勇者乎育今少宰先生蚤為聞人晩成醇儒以道德文章重天下時且繫以升降也不賢而能如是乎是可見公之勇也足為世之仕者之的而其賢也有陰翊世道之功踰耋望耄之夀賓詹學士之封生固􅂱然殁與生同况夫帝有恩言葬公祭公於乎盛矣玘等十五人者先生之門人也飲泉芘木可不知所自耶既曰知矣而不能執紼以送公也徒成浩歎而已而又可遂已耶聊因先生之奔喪也陳詞而附奠焉先生鑒哉尚饗祭李徵伯文於乎徵伯吾深望子謂子崛竒駕以勇駛不類見駑甘受勒轡納之劇逵一日千里我日衰頺有子足恃恃而翁談動輙以此翁笑不言其亦有以我告南歸心疾於矢微子經營殆或中止騎而顧我我覰子齒少不宜然而有拆理譬彼美錦閡以紕纇我欲玊之使試婦揣我歸三年如坐井底影響昧昧懲彼揺尾意子如鵬已同風起忽若有聞恍在夢寐云子何如恐或妄耳子不可無子不可死且信且疑當食失匕凡今之人有父在仕作其威聲黄熊蒼兕矧參鈞衡其又肻已噂噂沓沓逆天干紀維子愔愔類寒畯士敬不妄譽慢不妄毁人人則然邦其與矣我其北來哭子凡幾喪明者誰白頭孔偯大合群阡子亦在啓從先人居是謂受祉子有遺文寧必皆是我選我剔期夀於梓維子勿怖爾叔爾弟曽祖祖母子聽藝使茶陵李氏母伍庸鬼有酒在觴有帛在篚子飲子聽有如易水尚饗祭費叅議文嗚呼公也能以猶子魁天下可謂之善教而豫處其然又可謂之有識翻然乞身未及其年可謂之善遯而卒能使生不竞於蠻方又可謂幾於知幾之神生能使呂梁之民戴之如父母可謂之仁而没能使人廟而食之於無窮也又可謂之入人也深嗚呼吾不暇論其它也是以過而祭公公其享之哉祭費安人余氏文鞠子非艱教子之維艱教子非艱成子之維艱子也在國蔚為士元匪徒士元氣盈區寰其在於古奚有馬班吾得而友砭愚訂頑非母誰使之陰德母賢陰祈其年而遽大還士林凄然吾悲孔酸登堂奠焉文以代言尚饗祭丘文莊公文代英國作瓊距中原海天萬里誰知有瓊知自公始公學如海其宏其深孰測其底孰探其琛公識如鑑聽物之來豈惟䑕豹龍肉鶴胎孰為公文布帛菽粟孰為公心虚堂空谷公始來時章逢一儒今四十年天子三孤公始來時我失先王我方知兵與公相忘晩同史事日益親公知公為人自始至終公之大用維天子知既已老矣懇懇以辭辭而不獲遂益其疾乃于邸第奄以易簀弱兒孤孫偕公以歸我奠以文而寧不悲尚饗祭英國太夫人文代陸仲英作延陵有支大鹵之鄙其凝其鍾大宗有子有赫英邦天作之合天王女妃連以玊牒王亦孔武當天歩艱首死敵庭姦權厚顔國有忠臣家有烈婦立孤嗣爵兵符肘後子壻孫甥三公群伯祈父衛率咸侍巾幗踰耋望耄屢朝四宫后有殊錫帝有崇封寔倦含飴聿思先王違榮神遊維帝悼傷命中貴來且賻且弔宗伯司祀司空卜兆慘慘太師執喪哀毁予末小子僭施葛藟芘我惠我及我實多不腆致奠其悲奈何尚饗祭曽祖司税公文洪武初殁于蘭谿任所過而祭之夫神當天造草昧羣雄逐鹿之秋綽能布昭才猷克全宗祧于殺人如刈菅蒯之隙用以待天下之清大公小侯囊中物耳矧及眞主正大位又能深自晦藏屢孤召辟瀕九死不得已乃甘隱下僚竟終于位蓋蘭谿其地而司稅其職也時神之子曽孫之祖以三尺之孤克還以祔先塋百年于兹玘方竊有祿位實神之遺將大有所發此其始也玘前過兹地尚有衰服不敢以祭兹當北上特假道焉敢就易簀之所陳獻特牲暴曰前志惟神孤逺之魂洋洋如在以慰曽孫之思尚饗祭呉太安人文於乎宜人生也有夫之封有子之養有孫之賢有八十四齡之夀亦既多祉矣然而不必他州常之四封容有之義興將來未可必也至於老而病也病而劇也有孫泣請于朝以歸省及既殁也遂得以視其殯且葬焉則不􅍦義興它州或所無也是所謂其生也榮其死也哀其哀也人莫不知之雖吾君亦知之於乎可謂盛矣玘等於其孫之泣請時甚義其行况同年也同官也且同志也敢因以附奠焉尚饗祭都給事中屈引之文夫觀世之人多美則襮雖否亦襮多智則舞雖否亦舞處顯類驕孰顯弗驕遇進類競孰進弗競所以鮮令終也引之果有是乎貧能安之而不求其心退然羸能攝之而不斵其情泊然所以多夀考也引之果無是乎然則令終而夀也其引之乎而今也至於斯何也抑夀也者不死之令名也而古所謂不死者有三焉立德立功立言是已於乎引之有立德之基而施未究有立功之漸而位未充有立言之藴而畜不以發則世之所謂不死者又殊未可知也吾黨知之深者能不為之悲哉痛於執紼之餘訣之其有知乎哉寧不亮吾黨之悲也哉酒殽在陳尚饗祭胡封君文嗚呼朔方兵衝也人挾弓矢廼業詩書人恃虣敓廼與義俱歸人之女存人之孤葬人之死活人之軀已用以奮而輙蹋其翼人資其用而若摧乎枯以若而人如死可贖世百其夫而曾未及下夀溘然長徂雖然享令子之貴而列御郎署其在邊關是為優乎然某有聞其聲匪造其廬况能執紼而輓其輀車惟寄奠而再三兮悲嗚尚饗祭謝約菴先生文政莫如猛鄭僑有言公始臨我利斧在前孰為鬼蜮以邇我公而不縻爛不貰爾儂亦有大眚不製於法茍全其人茍累不懾人亦有嚚觀公於初如以槁葉投之紅罏及政之成學有新廟公亦勞止以教以詔山行水宿何有害災有乞水火里門夜開公既去矣今三十年鷇破鴞出拚飛戻天縳殺長吏覆城亦多今之為吏束手奈何民惟公思公亦可作公在九原公靣如昨矧有令子奔公之喪奠公有文以寄不忘尚饗祭周母文嗚呼太孺人稱未亡人者三十年封太孺人者三年就養京邸者二年夀凡八十五年是其閱世久而多祉也男二人孫男女六人曽孫男女三人中為御史者一人是其𦙍嗣昌而貴且賢也生而制命一章死而學士銘詞一章棘寺行實一章公侯文武大臣奠文一章同臺奠文一章諌垣奠文一章詞垣奠文一章哀詞凡一章詩凡百章是其表見于世彰彰也嗚呼若太孺人可不謂全人也哉如是而返葬于故丘道出于都門當銘旌之一奠猥以文字為職不可以無言也尚饗祭鄭太孺人文維宋之子歸鄭之姬今也夀母昔也令妻為國命婦作邦女師僮僮珠被烱烱翟衣君子偕老扶善弼違而遽地下先驅狐狸乃驚符臺五内崩離泣血叩閽臣失母慈維帝悼念許畢其私袒括徒跣登途南馳我二三子昔同𤨏闈或附驥尾北靣彤墀義匹同氣忍能不悲不腆寓奠靈其鑒之尚饗祭王大理母文於乎夫人之生也有踰耋之齒有鼎食之養有淑人之封殁也誄以命太史祭以命宗伯葬以命司空恩數榮名夀考令終環松四境孰與比隆亦有白首司天下平纍纍齊衰銜䘏南行再拜望奠維靈之歆尚饗祭鄉貢進士儒林郎合州貳守髙公文維先生楚産也晩為翁而秦居將相材也而抑于州縣之躊躇滇僰巴羌桴已乘而何陋匿名飛語瘢屢洗而不汚華人息肩於重役之後驕帥即擒其私謁之奴薦之者强弩之穿魯縞沮之者糞丸之混隋珠故於名日就烜䓇而與世竟爾﨑嶇憶昔執鞭迓馬寅賓父之入盥河瞖眥寔念母之劬若夫公居絕苞苴之謁投閒無甔石之儲有子而登於上使多祉而食乎天厨將為麟為鳳以遨遊於世忽乘彼白雲將何之乎凡我朝紳係情令器不勝愴咽當旐車之行群然一酹尚饗祭匏庵先生文嗟夫世之矜持門户多矣任學術者非周則張或自以為程朱語文章者非柳則蘇或自以為韓歐談詩歌者非梅則黄或自以為李杜論史學者非夀則競或自以為遷固其所以自待者可謂厚矣而世卒莫之許焉者皆是也維公於是數者不自以為名而名歸之不自以為是而人師之世卒未有異同者蓋其實不足而外自飾者終不可以欺天下而實大者雖欲自掩而卒不可掩若公其人乎然則位不滿其德用不究其才皆不足為公少多而公既有以自夀者如此區區之存殁奄忽間事耳又何足為公之修短也耶某等公門下士也撮公之大者於酹奠之間不得不告以􅇺公於㝠漠之表惟公鑒之尚饗祭呉封君文維公自泮宫之秀至蜚澤宮之英有用世之階矣公葢未嘗不欲仕也自夫學士之弟至為學士之父有用世之託矣公可以不必仕也自素封之君至為實封之君已食用世之報矣公蓋未嘗不仕也鄉進序於大賓之位齒又望乎大耋之尊於是而永世歟則為天之佚之厭世歟則為天之息之無不可者也亦何少多於公哉特某等尚覊縻於留務而令子昔嘗連署於留司謹因風而寄奠公庶來格而來嘗乎尚饗祭封太孺人黎母文幸邇令子之温然雖望慈閤之杳然亦得懿範之凝然與聞内則之肅然在躬也命服之襜然在函也天章之爛然其生也孫曽之侍班然其殁也婣賓之哭駢然自今伊始封溝井然松楸鬱然噫亦盛矣哉玘等不獲與於執紼之後謹陳詞而遥奠焉尚饗祭復庵楊先生文於乎正學之源其堙也久矣先生方其少也力任濬之疏之予之生也後慨不及其時見負畚荷鍤者之羣鄣之也他不足論也謀瘞忠骨於懦夫縮頸吐舌之時其流之瀑于千仞之崖也抑孰得而鄣之也哉然水之性迅極而瀦瀦有大小萬頃之陂是亦足矣可以灌溉可以方舟氣之升也則雲雲之降也雨下土澤萬物三州之民則亦既優既渥既霑既足矣其朝宗之勢葢既會百川而東焉所惜者不至海耳人亦曰有後昆在不必於其身備焉而以夀考終命復何憾耶令子與予二三子遊又同官於斯也故率鄉之在仕者一寄奠焉尚饗祭工部張尚書文於乎公之殁也年已六十六矣仕四十年矣歴十一官矣外之旬宣度支之是寄内之殿最神人之是司時有升降位有崇卑不機發矢激以為疾不知雄守雌以為遲不高城深府以為異不破畛决域以為隨不彍風鞭霆以從于險不循行數墨而一於夷故雖遭勒停而未嘗戚戚及再起廢而未嘗怡怡於乎公不可復見矣而凡在僚友於奠公也其誰不悲尚饗祭太監傅公文代衆作維公粤産也天閽是翔竒質也館閣門墻委珮兮宵垂垂以宮露橐琯兮朝鼎鼎以當陽黜披之斬為渉疑似絶整之歌以其譸張負重則屢荷鑰孔長孰不曰垂橐而入公獨念休之用光耋可以望溘其無常爾舉桓楹閟彼幽堂留司在位率酹一觴尚饗祭嘉祐王文大明正德二年七月壬寅朔二十四日乙丑謹以庶羞之儀祭于勑封忠烈武順昭靈嘉祐王之神維神天予竒骨已著靈標志清民暍死益咆虓廟食百禩日騰英飊我祖我宗德神之靈益崇其宇益隆其稱弗葺而圯今幾霜星帝有明詔守土之臣爰度爰葺易陳為新告神始王其在兹神伏惟尚饗祭簡郎中文維靈伏而家食時公輔之望既已起于鄉閭而達于方嶽即欲伏而不出乎不可得也及出而在位讞鞫是司不寃之譽鐵靣之稱人人知之其於公輔之進即欲忌而尼之者得乎夫何適轉武銓遽以殞仆告是失一公輔之器不獨鄉之人其悲凡有識者亦不能不惜也竊因是而譬之其在家也而不能揜者玊之韞于石而精神見于山川然也其在位也而大有聞者利器之無擇於根盤節錯也至于良玊多毁利器必折自古恒恒有之獨今茲哉某等敢於臨輀一奠而道其莫之為而為者以慰焉靈其不昧尚饗祭都察院右副都御史陳矩庵文於乎憶昔恩榮之宴吾二三子之遇兄也與兄之弟也自慶以為得郊與祁也軾與轍也握手以相歡悦也期而望之曰將來之稷與卨也既而各釐務於郎署宗伯司寇互矜其屬之有才傑也亦莫若天下士之難可恐喝也而兄既能得之於青齊弟又能得之於百粤雖然木實繁者其枝折前四載也兄與吾曹已流涕而嗚咽矣暨兄旬宣最功中丞轉轄又皆企踵謂將萃祉于一躬而乃夐茲顚越誰無客殞中年胡慘所遺孑孑所最恨者群嚘啾而倚于未亡屬終事而誰經紀乎大耋嗟乎吾二三子始之期之不惟觖之而兄之所遭罹者何若是其烈也今於靈輀啓行是千載永别也羞觴在陳衆蓄之衷又安能噤不言焉以洩也尚饗圭峯集巻二十
