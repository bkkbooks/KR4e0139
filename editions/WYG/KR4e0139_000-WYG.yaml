body:
  text: 圭峯集别集類五明提要臣等謹案圭峯集三十巻明羅玘撰玘字景鳴江西南城人成化丁未進士官至南京吏部右侍郎贈禮部尚書諡文肅事迹具明史本傳玘以氣節重一時其乞定宗社大計二疏及土李東陽書皆言人之所難言其文規橅韓愈戛戛獨造多掩抑其意迂折其詞使人思之于言外陳洪謨稱其為文必嘔心積慮至扄户牖或踞木石隠度逾旬日或嵗時神生境具而後命筆雖數易稿不憚葢與宋陳師道之吟詩不甚相逺其幽渺奥折也固宜而磊落嶔﨑有意作態不能如韓文之渾噩亦縁於是殆性躭孤僻有所偏詣歟然在明人之中亦可謂為其難者矣明制以翰林教習宦官謂之内館據玘所作白江墓碑葢嘗充是任者故集中諸文為宦官作者頗多雖玘之風槩可以共諒于後世然其為微瑕不止陶集之閒情顧一一録之是所不可解也周亮工書影稱玘集一刻于旴􅇇再刻于南國子監又有武進孫氏本今皆未見據此本所敘則初刻于常州再刻于荆州板皆佚嘉靖五年陳洪謨得荆州本六巻又得續集二巻奏議一巻彚而重刋後其鄉人黄端伯又於玘曾孫寛處求得逸稿合原集編為三十巻是其集輾轉增加已非其舊兹數篇者毋乃端伯所增入歟此本為康熙庚午玘八世從孫美才所刋編次頗無體例如文以夀文為冠而以奏議列襍著後詩亦以夀詩為冠而名之曰古樂府又以詞置賦之後詩之前皆為顛舛云乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f577e4ffb980e23734538dc20b2cf07204c67928bd2a4579bfd5e50789a67c12
