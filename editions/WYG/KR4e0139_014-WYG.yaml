body:
  text: 圭峰集卷十四明羅玘撰墓誌銘内供奉老老王氏墓誌銘𢎞治六年夏四月十四日内供奉王老老卒于其子御馬監太監博羅之私第博囉以聞且乞歸治喪事詔許之博囉哭之哀斂者一依喪禮嘗所與往來者皆走位哭無不歎訝其孝且欲銘其幽堂之石以内官監太監羅公所為行狀來請按博囉西域河西涼州部人其先世嘗為其部入貢闕下心慕畱焉不果歸語其家博囉父哈喇庫春尚幼也聞之心動及長存名位為貝勒華言平章也凡與部大人相謀語及京國必舉手南向膜拜示不敢犯意由是益不悦於其渠正綂二年太監魯安將命節制邊兵于甘誘徠備至哈喇庫春與妻即老老也革襁博囉自其部潛來欵軍門内附安為驛聞因得𨽻戎籍京師然不習水土尋卒葬于都城西香山鄉煤厰村之原時博囉甫八嵗獨於母居二月選入内供奉厯事睿景純三皇帝及聖慈仁壽太皇太后皇太后所以保翊聖躬弼成内敎與有勞焉今皇帝之在青宮也亦以老重之凡廷掖號内供奉之老曰老老云者美稱也以成化二十一年請許退休于私第恩賜白金文綺無算博囉以勞序累遷至今官時告省在側春秋八十有八可謂榮壽令終者也孫男二長曰成次曰壽壽以戰功授錦衣衛後所百户皆能相博囉於生致其養於卒致其葬葬之五月二十一日墓則合平章公哈喇庫春之舊也嗚呼其可銘也已銘曰永巷宵征五十霜星天閑誰扃有力如虎執轡如組厥子孔武為大長秋銀璫錦裘禁掖宣猷今為燕人燕土宜墳宜子宜孫華母李氏孺人墓誌銘華於吳中為甲姓李亦乙丙間皆世籍無錫李氏克中有女曰某既筓歸華氏原謙號存義處士者也處士父思學與克中為詩盟嘗曰吾先孝子遺是聲光卓為族望若亦文定公餘烈煥其有紹世世嗣婚實宜茍讙于妁媪是間吾成好也敢以稚子謙壻焉克中許諾及女歸即孺人也華故所習惟儒一業仕不仕皆詩書琴瑟雅歌投壺日相高尚毉師卜史雜諸門客不齒孺人謂處士曰濟生以毉稽疑以卜要非惡術也處士曰是通二家之言老於專門者皆窘窮自喪而退景泰中疫起縣南人相枕籍死飲以藥輒汗汗已立活活者百數華實衣服飲食其土人人亦貧弗報惟相率為美言稱頌或曰是謂存義人也人遂以號處士處士亦自謂云孺人笑曰吾為爾得名邪鄰婦嘗有貧而多育久厭苦之竢娠即餌毒下焉孺人立婦庭中數之徐徐陳説恩義利害恐以㝠禍婦卒感悟不復為年三十尚未子已而某年謀生某年烈生人以為止殺之報也烈幼岐嶷即不以常兒視雖不言惟俾日夜修學學成舉應天登甲辰進士丙午授推廣州府命甫下奔處士喪于家奴有酗酒火其廬者烈將縳之官孺人杖奴語烈而止謀嘗有怨家丁未秋受中傷之家人皆欲悉發其隂以相牽制孺人惟仰天歎曰不有命在何紛紛爾為也後卒直焉烈免喪改建昌府欲與以就養不許抵府又以書迎養又不許僕或自府歸閲烈筐致惟脯腊胙糗無長物喜動顏色輒加餐以為常癸丑八月烈考績將過家省謁未及以九月二十二日卒年八十一烈既走就謀次位哭謀婦呂氏烈婦司馬氏五女偕壻某某孫男游漣滌浴孫女姪刑部員外郎珵凡内外屬皆來㑹哭間杖興議明年某月某日葬壽山之原處士之兆不及哭者孫潤先一月殤也烈於我府席尚煗於我有徳况嘗過其廬薄暝謀腋孺人出見一再拜也烈曰是可銘吾母者走進士楊文之狀來史館其乞孔勤不得讓也於是乎銘之銘曰有禄有齒可生可死齒髙於夫禄享於子其生也榮其死也祀誰其銘之皇太史氏竹所先生墓誌銘南城入皇明第進士者二十人左氏獨得四人永樂戊戌山東參政瑺天順丁丑河南參議賢廣東布政使贊成化乙未試大理悠邑中稱竹所先生者山東之從子河南廣東之從兄大理之父也邑多竹自山谷陂澤村墟郛郭老佛之宮植之與他草木稱先生之居三谷尤以之為食性實宜故號竹所邑附郡有城一區背山面江號西江佳麗先生獨受二㕓東西異所作屋並極一時之觀種竹刷屋瓦醉賓談客接踵坐無隙席雖邦君上使未嘗不擁騶下問曰竹所何在先生亦無足恭以賓禮處之大理君幼未知學江寧海景吳時以舉學鳴先生館之三嵗大理君由是知學辛夘同寧海領鄉薦里閭榮之敎子者時以為法然自大理既貴而驟蓋棺于京頓失愉樂廣東以司勲出參淛政輿致君于淛省方岳諸公以詩為别南昌李若虚大書跋題其首歸途兩胯患風痺嵗三四作至𢎞治某年享年七十有八竟以是終先生諱某字時良方乳已失父某母某孺人垂欲棄去異先生終亢宗可老其家遂斬前志卒之食㫖服溫為左氏壽母祖某三谷布衣曽祖某元國子學録配施氏生某繼饒氏生悠大理也㦢亦業於庠蚤卒孫幾人宏經進俱庠生先生却顧惟逺髩欲華已營壙于麻姑山之麓厥費不貲泥塗之屧無階而至某將以某年月奉藏于此且曰女吾戚也鄉惟女史氏也非女銘不可銘曰其生孔清居于竹其死孔佚藏于麓可封不封以綏後禄南京都察院理刑知縣俞君墓誌銘俞君諱世徳字守宗無錫人同予丁未進士也出知肅寧縣𢎞治九年七月以治最召入理都察院刑獄得南院凡官理刑在院六閲月即真御史君被命已疾作不堪騎舁行留京師召醫飲善藥冀差瘥上道而日轉劇醫至輒陽紿歸治劑脱乃遁去錫人皆義君多來視知惡候也急相率隂具木以須八月一日乙亥卒年纔四十五銜尚知縣也惜哉君在肅寧凡兩朝京師主王河西隄杜氏予往候數四皆不即見最後皁以寢對予詰何晏也皁白明府坐縣恒五鼓休衙必秉燭以入民有一塍公必躬視雖暑雨行田間甚甘卒傷而憊今懲乃晏起矣同年皆詫君黄馘傴行或其疾先中而伏伏今發發遲蓋不可為如此肅寧𨽻河間河間近畿也民狺狺擊登聞躡踵惟肅寧晏然稱治縣必曰肅寧御史上最狀亦必曰肅寧都御史間嵗入議政其稱如御史者故召君也君得禮學於餘姚諸養忠綽有繩尺居錫庠為後進師錫之禮學絶復續自君始君實鄒姓生纔晬父某偶哀俞某失嗣遜以後之養冠娶皆於俞故君遂姓焉廷試家狀亦未忍頓易蓋有竢仕稍顯恩施平當然後請以復者其學於諸也時二父適俱為餘姚鹽官選而師之二室交贄並鞭䇿其資益自倍于人故君之成也亦迥異娶陳氏子男三顏曽閔女三某許某氏某許某氏某母某氏某之父某某之父某君之祖暨曽祖也以君有復志俞獨止於某與所後母某氏銘比信史法不可及也歸葬縣西青山其兆君所自卜者亦若有前知乎顏壻於陳户部曽壻於華松滋二君佐喪閔閔然且恐君遂泯泯也使太史氏玘執筆銘銘曰呱呱出後壯欲復歸自異邦絶學續以身殉官罹夭衂南臺虚户未寄足青山歸藏爾瞑目錦衣衛千户李君妻鄔氏權厝墓誌銘贈宜人鄔氏昭信校尉錦衣衛百户贈武略將軍錦衣衛副千户李君宗之妻錦衣衛後所正千户燦之母君字文玉以字行越之上虞人父傑祖塤曽祖敬徳世隠于儒君實是紹緒期于駿發耀聲光以樹其家誦説虞夏商周孔孟之書通其大義又取史傳百氏以為浩博恥一不能雖字林畫苑亦務至到人未始之知也值父以錦衣衛士徵赴闕乃白父曰此去闕半萬里大人以垂白往往即無患兒亦何為人吾棄儒矣遂戎服代行鄰老皆嗟咨歎賞曰何壯也或來勞飲食或以飭其子姓曰當如李氏子比入衛形神明爽矢口論事風生儕輩皆屈而退間見其操筆在几數紙立就或戲請書其手所持扇則變而為水石竹樹蟲魚務盡其紆餘隠約狀人至不敢比肩事事能聲大騰㑹文皇帝出中貴人偵天下事名其署曰東厰取錦衣士多智善隠者技絶倫者良于行者儒而愿者君以儒愿薦久之益以慎宻韜戢見任使遇有鑿空飛語告變者同事無不欣躍掠為已功君獨愀然與之根考蔓究明爭暗沮茍浮有徵者盡釋之嘗從容謂中貴人曰主上以公肘腋親臣柄祕權以弭姦猶棲鷹隼于宻葉中防兔狐雀鼠之虐嘉穀耳茍嘉穀無傷則宻葉中固畏之在中貴人忽起謝曰微子言吾何聞此要妙故今猶傳永樂中無横罹于禍者文皇北征章皇帝征武定巡萬全皆著扈蹕功宣徳中胙城王夜有盜入府刼其藏者盜久不能得君計得之以功陞隊長仍賜楮幣千景泰初以薦授班劒司百户班劒鹵簿物也其職於陛戺最親凡郊祀大禮俯趨便習合節雖世其職者不如然已得疾疾劇告在邸以景泰辛未三月十三日卒年五十三宜人以其柩歸葬上虞何家奥覺公山之先塋武功伯徐公方為太史銘其墓時燦生五齡矣宜人以育以敎底有成累遷至今官禄養恩封且至年七十六也𢎞治戊申四月六日殁燦志請歸其喪考於令武階不可傍偟數嵗至兹乙夘卒不得而封誥適下乃誓曰吾姑掩吾母此土也吾不合吾父母者有如皦日崇文門外八里莊佳壦也卜之以九月二十六日權厝焉亦用虚柩象君粗若合葬者志異時終遷祔也宜人父廷壽㑹稽人母屠孺人閉閨敎之二十五年始歸君君初室歸氏宜人繼歸者也生子一人燦女嫁右副都御史葉冕欽天監挈壺正廖景明士人葛昕陳壽凡四人孫男翰林秀才麟儒士鳳鵾鵬凡四人孫女淑貞聘錦衣官生丁奇淑良在室凡一人曽孫女一尚幼麟出也君以武貴人卒然遇之儒者也日與貴幸者處而略無依阿怙恃意而於義恐日不足鄉人俞漢逺道京戍漁陽客死逆旅逆旅人伺客垂絶褫衣匿囊委其屍于溝以為常君棺服斂漢逺且還之于鄉人有以是義君君曰吾偶見溝傍羣犬爭齕棄骸甚甘吾哀之也而人以為君喪五千里外宜人挾一孤孩歸之此其報也而宜人歸君之喪正是首丘天道好還其將不終合乎矧燦焯焯可恃如此嗚呼亦不愧為君婦矣於是燦以武功銘授行人王文濟使合為狀丐予銘豈欲予銘匹武功乎謂同為史氏則可也銘曰偕以褐來而至弁十石偕燕殯越瘞婦之事夫亦既能事英爽陟降于燕于越矧于結髮不在朽骼於焉同穴户部主事程君墓誌銘𢎞治七年夏六月十日丙申吾友户部廣東司主事程沂宗魯卒于京師吾與同年皆哭之哀尚書葉公侍郎呉公秦公與諸寮皆哀之下逮芻牧小吏亦哀之人莫不有死若宗魯則非哀其死也同年哀失賢友謂宗魯不死必為大臣且為良臣言無不然謂宗魯童時下筆數千言聲聞馳湖南湖南在同年者又言無不然哀之三公哀失賢屬寮之哀如三公若吏則又以其嚴且明罔敢干于度以安其位不能不哀已其父母老失壯子今尚不聞也可若何始宗魯卜京居得玉河隄東門之值隄之梁逼焉其甃之勢不能以頓殺而右突焉迤之於宅之位孔害朝夕予過必為宗魯戚予念欲語宗魯然宗魯方亢然口含石礫以奮興事功恐訾予誕噤不語之今已矣卒之前二十日來叩予門索為具慶詩甚遽既而取其帙去予晩學不能詩也因曠然一適更十日造之曰沂欲子為序非釋子也旦莫且自來因言近有江州之命江遡湘皆水道飄風迅馳可六七日假道以省故為此圖與詩也予嘗道大江直上舟人影影見所謂江州城者先解颿下碇曰凡天下舟船上下此者必訊驗易符入課乃往其胥與其土之豪長衣食焉闗節鍵鑰牢不可破嵗入常不二三而盜已七八葉公方大清國計故舉宗魯以行公前以近郊諸廩洎廏牧地多宿姦未易擿發患之已慎柬羣屬聲稱者四出獨埧上垣外無氓居舊不設寓館部有事至者事率營至莫簿書狼藉几案則不可收拾而守閹投隙設草具倉卒少施解則併而擁入其閤已亦幸一休焉不知已墮其穽中公獨屬意宗魯宗魯既至相旁隙地取材於官宇之廢役工於羨卒之休取足棲簿書宿胥𨽻休其身而止而寓館來告成於公自是弊源一塞不復可穴公益喜故事屬之在遣者終事始易遣而宗魯則三數事沓至無寧日宗魯亦幸公之知而勇為之也豐潤縣先有芻牧事宗魯按白有緒未竟江州行已有日恐不果竟往而返日夜冒暑疾馳三百里比至已不能言急索茵枕卧卧三日是為卒之日也時年三十有七宗魯以毛氏詩登成化丁未進士潭之湘隂人祖謙某處司巡父俊以宗魯之貴封如其官母于封安人配許安人某處判官志謙之女子一天機女三長某聘長沙王勝武餘未名兹將歸其柩某月日葬某之原然天機方㷀然一孺子耳是又在封君也於乎人患無其才有其才矣患無其志有其志矣患無其位有其位矣非有其年位亦未必遽以崇也位不崇其所施固亦有限顧其力而為之可也徐而圖之亦可也而率爾長往以至此極誰則為之果天乎傷哉雖然亦賢於素餐者逺矣蔣敬之曰是不可使後世不知有宗魯女其銘銘曰功以事立事以氣集氣以志帥志以位遂位以年升年以養増日馳三百乃養之賊年是用蹶為位之累齎志良苦已乎宗魯養素萬處士墓誌銘南昌羅舎之陽支村曰鄧坊有處士焉號養素字汝文諱綺萬其姓也父璞璞終田州府同知田州君父信衡信衡父可用於處士是為高曽大王父田州君始以進士知交阯靖安州黎蠻叛没其地能不汚其偽擢靖江王府長史居信衡喪免喪處士侍行留京師二年學同縣進士萬祥為進士業有緒而田州君改田州州本羈縻僻在粤粤人種蠱山出瘴霧能殺人而獠猺獷狠用其豪酋為守人輒憚往處士毅然誓侍始終挾古人篆籀諸多奇祕方書日夜習於邸第岑守舊魚肉視其民少忤則劉不移時路人視其佐屬咈意則鳥言搪突無敢誰何處士既端凝沈黙而又聞其言皆當世法令俗不知餌藥間有就診療者如脱守不覺自慴且多其藝能禮以上賓而於田州君至以兄事之大改其所為處士之力也田州君以事之雲南以處士偕道次栁之洛容縣民嘗有怨家淪為盜者距城十里方刑牲歃衆期以鼓行陷城逞其忿以報因以為變闔境洶洶明日縣長史以下潛以妻子奔栁城以避其鋒處士奮曰大人與膝下兒奈何無名死于賊手因募幕下驍卒飲以酒往諜之至導其一人偕來因得恐以危語使告其渠渠懼乃止岑守老欲傳其位於嫡鏞鏞被檄以兵助順于桂而守死田距桂數百里其庶長鑑睨鏞未即還舉兵圍城脅印若代之者鏞母窮急欲懐印縋出潛就鏞處士謀于田州君曰鑑非王命而得印何為也脱事洩印固在其手愈怒而􅀈入禍獨岑氏邪不如姑與之而徐圖之往告鏞母母諾明日開門擲印與之鑑果被討亂遂定及田州君乞歸以單騎往都府取符契獨處士以土兵數人衛歸舟自潯水東下暮泊長利峽峽夾岸叢篁中盜伏焉夜掠舟為業村長以告而前戍度不可進乃始以上供名物縶之以為質俾其土人鳴柝爇薪其上而舟中皆張弩注矢以待丙夜小舟來偵覺有備遁去達旦并力櫂舟兼程以進至南寧始與田州君遇而往返四五千里經十餘年且惡土也而血屬全以無恙歸鄉人多之然猶惜其學成不得一試也家故甲閥當長鄉賦與弟緯弟緒所以㑹計裒益轉輸不弛不等而其施衆睦族之心至老不衰居閒極意於霞宮雲宇譎詭之觀芒鞵烟艇踪跡所至輒索筆紀其胸中所得或刻石以去有詩五十卷與田州君閒庵稿傳於人子二籟簪籟簳皆以明法令食于官行有服位配唐朱羅氏女二歸趙李為婦孫六孫女七年六十九成化乙巳九月二十五日卒葬某之原籟大懼日就闇然埋伏誓必得射其耀而出之忍哀至兹始克以狀丐銘予不忍拒也銘曰身其親支不去左右亦幾何時矧入于夷種種醜惡而可去為維夷難覺多藝以學夷自削落親心是若莫夜禦戎擲印于兇屢危不窮既孝既忠没齒在野有鬱其長孰為長存恃此銘章李母謝夫人墓誌銘夫人姓謝氏諱春贛之興國人隠君克敬之女朝列大夫知開州遁道之妻􅬶珩儒生寵鴻邑秀朝之母也大夫未貴時得夫人繼其何夫人之室何之出也充羽賓三子矣夫人如自已出子之童有敎孩有嬉具在襁褓也有乳哺及長而冠冠而婚珩躡其序寵鴻朝繼之側室髙出盛又繼之服食惟一所異者貌耳人識夫人有七子也卒莫定其為誰氏之生大夫初筮得開州州畿輔地土木之變民物蕭條夫人居州第躬織繰操井臼與婢媵同苦樂不以貴怠輿皁有縣鶉菜色者皆軫而賜食與衣大夫大興州學捕蝗閔雨招徠流亡毎考為比州最擢從四品夫人所以勗勉尚不變其初民獻遺尺帛斗粟不敢入其第大夫去開日民至留鞾立碑以志其遺愛夫人其亦有助矣乎既歸貲不足市田宅而購書畀子猶若有餘者成化丙午八月當大比珩朝方集省下以其月二十五日終年六十六於時大夫之卒十三年矣而壙已别營距里餘以何先合塚不宜再祔然同於縣東榔嶺南北也側室陳後大夫七年殁大夫憐其不育脱立孤塚又恐為他氏鬼命先葬其右以待可謂仁也辛亥六月二十八日珩率弟將啓以窆時視窆者合男七人鴻早卒不與也女懐聰珍重凡二人孫振掖拭攄擁掇揆掀探捍據擢拯接挺合凡十五人孫女某某合凡十四人曽孫男某某合凡七人曽孫女某合凡四人而内外屬多不可勝數哭聲閧野縣人以為盛珩之志亦欲有為於時以繩武趾美輝煌登聞其所生而卒困躓如此居既僻寂無名為文辭者為楊其潛聞都下方蔚然甚屬意也得計偕來闖然入吾室以銘請銘曰不必自已惟其夫之子烏求其庶惟其夫之娶嗟若而人為婦為母兹歸于此山之趾白石齒齒戴主事妻胡宜人墓誌銘𢎞治七年夏六月二十四日予騎過長安之西街街東西交北出户是為戴天錫之宅予惟不能逺睇然遙見人旁午織其中狀少近聞有呼號聲予不能忍立騎麾𨽻入問狀𨽻奔出致其舎兒語云吾主母以今夘即凶吾主人翁泣仆地方召匠治棺斂飭飯含具總總予方幸天錫之有賢助而又惜其罹此釁也明日入弔天錫抱嬰兒汪然流涕立棺側語予曰吾妻無宿疾頃春咳作而熱發腹癥結如有物梗之者夜卧必裸其手醫云此胎氣壅而熱逆也不可下宜疏其氣而導其血閲月咳盛而熱蒸騰騰掌若握燒鐵錐不可忍醫猶執前診不變至晝夜咳咯痰遂泉湧日易醫醫輒庸前醫然實皆庸卒不效至此其命也夫又曰胡吾妻姓也某吾妻名也懐寧吾妻鄉也處士瓚處士剛孺人王吾妻之祖若父若母也鄉進士鳳吾妻之弟也未歸吾時其淑行之在胡媒媪言于吾母太宜人以致于吾父主事君所以必屬于吾者甚備吾不欲言之自其入吾室而吾母愛之如已生竈婢私竊語曰乃今見精飱鄰嫗得分遺歸語其家曰乃今見巧製吾之入闕也實挾以行於今為七年吾丑而興糜漿之飫吾腹寅而出終酉而入吾腹復然吾弛然而卧矣吾不憂于内而得專意于外以畢吾公誰使之吾不欲覆吾妻使不聞也子若吾哀而與以銘以歸祔于先塋馬鞍山之原則將不恨其為女人與不相吾以終矣天錫安慶潛山人尚書祠部主事宜人之貴蓋其貴也子一人嬰兒安陵女二人某年三十銘曰維寧有胡其生邪維潜有戴其歸邪維京有邸其客死邪維馬鞍有髙丘其反葬于斯邪義官王君墓誌銘今天下大較聚十氏居必有王氏其古受姓多也京師固多王氏東上角王其先錢塘人也太宗定都燕徙天下諸豪實之王在徙中曰某實自錢塘來者某生某某生鉞鉞生祚字永錫乃君也君之上世惟守錢塘之貲無隳無崇景泰中君始嗣主族時京師新罹虜變四方商賈莫遂進市不集善貨善貨夘至已售以為遲幸得脱去不甚計估值君廉賈皆五之厯天順天下日就平至成化凡二紀晏然兵革不用則已嵗走數十舸出淮江吳越諸州舸綱一人受厚直以次計力能上下傭之循環迭至輦輓晝夜屬于門皆諸南方奇物而麴以釀繒以衣魚鹽以食尤多切人日用者故京師語雄貲必曰江氏次王氏王氏謂君也君歎曰吾何以是名邪乃賂醫集善方爊煮煎熬百藥粉液以為膏傅紙上遇有貧病不能自致醫者輒施與之凶肆棺槥常隊入緡買之以竢死于溝中道路者餓夫羣然操瓢延頸于門日益不厭四方供輸庫藏或給大官牲蔬果實遇有漂于水刼于陸紿于無賴者常子母貸于人而留其官符以為質君不欲故立異姑同俗然實不主其必償故人有急樂趨君君二弟祐皆奇士克成君美祐子永清衛指揮僉事瑛尤孝事諸父得其驩心蓋君雖在豐裕而奉身極樸素朝夕食數豆蔬而婣賓進匕筯則象犀瑇瑁珠貝爛然在几不為嗇態貴游之豪蹴踘摴蒱聲色狗馬充斥閭里而惟投壺歌詩焚香瀹茗務習野意以為清故其子弟之不見異物而遷焉嗚呼君為人亦偉矣君嘗入粟實邊故冠服得此貴人然實非其心之所存人皆知之也𢎞治乙夘四月己夘以疾卒年六十子男二瑾孺人劉氏生珣側室黄氏生卜五月某日葬都城南三里何韓家窊之先塋君疾時度必死泣謂祐曰吾寄於世而不能自華爾吾哀而丐羅太史銘吾葬是爾吾華也吾不死矣吾聞楊諫議與素善諫議吾婣也敢以是累及是諫議遂來予不能拒也銘曰能以昌其家而不屑屑于斂挐衆汩汩以奢固囿其轍而不入于邪殁能知以自華使百世有聞抑又何嗟廣西按察司僉事熊君墓誌銘閒住翁廣西按察司僉事熊君也諱景字開甫幼為熊氏令子弟比長以詩領江西己夘鄉薦成化己丑登張學士榜進士入刑部為主事擢員外郎己亥轉今官甲辰念母劉太安人老無侍請歸養因以是號志休退也丁未年五十六十月晦日卒越八年是為𢎞治八年其孤葵始克與其季葛謀以十月十六日葬君于某前事葵屬鴻臚序班裘儀來丐銘儀君壻也道君之世與其事甚覈其為主事也屬部多大獄部長使鞫則屢掣于大閹貴人横竪間隔法所入必脅使出所出必入君意一不為動出入惟法無爽錙銖至為員外郎亦然時名大起人逆君遂大用以員外郎贈其父母封太安人妻封安人部長徳君助已常與太宰道君能吏實不欲他用太宰誤以為薦也以當廣西部長大悔君欣然行凡所轄道在則犴狴一空投牒受辯旁午立門外入則惟聞脱校聲吏俯首書牘不敢睨人張關節要賕為姦二廣節鎮都臺朱公嚴於覈實以賢監司許君檄君勾當潯桂諸猺猺人類而獸性居山林遇擾動輒號咷叫嘯觝觸跳踉必以死逞靜則跧伏不見踪跡君知其然約吾兵不得徙壁壘隂遣間衣商人服負鹽底猺所若為潛竄懋易者猺不疑也集來詗虚實間曰吾商人不知新按察官何人然見其方具器若古壺狀者十數實石其中窒以巨水計曰猺出降無庸發此不然此嘗破大藤峽者也猺懼白酋酋即日降不旬日降猺及獞獠數千姓蓋君以謀勝也公大喜鐫銀牌曰奬勞功勤以付君亦以勸來者及其請歸也父老泣留謀沮之然以不及先事為悔無已明年乙巳朝廷追憶其勲以文綺即其家賜之居母太安人則恂恂如童匕筯不以人代人問居官時事笑曰國有成憲官率循之無工拙也退然不以自多而實非忘世者太安人殁喪以禮凡緇黄宮于㝠者屏不用歎曰吾何能俾吾父母貴吾何敢必得養吾母以畢吾私皆吾君賜也吾雖駑然誓此身邁往一奮報者至是已矣熊之先居南昌杉塘世傳楚子熊繹之裔屹然大宗元社將戹盜四起能以兵保障其鄉曰九成人無少長咸曰善翁是為君之髙祖九成生徳讓徳讓生素敬素敬生資直資直君父也文皇帝時徳讓以才子選在江西十八人之一竟齟齬終泉州司税壻諶氏諶板湖豪也遂居板湖於君為曽祖素敬懲不仕能以所儲二千石貸饑人償未竟忽取其券一火焫之復來償者曰而未嘗貸吾粟何償也弗納號留耕於君為祖資直則儒者也學有源委敎於鄉為嚴師於家亦以嚴勝太安人助之故君無假他師而成殁贈生封實宜配傅氏封安人者也子葵葛丐銘者是已女鳴貞儀之妻淑貞妻張記順貞妻齊世華懿貞妻林紡葛暨世華紡皆業進士為學生孫男龍孫孫女閨懿尚幼也銘曰荆支洪居去杉即湖蓄鬱紆發勃如慎刑書往必趨如大愚扼吭擣虚出酋不虞其歸誰呼正虞倚閭不究其圖嗟烈丈夫今也則亡骨可枯名不渝錦衣衛千户安君墓誌銘景泰初額森未即悔禍南土弄兵之戎所在蠭起一二奔命之臣乘時觀望多其身圖由是姦伏于肘腋間莫可擿拔景皇帝赫然震怒恐有以戚我上皇遂嚴偵探之柄拔錦衣羣校置之東厰使之入微擣深不以時達時則有若安君諱順字子和者尤傑然夐出君汝之新蔡人幼侍其世父整于京整錦衣總旗也老以君代至是以才見使用事然其童年播遷東西浮寓以身薪水無隙以學而心獨恨且無攸適從則惟遇僧梵于瞽説于途亦説久乃口通佛書諸多傳奇野史後亦厭棄惟喜人讀書從旁聴之輒能成誦積至儒生所恒習者張口縷縷而出間能辯析義疑至史傳所紀即斷曰此治朝也或矍然曰此政失當亂若真能了了者其實手眼漠如也性無鏃礪之鑿事必流其真誠心寡蓋覆不主嫌疑凡闗涉政治大體即貴幸勲戚麗于憲度不避茍曖昧非其辜雖上意叵測必以身任之一時姦人飛奇反間嫁禍於人者皆見沮塞斂手避去坊市惡少年相語必曰毋嬰安順威寧伯王公為御史時晨入闕吏紿其家金器匿娼家不得公以語君吏聞君至股栗舉其槖伏辜扶風人趙才興從貴將久無功怨望誘妖僧以星炁煽人刑牲誓天朝陽門空舎中約旦夕變有詔覘之同事二三不即發君曰厝火必焚焚而沃之晩也捕之得其事狀并黨磔于市閲月蔚人呉伯通與其黨余郭福亦謀踵才興之為者亦皆墮于君手故未朞連受賞自試戈㦸司百户至真伯户皇上復辟奉迎乘輿多見任使㑹朝廷入廷議以君九擒劇盜功最多授副千户先皇帝即位初妖人趙春隂部署偽將偽擬國號于滄瀛間灤河並邊謀誘敵入其盜曰王成玉曰李端曰傅洞淵匿機誑脅民洶洶且走且惑君以次擒之以獻進今官享榮三十餘年階武徳將軍封妻張氏宜人贈父齊如其官母程氏如其妻皆是功也初君念軄禁近母老新蔡不得朝夕侍迎之京竟食君禄以壽終躬歸其喪合父窆人以為孝仕不仕少有知者皆聞君名尤為内相劉文和公所奇見於文焉𢎞治八年年九十十二月十六日辛酉卒子賢蚤卒嗣副千户者也寧入粟為郎視七品亦卒泰以戰功官錦衣百户孫璲瑜璽瑁瑋璽嗣賢官今為百户女某宋通妻也明年正月十八日葬大興縣東湖社豐臺村墓與張宜人合然宜人之窆已九年矣其幽堂宜有銘來屬翰林編修羅玘玘與御史潘楷友楷妻通之女君之甥也楷言其世與貫而已君之為人有不待言者銘曰執威弗威國威在斯炎石及玉而豈可為蠧既糞木衆亦灼鑽毒其初生木乃得完是維安侯克遇三帝祕密爪牙耳目攸寄侯率其性暗與道俱蹈是二美史有可書大都之郊此維高丘有石誌幽是曰安侯贈監察御史王君配張氏合葬墓誌銘贈監察御史王君贈孺人張氏廣東道監察御史表之父母也先是君以成化庚寅十二月二十八日卒御史偕其兄聚才葬之宅南先塋𢎞治戊申三月十六日孺人亦卒又穿君墓而合葬焉君之卒也年六十五御史時為鄉進士未貴顯孺人見御史舉進士知阜平調廣平迎就養入南臺為御史年八十三以卒御史免喪用薦留之臺考三載今上推恩其所生而君與孺人始有是贈距孺人之葬九年君之葬則二十有七年也御史將以贈銜題諸墓而泣謂其友給事中于君某曰吾兩葬吾親皆弗邇史館吾不忍以草野語銘吾親吾是以飲泣而待幸兹恤典吾親銜若斯可追銘已史氏吾朝夕同北面也所與善者宜莫吾拒謹以吾親世行授子狀于君狀曰君諱原字孟本樂庵其號也父清清父彬彬父允中始家汝寧西平里之洪村允中上世則商水人也而孺人之父曰二翁亦西平人以門閥婚君生十一齡而孤母郭氏鞠之成君亦蚤自懲孤㷀恐遂沈汩乃力問學為多能尤躭山經地志堪輿樷辰家之書久遂通其説則出遊長林髙丘巨壑陟降徘徊眺瞻其間津津然若有味者或竟日不去或竟去不顧人莫測也居閒惟與逢掖寒畯之士劇談雄辯去則閉門兀坐焚香啜茗而已里閈積恚至欲相軋為懟者立解之如決沮釃水不為力及捐所有於貧之尤若沃垢而去之汝寧東盡上蔡南界遂平西逼舞陽北抵郾城縱衡數百里介紹謁君為相宅卜塋兆者踵至君隂察其悃愊或非憸狡睥睨貴富與窮迫而良者間為一往有致金繒於歸囊則盛怒堅拒擲於地而去曰吾豈為是來邪於豪右大宗茍薄其為人百方招之弗能致其心志飄飄絶不屑營細瑣一惟孺人居中主之故四時薦祭賓婣時至男之學也女之嫁也牲牢修幣未嘗告匱用能弼成君徳諭子於道在縣邸老益嚴察俸入外一毛弗置於庖厨間笞朴之數御史晨出則戒損之卒俾御史以致政成以召入為名流其有功王氏者也聚才於子為長次則御史女二人壻李寛朱永寧孫男六人廷轉廷玉廷資廷貴廷賞廷貫孫女五人壻某某皆士人嗚呼狀若斯于君其豈我欺也邪則其東西封而墳者蓋纍纍也有能若斯墳者邪豈其自厚其躬預處其吉而今果然邪是宜追銘之以告于其幽予與御史善者也烏能辭銘曰孤能以其宗興嫠能觀其子成差池藏於斯人以為猶生圭峰集卷十四
