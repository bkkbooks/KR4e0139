body:
  text: 圭峯集巻二十六明羅玘撰詩五言古黎乾兆歸夀母蟠桃圖詩駿韁絡卑枝荼壘巢上榦天雞立髙顛用口作昏旦蠕蠕羣動間機息肯汗渙開華與結實納甲剛百換纍纍綴星曜終海枯石爛狡兒饑欲偷耄王空扼腕堂前忽見之眼眩雜花亂遂疑渝之源脉與崑崙貫借君報主身白日生羽翰飛歸拜堂下修爵進無算更祈三青鳥母徒邈雲漢常立堂東西如立王母畔李成章五十夀詩黄金礦深穴竒價論都㑹為生若薅田取穫在宴嵗年華去流水豈惜是日醉吾言勝揮戈敢任老景退送何邦彦僉江西憲初識面數日告行已成新相知忽作新别離始知離别蚤更覺相知遲程孔蹔傾葢不在多言辭髙枝有鳴鳥如進我酒巵酒盡子當去依稀各天涯豫章古水國其下蟠妖螭請出匣中劍一一剸刲之夀成國老夫人八十詩南門有長鑰豈止百丈過貂垂凝春温纛下或寢訛鵰飛髙牙空因風想玉珂憶惜珂珮聲隨歸振簷阿解之拜堂前盃盡慈顔酡一去今十年慈顔竟如何豈無水晶鱗豈無翠釜駝宫醪尚方珍亦有孫婆娑維此匕鬯者齒牙玉瑳瑳維此鼓舞者頭顱雪皤皤天德光日月帝居壯山河臣身借湏臾臣心其靡他送周草庭任雲南僉事春草滿庭芳玩之生意長草萊被滿野不翦禾黍傷我願草庭子生意拍滿腔乃持翦伐具去我天一方我聞彼絶徼蒺藜羅中央亦有螟與蛭虺虵雜蜣蜋種種積醜惡而於草中藏剪與不剪歟我行課其場大哉天地仁斂物用繁霜漁陽邊防圖為劉雲太監題朝辭黄金臺莫宿孤竹國夜深夢星月如照永巷色猶防傍麒麟其上煙霧黒覺来撫旌槊窅窅望宸極漁陽國東門啟閉慎朝夕室韋元納欵戍卒且畊穡柴虚猶子洵領南畿賢書東歸將北上春官予作二詩前道其實後以鼓其勇也有客復有客少壯勇而鷙一攫空邦人再攫空多士吾甞指其腹號曰五經笥官今古中丞柴虚别名宇洵也九鼎資年来沐鑪錘晶熒㑹躍出閃閃奪人皆柴虚顧之笑此寳良我試海神湧波濤逺致廟廊器誰能一家私總用邦國瑞又白日麾大旗裨王来接戰長弓發徤臂射中裨王面歸營夜張燈照見滅㓂箭天明上馬去勇氣逼飛電縳其名王歸拜獻明光殿保竹為余罃舉人父題一笱費一竹得魚不盈觔一笮費千竹度人縱如雲費竹有多寡終非愛竹人筐成塈落梅忍雜土與塵籩實薦宗廟凜然對明神用有貴賤異能免伐竹頻尚有汗簡編聖言載諄諄妙道固有託蠧朽傷其真憶昔得此種潛奪蠏谷春竟爾隠其下人曰竹隠君子乃更愛竹孫尤愛無倫視竹如視家誰能樂家貧桑梓恭敬止毛裏不屬身丘木有松楸望之忍為薪白鳯下啄實不知在何晨雖當伶倫來要使常囘輪夀栗齋先生詩有髪只期𤣥有心只期赤赤心日爭光𤣥髪嵗屢易心無制髪術坐見𤣥變白君王好少年鑷白竟何益浮名有若無擲去如敝舄赤心得所託如覺重負釋氤氲五雲表鸑鷟翔六翮從兹散髪去放浪烟水跡下睨一世人紛紛牧兒奕鉏藥窮山根采芝動雲石形骸付物外萬古一朝夕送石邦秀山西提學詩驄騣勿澆膏鞍韉勿裁繡多邊太行行歴歴雲水竇上鈎棘芒轉下與石角鬭貴能不黔突急急施砭炙豈伊泥来學孔轍亦奔走亨嘉際厥初吾道照正晝冀方號孔邇古我譲羣后降風從葛屨比羣如賃僦鑿空牖天明簡在誰授受紛紛過眼事不獨城郭舊呌虞得岵巔箎和逼星宿于侍御母輓詩迢迢白雲鄉望望枯涙眼白頭亂飛蓬㡬嵗不忍綰飜思食貧初跛驢力登棧二郎好風骨人謂萬金産乘驄騖天衢衣繡執象板文章換冠帔聊爾成一莞無磨未忘心其去亦甚僴哭昏臺中人欲以疉嶂鏟吾非中壘尉未敢賜編撰王院判父輓詩椿萎世已寂慈竹葉䇿䇿豈不悲椿萎苦心學醫國朝朝斸竹下常恐宅虺蜴慈竹嵗亦萎心恙如被蟄浩蕩天地間此身常跼蹐世人無長生賢聲寄經籍嗟嗟孝子心親名如拱璧吾如朽腐木豈任筆硯役放言雜詼諧以倡孝成癖魯錦衣母八十瑤池宴㑹圖作鳥作青鳥作官作金吾青鳥侍王母金吾衛乘輿王母宫瑶池乘輿駐幽都金吾宅在斯八十母與居我願彼青鳥飛向王母呼晨降金吾宅繡幃翠􅉊毺異香繚繞之與母傾百壺年年動金風龡下王母車輓篁墩母林夫人瀛海聚萍梗兩宗偕震業委禽非以師作合稽譜牒是時襄毅公淵氷渺初渉内顧門户殷百慮不一愜夫人慰慇懃此屬箕帚妾公亦葢世豪百歩穿楊葉官如傳舎然屢有乞米帖唯知行飲氷寧䘏謗盈篋胡能堪多艱如墮水跕跕及歸入門内無費舌與頰坐令忠義肝奮鼓祖逖楫南轅海無波北伐匈奴讋王明鍚使蕃晝日用三接移根傍桑梓得反大州歙夫人駕文駟令子得新㨗人方訝修反國喜増固曄奎星南斗避元氣待調爕温甘蔚背諼日月換堯莢公神久陟降配享登禘祫而開夜臺迎有詔封馬鬛茅山書屋為項德懋題滿山生白茅茅白山亦白維翁養黙慣分與塵世隔㧞茅覆山椒牽蘿緝茅壁面壁夢周孔㝠心契羲畫茅疎壁繚多缺月瞰深夕百年翁骨寒山鬼夜敲石鼻耳真貫穿誅茅掘遺磶見磶如見翁䕶磶如䕶璧一磶復一柱吾當陋晉籍書屋作於乃祖養嘿翁送項少府之長洲任詩上令下簿領日同飡吳秔飡秔問租田田不在吳城田初屬吳疆今分與吳平海壅太湖溢濕窪苦常盈雖耕十七八此外蛤蠣蟶刈穫登饟道亦如新被兵前者勸農事無如子知名子船在胥門櫂夫頗生獰船頭莫搥鼓船尾莫樹旌樹旌與搥鼓恐使老穉驚棄擲覆圩鍤於前事逢迎况能殖葑茭而與惡浪爭彼橋谺谺門此㟁蔚蔚檉暑䕃澇可洩前勲歘如生繫船門之涯髠檉用炊烹采采堤邊蔬蔓菁復蔓菁所貴官長痩如兵立先聲官痩民自肥民肥邦無傾與子相别離行行重行行送劉仁仲歸省詩頭戴義獸角憶兒前歸時孫歸好背腹振振銀鷺鷥老眼眵忽明呼童掃蓬茨坐堂勞辛酸乘馬百日馳重華正當陽子亦侍講帷羣公互經綸乃一卨一䕫念子能割義勇遂内顧私䕃屋漸生竹逼牆誰種榿前年郛邑空鋤岷絶蹲鴟巴童頗還定萬竈已烟炊夢寐見顔色渥丹滿頥髭縮地若有幻玉山立差池婆婆進璚觴此味老更知萱夀承恩詩為劉博之題十一井邊嫗皴皺如槁木自云太安人吾實與鄰屋乘輜一時来被出自黄谷有子式榖之吾惟恣禽犢於今四十年龍蛇隔貊鹿氓蚩蚩何為汲井煮膠鬻河隄決東口鞭背苦驅逐而今半死軀何以仰饘粥安人坐藍輿呵擁紛百僕如神仙中人秪聽聲轆轆耄眊何所知云此赴輦轂有龍旋於函有翟畵在服嫗愚欲垂涎真若秋蚓縮寧能洞天機基本貴先築如泉穴山中萬丈瀉晴瀑奔沉虚無底闃寂善潛伏澎然釃為川是以有四瀆有德古所云貺以名夀禄送衍聖公襲爵回詩上公趨金墀新金昭舊服崇班首百辟翕意注萬目皇皇函尊尊原本有水木胼胝脱魚鼈帝命誰率育宫居且粒食蠢蠢亦尸祝况當詔萬世如日出暘谷有揭者乾綱有運者坤軸峩峩享王祀衮衮紹遺鞠本宗尤無撥公侯終必復泰山小天下觀海𦕈一匊譬彼大白牛載道貟爾幅國門望東魯舊甬宛如築遄歸埽宫牆列鼎薦新餗惟餘甥館閒更欲留坦腹送實菴先生奉命祭告江淮便省慈闈詩碾氷驅飛車天衢中夜發修途縈春蚓疾志塞曉鶻冠欹那及緌骼露能暇韈如何副端拱南顧意矻矻吁嗟乎蒼生胡戾底天罰滌滌如炎焚糠籺不得咽拯援少遲遲行恐堆白骨前王實罪已剪爪且斷髪以臣代君行寧敢黔驛突窮鎮詢支祈泅入蛟蜃窟災祥神爾司舎始當救卒指麾萬虬龍一夜覆溟渤白蹢豕渉波滂沱離畢月南國率登隮吾皇大慈筏噫然扇融風生意翔勃勃臣心少舒弛跂望見吳越空桑感伊昔報主身敢忽慈顔違三年豈獨定省闕敢言三公換僅得假道謁朱輪閤隆閾玉節倚穹閥寳釘横黄金繡袪撑象笏曽誇負弩驅意象自突兀舞眩天為髙飲狂海應竭人生㑹值此喜劇口反訥穆清尚凝神牲牷果肥腯仰觀象緯逼詫訝失彗孛倐而秩祫禘所應在倉猝傳宣入登對理窟誰勃窣載命彼倌人星言理来軏揚名顯父母炳炳孔子曰贈鄧景華南還詩黔商檐為舟海賈舶作室檐頭霧霿霿舶底浪潏潏豈無􅓔與㺄磨牙恣搪突豈無鱷與蛟掉尾變恍惚就如底變髳相對兩吃吃倍蓰如丘山退走甚搒掖逹人固勤生其擇亦有術長航下江淮風伯甚呵叱朝浮清泠池莫宿歌舞窟神京萬寳淵羣駔紛授劕聨翩巧趨蹌璀璨羅百鎰炰羞進醍醑纎指鏗在瑟侵晨鞚錦韉臧獲十六七賞心適飛飛舟子已候日彼迷寤斯言勇撤棄簪笏夀梅閒翁九十詩航江儂真勇傭儂翁亦得幽燕走探厨一手提九罭逮歸羅囊箱幽奥射光色㕓翁狹眼孔連夕搏胷臆約襁耳側聞垂髫面親識信哉彼珠玉無脛走中國連牆元季間呼飲到昏黒醉狂思如雲百幅有遺力把觀呌孫曽舞抃㡬欲踖鞠躬非佯尊口不離館職喁喁私耳語競欲効供億銀缾螭遶腰貝􅕸爵生翼更端意先嘗乍發語又塞亷城髙言言賄將不可逼逢人説項斯事覈無粉飾有時敭稠人奮不䘏啾唧遂令山澤癯虚譽郵到北昔當闗中饑令子痛可憶木皮晝同飡糞壤夜共息幸茲獐䑕軀簪笏尾䕫稷江鄉萬里外劃劃窺夀域􅎺池肉陵屯眩弄雜㸑僰盤堆實三千膾炙黿九肋排空生肉翅甘分捐儤值角端或乘之還往未日昃終然渉幻窅有佞者子墨口如狂瀾翻舌似背錦織指麾夸娥氏侃侃侍翁側背能負南山並手拓北極日月如跳丸不出翁户閾武齡三之恡彭夀益前即行看騎蟾蜍入月光景匿便道焚黄詩為唐司副作人生本虚舟汎汎隨去住名韁苦縈之奔走在道路空餘袒括悲滂沱㡬春露金閨幸通籍恩湛亦希遇九原如可作日色射銀鷺依稀見羮墻聲容非像塑心濃地轉隔夜永夢屢屢墓門有芭蕉松桂亦無數日落𤣥猿啼黄能掛髙樹兒身恨飛鳥有翼可飛度天王重柔遠歸使每嫗煦館伴勞近臣皇華載馳騖行行古融州好近星火鋪六年今始歸一日見墳墓黄麻當此時有不論物故寂寥人散後星月鬼神聚咿嬰或曲跽天降此翁嫗誰無生子孫唯此稱獨歩兒心尚哽咽不及生反哺送檢討王敬夫歸省詩碧鶴在綘霄赤睛闚天文長頸有修翮而能負長雲一聞九臯聲翩然下其羣士乘風雲㑹飄颻恣升聞置身稷與卨北面瞻華勲清髙地位隔風俗燕秦分勇紓浮名鞅不用利斧斤函闗馬西頭紫氣屯氤氲庭柯葉不改庭草蕪不耘心行驅車急如此事孔殷湏臾都門道前是范陽軍送江仕通之莆田寓言十筍無一竹百卵無一禽竹苦刀斧傷禽畏虞羅侵見卵思禽飛見筍思竹林何異下邑士滿有軒冕心終焉井中坐仰見天㡬尋偏於蔀屋隙飛梭走光隂白髪日自摘君門似天深能無通籍者汰沙出黄金州縣昔矮屋今看更深沉絶勝夸昆士龍鍾抱膝吟送張佑之監德州倉予於佑之差有一日之長故言其大者郎吏頭漆黒心有大機軸司徒眼如電晨降檄一幅入門絶經營已飭車轆轆老父坐車上横身任為僕幸逢德州程九水一日陸船頭魚潑潑船尾鷗逐逐晉人不知船老覺船是屋且令買魚烹更欲伴鷗宿公衙幸少休可報酒初熟玉浮暑池歜金泥秋籬菊我能捐千金誰有愛日鬻么麽爾委吏自束縮腸腹慎勿莽饕餮人自念鞠育河源吟送熊節之知河源縣予昔與之處太學知其為人故見於吟云出宰河源縣非是黄河源維彼黄河源其名為鄂端華言星宿海或曰此天根君能如鄂端身髙在崑崙塊視人間世此縣安足言請從天下縣一一向主論縣縣令如君行行信魚豚挽蕭莘夫御史柯之父癘鬼滅人門其饞甚猛獸所經迹如掃有不遺卵鷇中間亢宗英天為置呵守羣尸臭腐間何處􅂒徑竇殗殜半死魂幸活六七咮補苴見新巢鼎鼎焉説舊賔興登寧馨配二十八宿峩峩惠文冠倐覺移戴首山中地行仙宫錦照白晝敢辭大塊息陟降帝左右威鳯吟送張經載四川盤糧威鳯集阿閣所不矜爪咮饑鴟得腐䑕不敢啄瓦竇有時脱翔去鴟啄當正晝飽能出妖聲呼起百怪鬬有狐毳九尾有蛇岐兩首一足䕫躍躍四目蒙貿貿鴟如啄不已實恐顛載覆仰籲太古帝長使鳯居守榮夀詩毛維之父母七十嵗青精晨雙盂並几日華在朶頥白􅚖􅚖刀切萬粒碎芹香齦齶餘椒桂衆臭退逹生有至理嬰色養其内西南走逡廵結髮老東莱令子温其玉赭案端委佩誰能驅飛車定省日可再浮名天宇雲此日真足愛明堂孝理初羣工正熙載天顔違咫尺行邁决旋磑前驅報親閭晝錦逼巵敦上方紫金丹更助飡沆瀣送劉使君之任栁州潞江寒欲氷栁州水如湯萬里赴百粤十年歸畨陽江頭别時兒今作長髯郎有力哮如虎挺身駕長航指言百粤路逺在西南鄉衡山髙峩峩洞庭渺茫茫借問水窮處一源判離湘離合牂合鬱其流遂湯湯泝牂且泝鬱是為栁州疆二州十縣地榮瘁孰主張遐邇皆天氓周室開明堂頌聲如可作太史紀循良新野宗知縣二異詩二穗三穗禾二岐三岐麥去年與今年新野民所穫農初得之笑把玩不忍釋乂牙珊瑚枝凌競戰士㦸又如明堂舞執籥與秉翟又如鸞鳯翔參差垂衆翮槖籥鼓元氣澒洞渾融液薰蒸為太和混沌此副坼令尹今為誰宋公師相伯疾惡真如仇愛物已成癖嘉祥豈虚生願獻府公宅桓桓沈中丞憲憲唐大國周公嘉禾篇再見出孔壁吁嗟薄惡吏亦自梗天澤送王宣溪雲南提學登途躡危梯逢人聞鳥言正晝長蛇呼夜欲呀口吞繩橋足顫掉半委饑蛟餐鳴弦􅂒鼯號前是犵狫村敲竹畀儂驚始覺蠻鬼尊糜糜氷石竇短蜮此户門吾生有正氣衆毒理不寃况承宣化命炳燿甚赤燉汪濊湛所極梁沬若孫原昆明西洱海於水注一盆竊虞生蠛蠓汚蛀久或眢澄清藉尊宿前席輟討論結髪侍清宴鳯毛莽孤騫守雌戒前阱犖犖傷弓魂痛定百念灰沉沉思主恩如以完肌膚湔洗天河源誓如河之源日夜東北奔夏景熙母受封詩阿母非職方烏顯螽斯德職方微阿母呱呱誰卵翼長黿無仰飼何以生九肋彼鯨波翻飜天角一水國夜仰觀天文帝座御北極而能班執珪扶搖信鵬力帝恩浩如春所不限異域里門忽傳呼有使来自北手持雲錦章白日絢五色遂令七十嫗縣君帶實食里兒競棄母婦或休蠶織猶驚有鵲虎奔走欲一識吾何親見聞請以意逆億送段惟勤自新城改廬陵運斤疾成風全物不食虎見者驚鬼神斵鐻覺無苦中心無穿鑿匪以智數取段侯天機熟外不與物忤恂恂口若吃剖析有大斧乃知古循良絶不似外賈廬陵䑛新甘新城奪舊乳徴聞繼前史直筆予敢侮送劉文煥廵按南畿朔風翦潞水巻巻生白花舟子不易進舉槳撞水牙謂言此著􅀈如以利斧加浮木水中居寧堪穴呀呀至人心虚虚聲入浩無涯患端日潛伏在在紛如麻辟之舟中水敗沒殊不差持斧觀君竹潞舟􅋈平沙登舟費沉吟吾言諒無譁送南城鄭尹之任夜風㩧屋角穿隙衾鐡冷君心去如飛脂舝覺僕猛遄歸拜松楸此味未雋永安知凋瘵邑萬室坐深穽餓虎吞羔豚饑蛟食鼃黽章甫以屨苴逢掖今裸裎喜人噤吞聲有若物在哽跼蹐無控訴空餘列行省常虞潢池中竊弄在俄頃牿童與豶豕絶不以力逞君行納吾汚此實邦邑幸夀平江伯六十眩人掣紫㹸伶工吹𤣥笙駝峯下天㕑璚液篘青城寳鼎祥雲浮錦籠衆星明􅉊毺履流丸罘罳目眯􅄳流蘇綴珠簾水晶貫蒼纓人皆詫瑤池我已登玉京羣公際休沐諸將解壘營繫馬鞍髙山解帶玉充楹談𤣥動誇椿介睂皆及鏗千刼建萬刼先庚累後庚雲谷恒谽谺終南鎮崢嶸千秋傳國儲百年本邦兵善飯壯不如披甲老覺輕用持桓桓威可汗敢渝盟賞静軒灎灎濯錦江穹穹昇仙橋人間有此境去去不憚遥閉門者誰氏㝠心契承蜩有亭月團圓有竹風瀟瀟髙視錦官城如覆鹿以蕉心齋坐忘身聞聲欲捐瓢千秋長若斯更用静魂招送周主簿任南城連山抱如環過水縈城脚軍州自古置小邑舊附郭烝黎戀門閥不厭土地薄神泉麤可釀出境配靈藥門無催租吏家有斸地钁市女面無脂野老巾不著囹圄寂生蓬譙門可羅雀謬當封藩圖一變百病作黒夜騎屋山白晝面相縳竊虞鑽泥鮎化作掉尾鱷觀君饒道氣秋漢横一鶚老夫頻搔首仰面望寥廓送謝侍郎陜西按事爽鳩西飛飛羽刷太華巔不飲涇㶚水不啄虞芮田涇㶚濁自古虞芮爭㡬年濁不以清飲爭不以啄悛古有至治世法在象魏縣匍匐俯入井如以手擠援木有絙鋸絶石有水鑽穿毛中能無疵奴亡或丐鞭方今浩恩波垢涴一洗湔萱榮為張經載題渝水赴海易渝船上灘難母心如孤船遭孀險於灘鑿鑿石齒隙如雷嚮奔湍一息生死隔誰謂天地寛乳哺各鼎鼎而今生羽翰上摩九萬里母老心更安白晝北堂㵾闖然入𤣥冠樹旄塞前途白馬黄金鞍匍匐走舎兒隣人越墻看致詞謝隣人吾亦諫諍官三嵗不見母初辭五雲端起舞為母夀兒不饑不寒兒腹有至寳其名為琅玕願言獻天子功名良不刋蹇判府六十及生子詩其婿繪圖寄祝之劉解元韻也得桂字人虞東隅昏我豁桑榆霽紛紛亂豺虎此際競吞噬妖䘲劃隂空使射那得羿人生百年内此譬向晩嵗木瀋行歸根𤓰落僅存蒂應門有儇童從以百十𨽻义魚緤黄犬烹割日㡬熭恐非一體分肯作苞桑計大過美枯楊剝重碩果繫將孫始將兒亦有將孫勢世人湼髭鬚老去用强制有鬚不使湼唯不班行綴猶能得雄州太守與聨第太守載酒来日出門尚閉倒裳迎太守與坐庭下桂醉歌南山詩戲擲兒以荔閧然發大笑日月恐其逝尤聞剝啄聲有使自燕薊開筒剝題封磊落富新製圖窮更何云再拜稱觴壻挽柴公照母里有不娶女齊姜陳之求婦姑聞勃磎兩姑爭婦留彼為鴟為梟反與貞静仇天孫織雲錦終歸物之尤俗慈類禽犢有子東家丘𤨏郎吾徒豪鴈行拜低頭人生非空桑氣類父母由吾徴母之賢識子臧與否豈為哭母辭職居闡其幽挽熊太守父金陵郭外山髙塚奠山麓中唐甓新易膏澤濡丘不山靈幻􅂒魖此詔出黄屋生為熊省庵死贈皇太僕平生拯溺心有子惟式榖曽援由基弓連發連中鵠牛刀亦小試拍拍驚鴈鶩更聨伯冏班宣王今考牧幽幽萬泉宫云是百鬼谷郍無迎恩壇蹈舞効嵩祝舊裳釋藍縷所不玷渠鬻㝠官愜新授翔去衆生族朝元遊清都何啻生受禄麻姑兹當来洞天三十六夀吳淑人七十舉眼望龕赭潮頭如雪白搔頭髪種種潮色滿巾幗蹉跎十二嵗一脉未亡魄龍函潤生雷當暑啟舊冊猶如面中丞委蛇退公隙問兒今何為名在象胥籍錢塘縣官酣云即夀母席狂簪榴花歸更助醉面赤兒心豈不亟重以萬山隔榮夀為姚治中母作鱟魚背有帆鱷魚尾有黏比目潛有鱖比翼飛有鶼吐樓有妖蜃獻膽有巨蚺崑崙黒如漆束縳充家閹此皆海邦人慣見行已厭為官得州縣有若墮井蟾縱能協隂光何異鑽泥鮎遂令中人資唾手母推縑罷歸實為幸配竄理不嫌姚宗重華胄行義世有砭慈母揮使去麻衣白􅢹􅢹王畿萬人魁信以手所拈胡為倅一郡大刀屈為鎌笑談呼吸間了不傷鋒銛僅飲撫之水屢罄米與鹽帝念賢倅母推封表其亷進官列三輔告歸舌真甜母老念兒逺兒亷思母嚴潮陽十萬家富者垂珠簾海錯供母饌龍腦熏帷幨何如太安人巖巖為具瞻觀國趨庭為楊廷儀作暎相皥下第俗嫌良可嗤郊祁乃齊名誰今笑天私寓言木假山自詫三峯竒兒子出頭地簿冗父不辭中允何可嫌天固珍一枝提刑異簿領况復荆人師寢膳卑暑地寧不蚤夜思主鬯式新荷乞身諉何欺㝠心寄遐託立判塤與箎挿羽當秋空嚲若長雲垂朝發召公城暮刷湘江湄老懐北斗邉猛起三命龜閲兆楚燉熄上堂寧馨兒送劉屯田歸任令峻簿尉寧撑拄鮮鶩鴈巢烏啄堦除犴狴生菼薍焚山虵穴古火食久已慣險馬恃匪經蠒絲戒前宦閑心付書雲静耳聽鳴澗荒祠試宵菱怪鼓鬼作幻駝蹄鼈羞羮魚滿寸可汕郭門接叢薄蒸槱喜能辦三家為雄村一二百里間居然超逸資强以載鼷鷃世途方犇犇賈物紛售贗而當鼓舊勇遇虎乃徒袒丈夫貴如玉論定在嵗晏王資博父母齊夀即前出門時官苦簿尉伍崢嶸獬豸角突爾如手取離憂終亦樂絶勝列三釜眼明讀泥金再拜荷明主名卸百里侯不貴實食戸當晨坐中堂􅅨史夾天姥生年不滿百七十稀自古郎身願為鵬兩腋出毛羽飛歸其何如問我我首俯德政遺跡吾能舟淤河吾能梁老圮要使保定府周道蕩如砥前之守者誰此語恐有矣九年夢寐中日月去犇駛尚遺圯與河白石浸洿水趙侯洮河来言若不啟齒鞭山下萬石荷鍤甚屯􅀈褰帷漫逶迤衆目隨顧指畚泥成髙丘修虹截波起老翁爭出門快覩百艘􅋈薪夫採薪歸信脚下脚履昔為寂寞區今化喧閙市吾無曽見聞得之傅太史三酸圖河豚朝菌味饞夫恒取敗瘡痂土炭惡所嗜一何怪朱門飫酒肉蘇向樵夫丐貴能通滯關厨傳空芼芥不知墻頭梅厥味殊不殺世惟多賤目用配桃李𣲖徒云古殷商此物充鼎鼐頃筐紿癡兒入口覺逢蠆大師僧寳珠學士奚墨塊爭先信手攫二得一可能讀作耐掀脣勇能吞舌結嗌已嗄當時侍童誰正自聽人籟昏然宿酲纒醒覺百病瘥鳥吞夢方真腸洗亦可愛蟛蜞戒誤食真食有沆瀣食與不食歟事去此圖在泛舟長河水寺之東賔仙遊李君將赴召予欲其有所思也擬是曲以送之泛舟長河水河水過漫漫澄心寤物理且作行路難競急恐不逹其前有驚湍萬斛等一葉於何恃根盤飄飄若乘雲既濟事乃安昨逢舶商来云自東三韓何嘗駕飛車舶壯嵗月寛􅄓母㡬飜海髙濤湧峯巒鯨吞雜鼉作怳歘参神奸時吾舶中人如以鐡作肝色空身世忘卒亦無傷殘商言我更豁我行且加餐盛封主事挽詩封君夜臺遊隣鬼紛累百聿始迎封君又若聚嘆息誰能一布衣老用著冠幘有子雖令學曽㡬青雲客家家競落莫誰氏再豐碩幸灾俗之常而閔垂絶魄隔藩即仇讐反眼視蠻貊封君有寛腸春水滿四澤蜉蝣生死間天地一朝夕生榮死之安盍受百鬼役寄言人世間願踵封君跡夏驛宰之任姚江道上有積潦山下出蒙泉潦決泉之奔厥委皆稽天我纓既我愛我足匪我捐雲崖監其原澣濯信所便貴泉亦貴潦明主之逹權守溪王先生父八十秋水滿震澤天然出芙蕖中心無琱琢對此真起予旭日上東楹照我白髪梳髪始黒如漆已不任簿書竟作强項令誰能藉阿譽彼茁者蘭芽秀發幸在渠甘以窮齟齬而歸老樵漁於今八十年髪白雪不如昨夜縣帖下賔詹有新除今晨府牒来於星講帷初顧此頭上巾重封廿年餘君恩東海波豈止震澤瀦願為太平翁長在澤邉居送范長史之夀國封在保寧九斿􅂒晴風綴錦幬行殿從官宻於雲子更目如電躡足附子語吾視子成􅱙王衣雖青青王宮百千眷一一當染之侵尋染將遍南池匊作盤錦屛蹴為碾良工巧更疾及一州九縣吾當泚筆竢急續東平傳送蔣敬之甥歸湘人言湘中風我未識見之撅土朝熝筍泲麻夜燃脂筍綿緯成筐脂光照繰絲蟇蝦羞入饌粔籹不堪炊屑麥僅蒸麩釀秫甘歠醨棄餘入隣疆販駔權不訾豈其自知盈恥與操贏竒漸涵入骨髓耳目常途迷自非上供輸白首無别離百屋如處女何能擁髙貲子舅始我言厥初咎之誰譬彼行為山一簣請自兹顧子亦舉舉雄飛不能雌一楫割甥舅張弧射羣疑曲踊吾甚武柆騫掇胡荽豈能媚庭幃泥泥兒女姿湘土善敏樹湘荼未如飴彼飛雲中鴈樂以無縶維脣厚掩虞齒薇肥活夷饑秋風片帆白淡月照所思歸語湘中人吾言百世師送胡大聲考績歸嚴州桐江亦澄淵其下多魚魚善釣不釣魚所以魚有餘魚餘今尚釣釣魚乃真漁真漁亦無數曽不登簡書刺史行部時善釣今有歟我考刺史最所不貴櫛梳刺史意在此適㑹我言初送太守之開封濁流亘混混古有闢其郛兹維天地中九州交逵衢尹實冠中夏奚與百郡俱四十守令下吏前合雲鋪中庭忽聞雷百諾應一呼門如納百川纍纍入縣輸千輛復百輛上供及軍需曽無遺毫毛丘山積負逋地大物甡甡隔身雜臞腴隄防或闊畧立地憂萑苻一倡百和之自立落鴈都坐令清平民入市愁於菟吾子起陽曲而翁烈丈夫自臺徂名卿子亦汗血駒峩峩白雲司明月懸秋壺大姦梗大獄如以手拉枯久結司㓂知或徹公與孤舊尹新去位寧容間湏臾子才望年資流凡落甌㬰横金中大夫手握銅虎符西落大行山田園未應蕪登髙望淮南心與白雲徂男兒志事業父母離憂無舊聞馬可釋勿謂龍易屠覆錦或䧟穽知雌當辯烏吾觀聖賢心川澤多納汚壁立萬仞强攀躋竟無途江湖多風波宣父有巨桴吾衰不自量子今黒頭顱環翠亭為門生吳廷亮父南坡作雷復吳姓白霧下赤壁素月篩青林風露變草木魚鳥解晴隂蛟潭湛潏潏鷗波去沉沉島嶼上下勢舟船来去心此亭對此景一鶴與一琴琴音諧韶濩鶴性甘蕭森春濃十里竹秋静萬家砧象罔溟蒙合雲雷屯伏深主人葛天氏不信有朝簪圭峯集巻二十六
