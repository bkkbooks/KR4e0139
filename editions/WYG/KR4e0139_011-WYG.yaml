body:
  text: 圭峰集卷十一明羅玘撰記梅厓記梅厓主人既斬其居之旁地畚土其上築之若崖焉高可於屋之危而止凡月華日精之山皆在目睫而濠之閭閻盡而畎畝連與夫丘墟林莽川湖陂澤逺淡而近濃者環百萬一眺而得之於是種樹之家爭售其可樹者於崖之上曰是卉也殿春而華有國色其名曰牡丹又曰是木也春而華其實甘其名曰桃又曰是蓏也蔓而華其實碩而匪核其名曰瓜是皆可樹主人曰吾一嵗食瓜不一二焉桃之木多螙液而善萎牡丹匪實無濟吾用請更諸久乃跽而進曰似李之花而差沈似杏之實而大酢作羣芳先與雪爭能然而賞者薄其色噉者薄其味世俗之所不榮者也子欲之乎其名曰梅主人曰若之熟木性有年矣見有不榮於春而瘁於秋冬者乎見有不隨羣而榮隨羣而瘁者乎蓋天地之氣生之以春而殺之以秋冬而隨其生而榮殺而瘁者必常物也孔子曰嵗寒然後知松栢之後凋凋之後者聖人猶取之而况能抗時以自遂者乎其必質之至堅而得夫氣之先似夫豪傑之士自拔於流俗者吾樹焉以自勵也因自號曰梅厓他日入朝以告其友李充昭充昭曰崖之在濠其有其無其或樹歟未樹歟吾不可得而知也然吾觀子之壁立萬仞方將極其觀於垓􅅽之外崖蓋不足髙也而又敢言天下人所難言者囘流俗於靡靡之餘獨梅之抗拔而已哉而吾目局局然求子於梅崖之間是以形器拘子也吾亦陋矣南城羅玘聞而是之然不敢以嘿者恐索鼎實於是崖也則培植之功亦主人一事充昭曰善請書為記以俟主人孫姓博學而多能今自禮科左給事中為江西右參議幼真其字也南園野老記南園野老吾友徐世明之尊甫也進賢之雷岡為閩粤水道之涯自東亂之西則陸走百里以達于洪浮而北下焉則不待信宿入于彭蠡東折而合于江吾之有事于洪暨北走京師皆常望其林麓丘陵藩垣閭閻之相屬然而未嘗一遊也徒聞世明道其南園者園之下森然有水漫之其清可以鑑其甘可以飲潔可以浴深可以載方舟激而行於溝可以溉千百畝之苗而又釃其餘也以灌蔬畦或竇而停或甗而汲以潤果樹之根荄其滸之菰蒲蒹葦生之風過焉窸窸有聲如鈴索上去蕖荷菱芡之與波上下鷗鳬之飛翔浮沈湛然而天光悠然而雲影吾父性與之適幅巾杖屨蓋不知朝而往夕而歸也而年又最高故號曰南園野老土之居者皆以是呼之於今十年矣而未有發其義者噫予未至南園果有意於洛陽之名園歟未得拜於野老之前其果有意於少陵之野老歟洛陽之名園今雖廢矣而其後之興也不可知少陵野老復更千百年亦未必有斯人也想其奔走於王室艱難之時雖其草堂亦為逆旅何暇於名園之徘徊乎况洛陽之名園皆當時公卿戚里爭為勝遊而不知實釀為酖毒盜之招耳此少陵所以吞聲於細栁新蒲之緑而不忍言又忍入而縱其樂也哉若兹南園逺王都四千里山水草木任自然之真無洛陽名園假人力為之者而野老實編氓非如少陵嘗食君之禄當任君之憂而非實野者比鼓腹擊壤洋洋乎與造物者游此其事也野老之名少陵固不得而爭矣然昔之野老有與人爭席而已而今也至與古人爭名得無不可雖然名虚器也猶有與古人爭墩者墩實物也然且為之於名何傷世明曰子言信辯矣請書之歸鑱于壁以為記搗石清隠記搗石顏氏永新大宗以搗石清隠名其堂而走其子璽求記於予者隠君琦也搗石者相傳魯公剌吉時得異石於永新用以搗衣比召為御史石隨而亦以搗搗聲徹于禁中𤣥宗取試之無聲也復歸之公聲如初公後四世孫永新令求石所出家焉而搗石之顏始此人以公故也率不敢蹈且籍豪奪吏不敢舞手以臨盜之過也不敢窺其門顏故得日以大而蔓延為北郭之宗君北郭之英也予未至其處謁君意永新當衡郴之麓山之虎蹲人立與泉之雪飛雷響貢奇獻媚於穹堂華屋間者四環而集搗衣石臥之地無見也然顏為魯人非兹石也永新烏有顏氏哉石非遭于公手則雖於此日發千砧盡和氏之璞也亦不過與歌姬舞女流轉於貴富之家為玩具耳矧搗衣之麄厲者乎且使兹石也搗於公家有聲若是焉移而搗於禁中亦有聲若是焉則徒充上方一物而已了無著於公也公之子孫雖令永新㑹代而歸宜矣又從而家之其得為智乎搗石今雖有顏氏正與編氓等君而以搗石名吾詬之矣惟其喑啞於萬乘而獨見聲於公石亦靈矣哉有若真能别白夫忠臣暗主幾微禍亂之萌與昔之言于晉者類也而特非妖耳然則兹石之祥於顏明也凡天下之顏當知重之矧居永新者乎若君者可謂知所重而不忘世守矣非汩汩於山泉間隠者也清秋月夕魯公有靈其亦來降斯堂而試聴搗聲乎宜為之記君之有齒有徳為鄉大賓他善若雨霪也進士汪仲信李用獻方日與大夫士言之予可略也不書文武聯芳記判陳州事程汝霖典吾縣敎時自言其𨽻尺籍于貴旗下有五伍者二吾子鵬也實居帥之戎衛子弟之秀皆附宣慰使之學吾子度也亦廩食其中然皆未能穎脱出頭角也去冬汝霖去吾縣來㑹天下之士試見吾於玉河之邸躍然大喜曰前所謂鵬也與斬都勻酋賞百户所謂度也試雲南得後諸士將以蚤暮至也自吾氏去茶陵入貴操戈鋋與羅氏鬼蠻好則相視怒則相攻餘百年其比而伍者井而湮竈而夷非其父則其子耳今其在者幾氏矣有能拔其上而為之長上乎又有能刺而入於文儒之囿撇然蜚英乎吾不能了造物者之施我其亦或舛也然慮亦盲瞶之人耳人遺以飲食飲且食不聞不知也可乎哉吾欲侈造物者之施我以勵鵬也度也惟名以榜之庶幾為宜且二子之遭是也朞年耳而實又同産如曰文武聯芳庶幾於義為宜然吾聞古不以萬選萬中為文不以百戰百勝為武要非今之所謂文且武也鵬也何武耶度也何文耶姑自吾貴之窮僻處視之而已矣吾不徵於古兄弟之並為卿相今有之譬諸草木聮比而芬芳可也二子何芳耶姑自吾氏之卑薄者視之而已矣敢辱史氏寵嘉之為之記庶幾鵬也度也日斯邁而月斯征矣吾曰是亦足以記已語有之知子無若父何庸吾譊譊乎而後為記哉其歸鑱諸毋緩世徳堂記少師太子太師尚書大學士徐公謀歸老于宜興豫作堂焉於縣東南陬洑溪之上門之闢也瞰其洄也除之平也際其漘也垣之曲而周也依其灣也簷阿之軒翔也與其波之演迤而升降也而凡溪之人仰斯堂之勝因思象公之徳其少者訊其長老曰公之狀吾兹尚未知之然意公之量其洄之洑而無所底止也公之重其漘之堅而齧射之無所加也公之智其灣之曲而隨其方也公之澤及於物其波之演迤而浸涵也夫然是溪也之有斯堂也宜哉其長老曰未也吾縣之有徐也自義興令始令後四世為江東逸民逸民生贈户部郎中郎中生瓊州知府知府生荆南漁隠漁隠實生公公之徳源亦逺已矣亦若是溪之逺源與君山而若輩其生也後不知也既已私擬公又遂相與名公之堂曰世徳之堂以俟公之歸而中朝之士聞之皆曰善哉溪人之名公堂而惜其知公之隘也夫公國之元老也天子之師臣而百僚之具瞻也天下孰不冀望其顏色以為重輕榮辱而皆卒不得願而退也則夫江河之量固不以水旱為盈縮明矣而又以其一身繫天下安危者十餘年巨防砥柱之重屬非公哉竊嘗私覬公之智亦如海涵地負而其曲成萬化而不遺者澤氣之升而為霖為雨也然則其源也其岷乎嶓乎崑崙乎而規規求公於一溪者其溪人之私言也豈天下之公言哉乃羣造公請以是記公之堂且以廣溪人之隘而告於無窮公弗能止也命屬吏南城羅玘書之武定州重修城隍廟記武定州有城隍廟在未賜改今名前其神於章皇帝之征漢也豫能著明靈以隂誘其兇渠醜類如醉之醒如寐之酣以待黄纛之至用能不遺一矢束手待俘一切得從減貸以完宗祊於如故不然獸窮且鬭而况以佚待勞城門一鑰之闢雖一卵未足以支泰山之重然亦何取於萬全哉粟帛之謠且作作將誰歸今道邊遺老尚能言神之炳炳如此今皇帝之元年古辰賈侯來知州事侯進士也以孔氏之道為政念遺黎刼脅于非辜創殘已極積餘六十年尚如嬰兒之待哺以長也又如沈痾之始去而體實羸也閔閔焉思所以振起而安定之以還其舊故恒鏟采韜威尤慎興作雖其已之居支木束綯不以為病問有以神之見靈于宿昔為言者意侯有作也越明年侯實夢與神語以為適然耳不為動數月又夢如初旦起謁廟洞諸門門樞皆刓敝􅑶臲有圮狀乃進前言者驗白因歎神功在宗社不誣廟不修且壊顧宣義郎馬芳可事乃又明年七月命芳自堂祖門以屬于最外門自左右營分而垣之以合於堂後之棲而止視昔則加之堂中貌神侍衛文武班于兩偏亦貌貌止于西東廡下善惡冥報㸌愚嚇俗雖未皆合於古不欲奪其舊也某月某日告成侯述其事來請記噫章皇帝取漢之奇予嘗聞之矣神也效靈其信然耶予與侯同舉進士逆知侯能還武定之舊舊亦未易還也必無疲其力無費其財是二者非靳於興作不可此侯志也而神之見夢侯夢也謂其非然耶雖然夢不夢廟壊於法必改作雖聖人不能以已也改作之費與勞大矣焉知神之以覺侯而先事焉意在節縮其勞費以福其民歟神能靈於宿昔倉卒莫大之變有不能於今歟神既靈其聴是州於冥冥與太守等民亦以是望之太守有堂以朝夕也廟成有以哉秋容記豐城胡萬爵號秋容予始未悉其義也與之遇都下往訪之邸時清秋氣肅坐予于庭之東籬菊方華盆池之水澄瑩視其底藻間赤烏之魚蠢蠢可數闢其北向之扉則城闉萬樹間黛錯丹疑為深春予呼酒而飲之盎然汗浹絺紵解而盡其缶則暝色冉冉自天而至素月光下人影在地向之萬樹烏鵲上下驚而分飛鳴而復集令人襟懐飄飄殊欲僊去予謂萬爵曰是可為秋容乎萬爵不應予乃取枕就寐覺有微籟掠耳而過之頃焉如潮飜如雷奔如萬馬之行聲如衆竅之齊吹擗屋撼扉飛瓦裂帷試於隙而窺焉一物無有幽黒冥迷厥明啓户則樹葉盡脱漫空紛披菊色憔悴盆池凝澌衣欲重襲手如攣拘萬爵則已蹙額攢睂告予曰此正吾之秋容也他日與之觀泉于西湖泉之源自山出崖石上冷冷之聲瀉于湖潨然若投石之沈于底乃止尤於寒日映之有光更上西山絶嶺望焉見夫稻之登也黄雲滿野直接于籍田之南於是興飫盡醉極暮而歸按轡呼而謂之曰子毒前日之秋容乎將快今日之秋容也何居萬爵曰吾易三經而學五試而後舉于鄉困二十年于南宮卒不獲僅補一縣所謂藍山者又在偏迂山澤之區故吾遭觸前日吾有感也然吾之性迂援寡以之馳逐於四通八達之衢必僕僕爾逢迎拜起為也吾能乎哉幸其地之迂左易治於吾之性實宜庶幾寡過於衰暮之年意造物者之福吾如泉之清泠光徹可以滌垢汚而鑒萬類如稻之登也可以卒嵗吾於是乎亦有秋矣而多賴不尤愈於老而無述者乎斯二遭也真若為我設也予聞而壯之與之書以為秋容記郡守馮侯閔雨記𢎞治已酉尚書秋官郎四明馮侯出守維揚越明年庚戌淮南北環數郡入春徂夏且不雨揚前此二三年亦不甚雨積暵漕渠中惟淤泥兩滸揚塵輓卒鞭牛曳繂盪舟泥中日不過數十步綱運大阻民盡縮手不稼穡亦向萎嗷嗷登聞四境胥動曰吾其莩乎什七曰毋戚我侯仁者可恃什三而不知侯之心已若劃刃特未言也乃四月壬辰出舎外閤厥明即城隍祠用祝幣告災退決辟之疑滯者罷役之得已者興發賑貸以次繼舉入閤蔬食思所缺失吏民無得肉且酒肉且酒者罰五月乙丑復即祠要神出矢言已乃置壇于祠于蕃釐觀于天寧寺于司徒廟凡為壇者四壇用黄冠典觀浮屠典寺巫典廟俾各羞誠于其鬼爇香然炬費一不與縮日昧爽壇一週暝復然戊寅午乃雨雨不終餉風自南搏之虹見雨止侯自是公移庭參外必即壇令㕓之民祀􅀈聚童呪蜥蜴其前率屬吏于其後拜之凡十餘日戊申又雨旁邑如注昏黒雷霆聲勢若至已而寂然者幾月民已知侯之可雨即不雨可移粟不莩視其身矣然侯志必雨六月庚子即祠出矢言激神益厲罔恤患害左右至吐舌不忍聞黄冠浮屠役術益急巫言欲自焚侯日跼蹐或不知飲食體貌羸惡如餓夫又如土炭蓋暑侵其肌憂傷其裏此疾徵也日猶拜如常迄不為解七月壬子質明大合僚吏士民免冠徒跣自城隍祠步三拜一至司徒廟約餘十里冒赤日口鼻俯呷熱蒸熏暈屢僵灌以藥汁起益䖍視膝則血染裳衣比入廟門雲合晝晦雷電以風大雨猝至平地水深數尺癸丑又雨至乙夘始霽漕渠水潑潑舟縷縷魚貫北進郭外聞鼛鼓闐闐與旁邑接侯之心則舒體實疲矣且侯以身為國為民與旱災角角既勝自分當然耳無他營為也而郡之鄉進士邵溥輩作喜雨詩以予適在賓館來曰願有述予既以疾辭江都知縣長安韓旭復狀侯閔雨來督記旭曰此民志也否則相率譁至擁舟奪行非便旭與予同舉順天志逺而言信丞曽英主簿馬進言亦然故書若侯之政當入大書者多此未可窺侯也侯名忠字原孝松崖其别號云涵敬齋記寧都盧誠善亶其名也號其齋曰涵敬來京師問其義於予予觀誠善則誠士也請以士告之夫士之所事國家治亂興亡之迹天地鬼神日旱雷雹雨暘寒燠災祥之變兵帥農工毉卜巫祝漁畋之流禮樂射御書數百家小説之文弁冕鞶纓黻偪絇舄介胄襡鞲之服罇罍敦彞玉帛弓矢劒盾戈矛殳槊耒耜箕筥鞭朴校梏之具絃匏鐘鼓笙竽珮玉鐃鐲笳角魚柝礮石之聲旗常旟旐旌旄之章固無所不當通而於宗廟朝廷郊野市井道路犴獄與夫澤梁江海懸崖斷棧之險徼塞亭障蠻夷敵國戰鬬之場固無所不當厯盲風毒霧虺蜮觶螭殺人之獸夔魖委蛇蚵蠪水土之怪隕星地震可駭可怖亦不得而避也如有毫末不盡其精微之奥而欲僥倖以試於萬一其不僨人之事也者鮮矣此士之貴於有養養之充用之周也養之事敬則虚虚則畢照而無遺所謂充也既充矣何施而不可哉士之所以為貴而天下不可一日無者也誠善之志大矣誠善蹙然作曰亶何足以知之語有之涵養須用敬先君子之遺戒耳雖然敢不拜敎願歸牓于齋楣守愚軒記予愚無所似言不能文人之美有來强者輒不得而去也而伍君朝信欲予記其舅氏蕭君之軒曰守愚者抑予之愚又有甚焉者將何言耶然愚之出也以類堯之時世濟之四族是也以地愚公之谷是也以習殷之頑是也而君之籍于蘆陵蓋天下山川之勝處而澹江其居也又蘆陵之勝處秀特靈淑之氣不為物所洩而獨鍾於人人之穎異恢傑者往往以文章事業名天下而其山窮川阻僻絶寂寞之墟林居樵食之民亦能道古今明法令亹亹可聴雖通都大邑冠裳而仕者或病於是其上而為士可知已是君之生而習固宜不愚也况蘆陵以貲名必曰蕭氏而豪傑善施之望自君而上已五六世並君之世起甲科官四方者三人而其一予同進士敷化也其類豈其愚乎如予之愚則有之人之姦愿險夷接乎吾前昧昧焉不知也而毎蹈其穽愚之名不得而辭焉而君能選於衆得館甥之賢如吾伍君者賢者之選必以類當愚者固如是乎而伍君又毎為子言君之孝友闓爽邃於史傳而邁於氣義沈毅有斷為鄉人先予益求君之愚不得也或君之心見世之忘返以喪身及其親以覆其宗者皆天下智巧便佞之尤者也方其氣盈志得安知不以奴𨽻視其愚人乎而託於愚者亦甘心焉以幸脱其智巧便佞之名以辭其無窮之患古之人有行之者甯武子是也愚亦何嘗不可哉孔子聖人也猶欲以聰明睿智而守之以愚聖人者豈亦自樂於愚乎哉畏患而思避之與夫人之心一也後世有不自慎重依倚附託栩栩然自以為智矣及夫竄逐屏棄於幽惡無聊之地始悔焉其居至無不以愚名者是真愚也非所謂守愚也予雖愚記君之軒不可以不辨木齋記凡木燥濕之不時則凋瘁而多菑翳屈拜之則折焚之則體燼而灰揚擊之則多徵音而或啞然莫之應縱斧之則隨其理而解鋸之則屑暴之則槁槁而傳之水則浮而反是也則沈是其為體也無所伏偽於其中任其本真而出之凡有血氣者皆得由已取而用焉非必設巧盡智以誘之而後見焉者也或曰斵削之而為宮以居為車以行為舟以載弦而為弓剡而為矢以射雕而青黄之丹朱之為尊為豆登以飲以食為筵以馮為榻也以休又其變也為棺槨以送死其為類甚博且飾也非木歟曰是人之假之以盡天下之用非木之性能之也雖然亦其無所伏偽於中故能用於人若夫金則聞冶而躍者矣土則聞陶而苦窳者矣是其能以抗夫工人則工人雖欲不設巧盡智以馭之不可也况於衆人與夫凡有血氣者可得由巳取而用也哉故冶工之衆二之陶工之衆四之梓匠輪輿九之不如是不足濟於用也濟於用則切於人之身人也者仁也孔子以木之近仁其殆是之謂歟然吾之所謂木之木之云也孔子之所謂人之木之云也其理一也鄉進士進賢饒正派道其先君木齋之號於予其從兄衢守正溢為夏官時嘗誦木齋之詩數十篇其溫然太古之風猶在耳也予雖不及見之其無所伏偽於中殆人之木者歟正派躍然曰吾先君有是哉請録以為記孟昭木齋之字云竹池書院記上世何嘗有書院哉是時郡國不必有書院也中世文敎日滋起而名賢斆學所在或後人尊而名之曰書院或遂因之登其郡為上郡邑為上邑曰此賢人君子之鄉也郡邑可無書院哉宜山舊未有書院今有之鄉進士沈君之作以舎其來學者百餘人而名之曰竹池書院者推官瓊人吳侯也侯名之而不遂記之君必走萬里抵京師而屬予記之使予記之而不可傳之則院在宜山知有是院也他邑亦未必知之更數百年人事之不可知雖屢有興其廢者然必終歸于廢則宜之人後亦將終於不知有是院矣又况天下後世乎然則君作之侯名之予記之一幻耳於宜固無補也予敢記是院哉予固謬也然古今人髙下未可知也君其或者如孫泰山乎石徂徠乎李旴江乎三君子者以匹夫居其鄉初無勢位之可以恐喝爵禄之可以動人者而其去來學者常千百人計當時必有以舎而留之今皆不知其處或雖其遺址可尋要皆同於廢耳而為之識者蓋有矣亦未見其有䓇然昭人俾三君子者至于今藉以重也然而稱其鄉未有不知三君子之生於其間何者其人何人也傳曰舜何人也况三君子之在近世君忍處於其下乎稱宜山則知君乃君事也是則是院之廢可也未廢可也亦何假於吾記之傳不傳歟雖為之記亦可也記曰院有堂堂兩翼為廡廡盡為門皆垣焉以合于堂之後又門而為左右室中為講亭亭後有池池上有竹天虚日晶倒影澄涵棲鳳下舞潛虬欲飛侯之命名取此院作於宜宜人之賢有馮公亭之右祀公志主也君本衢人衢人之賢有趙公亭之左祀公志賓也端委肖貌如聞語言君以為敎基取此予不得院之詳此特君所以命予記者雖然詳亦無助於傳也王氏祠堂記𢎞治二年十月金谿明谷王氏祠堂成其作自元年之十二月而綂其事者廷懋也堂之廣楹六之門如堂之楹而髙殺其四之一東西室各四楹器數齊湢庖庫具在礱石為簷除四周如矩虚其中而甓之矢直砥平無興塵泥隂雨若霽闔宗升堂奠位凝肅顧瞻羣主若見若語孝弟之心與涕俱生咸歎曰舊徒吾祭不吾興感若是也鄉人之嚚嚚者曰甚哉王氏田入之饒成此其易也吾以為不然夫王氏田入之饒孰愈於賜廟之家禄入乎吾遊京師見其藩則拔矣垣則夷矣碑踣而畜室焉者盡賜廟也問之其子孫不入是者幾世矣又其甚者曰是既鬻矣竢其盡夷築為他氏之宮也至其大第以居髙軒以遊則殫其禄入焉以與戚幸者爭為長雄顧不少惜豈其力獨歉於一廟耶蓋其先世得無有貪功之過而濫及於非辜乎其不祀可坐而待也獨其子孫之罪哉而此王氏者吾知之實自宋祕閣校理平甫五世孫彥逺居於此平甫荆國公之弟也當熙寧中一時小人皆附公敢行苛政以希貴富貴富公所柄也豈獨靳於其弟乎而平甫竟以不顯終其身要其心有切齒於公於小人之所為者此寛厚長者之風而為當世所竊笑然不知其固有可久而存者矣而彥逺又歸自金陵依故土以居其不忘本根又如此而公之子雱雱之死無聞焉小人之祀不祀蓋亦與貪功多殺者爭入于泯滅而已耳無足論也祠之所作庶其在此此天也夫豈牽於力哉嗚呼人亦孰不欲祀安知貪殘苛暴者其不愈急乎而卒愈促觀於此祀亦可少熄矣其族彥斯誠至是始克來請記吾以是為記亦以公為世勸云日新齋記庶吉士考題齋以日新名名所志也夫代乎前而相仍於無窮者日也旦而午午而莫莫而復旦旦午若循環然固有新之象矣而天下之人囿於其中有不逐其新者乎故腐敗餒餲者不飲且食垢敝綻裂者不冠且服手足焉而盥濯之體膚髮毛焉而沐浴澡雪之拂其几筵蠲其器盎灑掃其庭除凡所以明潔之具無所不至皆為其身而日謀新也至於心尤易以染而汚者獨其新不新人不得而知也故隠忍蓋藏而自欺終身者衆矣嗚呼此湯之所以銘盤也夫湯聖人也奚必為是而且為之而吾衆人其去湯也何如而乃如是其得為智乎吾懼焉近於舎傍規地方丈餘畚其沮洳纍以燥剛甃甓其下聮楹其上而瓦焉既成鑿其牆而四牖之几硯圖書百爾備具旦旦入而偃仰其中几之經宿必塵塵則拂之以麈因思吾心得無有蒙蔽之塵乎其拂之也宜剛則新矣硯池之經宿必汚汚則覆而易注之因思吾心得無有昏濁之汚乎其易之也宜潔則新矣任吾之便而刺書以觀味津津焉入吾吭覺吾舊未聞新有得也庶幾旦而午午而復旦旦午亦循環然吾之日新也其有窮乎哉因名之曰日新以自警焉過此以往未之能保也若夫附麗聖賢古人之事也則吾豈敢終養堂記宜黄鄒君世臣作堂于其居之後有室焉奉母譚孺人居之視膳問安於斯忘其身之在仕籍也曰吾其終養吾母於斯因名堂曰終養或謂之曰子之學禮以為業纂言以為文羣十三郡之士以試于有司者三十年矣如子之比而登者有焉未至於子而登者亦有焉由是而紆青曳紫者有焉惟子之數奇而偃蹇至於是今既貢于王庭觀國之光矣脱鱗介而生羽翰此其時也而以是名堂或者其悖乎君曰吾之昔者壯而入淵泉以剸虬龍乎登巉巖以縛虎豹乎附鵬翼以翔滄溟乎騎八駿以上崑崙乎吾皆曰能也自以為侍母之日長吾敢有吾身以求畢吾志今則愛日至矣昔人所謂無以終餘年吾之謂也吾尚敢有吾身以忘吾母乎吾決矣然亦未之信也及是廷試入髙第制當入大學以卒業迺以其情請大宗伯以聞詔太宰旌以一官比縣令君如飲得飴如步得騎如瞑得明顧視紛紛者方逐逐於日暮之途實如負塗且為之欷歔而自以為得所圖而為母娛也以予之嗣子垣壻於其孫且久與之遊來請記予發其志記之圭峰集卷十一
