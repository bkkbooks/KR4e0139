body:
  text: 圭峰集卷七明羅玘撰序壽梁母八十序人自為人女至於入他族為婦者巳十一矣由婦而為母者蓋加少焉由母而為人姑者又加少焉至於為人之祖母則自其為姑者又十一矣為人之曽祖母則自其為祖母者又十一矣如是而問其年多且百嵗少亦不下八九十若八十則又其恒也夫其循厯不如是則亦不能至是矣如是而在深山僻境人跡絶逺之地已賢於舟車都㑹之區處窮簷蔀屋之下已賢於雕甍畫棟之室含飴弄孫已賢於列鼎而食牆暄之曝已賢於累茵而坐蓋其傲睨天地之化雖造物者亦為其薄而弄之紛紛乎目前者又烏足以與語然則其為乃爾健邪乃若以如是之年而就其子之禄養且自其僻逺而邇於天子之都戎衞之帥率其屬來觴焉縣大夫率其屬來觴焉縣之師儒又從其大夫來觴焉則其子雖在卑位固可以一展顔於慈閤以為歡掛史氏之頰牙以為榮矣予史氏也為之言者陽樊司驛梁忠氏之母張孺人也陽樊𨽻玉田縣縣在都城東三百里興州左屯衞治焉衞帥唐君縣大夫李君皆嘉司驛之為人以及於其母故於其壽也皆率其屬來稱觴於其舎𢎞治戊午正月癸夘其日也送劉君知豐城序𢎞治壬子之冬十有一月予至京之又明日進士劉君出令豐城縣縣之仕於朝者萃飲餞之屬予為觴正酒半合辭言曰吾縣瀕江以縣江合䖍吉諸郡之水流至縣西無髙山巨磯以障之遂汪洋演迤而紓徐縣若受江呀而銜之者毎北風駕濤則囓其涯涯遂甕空其底嵗善崩暴漲時集又繞其背而出之縣又若浮桴然民洶洶無䇿以生今天幸惠令君以緩兹禍乎君笑而不言蓋君以三傳魁南宫奕世顯榮有不難於政理者意豈不以縣之所當治者獨江乎哉雖然君楚人也楚有九澤澤國也予亦不能外江以申縣人之意夫此江舟之浮者諸蕃之貢交廣之賦中州之商日且千艘而其亂者漁者釣者泳者泅者嬉遊者土之人蓋半有事于江焉當其日晶風恬水波不興朝颿暮櫓鳴聲上下各飽其欲而歸平途安車不是快也孰不幸而有此江也哉其或萬竅齊吹雷電俱至稽天之浪􅉫盪陵谷而鮫鰐鼉鯢乘而伺之雖其素以水事自任者方且神褫股掉無以措躬于其間而其葬魚腹者何可勝數奚翅囓涯之禍而已則不幸而有此江亦人之情也今君日臨此江而其不幸者一觸目焉其戚君心宜何如於是試思之縣人亦庸有不幸者乎夫自有天地來則有此江而人之幸不幸於其間日相尋於無窮雖天地之大亦無如之何而况人將何尤邪而縣之人一有幸不幸則曰令實我為也令將何諉乎然則君之明其得於江者必多也而况治之而已乎然江亦將坻而草樹焉以蕘以牧瀦而陂池焉以灌以溉以利渥縣之人自君始而其東之之勢合岷江以朝宗于海蓋與君同其大也衆咸觴君命觴正書以贈君之行都門春别圖詩序岑徳充歸瓊臺其友檢討陳克紹鴻臚傅秉忠將别之郊有圖焉未名也予題之曰都門春别秉忠曰善乃自為詩一章以倡其凡來别者而俾予為序予曰天地之氣流於四時莫和於春春之著於物也則羣然以動以出其生色而於人也亦然其所自出必於大都而後濡被乎天下然其隂陽錯慘舒又備四時之氣以神其生殺榮瘁之機於俄頃之間而非尋常下國比者故人有對其時而春者也有不必其時而人自為春者也有對其時而漠然不知所謂春者也地既大且神而人遭之其偏異自如此然對其時而漠然不知者類多逺方羈旅之人何者無位於朝為之援也無室於衢為之館也無賈於市以通其乞假也煬誰為之避竈反於其舎誰非爭席者也是則雖煦以熙熙之春其漠然也固宜徳充瓊人也瓊在極南大海上距大都水陸萬里獨非逺方歟古者棄於職方以為便利宋之中葉始有未可以言棄之論由是言之吾意前此來遊之士其於所謂春其皆有漠然者乎今我深庵先生太保公挺然以命世之才出於其間值海嶽千百年至和之氣鬱積而始發凡積久而發者不能不蒸蒸其盛如春然公是也天下到如今文有渾噩之風公也士無浮薄之習亦公也予嘗私論公於元氣實有回春之助而天下士誰非坐春風者或不自知則有矣况瓊公之鄉郡乎况瓊來遊之士身親而薰炙之尚容有漠然者乎徳充又館甥之賢者也吾聞賢者薰人之善如渴夫之就飲如方春之物一遇時雨之化而勃然也兹來無乃其是乎不然何其充充乎如欲流融融乎其已熙忽然其歸也歸之旦初旭在照惠風徐來出其東門三揖而别壽致仕指揮使倪公八十序篁墩先生作指揮倪公七十文公之孫鉉從予游出以見予大要言天津之開倪實為之而食其報者當在於公公將作太平壽俊以觀其地之日盛者於今十年天津之城四樓翬飛城門虎旅介胄持㦸晨夜殘更不爽晷刻城之内市區益敞而譁肆之珍貨益集舟船之杙㭬於涯者如麻遂為郊闗重鎮非復前日之天津而公尚前日之公也然已八十矣篁墩之言不亦驗乎驗於今有不驗於後乎雖然此亦言其先世以武種殖之至公而收穫之終將家之態度云耳未見其右文之功在天下也宣徳來邊衛漸置學士之登有科而無貢士之白首蹉跎還補伍者在在而有為脣齒羞然無如之何成化初李文達公入朝過天津公率士郊迎首以為言文達未之許也既去公又率士送于上流跽泥淖中言益懇文達心動入言之由是衞學得貢士實公始嗚呼公其文翁之流歟四邊之士雖不識公而必徳公徳必頌頌必祝天其亦有聴乎聴必有意於公公之自種也多矣將自收穫之不既必在於其子子收穫之不既必在於其孫而鉉也甚文其必有在乎而况重以先世之所種者又何以其福壽議為哉是事也天津學汪生濟為予言之五月庚午維公壽期羣生乞予文為祝而又推濟暨武生源來予不能文也合前十年篁墩之文而演其意不知後十年二十年合予意者為誰予日望之送宗君之長蘆都運使序𢎞治八年夏四月詔以尚書户部郎中宗君為長蘆都轉運鹽使司使君於少師徐公為邑人於尚書葉公為屬吏於青宮翰苑東臺之英多嘗同為進士者少師日晏下黄扉或欲道故舊必索君語尚書事有可疑者必索君議青宮翰苑東臺之英有所倡也必索君和兹事君以去處非其據人情似不能無悒悒者吾以為今天下㩁算之政一切罷去鹽以不得已而獨存而迂愚怪詖之儒尤欲槩以利賄諱言之而視其司為冗曹和以成俗同然一辭莫可破云故居是官者雖其長亦忘其金紫煌煌之榮而鬱鬱其心胸朝夕舉踵以竢代噫此何為者也儒之迂而聾瞽夫世之過也曽不知邊鄙待餔之卒水旱不期之災一旦倉卒崛起之變而欲驅迂儒以徒手應之雖戮之以謝世而其為計亦疎矣易曰聖人之大寶曰位何以守位曰仁何以聚人曰財是果聖人之言非耶聖人顧不足信而信迂儒又從而和之多見其惑也君明甚已灼知天子首用之於畿甸間必求如君者次第布之天下是將懲前之為更重是官以收效也明目張膽躍然以往少師在相位尚書總利權實預是謀青宮翰苑東臺之英豈迂儒哉必將聴君之去而觀其祗命以為也奚有所謂悒悒者耶吾方有見於此其寮又以贈言來屬於是乎書送尹君歸厯城序厯城尹君以𢎞治八年夏四月至京師太師英國公迓之入館之洞門谺然冰簟妥榻白飯飯僕青芻䬴駒晨進盥頮瀋液宵爇蘭薰秉燎炬如晝日一筵其享篚班如自五督府帥都尉侯暨伯戚畹之豪爭速宴㑹樂公有重客也時公爵上公為天子帥臣參機務總元戎屹然長城為邦家重而君又以太守子太子太保太宰公之弟翰林侍講君之季父也兹以太宰之命歸侍講之女于公之嗣子鋭卺合禮成求易水之涯而風之登黄金臺以望居庸延睇于漁陽上谷雲中嗟闗塞之大防於是乎在而後撫髙閣建瓴之勢俯而瞰之飛芻挽粟海客蠻商蹄踵交道市列萬肆珍貨盈溢儈駔紛如在焉騎者輦者舁者任者負者介胄而馳者戈鋋而趨者聚而語者絃而竚且歌者呵而軒者厥聲如雷飛塵蔽天而亦目眩心搖就館而休則優伶盈庭絲竹競作魚龍角觝之技更進互出于金盌玉壺之側至其少飫則又丹檻斜入瑤臺俯臨翠竹朱華裊砌冒池清颸送凉濃隂生寂清神豁襟如在洞府或忘其素髮之盈簪而身之在客也嗟夫天下之人顧瞻京師如在天上有不願如往者乎然而轉輸者勞于力獄訟者勞於形朝覲考課者勞于心懋遷有無者勞於計畫是雖於可樂之地卒無可樂之時而欲遂其所願樂者蓋亦莫之能也惟君婚姻之貴亞天子一等耳而又當豐亨豫大之時無一旅之出以勞元戎故得以其餘閒娯婣賓而侈夫上之禄賜之盛而君亦世貴富是來也所謂勞心力形骸計畫者舉無焉宜其老而不失其樂可謂兩際其盛也五月初吉告歸于公公曰吾講幄之下能無宣是美者乃屬予予謹序送閫帥黄君福建備倭序倭奴夷亦曰日本東海外之夷也謂之奴奴之也奴必有主吾中國是已天下之賤辱且勞者至于奴亦極矣然其心亦未必甘而安為之也其鬱鬱之忿蓄於中而或乘之以黠鼓之以暴則門屏之間將有易位之變伏焉而莫覺者而况擁君人之號襲世傳之序聚落之人兵軍之富器械之工巧而又逺在漲海荒服之外吾奴之而已彼豈俛焉直受如兹倭奴者吾雖為主而欲偃然不加之意求以無患得乎又况安南朝鮮均夷也而朝貢時至正朔所加封冊所臨齒諸親藩而倭亦以文字為國獨蒙棄斥無辭以别夫蝸殻蟻封之夷其情之痛苦不獨蓄忿之奴而已也夫奴之忿不忿一家之利害而已矣今倭之界與明越諸州相值東底遼南盡于閩廣延袤萬里不啻皆吾地吾赤子也而付諸蓄忿之夷朝夕睊睊以狙伺之其忍乎千里之間千夫之所不啻必萬夫之衞萬夫之衞不啻必閫帥以臨之勢必至於此乃得䇿也署閫帥黄君今年四月以簡命當詣福建福建所𨽻衞五所十水寨五戰艦千艘水軍十萬偏裨之將數百人君至將將將軍軍登艦弓引蒲劒露芒鳴鼙如雷軍于島嶼之汊直奴視倭奴如以肉臨虎口若然真備倭之賢將也君先世土人土人今亦有利哉土人宦于朝者皆觀君此舉借予言告之送孫君之山東藩司經厯序祥符孫君思顯以選得山東藩司經厯予始不識思顯也思顯於職方主事王廷文為外叔父廷文之祖思顯祖之壻也廷文之父大參公思顯父之甥也大參公之訓廷文必厚舅氏家廷文奉以周旋不敢失墜於今思顯之來也則思大參公之訓焉予亦不敢簡思顯識之蓋廷文予之同年友也厚同年之厚者人之情也廷文毎為予言思顯抱志悒悒終無以洩其奇輒角輒蹶或誦其所為文於予真有可唾手理而究其不遇於時此則予之傷于虎而幸脱焉者也抑予又有甚焉泛濤江泝漢沔以上襄鄧以西踰武闗過商於下七盤出藍田以底于秦飲浮屍之汙溝穿虎豹猿玃之羣出百死而始得衣士服拜司成於太學其無聊卑辱之態有不忍言者思顯則無是也不猶愈於予乎及是命廷文又戚戚咨嗟不置噫今天下重進士進士仕於朝固重也其或為州為縣為府之佐為監司之佐有事于藩也望門而趨趨而厯階以升匍匐庭下贊唱鞠躬俯而揖焉跼蹐屏息拱手趨出惟謹而思顯固據案坐不言不問也彼所謂進士何為哉况山東古齊國也天下莫强焉今猶包魯以為疆其使古方伯也其幕古列國之卿也齊之卿管夷吾晏嬰為盛後世仰髙焉思顯今而至於管晏之位亦榮矣而遂能管晏亦誰禁乎廷文猶不慊焉亦過矣或者大參公欲以厚其舅氏以付諸廷文其訓不止是也而廷文孝思之過則吾不知矣廷文欲序思顯之行不鄙予之俚也予謹序送任象之之新安序夏之旦農之興而饔也殷然而雷渰然而雲霏微而霢霂焉當是時有不呼其侶衣其襫襏嘻嘻而之田者乎有忍能卧而不出者乎有之則咻之矣既而風之豁然而霽杲杲然而赤日出側耳而聴焉雷已收矣當是時有不呼其侶斂其襫襏悶悶而歸休者乎有忍能作而不止者乎有之亦咻之矣曽不知晦而霽霽而晦而又屢霽而屢晦而後天地山澤之氣潝焉浮焉升降而瀰漫焉澒洞幽黒尺寸無所辨而雷電隨之而大雨斯至矣當是時也卧而不出者惰農也無所事於悔也出而歸休者躁農也有能不悔者乎而其悔也亦晩矣作而不止者固徐徐焉窮其一日之力而恢恢乎收兼人之功矣是故吾於天之晦而霽霽而晦有取焉知其將以釀是大雨也吾於農之不以晦而作霽而止有取焉知其將以遇是大雨也吾於吾友任象之之出處有取焉知其有類乎是也象之閬人蚤以宏才髙薦于蜀褎然來取進士旦興而饔矣飽而力可為也朝廷適下儲賢之詔居三年又有御史之選蓋殷雷之下霢霂其零象也而象之皆與焉盡祕書所有而讀之而後建白天下事嘻嘻之田之時寧止於咻卧者而已乎然而勇於敢為遇事風生風之過也則拂掃其雲赤日之出有不免者而中部之命下矣中部於京師為西陲知縣於御史為左官人孰不懲羮吹虀落其角距如農之悶悶以歸休乎而象之知為御史也不知為知縣也人之咻之不知也視農之作而不知止者又甚焉其上之人皆曰象之賢者白之朝然不知天之閔農則錯以晦霽釀大雨以霑濡之其勢決有不容已而於賢者特聴其自定而終無所閔邪抑孟子所謂天降大任亦有不盡然邪吾嘗聞天之降雨假於嶽之雲觸石而起膚寸而合不崇朝而雨天下然附嶽之地偏多焉象之昔逺在西陲今補新安密邇輦轂是附嶽之地也雨澤之偏多將不自兹始乎天之意或在是乎而凡同年尚有不釋然者於其來送象之為之言非獨以慰象之也賀句君奉詔提督四衞營事序國家制兵以府自京師以達於天下又達於四遐之邊羈縻之域凡赤籍者皆伍以聮什什以𨽻百百以𨽻千千有所千以𨽻萬萬有衞合諸衛則又有都帥以總之以分𨽻於府為府五又皆制于兵部乃兵部有綜理發召之專焉府帥有握兵之重無不制之兵也然禁兵不與焉禁兵則惟綜理於兵部稽其盈耗而乘除之發召無所敢與錦衣亦禁兵也其帥且與府帥抗伺察其幾微府帥且俯仰之其下偏裨徹侯有不相名者錦衣次而為旗手府軍金吾羽林又次而為虎賁騰驤武驤其帥雖不敢視錦衣以抗府帥然皆同禁兵非其屬也禁兵宿衛宮門扈翊警蹕天子御衙執戈㦸以侍陛戺大朝㑹設鹵簿以嚴國容出則夾乘輿以備非常古者去其淫怠奇衺而敎之道藝周公以綴衣虎賁次諸常伯常任準人以立政蓋為王爪牙腹心之近雖名為兵豈真特一勇之夫而已哉况同衛於京也一為府𨽻其官也望軍門而戰慄頤指氣使於戲下如弄兒焉雖金紫不免也禁兵固攘璧也嵗朔一入大廷燎烟羃羃顧瞻未周已放仗矣禁兵固日以為家也而又密聞祕見蓋山林耆宿之儒得於殘編斷簡有未敢以為的然者其兵如此居其上而為官可知已况居其官之上而為之節制者乎騰驤四衛舊有提督營事官所謂節制者㑹當代詔以代者句君某也錦衣張君養直雅與善而求予説為君贈予亦不知君也知禁兵之重其官重其節制尤重也今天子明見萬里耳目所及之重者豈輕以畀人君勉之哉壽雲隠蕭君六十序萬安雲隠處士君蕭升榮之仲父也升榮前年入吾院踵吾為庶吉士吾以弟視之學則吾兄也然挹而進吾與語時刺刺若忘吾之陋者吾於是而得其居之墟曰夏霄又知其諸父之有五老也明年甲寅十月某日吾之與語方洽忽作而起曰前此六十年吾仲父雲隠生吾以嚴君之命縻於是吾兹南望得無情乎吾戲之曰子能鳥翼乎杖縮地挾飛仙乎驅飛車乎蓋未能也然則吾為子請授子以符具子以傳闗門夜開津使􅋈待一日而馳百里不啻必再百里再百里不啻又再百里由是望夏霄而駐驂襲錦衣以容與厯階升堂垂白者觴之斑白者觴之五老陶陶醉顏怡愉子欲之乎曰未也始吾仲父勗吾以學也嘗殫百金而不以為費晨出百爾營為入必課吾業束吾如束芻雖夜分而不以為疲吾舉于鄉吾歸視其色若有未愜吾者至為進士及今其訓詞之至其嚴也尚如吾始學時然則其非榮吾官也將責吾以大也其何榮於吾一歸邪曩丙寅之癘也吾宗一空吾母始歸吾嚴君諸父時四五童子耳啄之利者啄吾屋爪之銛者攫吾壤喘不得以息踵不得以寧尚有眚焉其何敢念有家乎幸于今五十年既生既聚指之蕃也餘於千曩四五子老人矣雲隠其一也而孝友之稱好施急人之譽縣大夫皆仰而賓之今日固縣大夫之觴且至也况其下者乎吾無庸歸也然吾思得從二三子於是吾仲父有賜焉傳曰報賜以力力吾無以為也顧吾子為吾言之子之言人皆曰傳也人之言然世不知有蕭雲隠乎是將壽其名也不獨壽其生也吾雖涸東海以為觴何以易此吾聞而愕然驚焉於今且朞年矣未有以應也而君之壻張仁亦以書屬升榮申前請益堅不得拒而掇其舊以告我者歸之若曰是能壽人之名吾恐其滋蔓也送萬良弼分敎松陽序萬良弼不屑為學官予已知之三十年矣是官也予雖陋亦不屑為之故毎三年必與良弼遇省下試試罷輒不得願乃分去良弼與予皆然也然予少良弼數嵗而蚤衰自分業左而數奇旦旦企踵數貢期曰得則就翰林試幸中選吏部計其時為四十餘庶幾免白首經生名也已而西人告饑朝廷下便宜之詔予已若羈鳥脱籠信爾颺去意良弼貲倍予百年又過之其往當浩然矣而兀然安處就省試尚如初不變予於是益歎良弼之不衰其必有遇乎予既官翰林今年春良弼貢至嗒然悔其前之踽踽也見予從諸冠裳之後而賞予之知幾且乞學官以畢志予私怪焉而又隂憶良弼始挾其從子奭遊臨川奭童子也奇氣逼人臨川之人爭迎致之市兒巷婦以先覩之為快於時良弼父子間亦盛矣哉其意氣勃勃直握功名于指掌真謂登金步玉為其家物也自予望之孰謂其亦依依棲遲至暮乃爾况飽意于一學官又况忍置身於異途如予哉然而天下之事其素定之幾伏於冥冥如旭日晶晶而或霶􅑛於夜霏微冥迷而忽夕照于西此蓋聖智之所以不敢役心于得喪惟於其所遇而安之良弼今始知之矣是夫果以試得處之松陽頎然巾服若尚少也入予室辭去予知松陽之士比亦有連蹶未振者良弼心念是吾也慰安之有率爾攘臂自喜者良弼固器之以為已地且將懼曰慎毋為吾哉良弼是心惟予知之因書以贈送艾典術歸隴州序史記天官書曰中國山川東北流其維首在隴蜀尾没于勃碣故秦晉燕趙常多兵譬之人焉隴蜀之喉也於中國為項領勃渤海也碣石今淪于海要皆在今大都東南大海濱海為尾閭洩西維之水而脈絡實首尾焉隴為秦野其位輿鬼其舎鶉首其宮巨蟹其州雍其星太白太白西方金也大都為燕野其位箕尾其舎析木其宮人馬其州幽其星辰星辰北方水也金水母也又兵象也有殺伐之氣焉水火夫也其為體也柔柔則為沈鷙其過也為激射為奔放則二野之分其兵之用也亦若有為之者哉然吾聞太白其庳近日其髙逺日出以辰戌入以丑未當出不出未當入而入天下於是乎偃兵五星皆從辰星而聚于一舎其國可以法致天下是二星也雖為兵災亦或移而為祥其躔次贏縮因人而變宋襄公一言而熒惑退舎是也今乘輿所駐北極紫微帝座也又辰星㑹太白五星聚于一舎位也日月如合璧望氣者從天精而見景星索所謂彗孛蚩尤旗枉矢旬始者卒不入于目中斯何時哉尚與天官書合也春秋之時言星者魯有梓慎鄭有禆竈齊有甘公魏有石申無國無之而燕秦無聞予意二國昧谷幽都地也古和氏仲叔所居其遺祕有非列國所得竊窺無賴於以名見者燕今司天在焉豈出羲和氏之下哉而秦隴之間亦宜有如昔之不以名見者乎隴之典術艾昭氏吾友閻允徳之異姓子姓也今年客於允徳所允徳重其世也少其官而欲勗之進而立於其先方伯公之地噫允徳之愛人至矣然昭業已為是特充其官焉則不能不以名見使秦有星家名自昭始如甘石禆梓氏可不可乎予故於昭之自燕歸秦也姑與之論燕秦分野所以薄試其術而登躋之激發之允徳其將謂我善我人否乎壽陳勁齋六十序分寧縣學入國朝幾兩圮發帑金新之皆陳氏而勁齋翁嗣為之縣之民罹饑年亦不知其幾矣發廩捐金賑之多陳氏翁又嗣之縣語孝友行誼稱鄉先生可俎豆於社者亦多陳氏人今又皆仰翁焉兩造幾發陳之先為之落機牙而寢者無算也翁尤騞騞然若剖竹破節無留鋒鋩今雖六十也其應尚無倦縣庭掃除甚適也故縣人皆曰此翁勁名之曰勁齋翁吾未深識翁方伯周公為駕部時道之公之弟刑部君朝夕與吾居又極道之翁之從子􅀈吾昔與之識省下亦嘗譽其仲父勁齋者吾時狷騃甚不意其果若此也夫人持一瓣香入寺門其口之祈其心之望吾不知其何如也富者供佛以宫以為佛能錫以福也飯僧以田以為僧與佛居能使佛福我也天下之不能禍且福至於吾孔氏之徒亦極矣而陳氏世為學以居之至於嗷嗷待餔之民其於身之弗能卹况於所謂禍且福者而陳氏世賑之畢竟與世之人背而馳也何求哉豈其世愚而莫之覺邪又吾嘗見世之為富者矣鄉鄰之詈者使之鬭也鬭者使之訟也訟者使之貨也然後左右觀望乘其急而市其田宅以自廣焉而陳氏又世為之寢皆世俗指為愚者然而陳之富日以益他縣莫不聞陳之被冠服比貴人者森若壽考稱鄉先生者亦踵出若翁是也詩曰求福不回世人蓋未之思耳陳氏為近之然吾獨以頌翁者嵗二月壬申翁壽在是􅀈來徴為序以賀也送水部王君之清江行曹序都水主事王世顯始予遇之于太學與予皆以例進生也蒙指目之辱焉不能頓沃而去之今也十年矣皆有仕籍于朝予不足道也所以一洗曩時之辱者誰乎世顯也世顯在太學時予隂察其才之可與立既而同舉順天明年元日非有所取也而一遇窘辱異甚焉世顯至不能堪予乃觸寒劇飲大醉熟寢而已覺而世顯猶艴然赭其色予又知其志之奮厲非予之齪齪者比心慕之然而連蹶于有司至癸丑予預典校始第進士予已遲之及今始官是劇曹又往督清江運艘凡庶務無劇於此則其才之少得以出而志之少可以見予之望之也庶幾其有端乎蓋君子貴乎志也以其成貴乎才也以致用人之所以靡不有初而鮮克令終者豈其心之欲如是邪當夫鼎盛之年而幸軔夫中正之途磅礴奮臂物迎而解天下事無一不可為者其自視亦可謂盛矣而不知其志徒見其順也未見其逆也不能以不驕才徒遇其易也未遇其難也不能以不恃如是而欲令終也不亦難乎而或卵翼是資馮焉乘焉觸人之言敢出焉出而人姑忍之咈人之事敢行焉行而人姑安之其自視尤盛矣而不知其志日以驕實無所主也才日以恃實無所為也如是而不觸危機嬰禍網者亦鮮矣况求所謂令終也哉而或者於此始悔其初之盛者為之累也亦晩矣嘻初之盛者終之累也然則初之辱者庸非終之福乎若初之辱予與世顯則有之然而志也不若世顯之堅才也不若世顯之善予將老而衰而世顯甚壯且碩也世顯其將不為令終之人乎令終則榮辱斯洗矣有不被及于予者乎世顯上海人上海之寓宦于兹者謂予知之深來徵贈言言無要於此也世顯豈欲予他言哉壽清風居士八十序王廷光自南曹郎歸語予以清風居士者予不竟聴之他日語復然居士蓋髙郵人也廷光始得解隨計北上至高郵而嵗已暮天時吹烈風飛霰著袍撲幘濡穿入體驛之下乘已匍匐如跛鼈乃下而曳之以行後之𨽻也凌兢縮項無人色市兒奔追噭笑或手瓦礫擲之而居士適於巷出遇焉叱曰何敢爾且異廷光之狀也曰郎君得微有仕進之趨乎得微有行邁之窘乎吾室孔邇入憩無多固讓已而煁之煬盌之茗𨽻之飯馬之莝箕貼如歸也明日裹糗􅖲酺醢易馬而遣之廷光曰天下亦有斯人乎予曰是謂徳施于不報觀其隙而利濟乎人者也其以醫隠則善乎廷光曰然予時困于鄉茫然不知所謂髙郵也𢎞治壬子予免喪入闕過之求居士而拜焉問其年曰更越三載八十矣而神形明秀如嬰兒步履便捷如壯夫議論穿貫浩洽宿儒不如也問其所以衛生之術笑而不對飲予以酒如平生歡者於是益信廷光所語不虚也予既復史事預校南宮得今行人夏廷瓚實與居士戚或時相與道居士之為人越明年乙夘行人以使歸之便請曰忍能愛一言不為居士壽乎予諾而未暇也又明年丙辰訓導李士元亦居士戚也來㑹試都下又申行人意噫使予壽居士居士其假予壽乎如曰託文字以不朽于後世以為壽予又非其人也居士之子上舎璉璉子學生某予過時皆以他事出而識者方以逺大器之居士將恃以為榮也然居士方為郡大賓飲射大㑹邦人士女聚觀爭識丁大賓亦未必不為榮也予之序固不可以非其人辭送都閫張君之任福建序今天下藩鎮錢榖以屬宣使刑獄以屬監司甲兵以屬閫帥勢若體敵尊同如鼎足之跱然宣使監司其起也咸自鄉校之敎論秀之舉進士之登州縣之試郎曹之厯沈汩練漉百僅一二而後至焉閫帥則武銜也咸起廕補廕補之官雖以總角之童横金曳紫驟貴於俄頃之間惟閫帥法不䕃授以薦得之要之其秩已崇亦無積累之難如此然而兵之服食鎧仗給於宣使兵之姦宄幾微察於監司僅握赤籍知其盈耗以通於兵部都府者閫帥也境内有警又節鎮大臣主之發調之權不與焉上疑下謗無隙而生位尊禄厚而逸且安宣使監司不如也藩鎮獨河南為土中無邊事江西亦無邊事而深山長谷有狙伏焉未為寧地秦晉備蜀捍羌雲貴湖撫雜蠻兩粤猺苗伺之遼左青齊吳越閩宿有備倭之戍皆院邊不能晏然如土中者雖然土中兵嵗一踐更于京湖江呉越兵拔其十三四為漕卒道亡死踣閫帥多與其擾而閩既以逺僻不與役倭之備亦嬉笑於門閾中而已其官名為武弁實有不識兵革與儒官等者然則閩之閫帥天下閫帥不如也今年夏上命都指揮僉事張君往任閩閫而刑部郎中馬君屬予言其行予聞君世宦戎衞少肄武學親立戰功至是官然猶壓於元戎大司馬其尊未自表見也由此而行七十里有秉纛戎服郊迎者則君亦尊重矣入重門坐數仞之堂啓而視篆銀質而丹文君之任不可謂不專也久而逸豫安安錢穀刑獄一切不必自已營之而又武事稀闊與儒官無辨然後知宣使監司不如也天下閫帥不如也樂哉是為序圭峰集卷七
