body:
  text: 圭峯集巻三明羅玘撰序迎養逢恩序今制在廷之臣滿三載始得推恩封其父母如已官然間十數歳乃一覃恩始弛是限亦得封雖然維具慶維嚴慈偏侍可迎以養兾一得即闕謝以為榮然或遐逺甚又不能必迎迎亦或不能必至至又多弗偶然則兹遇也其難乎今皇帝之十一年吾友戸部主事趙叔鳴急于東城之陬僦舎舎草具已迎其尊甫西津居士至予舎亦東陬也又宿舊因得交其父子間其冬十一月二十一日適覃恩叔鳴甫一載官也乃得侍居士以冠服明日入闕謝于時被恩中父子謝惟是二人凡恩則榮恩以希闊罕遇遇之又榮遇而無與為比又最榮假叔鳴曰舎館定吾其迎迎之居士亦曰舎館未定吾遲遲其行則固江都始封君也幸至焉則固邸舎始封君也何由父子明日入以謝而迓是榮也事有可得為而於其親顧不得為焉為人子者其容不悔乎夫有可徐徐為之圖者有不可徐徐為之圖者若此其徐徐之慢也不勇也雖然其亦不偶然焉聞居士嘗道杭也羣旅以市珍之光溢目也競市焉亦從而競市焉則江北所未有之書也歸以付叔鳴日夜服習之景象而行之叔鳴遂猋然馳翩然而翔去若不可羈馽者至于今又若淼然不可以端倪退然於勢與利若怯而遁以避者何昻昻其高舉也天下之勇者也其性之然乎學之然乎容亦有教之參存然乎若曰教也居士其自取之而自享之者非乎可賀也予勇不足以決鬱於中且六年於叔鳴出監漕于德州又奉居士漸以南也則會之不可常也已因發而追賀之姚氏家乘序慈谿姚氏家乘成廣西提學僉事英之所作也其曰乘云者若車之乘以載焉者也亦晉之乘之云也英之予校禮部所得士因得縱觀焉其制首世系英之曰伯父叅政所修慈谿新譜在斯譬則乘之輿也次列誥制一勅制二廷試䇿問二英之曰先後所得諸朝者在斯譬則乘之軾也所馮以敬焉者也次列表二序一䇿問三啟一賦一行狀一詩三英之曰先世之手澤在斯譬則乘之幰也仰而朝夕者也又次列誌銘一序三詩十英之曰諸先宗工為吾氏作者在斯譬則乘之帷也華乎外而蔽乎内者也予曰噫善哉子之取義於乘也然試思之族之生生無窮也日載乎其中其為任也甚重而歴于千萬世其為道也甚逺以甚重之任而行甚逺之道吾見汚池沮洳之阻飛崖絶磴百折之險風雨晦㝠雷電氷雪之遭寇爭戰鬪猛獸蟲蛇之戹日相尋乎其前以為乘之灾者葢紛如也而可以言至乎故必轂以持之必攻也輪以運之必員也馬以駕之必良也御以御之必法也而或其持之也以匪攻之轂而運之也以匪員之輪馬也非超逸之良而御也無範我馳驅之法則吾為爾乘危矣惡在其無覆也哉夫心也者轂也智也者輪也才也者馬也而又一脉重厚不震不動以為家法也者御也而皆備焉則夫輿也軾也幰與帷也可以無虞矣而乘之為道得矣雖舉天下之乘可也獨姚氏之乘乎哉英之不覺􅀈然笑嗒然而無辨欣然書於後以為序賀朱天錫齊夀詩序金臺朱君天錫俞生昻之婦翁也今兹九月既望丁未年六十昻將賀之越三日庚戌蔣孺人之年亦如君於昻為婦之母昻欲裒賀意出諸牲牢玉帛之外匪詩歌不可得邢文龍為之倡和者凡幾帙成以其期往文龍謂括諸詩而序之於予為宜予知君蘇人也再世燕籍遂為燕人有南北之族善操竒贏如矢注的如樗蒲呼盧有往斯獲有擬封君之富入粟為郎有冠服之榮趾美於戸庭連壁於他門有子嫜之盛飛甍傑棟于尺五之天有第宅之安出有輿馬之華入有樽罍之奉而又日分禁曙之光歲挹蹕道之塵炙於貴鍾鼎之制習焉親於賢禮義之澤漸焉蘇雖東南勝處藉君生之未必能違之而來來而商且仕未必能如是其久又安有是也況今天下如足支而鼎安京師鼎象也民之最幸者生其中目不覩旐旟耳不聞金鼓不撫耞耒不勤四體而坐享四方水陸之精華而以恬以愉夫恬則心澹然而本真不揺愉則體充然而外耗不入而夫人皆可夀也如君之富可以釣取榮名厚自奉養得賢而嗣之而南宗向榮可以反可以無反者是君也宜其恬愉之獨先于人而有以及其與居者與居之邇者非孺人乎其偕老也又何足言耶管絃沸然中冰玉烱然照人而壺觴奕奕可無歌以侑醉者乎有及於斯詩也必知予之所以序送饒及之分教望江序臨川饒及之往分望江縣之教及之在臨川固魁梧竒士少壯時每三年必以禮經與十三郡之士角禮之士不及易詩書三之一故皆聞及之名及之固自負士亦推許若出一辭曰及之其魁我乎至名出曉及之竟寂然歸臨川復為諸生葢自天順戊子至今壬子其歸如是者十而及之已如逐北之兵不可言勇抑志就貢而來見予京師日入二毛予大愴也予昔見及之北禪僧舎中畚土為砌砌上種菊數十叢對哦其間若能遺外聲利而且笑且言盈盈于函丈間皆來學者也予察其無倦色竊念曰教道固如是然及之之學必為進士進士例不尸教事不可以抑也及今二十餘年乃甘與衰暮之士百十羣試教官于吏部部糊名翌日送院院學士西涯李先生主校予亦與焉西涯得及之巻不覺喟曰是固進士也烏得于是惜之而首列焉部乃以教是縣葢優之也夫翰林極天下之選而西涯時又以文玅天下未聞妄所許可而顧於及之乃爾視諸疇昔儕輩徒以附和一辭者彼以耳此以目彼以私此以公脫然敻逺借及之得一薦而與天下之士並逐於西涯掄揀之下其於進士也何足多耶世固有遇不遇皆天也可嘅也夫雖然予亦蚤識教道於僧舎矣及之行也尚亦為國無倦夀英國太夫人八十詩序王公師傅妃夫人之爵本兵機務節鎮薄違之任子壻女甥孫曾之昌自耋徂耄之夀康寧恬裕之休恩命禮數之隆萃於一家際於一時而又合於一身以為慶今惟英國太夫人乎夫人晉人也歸定興忠烈王為夫人王為公時以身殉國難夫人鞠遺孤今為太師英國公而仁廟敬妃其女也太傅保國公征南黔國公清平伯其壻也而永順伯安昌伯又其孫壻焉太師本天下兵掌機務天子方毗倚焉而太傅亦都天下兵馬黔公殿南徼清平永順皆當戎寄七孫二為執金吾爪牙在天子左右每入閤問起居垂魚鳴玉鏗然委地夫人亦頷之而已永樂甲午九月十日夫人生於今為八十拜太師太傅於庭五爵之貴駢乘連袂而至二三元老館閣諸賢皆賦詩為夀在館諸生黄元王傑亦相倡和以鳴其盛謂得予題之亦可登其堂也予憶太師同史事時每道太夫人之康裕日飲宫醪數勺餐飯尚幾匙目誦佛書烱如也予謂此其夀徵已而果然然其朂王以忠教太師以道經邦國毓成敬妃之徽音太傳黔公成安定之功赫然於中外其於理道有潜補也夫有隠功必有顯報功惟彌隠報亦彌顯此其爵賞名位蔓延絲繫於戚屬毛裏之間而夀考康寧饗於其身宜也昔魯成風於莊公為令妻於僖公為夀母國人歌之而夫子列於清廟那頌之什亦未聞其以朂王朂莊以教太師教僖如夫人者是宜裭令壽為夫人號而元老諸賢匪那頌之宗工伊清廟之詩人也予與諸生其擊瓦缶於疏越之側者乎壎箎迭鳴集序百愚子吾友也官既困頓而詩益雄人之知之以詩或忘其官也其兄半農拙齋遺菴皆以其詩鳴葢其清逸在野得以肆為之以成先訥菴君之遺教者其暇倍於百愚百愚則人方英英然如雲之無可繫著而望之也亦不得不為之耳而四人者詩遂相埒成一家言而並鳴于時百愚在渤澥予過焉摘其百二以示使評之時獨半農之響絶於其人之云亡而其餘則竒音競發爭為長雄勍敵也誰得而低昻之雖然吾見其氣葢如此至其天性之真所以推服敬讓更和而迭鳴者未必不私幸其家之有是四人者且同出也凡物之有聲者其鳴也亦有不得已焉然而凄然悲者人傷之唧然微者人厭之羣然皥者人鄙之虓然吼者人畏之若夫蜚大屋拔大木而訇震於六合黯黮之中破山舞石擊撞於百川沸騰之日澒耳嵬眼飛神褫魄人亦孰幸其有是聲哉至於終身聽之而不厭者樂聲而已而樂聲之中又有倡和而迭鳴自為伯仲者壎與箎也詩曰伯氏吹壎仲氏吹箎而世猶以之況夫人之為兄弟者則兄弟之能倡和以鳴者不其尤似者乎宜人喜而聽之甚於樂久而傳誦之不止於凡為詩者而已予謹評之曰壎箎迭鳴集而又感夫紙筆之不好則不能以鳴鳴之而墻可䦧也亦不暇以鳴鳴如戛釡撞缶犂然其聲使人坐睡掩笑者雖鳴不鳴也皆可悲已百愚明之馮氏尚書郎守揚州坐累謫鹽司尚脫然不知為謫也獨一時詩之雄也夫送王資博考最還治詩序王資博以吾同年進士出知平陽縣吾不知平陽也知吾資博學廣而才優廉毅方正可重負荷庸止於為縣而已作雜文期之且以為别既而闃如異域一介之使不入吾第而淛東西稱治縣有平陽吾又不知資博也徒知平陽矣今年八月自其縣來考績見其昔之渥也殷腴也皴容服闇然殊有悴色吾不必知資博也知為縣之勞人而悴人之貌有如此淛東有治縣也宜哉然於予心不能無戚戚焉及資博歸縣之湯生遍求館閣省寺之詩歌之亦及於予夫生士也士居鄉校羣坐囂然議其長佐寸長尺短口伐劒刃騞騞然長佐持三尺法以臨其父兄族屬家之慘舒寄焉尚不能以制使止也況生已寓于斯環觀其身一無足顧慮者乎立睨資博資博亦將安之又其桀驁不遜亦誰與校哉生皆無於是且汲汲於其長恐公卿忽其隠而不知也則縣之欲報資博者寧獨生耶吾始閔資博之悴兹而更以賀也今河決于東北而水溢于東南連數十城吏皆如資博憂悴以從事吾猶恨其少也惜乎吾力弗能振之於生之請也徒發一嘆上林春意圖詩序送余邦臣歸青神有圖焉曰上林春意而繫以詩者長樂謝邦用作之林宗器又作之凡作者若干人然終不任為之引或曰予可也蓋予嘗竊一至上林者耳諸君豈欲予誇張而歆豔之以速邦臣之來耶予不敢也予之東馳西騖至於顛躓喪履者屢矣卒不得其門而入及入而目已瞀瞀焉不能以注視也足已蹺蹺焉不能以周遊也伏於數筵之地而睨乎百里之逺其臺池堂隍之高深蕊宫桂殿之巍峩耶瑶草之吹香而琪樹之敷陰耶衆鳥之翩翻而羣獸之駓騃耶魚之躍于蒲而龜龍之遊於庭耶予已揮霍眩惑不能名焉而獨予郡之年力壯而聰明勇銳者縱其所如往其於長卿之賦殆盡為目中物矣諸君不彼之問顧及於衰頽如予者欲聞所謂春之意不已難乎然吾聞邦臣之歸特以省其太孺人非有兒女子戀戀之私而蚤夜持籌以治産為也肅敏公豐功偉望其起身亦嘗自上林者此邦臣所飫聞者也今公雖殁而其陟降之靈能無眷眷於其子姓乎況母之期其子也太上在名而膝下之歡亦不免以常兒畜之耳太孺人親見肅敏公之赫赫如此口雖未言其心寧忍置邦臣於公之下乎邦臣雖欲遲留信宿吾猶恐其不得也方今主上闢四門而上林之扃將洞然寅賔以入諸君與邦臣接袂一往觀乎濯塵纓於暖浪重華帽於春風洒然醉春意而出也尚假於予言哉送月樓楊先生歸姑蘇詩序𢎞治七年夏六月丙子尚書刑部郎楊尚絅晨受制命于闕歸而尊翁月樓先生自蘇至制之下也葢封先生官如尚絅先生即得易褐以錦束腰以銀加頂以哻未及解裝而已北面嵩呼如素貴者遭遇之竒如此哉吾二三輩於尚絅兄弟也以父視先生往候見焉吾己如歴階以升高臨素輝於碧落吾於是而喜得月樓焉吾往時見尚絅嶄然不羣巍然而上出洞然以明照于羣疑難辨之情雖其同官自以為不及也吾甚慕焉而莫求其端乃今始知之又吾嘗私譬蘇為國家廚庖之處而其歲入乃鬵釡盃盂中物也其民宜有以自老而無仰於他方則無事於遊遊亦不渉江淮以北而槎溪又在蘇之東瀕海沃衍倍他壤産入既饒而亭池竹樹觀遊之美亦其勢有不容以獨嗇者然而樓于水澤之濵宵與月宜此則吾聞先生之獨高朗也夫高朗者之心胸與塵囂紛華恒自隔去而又處夫有以自老俗皆倦遊之鄉七十一齡之翁水道四千餘里而就乎緇塵蒙蒙煩囂之地亦何屑於是耶其必有天誘其衷而黙會寵光於倐忽者不然則奚以來來而差池之奚有是竒也先生蚤識尚絅為竒器教成之用於國為竒士宜有兹竒事以彰之尚絅其立竒功以報國耳此先生之心也先生歸都諫楊君大合羣賢飲酒賦詩以别予獨怨移月樓而去我也故特為之序澄江文集後序太子少保澄江先生尹公既挾其所以用世者歸老于澄江之上而江濆之人士方幸公之歸而於小子後生有所造就也然而朝之二三老成靜而竚思作而會言學士大夫欲有所質疑而辨難與夫新進之士慕公之名而思識其面者又未必不私憾公之去也公之去也人之惡之而擠之也方其設穽下石之時寧獨一快於去公而已耶至於得公之文而讀之雖其倉卒之際亦必終其篇而止而每嘆其難其心亦良是公矣而必為此何哉夫人有所惡者必先有所忌有所忌者必先有所畏公之文既為人所畏矣而又自坦易直諒蕩無城府以葢藏之亦即發其英銳毅果之氣以臨事即公雖卑官末屬不掛齒牙者猶不免焉於其害葢其文之著也而況日與要樞者居而已出其上欲免於忌且惡得乎公之得全以去而兹猶有以繫人之望者幸也今公身日益佚心日益休益得以歛其精華而大放於篇章著作之間當必有出於其在位之日者夫以其在位之日而其文人猶畏而忌之則今之可畏者殆必有甚焉而所以忌者或可少逭耳又況後數十年今日之望公者亦湮淪物故而凡忌公者又能以久存乎至其所可畏者當􅂱乎獨在而與天地爭為久長凡附名於公文者尚亦有頼焉揚雄作太𤣥劉歆欲以覆瓿待之而桓譚侯芭獨信其必傳今之忌公者葢欲擠其身而止耳噤不敢以歆之待雄者待公其亦有見矣乎惜其心未廣而謀之不臧可笑也石埭呉君德純來知公縣得公文一巻於公冠以公號曰澄江文集者將刻之以傳而俾予為序予與德純皆公之門人也敢俾譚與芭也專美於前哉僣書于後壽族叔思忠七十序吾宗在四石溪葢自侍御公之子析而居之吾前年免喪一過焉宗之老五六人以譜考之於吾皆為叔父而思忠思憲思懋思愈又同出也樸厚而愿慤飲予以酒予方促裝北上行苦奮迅不能留而秉燭宵訪至丙夜已歴五六十宅啜茶計不下數十甌耄倪序拜興俯至疲甚矣雞鳴起盥就餔思懋而行於今尚能意貌其門墻池館童兒婦女奔追絡繹聚觀嬉笑如昨日者今年夏思懋來鬻縑都市將歸謂予曰子能記吾伯兄之狀乎予曰修而黟子能知吾伯兄之年乎予曰計今當為七十也笑曰嘻明年孟春之廿五日其果然矣然念吾宗之五六十宅者扶老携幼稯稯而來與夫旁舎之夫婣連之屬其牽牲挈卣爼臠而割鮮者固已爭先而竢隙吾之庭亦既盈矣若夫祝嘏而嘉告葢亦闖吾門因陳而蹈襲以饕一醉者耳吾以俳優畜之幸吾宗之有吾子也能一灑螭頭之餘泚吾匵而歸驚肉眼以高仰振里耳以收聲吾伯兄春酒之醺其亦一快也哉予諾再拜書之平陽馬氏族譜序平陽馬氏初無廟也廟自良臣始初無譜也譜之亦自良臣始廟在平陽予不及見之譜成於京師予見焉葢良臣欲見於予也良臣太學生年與予若然入吾室揖吾必降等不抗坐必東向不即賔位口吃吃自道弟子甚恭道遇下馬立道側予固辭佯諾而去後遇復然不少改予固無所取重於人而良臣乃爾思欲報之已而持其宫諭劉公之文示予葢譜序也曰願有述予諾焉予觀太學之士幾千人搜經剔史作為文章以逐時好而羣進取方汲汲然與日晷競而遊談謔浪玩日愒月皆棄於時者也而況惟譜牒是急有不笑其迂者乎然自吾觀之吾之父吾知之吾之祖吾知之吾之高曾吾能舉其諱亦可矣又進而上其世愈隔其知益鮮夫其所以生生而至於有我者吾不知之可以為人乎此譜之所以作也嗚呼彼進取者視此果孰迂乎吾將賀良臣之獨迂也而次吾語於其譜之後慶靳母太孺人序吾寮有母在邸養者惟吾靳充道一人充道丹徒人丹徒雖云南北孔道然尚逺京師二千里太孺人年七十有八以無疾疢之嬰嶺海之隔獲以迎養于斯而際恩封于今兹充道固私竊自幸以是賢於人也吾觀充道魁南畿至試春官對大廷又皆先多士入翰林職史事作為文章有兩漢氣是葢丹徒近時所無而又敦渾深厚善自藴藉人視之退然若無能者吾固喜充道之將大有為必有賢父母如太孺人者為之也且天地之間必鬱蒸堛坼而後祥物生焉葢不易生之也於人也亦然太孺人事温州君娠而弗鷇或鷇而屢殤而生道遂絶至於置姬他圖無不為之及宦温之日而充道生於是而凡為娠者十有六年亦幾五十矣人以仁者必有後歸温州而識者又以為太孺人十有六娠而畢竟有待於温蓋温州有鉅海之浸丹徒有長江之遶合是二氣於其身而後生也吾又於太孺人生充道之竒賢充道也夫地為世而生祥母為國而生賢其致一也祥之於世固無所大損益也而麟遊以名鳳翔以名且與斯世相為終窮凡壤累百莫與京焉然則太孺人享充道之貴將百齡以登于岸而後且有聞也今兹之封特其兆焉而已吾又於地之生祥其理同者卜之也充道之邸於吾為近而太孺人夀期乃兹月某日羣寮有酒在尊且有詩也將躋其堂而謂予雖陋年差長强使為之序監察御史鄧君考績序監察御史仁和鄧君良臣予之同年友也今年某月上其初考于其臺長翟公李公二公進吏於庭閲稽故牘而問吏曰二年秋京師大水決隍至陊其城三年復其高深上用旌賚時遣鄧御史乎曰然四年西城虞候奉若指使無宿姦偷内帑之積估為官食時遣鄧御史乎曰然五年湘湖積儲往稽其算新陳融通時遣鄧御史乎曰然二公喜相謂曰古稱迂儒僨事非儒之僨儒而迂之僨也迂必泥泥必鈍鈍敏反也泥通反也斯僨耳矣至受責與庸夫等耳臺中人恒謂鄧御史通鄧御史敏其才識用之當有大過人者如今考其言果然世謂人難知人果難知哉盍書曰考上上乃符部上其績于朝時朝廷方難江西行臺之代詔選其可持節以往者二公又合謀曰江西賦出不加於全呉貢無包篚織皮珍竒之麗無齒革羽毛魚鹽磬具材木之富計其幅員不當川陜三之一而又無苗髳戎貊為之邉鄙甌婁窪邪互為歉豊無赤地不毛之歲土綿力薄無飛鷹走犬彎强用長帶劒之民宜其易之而反病之非以其俗之酣於嚚耶噫嚚不足以病人而人自病之也禹之治水也天下之大患銷於行所無事而已庸人多事一方之嚚亦足病之悲夫臺中人恒謂鄧御史通鄧御史敏業已試其端矣既通且敏尚何多事之有江西必鄧御史行也明日乃以入請而同官劉公竒方為酒合羣寮樂二公之考稱君也是命適下公竒大喜曰竒事也上且知君矣可書使吏持送史院予知君舊也留其事又為序以歸之鄒氏䨥輓詩序䨥輓詩一巻輓崇仁裕菴處士鄒用明附以王孺人故題曰䨥輓云處士之子上舎懌持來示予予考其歲月成化十四年處士殁更十一年是為𢎞治元年孺人殁處士之殁於今十有八年孺人之殁於今為八年而詩又皆今之士大夫為之且非崇仁人也即崇仁當時哭其喪而臨于壙者今其零落凋謝將十五於其間其存者未必能能者未必崛然興思而為之詩也況距崇仁數千里之京師哉古人以喜不慶憂不弔為塗人塗人云者或面而不相名或名而不相知皆可以為塗人而非若此之相越且疏也以過於塗人之疏而為痛哭悲哀之言其為不情也亦甚矣而亦何貴哉予因謂懌曰宜毁此懌泣曰毁良是然而不毁亦有道也驥之行也一日而千里青蠅附於其尾亦一日而千里不然尋丈間營營一物而已矣今吾附吾親於是安知不有驥也耶吾為親佞也不知其他予恍然思其言甚質為之書其事學古劉先生榮夀詩序學古劉先生吾始不知其何如人或曰敬齋之子也敬齋之潔已近世來一人而已其判金華時體無完衣而寒之劇也温足以氄爇蒿加手於其上至不可忍則貸民之毳舄以行歴數置而霽裹而識之郵以畀其民而其守雄也輒與過閹抗抗至閹怒而搏互無少遜閹以聞逮至闕皇帝赫然南面清問之逆鱗之下無爽其初而亦自是不復歸鄉井先是母喪不能舉女之不能歸者三人身後有遺悲矣賴先生勤身節縮授徒取直日就補苴而喪之葬妹之歸田廬之可生者亦既鞠育夫今鄉進士御史君二人者嶷嶷然以長也而又自能起名鄉書教武昌武進有成擢至翰林孔目年未六十而歸又二十年乃以御史之貴為封君與王孺人偕榮于燕閒歸宿之境明年年八十矣尚無恙也日猶課諸孫以燕翼劉氏於無窮嗚呼敬齋之盛盛矣然於劉氏若無預也而劉氏微先生將不為編氓乎不可得也御史同予丁未進士入翰林為庶吉士先生自家以十詠抵御史屬予和予覽其體裁類杜甚愛之又聞其深自秘重不輕以畀人意氣嚴毅不減父風其不蹈父之軌者葢其所遭之時不同而然耶抑亦天之所以福劉氏也劉世籍安成湖之最西境於京師為僻逺先生未封時御史按雲南嘗一便省之兹而再閱數月是為明年暮春之初又御史思歸省慶時也先生雪髪繡衣晩榮而夀御史歸乎樂也然其自所抱負終身局於支撑劉宗若斵而小之今已無及矣誰無追惟而鬱鬱者則其所倚重於御史獨飽於其一歸而已耶予知御史最深故不避而發此序之以為先生夀言而不文則珠璣爛然有以掩我亦固非以文為競也送楊君知新喻縣序進士始仕必達官豈惟自祈其然人亦莫不祈其然南部郎曹臺屬亦達官也必曰吾奚不能為北既北矣居數歲見部寺臺之長其初亦進士也慕之或陟而位於外必曰吾奚不能為長而擠若是人而非哲且賢與悶悶不慧者能無是心哉曾不思進士仕而為縣者必先湔去其始為進士之心甘淪於丞簿卑冗之伍日與之浮沉從事庸汚狡悍如近溷如蹈蒺藜然將包荒之不暇也郡督郵至槩以揖焉部使至槩以跪邀於途焉吏抱案巻其前槩以署焉又不幸逐逐其欲以敗事又槩以蒙誚讓焉又嘗與為進士者遇而於吾為轄其忍為轄槩以丞簿而不吾異也暮而入内愧其妻孥婢僕噤不以言焉如是而南部郎曹臺屬甚樂也不必北也居數歳而陟於外甚樂也不必部寺臺之長也其為縣者又曾不思羣試於禮部不幸而不得進士固亦丞與簿之列也固亦有逆吾之荒而包之者也如是而為縣甚樂也郎曹䑓屬望之登山然部寺臺之長望之登天然其處既卑其警益集其心益危其欲益易以足力益思以奮而功益因以倍者勢不容以己也幸今天下用進士為縣十六七而以功起為達官亦十八九遂至於元老亦有之是其成也視始仕為達官者不惟等耳或反過焉嗚呼縣於進士亦有功哉餘姚楊君居敬將知新喻縣君進士也翁君應乾與有戚謂必得吾言而後進士為縣之義始白雖然翁君不鄙予予之同年友也楊君世宦家又閱歴滋久而吐茹皎然得無以發蒙視予言乎送僉事陳君湖廣提學序書紀禹之徂征有苗易稱高宗之伐鬼方而商詩殷武亦歌之周宣采芑南征之詩春秋桓文陘濮之役皇帝王覇之相承若將不能一日忘乎衡巫江漢之間者古之人亦何急於得楚哉以為都則僻以其地則田下中而泥塗多沮澤以貢賦包篚則羽毛齒革惟金三品出於他州尚多有之兵者聖人所不得已而用之者也然則古人亦有得已之兵耶於乎此古之人所以動於此而其幾應於彼發於一時而其憂及於千萬世者歟詩有之崧高維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰言崧之為嶽邇於王都疏甸之既久望秩之必通而其神之歆之宜其降而生賢焉若以為答也夫衡亦嶽也江漢大瀆也其尊豈亞於崧高哉顧其僻在南陬況不順者馮焉皇路為之不通廵狩秩望之禮曠焉其神氣安能與中國相為流通而尚望其有他乎哉故其所以不能一日忘者疾不順者梗之也討不順者將引其嶽瀆之尊而匹諸崧者也匹諸崧者固將以生申與甫者望之也然不必其身親見之者公之後之有天下者也然而更千百年世非其世而廵狩望秩之禮移為封禪禱祠之儀雖崧焉不免為明神羞而況於衡乎故唐韓愈氏僅意其有魁竒忠信之民生其間而猶有未及見之嘆夫申與甫豈特魁竒忠信而已哉則其未生而有待於今日之盛也可覘已有之亦未必不出于黨庠術序之間而其董學政者果洞古而照今歟宜可坐而得之而為天下賀矣太和陳君文鳴由刑部員外郎簡當兹任君前為庶吉士於予為同舘且同鄉也信其洞古照今而於是乎有遭焉因同官之請贈行也而獨以是告文會贈言序金陵龍志仁由刑部員外郎出僉于浙志仁豪傑士也浙大藩也僉事憲臣也議者以為豪傑之才用則無其不可為者未也然必得大藩始有可為之地猶未也然又必持憲節焉始有得為之權而志仁亦欲自試之以答上之知也别其友以行於是其友之雅與文會者凡二十二人人為一詩以贈題必以浙之勝者志志仁他日次第之所歴也而其經緯脉絡予請為志仁商之夫人北道赴浙者必自檇李入春秋之末呉越於此日尋干戈爭尺寸焉今則東南孔道也則夫天下可以為有一定勢乎哉孟子曰所惡執一者為其賊道也可不省諸而于是時當迓者至導以入會府之城其於古也為錢塘即而行禮上之禮越三日羣廟告至讀表忠觀之碑循蘇公堤拜武穆之像于西湖之上奮曰予何人哉庶幾臣節可勵也浙分東西為二道僉事歲分其一焉度浙而北泝者為桐江姓是州者誰也載求泰伯祠而鞠躬焉廉貪起懦于消息盈虛之間盍於明月泉驗之其然耶要今二千石無有慢遊以病民者有則必誅扃謝公樓窒白石洞弭綠波亭下艤舟以嬉者其嚴乎使蘭亭諸賢尚在亦當減坐中觴咏之七孰為曹娥江之廟驄之過也式之式清風嶺之祠訪林逋之宅亦有築堆讀書如顧野王者乎則駐節賞之而或舁夫所指有吹簫臺焉呵之左道無緣而入矣浙澤國也浙東之鵞池鑑湖剡溪浙西之苕溪葛洪川淤者必浚圯者必完奪于豪者必復舉以利民焉使民如歌白公歌之志仁可以告成事矣而今而後天下之人益信夫豪傑之才得其地與權真可以有為哉而凡二十二人之詩亦非徒作也若夫考績幽明之法則上與當軸者事也予何敢與志仁亦自不必知也圭峯集巻三
