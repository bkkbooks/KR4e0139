body:
  text: 圭峯集卷十九明羅玘撰墓表監察御史彭君墓表𢎞治十四年冬十一月十有八日江西提舉副使邵君屬饒守李君二守鮑君介何生徐生走南城抵豫室命表故監察銜史彭君之墓且曰君里世他行葬所歲日月有編修程正之志銘在惟君貞臣臣行首貞願表于其墓告來者為饒士世世勸豫既泣泣已思邵君為户部時常别白時之忠佞若涇渭然至君則曰此所謂渭也至其指為涇者則又若仇敵不少貸今兹果然既又思君平時言笑嘻嘻劇飲歌呼遇人無爾汝見其肺肝無留畛或坦坦夷夷人或易之豫獨曰是非其性要有藴藉耳成化末同舉進士日益追逐相唯諾見時有附閹貴驟至要樞者有苞苴徑內降補官者謂曰是不可鉗之于市耶至雜他同年則竟日寂無所指斥者豫於是益覘君𢎞治改元之明年擢河南道監察御史巡京城之內外暨近畿橫亘數百里降人營也歲朔風塵起馳騎彎弓掠人道上事泄索急則扳戚里閹奴為援匿優伶家為恆君每得其機牙發之竒中人驚為神始改觀悚息用薦出巡浙之鹽法豫時奔先君之喪過之浙之人曰是御史公商竈其兩德之又曰是御史不可干以私六貴人助富人奪人妻弗能得豫喜曰是將嶄然矣豫免喪至闕則𢎞治六年也禱祠事興上非其好也乃閹之黠譎入之自擅睂目標搒鼓其幻徒日食于大官不嗛又假供養莊嚴縻耗百貨延于大農之錢方酣君時監光祿寺事奮曰吾不能默默以茍活刻時日至于大官雖重得禍萬無恨明日疏入謂宜一切罷革儲積之以待變仙釋幻惑其道左且不根語觸諱忌群閹銜而持之遂下君錦衣獄舉朝震駭莫不服君之忠而危其禍英國張公獨首白辨君無罪宜貰諸大臣助之上意乃解然猶編管邊之隆慶衛伍在伍惟以母老羈京邸為憂明年詔釋歸養其母吏部尚書王公建議起君行召君矣而母李孺人殁未及葬君亦殁逾年一子希龍又殁天下莫不悲其禍之烈既又莫不惜其不及召且大用以沛其施且惟希龍遺腹子天錫是嗣方三齡也於乎天難諶斯人事之入于無窮其不可知其穹碑大隧之加於斯有也抑榛莽之蔽狐狸之窟而或夷而為墟蹊坎竇亦有也甚而陵谷之迭與為變亦有也况於兹墓乎則夫貞臣者固世倚以為重而亦其身之有不必芘歟然君之字書與夫歌詩雜著天下莫不存君之名內自六宫外暨蠻夷海裔莫不聞史氏當不有遺也而邵君又率其屬為君世世之托君其可以無憾而安于此惟豫弗任厥職亦惟曰祗服邵君之役夫人李氏墓表夫人故都察院右都御史馬公配也姓李氏諱某字某與公均汀之長汀人曾祖某祖某父某母某氏皆生夫人與所自生者也男緒入粟為郎綜醫學正科緝府學生維以蔭授上林苑監蕃育署丞孫男文明文英文欽文昭曽孫男京城師女大妹適國子生周韶鳳孫女劉姐適鄧翊細女適鄧儒三姐適徐明六姐適廖本皆府學生周妹未聘曽孫女七九長皆夫人生與所生生者也初夫人生母坐蓐見肉胞如毬狀甚訝之以為是必物怪之為者急溺之浴槃中須其絶姨救免須臾又溺如初鄰之二三嫗走視之驚曰是肉毬也諺讖有之凡毬生者無男女必貴必刲之出以浴母不得溺付姨浴之永樂壬寅二月十六其日也稍長凝秀端慧壼闥閾外跬迹弗及臧獲鄰並至不識其聲况見其靣及所攸為他日嫗有入李氏擕其翦製組刺輕盈綽約出見諸戚諸戚爭傳以為式或又醜其陋則憤悶不欲見見即咨嗟以為不能為久之前所述讖二三嫗喜相慶曰讖其驗乎吾其不妄語已矣既笄歸公正統甲子公以禮經魁福建乙丑登進士入主户部事以夫人來主內事公得悉意于公入如客主夫人曰是不可獨吾力諸乃益一側室顧氏為助力益衆賓至公得叩檻呼漿茗咄嗟膳羞移日賓退宵寐安安夙興入闕旦晝坐署處分暝歸咏詩歌于于施施以為常公擢郎中遷四川參政遷右布政使尋轉左布政使擢都察院右副都御史巡撫湖湘夫人皆相如初以行及公翻然思老得詔加右都御史夫人得今封以歸則又贊公曰必如是必如是公營夀藏于城東八里之樂丘時與夫人籃輿徜徉其上顧曰樂哉是丘百歲後吾與若同歸于此夫人曰幸甚敢不惟命𢎞治丙辰五月某日公卒葬焉後七年壬戌五月二十七日夫人亦卒春秋八十一某月日緒綜緝啓以袝一如公命越明年癸亥正月二十日訃始至署維慟絶曰吾顧出也吾幼不知誰出也緒也綜也緝也吾母於吾固同溫且飽也無擇也婚均吾甲乙氏之族也奪緒廕以廕吾也吾不得視吾母之斂且殯且葬也於乎吾罪也既已又屬鍾選部曰若吾戚也若其謀所以揭吾母之章章也選部乃入吾室且述曰維之言然豫校南宫選部豫所得士為知己其豈我欺於乎患天不降祥祥不患虛患人無施施不患人之不知觀夫人又觀維二事吾益信之因為次之俾鑱以表諸墓噫止庵詹先生墓表豫少側聞正統之季雲南孟養用兵有上言其將帥失律張皇病民者天子大嘉異之詔即用往參其軍事事雖中止然一時名震海內將卒懾懼用命克底成功為時一助蓋校官也而失其名及官于朝聞諸長老言知為詹君名英字秀實也最後乃得其孫大理左寺副習言之則君也殁於甲辰六月某日今二十年矣其言事時方訓導于蜀之會川會川與雲南接而君之僑寓在貴貴兵入道也害之切于肌膚而事之熟于備嘗然孰敢出身當之而君獨言之實竒士先是疏言邊務十三事皆已見諸施行而在職以俾夷為華為己任會川夷陬也有貢與科實自君之教始人用是信之知其非一旦偶然發者其始聞詔也恐事掣肘非便自詣闕以不可狀辭公卿聞其至皆欲識其靣或納交或招致為重客或欲薦以臺職處之會己巳之變止歸會川滿考轉雲南河西教諭雖去蜀猶憂其患疏薦可撫蜀者侍郎張固上可之蜀賴以安其憂世不少置多此類初貴之學以宣慰司置戎衛限不與君時尚少以書抵都府擬請如司例行之著為令君首事發解于雲南士疏踵起起必曰是由詹氏詹故玊山仕族也宋多聞人洪武中始以定襄知縣坐纍謫戍于貴遂為貴人於君為王父諱珍寶定襄生處士諱源是實生君君生三歲處士識其非常兒取目前器物人倫字類引聲指訓漸及于逺引物連類旁推曲貫約久截中泛抽試之百不失一因驚喜知詹之將必復振比少長從童子師遊輒難以駢句無不落聲而應或若天成古文竒字惟其目所流注矢口縱衡莫不如志貴寄蠻壤為藩庶事草草竒童崛出咸訝瑞降以為興端時同舍生號王三遍者三遍者讀三過之云也後以君偶之曰一覽一覽云者尤殺其數之二也若曰過之之云也積數歲學益進發為文章氣盎盎熏人宣慰宋侯伯仲方擅文場壁立堅甚獨開一靣納君王後終教授雅有盛名終身不昌言為敵君葬城西原王為志墓焉君年止七十二距解官幾二十年始娶于楊繼于段封大理評事木義官米其二子大理左寺副恩程番學生惠其二孫適學生陸鄰適鄉貢士張宇其女與孫女雲表雲章其曾孫也大理又與豫言君純孝天至至老歲時忌奠悲啼如少時散所藏以家室族之人與其鄉人往往折負償之劵嬉笑臨之擅丘壑之趣於壺觴歌咏間有止庵先生藁行于時此則君之高也茍不役於物者或能之至其大節憲憲在人耳目則有不在是者於乎己巳之先變未釁也而四方亦既騷動日入于多事矣而疏逺之小臣有能奮不顧身言天下事如君者而天子又能聽之不徒聽之而又用之當時大臣不徒不嫉之而又欲薦之是可謂不諱之朝而言猶不壅于上聞也故雖遭是莫大之變而卒亦莫之能災者豈無自哉大理丐表君之墓豫於次第之末因併載是以志敵國外患法家拂士之有益人國者信夫正所以旌君也吳母駱氏孺人墓表蒼梧吳孺人進士順德令廷舉之母處士英之妻駱志榮之女也殁且葬今七年矣廷舉始克以狀乞豫表其墓始豫遇廷舉于太學秀而修臞啖肉不盡胾葷辛之味少所御尤不樂戲弄百玩本其自曰吾母教然今既往矣與之語穿貫經史若炙輠然曰廷舉少失怙恃吾母以生遣學學宫宵則爇燭治女事因督誦讀五鼓復然如是者庚子得鄉薦乃止兹不酬母志大罪也間嘗泣豫曰先君蚤世時吾母幾欲絶以廷舉故少能支然猶三年眶睫不時暵闔扉屏接見衣絺苧蓬弗櫛垢弗沐也丙申歲廷舉遘暴疾奄奄神魄殗殜無幾羣叔欲具櫘止吾母禱藥費卒不得營益急枵腹自朔旦達望晝夜不少瞬諸母更畨迭休弗能支嘆曰神也廷舉賴以活不肖軀至茲成人嘗指鄰貴歐轉運第扁恩榮字曰渠何為者而何為者即不逐晷自策勵流而日月當與鄉人徂矣而母尚何歸耶時家已索莫歲連大祲仰哺如堵而其師賓問遺率如常不以戚羣叔浣滌紉綴除敝更完字不肖軀者不後他學子惟少懈防護至綻汚闒趿必褫而責之然亦未嘗顯撻也於人介取而多豫他學子有以書遺廷舉者輒怒還其家不留宿尤不喜紛華熠耀嫁來之衣三十年尚襜如也花晨燈夕梧土雜遝遊觀以為俗惟吾母酷惡之及今亦有化之者而此其凡也不知古列女何如耳而夀止五十天竟何為哉嗚呼廷舉所以悲而重為知已告焉明年丁未廷舉與吾同登進士第又明年戊申出令南海上由洞庭上郴嶺歸拜墓下欲買石刻其事而狀來豫憶其前言與兹狀合也聞於粵人詎一二且習也豫無以拒之矣抑豫肄史館者也假而筆豫屬也續更生之序敢讓乎雖然有子矣不但已也墓隧之碑庸詎知無掀揭天地者為之乎書而歸之使刻石以俟浮梁黃處士墓表黃德恆諱秉彞浮梁處士也家縣之景德鎮鎮之人以萬室陶天下自景德之陶盛而諸陶廢天下民用日仰于景德挾其有與技來集至天子亦出中官監製上供甲品設行監其地以故互市日繁貨泉流瀦而四方謳歈戲弄百具染及氓𨽻為楚越交巨鎮然其利之擅皆土其鄉之豪也黃氏世不酣據之處士生首暹之行第屬統宗衆方以讀書用世為的尤以意示宗衆無逐鄰為射利賈多怨或為市習所染時因事陰割已蓄以歸宗之貧且厄者為率而口不顯及楚之俗瞰貴富者之墓夜坎之內父母骸其中思齊焉曰侵地中之者立蒙禍敗祖一常遭之羣洶洶擬發驗處士付禍于天不動踰年生事倍豐羣洶洶者愧默息務匿人垢瘢而婉導曲成之不引任為己德一弟秉忠終身賓之不忍分割而苦俗風簸煽輒蹙額弗寧竟堅鎮之延及白首以勢不可而自竈取析劵內櫝中緘之棲梁木上泣且數日最晚以齒舉賓鄉飲孝宗初恩預冠服歲時縣舉飲入縣飲飲已明日入謝謝已屏出迹每出鎮人以為祥門之左故有橋上度馬或墜宣德中割地以為衢而橋亦廣之稱是鄉人至今德之名之曰步雲橋志黃氏之興也子琳孫嵩峰巘峸孫女三曽孫男六𢎞治甲寅十二月四日年八十九卒葬里之唐塢其祔則孺人朱氏也始將葬嵩時以鄉貢士試京師乞銘豫以館事辭豫得告歸使日月至乞不置比復館嵩已宰臨湘乞如豫在告者正德丙寅秋自臨湘來上考功第請曰祖墓築堅久弗忍內銘矣謹礱石焉俟樹表也豫尚難之乃涕泣言曰嵩微祖無以有今日遂盛言其遊心振後暑不求風寒不求燠玊嵩與峸期于有成嵩塞不通於逺近吾百里則無之貴弗掩是焉爾豫曰世有姦雄資利近便田宅自殖焉者忍自其兄弟親戚乎侵之曰以遺吾子若孫其子若孫有能卒享其遺者乎嵩之言然處士不為衆之所遺其遺也乃若是其諸異乎人之遺之與因次嵩狀為表畀之歸鑱諸礱之石薑孺人汪氏墓表成化辛卯某月某日薑孺人汪氏卒葬里蓮華石之原至于今正德丁卯凡三十七年自辛卯距正統丁巳始女于薑氏壁在薑氏凡三十有五年生紳綬綰男三女八􅀢鳳清漙汛浙泓孫七孫女二自丁巳距永樂己亥是其生比卒得年者五十三汪英濟王裔也王始迹于歙故王裔多布居歙婺弋陽之間逺有代序而自西里之汪獨盛于弋陽國初迄今稱長者曰庭實曰朝章曰韞􅀈凡三世蓋孺人曽祖祖父也母縣馬鞍山徐氏故大家在湖以東俗好炊熬菹醢脯臡鎊㔅根實為百物狀出飲賓為名髙而閨姝類日繡組鞶纓誨諸姻族若釣來聘者孺人幼已知薄之姆如母言日引同事外雖不違而心竟惡以巧作鑿其真曰不有內則者在習乎益肅於步履而嚴於笑顰薑學訓同里與汪潔大者恐失之以媒入韞􅀈遂許壁既歸姑馬氏喜得婦以內事付之乃與學訓出教德平多其歲時如在顔靣或遇代過家周視堂廟壼奧鼎簋羃帟翼翼垂垂大綜于庭僕趨於下斬若官署見其鄰媪親英與講貧下嫗叟具賀曰賢婦賢婦雖其父母口不宣言然亦幸薑之內政自其家施之而自慶汪之有孝女暨逮終之哀比諸兄弟其骨肉之愛終其身如初壁以疾卒綰方六歲有竒氣出諸兒心存之而不弄以他物興居食飲意向以矩度自念曰吾以是兒昌此室逮疾革猶在念綰時未室出金盞曰以婚爾綰悲率由無怠至起進士官南臺御史發寺人宗姦蹶而復起守荒城計摧女猺奄至之鋒如掃敗葉事聞朝野股栗其究也坐籌苓苗卒定兩江時方屬當一靣以起天下之懦而遽以河南按察使死天下識與不識為世悲之曰玊卿玊卿玊卿云者其字也始玊卿病豫處分立諸子曰爾哀吾之死耶未若哀爾祖妣之不傳也我死毋以羅太史銘若爾吾哀移以表爾祖妣之墓吾瞑目矣至是請果走汛來如其處分語於乎死不忘親吾其何辭遂次所授劉絢狀付歸鑱之墓庶幾覽者知有是子必先有是母也清鄉進士暨汛以下褎然孺人之澤方瀼瀼云圭峯集卷十九
