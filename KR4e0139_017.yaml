body:
  text: 圭峯集巻十七明羅玘撰墓誌銘雲南按察副使邢君封孺人李氏合塟墓誌銘君邢氏諱纓字文甫以名故號濯庵當正徳五年七月二十三日年五十八卒於雲南按察司盖司副使也喪還黄梅訃至留都子刑科給事中寰袒括為位哭謀歸筮六年某月日合封孺人塟縣某之原孺人姓李氏諱妙媛年四十四當𢎞治八年七月初七日卒用權厝儀而石未誌爾乃序仁貴生仕聰仕聰生贈知縣暹娶封太孺人周氏為其曽祖祖父母序孺人繼孺人操氏為妻序寰完宷寵為子許宛彬周渭陳晟吳琯為女序進士長洲知縣山東道監察御史福建道監察御史及今官為官試戸部采純皇逸事於河南清兩浙軍按陜西閱本院章奏為事讞縣積滯獄脫垂死囚覆逋租餓民民以不餓死浙部赤籍鏡徹蟣虱可櫛西陲肅清為績白父寃壁立叛閹烈熖間三年為行序孺人父李某母某氏槩見于吏科給事中毛君之狀泣捧拜請曰孤父若母自是有聞乎繄公不聞乎亦繄公公銘不銘惟公予不覺亦泣謂曰狀若斯何畧也亦知大學士王公乎予與而父試丁未公在院夜得巻驚以為雄州士大竒之及名揭黄梅也出語人以其句黄梅赫然有名聲自是始羣居予耳而父語當世及古籍目所放為文詞俯首渴飲恐日昃同河南事丁宗仁死無嗣丁氏以道逺難其喪之還一日喪忽至木美舊裝如去時闔室悲且訝僕曰一邢父之為士林義之間亦忿吾榜人獨髙出者予奔先大夫喪所過城邑匿不與知舊接至長洲瞑舟方弛楫炊俄而呵從擁翼駐磯上炬影炅炅頳顔叱舟舟中人踣半逸半予堅匿免怒去乃櫂數置訊之置吏曰吾宰事每纎跡其影而鉅跡其響胡避乎比三年會色猶弗懌今尚畏之在任陜當巡延延以鋒鏑為食飲會大閱以一矢興中的又以一矢射堠堠仆守臣連呼天生豪傑者三而予每遇秦人曰真御史曰真御史而今遇滇人曰鐡面監司謂而父也寰收泣謝曰如公言孤復何恨又曰先大夫蚤嵗屢北南宫歸母埽除備漿茗賔至出飲之而已而口未及利鈍事既禄食損抑百需以佐費廩餼薪金常郤入曰公家得微有急乎公謂黄梅藉先大夫出名聲而未知先大夫名聲亦有所自出耶又曰先大夫垂生夕也隣之叟夢羽衣金珮薄吾堂寤而驚走告焉先知縣君亦驚曰吾窺見金甲神官涖吾東隅已而先大夫生予曰噫異哉哲人之生也其卒也奚宜褫銘而寰又塟與禮合予義寰兄弟等奚宜靳銘銘曰天為降祥而生之已試之世已顒顒而望之然有資焉若階也不可以躐躋有内焉以相之又若嘉樹焉折而先萎然遂止於斯則胡為而生之天乎斯墳乎胡為故潛川處士孺人胡氏合塟墓誌銘正徳五年四月十一日金陵七十七翁袁潤徳卒十二月二十日塟江寧縣髙寨村子九江推官經實尸之而以母孺人祔孺人加翁一齡先以四年閏月之十二日卒計抵郡經來奔以狀屬歐陽庫部來告曰吾母諱玉烏程甲族故也曽祖某祖父斌父忠母孟氏經生某鉛生保其男適楊瑋適鄉進士胡瀾適百戸葛昇其女吉善其孫適郝拱宿適百戸葛求其孫女應龍應鸞應鼇其曽孫銀姐其曽孫女願公賜之銘予度弗任銘弗應庫部速弗置久且懈及是經又以狀屬錦衣房侯告曰經將合吾父母塟焉吾父諱瑀號潛川蔡國忠毅公弟都督僉事義之孫隠士勝之子母吕氏也子女孫載前狀且哭曰吾不及遭公公不銘吾父母吾何言吾今及遭公公不銘吾父母吾不敢以塟公又何言哭載路去而以侯留侯乃盡經癖狀予亦識經癖莫破也憐之然了莫悉翁奮問侯曰翁將種也其為將家態乎曰否翁儒服而儒言人至與之居覺若飲醇酧無不醉飫而退者至諸多空寂服食之說或時偶出之有問者輙變色而作曰吾習而不用賢惡用是其多能若是乎曰然然其妙在活人之生而又義不聽人之報淮蔡之間至今神之且徳之其業之然乎曰否母嘗瀕於危醫林立莫措手因檢方書一飲而頓愈終身遂樂攻之而致若是其良爾孰敢以業目之然則惡乎業乎曰業乎田業乎牧其既饒也斥其餘以與廢疾餓者若棄涕唾然其在人耳目者迎伯父母老焉無異父母也吾不敢譽也予曰仁哉他日庫部亦來速銘曰吾主袁氏二朞矣吾見其僕也其衣袂也襜然其屨綦也􅀢然其興俯也有度而言不及之退伏墻屏間凝然及投之以餅餤莫不歛衽而避而吾訝之跽曰吾主母之不忍賤吾身也吾又忍違其令哉旦莫婢之炊也竈煁之突煙則燂之匕之掠釡也有聲焉爾矣予驚曰嚴哉噫合一室而處是二人焉宜有經也若而人而出矣經舉應天推郡為江西最雖欲不表見於世不可得已顧不欲表見其親邪而乃癖主予銘此又何也銘曰奕奕穹室衆庻睨之戎衣逢掖以時曳之澤逺而斬敝其藩亷日綴月完胡不内占斬斬外内人謂袁宗後先考終有崇者封故封都水主事豫軒翁墓誌銘封都水主事八十三翁號豫軒姓都氏諱印字維明姑蘇閶門南濠人蘇以地最天下以閶門閶門以南濠南濠以都尉諸氏都尤以節槩傳髙廟初文信至能當婦翁殊死時代之生彦容作月樓濠上顯名當時得尉氏妻之人謂連綿呼兆當有竒𦙍翁生異質天成目數行俱下十二三能賦詩鼓琴日陪諸老宿杖屨為適長遂酣飫超越太異度非支離陸沉莫救敗然苦蘇故吳會易聲張曰吾以淺示之乃挾易詩禮三經從鄉業舉子者游幸一不利即諉曰難如是棄去去就里塾集羣䝉訓聲律髙門大姓爭招致悔曰是謂畏影而逃日中可乎又謝去以醫浮湛閭里或少露芒穎已病如掇萌然旬日喧騰神之詭曰古方偶中爾隂自擲餌劑掉手詈曰乃幾敗吾事遇為道士說者過境喜乃便旋與之周遊講說服食卦炁支吾嵗年至子穆登進士官都水賜封乞南得武庫便養欣然來就曰吾今脫蘇吾知免矣居二年以正徳三年六月十八日卒配姚氏繼朱氏俱贈安人穆穂其子元翁次翁其孫祖齡其曽孫女二人谷源茹喆其婿卒之日穆當考先入闕也穆歸諏十二月某日扶塟縣薦福山泣謂玘曰子知吾翁吾翁須子銘於乎玘忍辭知翁哉昔頻道吳下人言翁居室極奥窔隣竝婚媾無一飯過逢乞貸泉布日湧出至落莫不悔穆既用世差變易終以咈教愠之其泓涵溔淼障窒牢宻及間為籕𨽻罨畫暨諸小藝臻妍逞妙盖滲溜滴瀝有不能盡秘者若占辭前知則又自負神授也是夏五月戊午晨興卦之遇損之睽占曰立土頽淵三年暵其田二女號轅鬼車其前赤古下然厥載用顛擲地呼穂曰吾其已矣乎其速以吾木來六月大暑灼地不可耐得寢疾昏弗辯物藥食咽入懵然已夘日中忽作坐無苦也呼蜜孫以蜜進呼茗孫以茗進咽之如是不火食者七日甲申僕自蘇來入報木至遂呼具盤盤具入浴浴畢喜曰快哉吾其蟬蛻已目遂瞑豈道家者所謂蛻殻解者歟所著三餘贅筆衛生家寳存于家銘曰彼有風襮其憂憂藏此有潛伏其憂憂章亦各其志君子考成卒謂藏之者臧故蘭雪居士墓誌銘蘭雪居士宜興沈氏諱㬢字某家縣之黄瀆瀆濵震澤澤旁近地衍沃可丘以毛者疇以稼者瀦以漁者十故入沈之二三故其子弟雖緫丱不能無分釐務居士於子序屬孟而仲暉叔曄皆學學宫祖妣徐夫人名能家而好隂别後昆勤惰昬明得居士所釐務治喜召子彛婦崔居士父母也謂曰吾為若喜有子矣沈其興乎長果大封殖積嵗久衡磷量利至日不勝輸貸者之應值時嵗歉則常坐餓者旁室中且籍且糜而負槖以歸者又屬於途久而縣亦以其酣於義奏承事郎以官之其墅遊所厯淖道圮橋經目者無寧須臾成之咸自帑出其心汲汲於利人然義鋒凜凛善剜剔人紛結人帖帖抑首去處人所宜依違劃截成敗兩岐可配蓍蔡自敵以下畏有詖行入其耳甚於禠祼撻於獄故一時標榜品目曰吾縣有白衣能吏在自少喜讀書不求甚解而析義顧搯擢入筋骨嘗泛舟入湘楚間碇於涯將召儈駔大事事於晝寢寐中得心痛呌號驚起追占之曰夫心身之君也身譬則家也易家人之彖曰家人有嚴君焉兹而震剝於内厥徴安在其尊者當之乎急起碇犯晨夜歸至則果然人又以為孝感年七十三以正徳二年十一月二十四日卒配陳氏子誠謹訥謨孫政孜效敷敦敔曽孫松女四人嫁吳儼臧志明楊㩝楊文賙始黄瀆之沈來自吳興至代州同知茂生贈右副都御史榮榮生某贈右副都御史彛彛生居士兄弟五人南京工部右侍郎暉光禄署丞曄弟之仕者某衛指揮僉事誠太僕寺主簿謹則子之仕者而壻之仕者翰林侍讀學士儼也内外軒裳寂容衰服哭侍匶側盛矣塟得卒之明年十二月二十日在大潮之麓先是吳文定公傳文穆公所記西林真宅繭室者謹來乞玘銘且曰是維先君之作也是維先君之所婆娑偃仰也笑曰樂哉藏乎而夕忘返焉者二紀於兹矣玘曰然乎噫達生若是哉是可銘也已銘曰身有不試而視其家若淵受注生有不諱而視其身若蟬就蛻家以𦙍延身恃名存於千百年視此銘文署指揮使王君淑人仲氏合塟墓誌銘河南都指揮僉事王佐𢎞治十八年某月日合塟其父睢州衛署指揮使母淑人仲氏於某之原成化丁未佐時為指揮使與監南宫門予藉佐得完試事徳之遂如平生懽因得講其上世官所從來而於指揮使戰功特詳正統己巳京師髙梁橋郤敵之戰天順辛巳西夏之征成化丁亥荆襄一矢斃賊帥之捷是冬建州深入之勝用能由同知而陟為使予雖不及生拜識之與之上下其議論然知其所謂偉男子也諱琮字廷用年五十九丁酉三月二十日提練卒自京師歸睢客死於臨清權厝二十有九年矣今年某月日淑人亦卒佐方坐京營聞訃慟幾絶又域于例不獲即解事奔喪又慟乃以情請歸謀合塟塟擬得銘庻其父母後有聞以予厚宜不讓以狀來予發狀指揮使凡二室首陳氏生男泰女妙圓歿淑人實入繼之淑人登之黄人父守睢選族歸王氏在王氏比卒凡四五十年年八十生男佐女妙圓嫁千戸朱諒三妹嫁指揮李珊𦙍續詵詵而佐迺統宗以能勞進秩方嶽淑人其大有功於王氏者也佐初筮踐指揮使之舊實指揮使自大以遺者指揮使初筮踐父成指揮同知之舊實成自大以遺者成初筮踐父義千戸之舊實義起家洪武初以遺者於指揮使祖也本昌枝榮益遞培溉宜於佐焉起且大如此佐嘗語人曰吾佐也何能為吾先吾父母之遺也吾父誦馬伏波馬革裹尸之語終身今謖謖焉在耳吾母自為女吾外祖異之嫁為婦吾父與為賔及為繼母而吾兄泰至忘非其出里之人則仰以為百族師吾朝夕服訓言甘如飴而試之又每騐如藥石吾是以有今兹也間亦以語予予曰聞之舊矣及是泣漣如哽塞惟拜襂襂不置若必得予言者嗟夫銘俗類䛕是以君子從而靳諸若此者非予之所能靳也銘曰沉厥世秩睢有餒鬼心祍金革玉秩世起孰相於王非生如生太和蒸蒸其世之興起秩斯難相亦匪易異歸同藏以永世世封太安人趙母葉氏墓誌銘𢎞治十一年戊午十二月先皇帝覃恩區内羣臣均得封且贈其所生戸部郎中晉江趙瑺母葉氏封太安人時瑺為主事從官封也瑺進員外郎中太安人年八十甲子十一月一日卒於家瑺奉命入東粤擬便省乙丑十月㡳姑蘇遇訃慟絶例必畢命事慟畢事必反命闕下不獲歸襄事又慟比反命因以狀丐予銘謀以正徳元年某月日祔諸秀峯先生主事之塋予許銘始懌慶母兹其後有聞晉江之葉徙自光之固始來居焉至子明積以逺故遂與光絶純為閩人子明生康康生府學生陽陽生安人及笄歸趙氏贈戸部主事森之妻生乾瑢瓛瑺某璘男子六人女子二人孫偉偃佐㒜偬信侃佑俸九人曽孫某一人佐㒜信踵瑺學偃隂陽訓術也𦙍昌宗興日就勃勃夀考令終為邦之望弗可尚已始安人入趙時屬舅殁遺季二子五女若旒絶綴有委地勢主事弱冠纉家統百身勤晝夜弗給其裻穿七折面垢髮巻喧啾馳逐一屬安人於内調虞靡不均靖姆傅冠笄聘娶嫁媵隨俗較力俾有家室無後其時主事致孝友稱繫之諸子學主事槩鞭之急安人不恱曰夫人若器然用之非宜徒速其敝瑺也其庻乎乃授以春秋俾學主事以疾卒三年以縗縞承事且悲且營輸公儲私禮周恵浹人驟臨之不覺其為嫠室成化丙午瑺舉省闈丁未黜南宫歸乃立瑺諭餘百言要以忘得喪齊寵辱樹本志大為歸瑺用服行至庚戌果上第而兹宦聲琅然隮日有待人云亦本諸安人可銘也銘曰舅之遺雛稚屬夫夫之遺戸門百需莫歉厥初後沛有餘有韡命服有穹髙年維徳斯食要終則然八十六翁任廷玉墓誌銘正徳元年二月二十日八十六翁任廷玉卒卒之前二日翁已寢疾絶餔歠餘四十日予徃候猶力支振顙吭􅀈呷莫辯子頂婦許二耳切聽傳云其丐公榮之以銘予兩館翁與㳺廿年其何辭乃諾復頷頂耳語曰吾死不朽矣至是日髙舂命頂濡筆為書若道家步虚聲者凡十四字道家者說翁生平所酷好也故以是終云翁之先蒲人上世有自蒲徙應天者至子温是為翁曽大父子温生復禮是為翁大父復禮生翁父從逺從逺永樂中携四子徙順天籍宛平之南廂得南廂之東喜曰吾其種子孫于此遂居之翁諱璘於倫次為仲出學入事日革童心母馬氏私謂從逺曰毋童仲也女任其棟諸比長果能相兄帥弟權子母居物至淮以南東轉吳會轉運交子罔不入鏹受券為㢘賈貲逐嵗溢衍大有名徐揚間乃憤業與士隔無能改於其舊入貲官帑郎四人者嵗時序拜旅飲弁鞶鞾袍粗若勲封者然裘馬器物則務以樸先羣子弟故族雖居㕓卒以不釣外染聞居随生事日就闢且逵衝也其非甚霾風霖潦旦入樽榼匪餞伊迎為供帳朝紳至忘其非郵亭者莫則假館求休蹄踵沓至外大諸侯特為湯沐邑翁益懼受詬乾沒為嫌口噤不及公家事故簡牘篇章慶贈品藻當世宗工亦間響應無為疑留性不察察為物較𢎞治間羣盜嘗夜入索翁翁匿獲頂縛脅急會頂醉沉不知導所貯盜恚刃頂額禠韡去為邏司所得蹤跡所由翁戒家衆毋張空目家衆請故曰律盜行弗得得減死我無所亡由我死不祥窶人多偵知携其子女立門外佯為窘迫不可生狀求售給直去度日月逺乃傴僂覘伺售者不則悲啼拊摩手眼偽麻暈僵卧撼翁翁不逆多立遣之暇時布殺價貿為衣木殺直市為棺貯之時其隆寒或大疫酌施之隣以是鮮祼死者與祼塟者於乎翁其仁矣哉配顔氏繼何氏孫長課次說孫女長適田玉文次納錦衣指揮范氏聘曽孫女一頂卜四月某日塟十里河之先塋銘曰生我屬我知幹厥蠱主我知慎與處時虚知取時盈知予佚多年所今息在墓故内官監太監白公墓誌銘提督光禄寺内官監太監白公年五十一以正徳元年五月六日卒於京師昭回坊之私第奉御李應長隨田雄以聞上震悼賜祭暨楮幣五十䘏其喪命左少監鄭璽奉御王恭營墓域墓在城西香山之原塟以六月十二日兄鳳姪釗鋼銳鑄舁母宗自涿來會塟璽恭懋雄公所卵翼者也上知之故疾以懋雄侍喪以璽恭治焉公疾自𢎞治癸亥移命入寺始寺天庖也四方供入泉注壑然而市豪餌奥樞為洩孔百出公至惟嗅葷薌無一㗖啐而大施䟽濬法勞甚操畚鍤者孔遂塞以是體浸尫蒸耗𠻳血縷縷下臟復敗遺為瘻痔而母踰耋年刺骨在念迫益熾猶忍支一年明年乙丑四月遂以情請不許越五日復請會寺寮入䟽留諭慰又不果許正徳丙寅用登極恩賜蟒衣玉帶為非望賞三月疾大作懇辭諭如初疾至劇復䟽懇賜復監就湯藥部寺䟽公履行宜留任寺事公至以死懇得賜就外私第果便終事方公未入寺也岐王暨恵妃薨於國公承命還其柩返徃萬里館候輿皁不知為肘腋親臣過臨其地寺事之柄良以是選公始為内使營衛聖恭僖夫人塚𢎞治辛亥預修太廟後殿進長隨畢工進奉御戊午清寧宫災預鼎建功進今職監臨諸庫秋毫無所近受知先帝賜蟒衣恩隆倚重日進一日至再世而益耀公諱江祖慶父聚世居涿之韓村公生有異質幼即知學長離羣褎出以事君竭忠颺為口實用是獲登内以成其志非偶然也璽恭徳公如父而悲公遽爾隕棄丐銘恭予教内館時生也其知所嚮徃者銘曰憑厥栖而為梟為鴟曰讒實禍基不如期期憑厥栖而為狐為貍曰姦實危梯不如依依素介則匱勇勤致羸折於里軸届門尤誰其命也夫銘以哀之封安人歐母余氏墓誌銘安人諱某字某眉之青神余氏肅敏公女也公獲事睿景純三皇帝厯四十年官至太子太保少保兵部尚書公在社稷為時名臣事載諸史嗣子世臣今僉錦衣指揮事安人出其先性與内則合公與夫人屬念之慎選厥儀初筮在所必挈與俱得州之秀歐氏故臨洮知府前江西按察副使鉦字時振監察御史亷之子吏部員外郎銳之弟蚤以六書肄翰林成化丙午與予同舉順天明年第進士授兵部職方主事進員外郎中盡輸所得于公甥館之教者沛然施之宦名日嶄嶄起諸儕類上為今少師太子太師兵部尚書馬公在部時所竒漢中古梁州秦蜀襟喉也薦守之尋以九江控長江重湖之滙北望中原險阸多睥睨為東南要津移薦為江西按察副使鎮其地遂為言者所論奪守臨洮道眉以卒安人自同牢比屬纊非閲江陵祀暨邊巡公出未嘗一日不與興居中之登進家衆忽得順道遽而喜仰以覬無改色終之糾奪家衆忽墮逆境遽而戚仰以覬亦無改色率如常生平莫窺其際及喪時振哀與愷愜監徃興來閭里觀式孀眉能無困於貧用成子望溟不荒于學終業國子女歸副都御史吳公子舉人律已又女歸大學士楊公子惇蔚有時望俾時振無遺憂當食歐廟世世矣世臣薄違每暇念燕眉動隔年嵗闃無相聞不忍割骨肉如異世不逺數千里迎與居以便甘毳𢎞治乙丑十一月二日年五十以疾歿斂禭飯含一出其力仁哉其迎之智哉其來也肅敏之教可考已世臣走望溟奉狀來乞予銘歸卜某月某日祔于五峯原時振之塋於乎予終順天試也暴風壊屋席濕僵予暈齒嗑嗑手弜莫握管窮甚有夫從東呼來叱邏卒面擁樹予温之久之蘇乃握管終之不即已矣且導出道名姓去識時振始此今二紀矣時振已即世予在告失銘之悔莫逭尚忍靳銘其妻也邪銘曰子順閨儲婦賢宦途母慈嫠居考終幽都歸祔夫俱有始有卒其在兹乎封淑人廖母趙氏權厝誌銘錦衣指揮使永定廖侯將權厝其妻封淑人趙氏于金陵之南郊筮正徳辛未十二月十八日甲午吉卜公若卿孰銘之龜見兆曰魯何古洪其鳴咽鐘老史氏吉迺前二十日率子鄉貢進士鎧錦衣千戸鉞錦衣千戸銳拜而跽泣請曰鵬妻諱恵果以鵬貴封淑人曽祖七祖文父瑜母徐氏世淮人也瑜侍伯祖内官監太監琳居京師而淑人從而毓之閨鵬亦以伯兄今南京守備御用監太監堂仲兄知司禮文書事御用監左少監鑾御馬監太監暉叔弟尚衣監太監廣季弟御馬監太監宣侍母王太淑人於宦邸而二室相比為厚善淑人幼極端重慧婉温恭母心選在不可回則以媪媒之聘而室鵬鵬自婚而壼閾倐改峻嚴晝入則稀闊而優出膳飲飲食朋儔鎮日講習選非霖潦淖沍則専藝於弧矢矟槊間久而猱騰隼搏差謂兼人守備公將命鎮中州時西域賈胡積種蔓延舊盤結土中尾日大莫掉則以嫗醫童幻流食民間夜攻剽掠公曰鵬爾勝提戈耶鵬遂徃徃馘數魁禽縦不濡刃功迺用成兹官贈先君昭勇將軍錦衣指揮使太淑人亦封焉太淑人喜曰兒有兹婦則然益飭諸媵熏婦徳致裏言無出鎧蚤夜磨淬期説母心得儁河南鉞銳磬控縱送曰是亦藝非梟盧蹋踘比母或無戚用是迺皆成助勲資門閥融融如也妻有力焉敢為公誦之又曰太寧侯陳儒鵬女許女焉淳澤孫也金姐孫女也鎧進又泣曰吾母年四十三十月二日歿父北騖也不及訣歸悼誓必塟永定然寄厝黟黟殊増衷悲父子其沐浴卜龜為有知也兆公實天賜公夀吾母於世公忍拒歟予塞移刻索語弗得則諾銘銘曰淮之萌燕則茁之汴之榮吳則瘁之閩之歸根客則厝之夫子卜之史氏銘之伊誰似之故封南京禮部尚書樸庵先生柴公墓誌銘封資善大夫南京禮部尚書樸庵先生柴公以正徳辛未八月乙酉自其子南京守備兵部尚書昇之邸歸南陽尚書送之郊玘於尚書同年也亦出與于祖見其矍鑠善飲啖退語人曰公不百齡乎吾不信也間遇尚書語是尚書笑且首肯之至是忽傳正月乙夘公卒衆詫訃來果然尚書解位奔有日而涕泣狀玘銘其墓墓在淯陽從其先昭穆之序日在冬某月之某日柴長安故甲姓也曽祖豫南陽教授受代僑南陽遂土著南陽祖恭父贈禮部尚書任景州判官蘭母某贈夫人黄氏景州值家末造貢業太學行齎居送一惟公身人不堪其集於蓼而公自童年徂壯化嗇成豐徐徐力任之人無隙窺其拮据態字兄文珪之孤冠且婚之又字弟文玘之孤冠且婚之而食有田居且有廬二孤至忘其為珪玘若非孤者叔蘇州監稅歸老㷀㷀公揣景州痌甚刺骨請曰大人無苦兒能任叔之終則已矣景州大說時節合食兩堂翁媪調娛怡懌創見之者罔辯疏戚以天年後先終棺衾飯含虞禫衰忌因情酌禮哀中軌度至封溝位置纍然中而又井然閭之右長老慕者朂子弟之不率者曰曷不師柴氏乎閭之左不知也惟曰昔嘗嵗饑矣荷槖之柴氏者莫不充槖而出市之羅鳥雀者得則曰盍之柴氏罟取螺蛤鼈鱔者得則曰盍之柴氏至則厚值收之縦之山林洿澤中以為恒大較公仁孝人也用尚書貴自封工科給事中吏部右侍郎至今官尚書移南至叅機務公日夜感激殊遇思朂尚書帥先熙載乃馳二旬至歡不啻其口出挾諸孫出郭登眺佳麗勝處中罔遺漏玘嘗徃間客席傾聽道其土風物産事緒鑿鑿令人如見尚書亦每謂曰吾大人當家幹蠱緒無斯須間究其學而辟咡詔昇今尚憶者月到梧桐上朝為田舍郎凡幾句也忽作而厲聲曰此若祖詔我時詩也顧詩意藴蓄大既廢莫任荷亦何言若為我任我不若禁於今五十年僅克就教緒而大人實親見之可謂自植而自歛之者與玘應之曰然未數月也而兹以玘銘於乎惡乎辭乎公娶蘇氏相公教子師婦多律則封孺人先公卒贈淑人至夫人子七人孟尚書也六皆殤女一人周羽壻也孫三人朏郡庠生肜業舉子業騰殤孫女三人臧良緒邢天麟蘇節壻也朏生濟南肜生黑兒是為曽孫公諱文璋字廷美年七十七銘曰自雍而豫既土而居亦選厥業章逢襟裾倅賛折閲伯瀛仲蘇赤立蘇歸遽分菀枯曰吾任之均歠而餔是曰志養太和蒸如同氣朝露競捐孤雛譬彼刈蔓委者𤓰壺時乃婚姻割畀場廬林有逸羽隣無餓夫有賔有師塾閈于于弦斯誦斯䝉端厥初儲英於家維國之圖載叅機樞封銜與俱崇封在焉淯陽之墟施繼禄墓誌銘施繼禄成化辛丑冬以賈還自京師之臘月招余飲於其家時方大雨雪酒行甚歡以厥器恩相善故奬譽過實余慙弗敢當醉步歸卧邸下而喟其賢且數日既得告歸覲未幾君以訃聞則月之廿四日也吾里之素徃還者宻者呱呱疎者亦不免於太息至於余則深痛其不克見令器之有顯庸日也明年得處術指郭外十四都甯家橋為勝隂得艮之寅陽得坤之申將以十一月廿六日舁柩從事而欲余言以銘之按狀君諱爵字繼禄生宣徳甲寅十月廿七洪武初建昌府醫學教授諱某其髙祖也進士淛御史諱某其曽祖也本府醫學正科諱某其祖也父紹明宣徳中用郡守楊候薦仍祖職兄繼福起方伯郭公疾用謝守薦任今南豐醫學訓科君先配南隅萬石君趙忠敬女繼配城西饒守中女男女六人君生世家通方書數十不勇自賢而每嗤時之自昧其術毒誤人者惟酌四民之中不士之憂不農之勞不工之賤且利倍彼三者取焉耳賈是也又度旴之出唯楮焉是崇則易楮于山走航于川北至於京師而轉移焉春而徃必臘而歸若是幾二十年而貨已崇矣成化辛夘謝守器恩之才遣遊郡庠君益以報稱是圖用期逺到博延師友以訓以飭無何復因美觀選中郡䕶守令督勸百端君獨愀然弗樂祈免再三乃戒之曰禁臠勿近子不見郭令公之子乎兹事獲遂其如功業何果如志復得卒業於今仕路可徯而君已捐館矣奈之何然君處兄弟睦況于親與隣和況於族待友謙況於賢争䦧者資之以決況於嚚商於途者有告急輒以周況於貪且暴意其得於家世忠厚之教而然與若是康而夀宜也而止於兹之五十何也豈其積之厚必於子若孫而發其報也歟吾皆不得而知矣天道冥冥幽冥則靈銘曰謂君幸也何百嵗而嗇其半謂君不幸也何萬里而至家終其筭人孰無憂家成則憂其少緩人孰無死子賢則死其有煥嗚呼君其安矣哉千載斯安甯橋之畔太子太保禮部尚書張公墓誌銘正徳十二年十二月十一日太子太保禮部尚書張公年七十六薨巡撫院以聞上輟朝一日贈太子太傅詔䘏典具如制明年十二月十九日其子福建右布政使恩及錦衣悊塟公於本縣上湖之原恩豫入山出鄉進士鄭嶸狀乞銘公予與公同里閈少同學長老同官雖然誰驟謂予足任此也抑予奚容辭弗足任此也公諱昇字啓昭號栢厓其先在宋有尚書簡肅公最盛鄉之人過其門必曰張尚書云公弱冠選秀謁先師畢皷吹導入家老嫗揶揄反走呼曰尚書復來矣公生之嵗也邑東􅀢湖開長老相賀曰龜湖開狀元來此䜟記也當有應者已而公登成化己丑進士第一人自翰林院修撰左春坊左贊善左諭徳左庻子少詹事侍讀學士禮部侍郎轉尚書加太子太保比家居人皆畧其官亦止曰張狀元云創見所無也故云然亦足以驗幾之先見不偶者公為庻子憤宰執弄權誤國言之上上初直公中變左遷南部屯田員外郎途以憂歸弄權者敗上用言者還公職如初既進賔詹經筵日講青宫引翼聲稱峻拔擢貳禮部陟正春官郊廟綴儀櫛比春闈弊孔篴張公或肅將顒若倐而爬剔窒築機芒叵測無啓齒無作容諸曹悉告理公曰事過止先是諸鎮閹類相習結私嬖偵内所向則文禽怪獸妖花理木澤葅海錯竒技巧製仙釋幻惑祥瑞曼延之獻日攫於民繹驛騷於道一機軸于部公奮曰是誠在我乃揣摩幾先可身當者極言之其扄鐍牢宻先機窞穽以待者乃浮輕沒重與顯奪冥流虚瀦實無貽寮憂而隂隳之恒十八賴上寛明簡在用成𢎞康平之治公有助焉公在官期部之無遺舉次第以請植綱常則祀江萬里於饒合祠趙時賞四十人于文信公之廟祔鍾同於忠節之祠表孫景雲妻鍾氏貞烈之門尊先哲則載祠徽國文公於婺源祀魏了翁于姑蘇豫章延平各於其里祠而春秋祀之興百年闕典人心翕然博平王建寺請額公曰宗藩讀書守祖訓何忽屋民地以舍異端力請格止以塞他請班行崔志端者公同銜也幼竄羽氏𨽻太常為樂童積資為寺卿奄至是日脂韋掖庭比弄具出則旁若無人等公宰舊惟隠忍至公裁割清濁較然公當還職初上言時政大要汰冗濫罷齋醮停工役審奸擇賢為應天以實不以文如商宗周宣者繼是奉詔陳言又以禁奢靡重名器省供應併解納為言於時有言官過激落職公疏求言而言官言之得譴則求言而言官不言者如何一時論者快賞嘗奉命春闈校文主兩京鄉試得儲侍郎巏張都御史檜蔚為名臣文苑有輝遭聖慈仁夀太皇太后喪議祔諸儀稱㫖奉迎今皇后也公為副使大禮洊行舉無愆儀監在淵衷故乞休屢見慰留召對面諭者一比考績陛謝歸中貴齎賚至矣今上嗣服之明年公疾作懇辭三四得可加今官有司月米為石者四嵗夫如其米之數馳驛以歸盛哉公於書無不讀汎入外典百家言遇星翁厯家談必結舌而退嘗與予談兵論河防公宗是古圖予曰古今異宜辨百折公坐屈予喜面有矜色出偶遇名家將將曰何喜也予笑曰方遇頗牧來意其問譝公將弗寤去嘗奉命封代國道出澤州崇山下聞有聲硿硿公念山得無崩乎時匝輿百餘人命取他道出衆心迂公履聲絶山果崩是何其達也事考篔牕公恒欎已所優為而惟馭其所向居江夫人喪既禫邑中譌火夜三四發翁聞閧聲必推枕急呼公問内符契安在公執詣床出燭之曰懸以待旦乃就枕内符契者亦曰勘合凡京員遭喪降自大内起復合以防偽者也公既免喪不敢久留侍遄其行以順適之嵗祲翁日為糜以食餓者道路之幾仆者然無奈日踵至何廩罄矣主藏以告翁乃止又懼云他日覈廩籍報至京公大恱公喪篔牕翁行古禮生平冠婚祭亦如之孚族得威如之吉而能萃其渙弗屯其膏遇人如鋸齒一一中度廋情者匿不復見君子以為得遯之象晩尤翛然物表得西山勝處屋之曰三谷書院嵗半吟嘯其中積草盈案人或紿童取以為式不校也當廟祭童嘗舁公歸道上口哦不輟而流觀太虚將入門瞷曰伊誰氏之室耶童曰大人宅於斯公愕曰是乎乃入嗚呼可知公已所著有栢崖詩文集二奏疏二和唐詩皷吹集一咏史詩集一行於世篔牕翁贈禮部尚書妣饒氏江氏俱贈夫人祖徳厚妣陶氏贈亦如之公配胡氏上官氏封贈夫人子四恩進士累官至今官娶某某某氏封宜人愈京闈經魁娶某氏先卒憙光禄良醖署丞卒娶某氏悊錦衣衛官娶某氏女三某適某孫崇京闈亞魁娶胡氏嵩先殤崑娶雷氏􅟭娶江氏岑娶許氏俱學生峑岢尚幼孫女五某某曽孫四梓桂梅柱銘曰軍都蜿蟺迤西則延縈旴中川郡殿厥墟爰發有初類山澤癯乃大發公實華亨豐令始令終雜志附待舉所志宗伯徐公既名待舉所所之主人疑之謂予曰何哉公所謂待舉者予曰記有之古之儒者懐忠信以待舉舉舉而加諸位之云也主人曰吾老矣何懐耶以待也吾子伯也弗能畊使之學叔也季也亦如之吾亦如伯也之使焉其質駑也吾待之若樹而萌若蔬而甲而吾滋吾糞吾培之或若廐馬之逸也吾縶之若薪槱之蓬蓬也吾束縛之其翹翹而參差也吾斬艾之師之不淑吾十易之不為病省之試吾具糗粻資送之而豫為之館傳師與友皆於我乎館且榖也天其或者有遇乎則朝於斯天下之走集於斯吾子來也亦容以露處乎選館而僦之安知芝蘭馥馥者不衷有鮑魚乎吾是以籠兹㕓以豫之公亦其知我哉又曰自吾居於是聞旁之舍東而咿嗢楚語曰楚之工人居之西而炰烋秦音曰秦之甲士居之居今數月矣則已撤而崇其亭臺瀦而池垣而囿曰某戚里之别院也或曰某閹貴人奪而築焉者也況吾兹㕓也可長有乎或戚與閹之聞是名也曰是亦急於吾君者亦將而免於奪乎幸矣名亦不為無助吾將謁公為記他日書公記于壁重予與之戚也使撰其言為志所為屋二牗正北出面錦衣之髙墉主人臨川饒氏恵徴其字千戸其官也修庫志大明正徳六年嵗次辛未六月朔南京禮部重修架閣庫成徹腐易新堅倍初焉而太祖開國之儀文與羣簿書之幸存者復奉入以貯逆數之四月十八日竪也為日四十有三又逆數之三月二十四日撤也為日二十有四用人之力取諸五兵馬司之羡卒日三十人數視其日工人不以數書者給其直也董事之人趙祥金恩申華張宗吕受余立張昇鄭吉張洪余仙王器朱昻周華陳文則取諸太常寺舊厯試之敏有功者皆於司務王洛郎中劉金暨郎中黄宏向錦主事劉時望日聽焉洛也金也又獨無分日木石甓瓦工直百需取諸武庫輸來直堂之直銀以兩數者五十有七盖予權部事起自二月十八訖於四月十五日視其兩之數例得私之脫微此也曷成之適白巖先生以大宗伯至周覽之曰善俾志之乃志雜銘附愛日樓銘為錢世思作耳聽聽其清目瞭瞭其明樓之階日且降登膳之於朝母顰温之於昏母愠旦復旦兮於樓母曰而忘而君有峩其冠有垂其帔降登於樓皦日爾爾旦復旦兮日居月諸子在君所母安樓居髪之皤皤齒之􅚖􅚖于降于登婆婆娑娑母安樓居子在君所分刻寸晷孰與子賈孰與子賈分刻寸晷孝子之心一日萬里泉亭銘為吕侍御作恵之泉泠泠伊誰聽之有亭泉噴如珠亭有詩書濺我蠧魚而湧湧流可以灌溉可以浮舟方其出山注之為灘其聲潺潺激而為瀾瀾束為湍或停為淵或疏為川是天下水萬歸於海原於涓涓厥委稽天是為達觀而終此亭以聽此泉逹人不然笏研銘為靳充道作孤孤外矩虚虚中規縱尺之半衡寸有竒質本山骨形肖介圭因人盈涸隨几髙卑磨而不磷湼而不緇楮斯穎斯泚之濡之羲畫文彖周皷秦碑誰敢侮予非予其誰楊州譙樓鐘銘𢎞治五秋誰尸此州長清房侯侯耳城譙惟皷其朝亦皷其宵宵朝匪鐘四紀春冬民罹嵗凶凶占厥聲民胥告鳴侯選屬能能薄馬進是冶是釁登簴斯震震聲四達實自矦發侯政桓撥撥災為祥豐年穰穰地久天長明山草亭銘為王少司徒作洞庭海寛明山崧髙梁海者蓬棟崧者蒿斯蒿斯蓬奚楩奚柟太虚為盖浮雲為簷戸啓春更戸闔冬秋主出旦奭主歸巢由圭峯集巻十七
