body:
  text: 圭峯集卷二十五明羅玘撰詩擬古樂府附雜體夀姜母八十詩歸遲遲歸遲遲手中之線憶者誰去時衣裳母得知天孫為織銀獬豸白晝凛凛感風吹維南半天見鐵面有手未便擎巵􅂒東海濵秦臺畔侵星闢髙門旌節來岸岸云是濵州太守從者魚貫餼牽極鮮肥􅊦斚亦璀璨古來七十既稀有况益十載於今旦鼓坎坎舞舉舉以舞以酒夀如許御史持大斧曰敢遑啓處太守之官守此土太守不舞誰代舞御史之歸奏三釡石樓髙寄李石樓石樓髙石樓髙星宿磊磊手可操愧我欲上非飛猱石樓堅石樓堅雪霰堆户氷凝椽愧我欲住非蛻仙不如移身且就石樓下朝朝莫莫窺其罅或傍石樓旁仰鑽爾爾甘凍僵忽然飄風刮地揚沙石翳我兩目昏咫尺歸來兀兀坐茅屋石樓不見見我獨忍能不寄詩一幅重慶詩為實菴兄六十夀中堂垂垂坐天姥擊鼓坎坎舞栩栩大兒誰助邉漢卜式小兒誰南宫先生配韓愈望雲思舞笏仰拄以寧馨歸代以舞各奏爾能曰豫武左中規右中矩此舞傳來老萊譜是時姚江波湧山馮夷凌波助擊鼓蹲蹲越山昻舉舉越山俯姥雖云樂覺兒苦兒年六十力如虎姥身姥臂姥脛股用以娛姥奚彼取年年舞舞後莫數南宫索詩要杜甫貂乃不足狗尾補慈竹圖詩余邦臣使便捧封制夀於慈闈因寓意焉邦臣睂州人竹生子子生孫竹生子孫孫轉蕃是曰慈竹為竹元歷歷鳯啄實磊磊貓蹲根惡草惡木天所髠霜晨雪夕褫冠褌此時獨亭亭窸窸風葉翻浮埃脫落净瘢痕冬寒不為寒春溫不為溫大哉天地無怨恩此竹者地勢坤圖長存學止翁齊夀詩為季本清作諌議性憎僧萬廽僧生不為諌議憎欲以其缺試更能朝朝紫微帝回天戒氷凝莫扇扇枕枕欲氷一身一日髙互曽萬回一回絶傳燈諫議心騰騰翁冠媪帔千里萬里目窅窅兮其凝瞢太官羞牛車纍之載以鵬歸􅝛鯢齒佐尊朋何如拾橡盛瓦登母追峩峩脛束縢膝韍急不及毾㲪諫議坐瑣闈此語吾聽曽西安嚴太守考最歸郡嚴侯宿擅八乂手衆首肯肯豫獨否偶從壁隙觀白戰豫愕不覺臼在手捲旗潛避之縮舌深閉口祝鳩氏僚如立栁投鼠忌器多掣肘侯辰臨之不及酉事有至難如拉朽三原公國黃耉嚇此竒遇良豈偶諒非行苞苴為郡得杜母傳痏以膏起尫以炙華山不能言清渭監妍醜侯名不在三王後役碌碌治郡如斗一身四射集百詬遇侯兮當反走僅備驅除擁篲帚屠冢宰父封宫保詩沉沉深堂公坐時府公擊鼓來賀之開門兩兩天丁入龍墀東頭縣令立金虬飛動玉軸開王言如綸墨猶濕青宫太保天官卿授公公拜公亦驚青天無梯白日升蹙金麒麟照夜頳水蒼之玉懸腰明白頭仙翁地上行鏡湖心四明巔公有藥室有酒船不須日食萬萬錢公無身坐政事堂英雄之網誰持綱此恩此典公可當送余國信歸鉛山滿腹書眼壁塞萬里途眼生翼眼壁塞陸沉翁眼生翼龍斷客陸沉夜漫漫龍斷身役役忽然棄擲聚螢囊掉手不揖二千石瀛洲仙客上朝元坐我樓船三百尺船髙不知風不知波錢塘江不為江滹沱河不為河長江濁河乃一歌河飛鳬鴈江驚鼉壯遊如有神勇去疑有魔遲日下化國飄風揚卷阿鹿鳴聲呦呦雄藩禮為羅我徯子至其無他送胡惟峻奉使雲貴便道毗陵省母朔方健兒好身手刺船水上輕於斗船頭捶鼓催船行船疾如飛百吏走中有持斧者頭戴獬豸冠霹靂飛電臨百蠻長淮盡頭江水過千里萬里截住為金山鯨浮金背過山頂十萬艘夫皆縮頸笑而躍過了若無人謂御史歸之猛吳中舶趠風吹冷還吹熱冷於歊熇生清凉熱向深杯觴大耋隂深栁壯可繫驄䆗窱堂深任容節王命重於山丹髮白如雪業已官家作材傑泰和禱雨有感為吳德純作金華山雲如紙薄澄江赤日爍欲涸田家生怕牛餓死滿田焦禾任牛嚼禾盡牛肥尚可為縣吏催租出牛縳縳牛到市多賣錢了租背上無腷膞新傳縣官昨夜到坐席未暖行出郭西郊驀地隂雲生狂雷一下顛快閣雷聲轉大人轉驚兩耳何曽聞雨落雷收雲散天一色只見髙田有魚躍疾忙牽牛趂夜歸覓石跟蹡磨錢鏄君不見縣官騎馬入縣門猶向山頭望雨腳栲亭夀詩吾聞棟明堂者鄧林木山樗不入匠石目樗誠可棄未若栲樗在巘兮栲在麓侯官少府不屑住身大如丘嫌矮屋擺除敝屣歸去來架栲為亭不費築東邉甕牖慣吞月照見鞠躬進湯粥哦松那如負米甘嗤彼空吟莪蓼蓼眼前萬物盡芻狗鑿混沌死北帝倏髙騎日月遊六合無何有鄉暮即宿呌文襄公公在天至今國活猶食肉封丘㕔事僅旋馬光祿之官非太祝英公門户鄭公笏田園鬻盡笏不鬻公孫可夀一百年公在吾為公作僕館甥歸去當登堂要我作詩詩在軸送李希賢提兩浙學二首山僧下山時僧送不出山但問下山僧此去幾時還乳水間一孔白雲留半間秪恐僧還少僧還誰閉關又栁邉旋旋出行厨酒盡依依忍别吾散地獨君能鵲起外臺從此帶龍圖位尊安定先生上名任四海狂客呼肯為東南放風采定剜天目塞西湖送吳老歸宜興遺金在道吾亦攫入朝爭名戰自惡胡為徒手長安歸骨瘦脰長如野鶴君不見饑鴟低飛啄腐鼠飽鳴人屋人射女又不見鶴飛入層雲赤晴炅炅窺天文腹則饑眼獨飽下棲舊林覺林小征西廟前是舊林鳯凰巢髙喧百禽題鍾馗四首前有枕前有枕乃是石可寢巾簪一任􅂒􅂒何如少飲又橋有竅橋有竅驢不過緊要推尻曳耳多時到得鬼笑又鬼作僕鬼作僕肩頭上琴劍書簏問主人何處乘牛入空谷又乘白鹿乘白鹿鬼牽韁凌兢局鞠過松林數步一片雲山緑翁應乾父子傳經同朝卷上公晨朝用子隨金蟬玉帶腹則虛退食袒裼狗馬娛相公公退苦課子子卧絳厨朝未起千呼萬喚渾爾爾白屋子朱門孫一為府君一呌閽榮辱自已原無門參之笞窋詎足論旦笞伯禽殊有恩奮建躡踵孝謹聞向之歆賢之𤣥姚江翁家在眼前隴西閻大參山居四詠同年允德父寒泉濯足孔不飲盜吳飲貪飲狂國人狂正酣沁寒潄齒齒鋒利公以濯足吾不諳豈遭十日爍下土軀殼焦縮皮毛燂因思層氷赤腳踏氷山多險不可探牛蹄濙濙可在眼一冷著骨毛毿毿夜眠如臘絶垢膩只此可寄僧伽龕滄浪漁父怨腫濕妙道肯向庸庸談黃卷潛心不為勞勞逐蠧魚平生即此當菑畬兒童莫笑頭顱白恐是研山行祕書南薰午夢黃帝遊華胥簡子聽鈞天孔與周唯諾莊周蝶翩翩有無無有間抱枝蛻空蟬幸蚤脫鼎鑊無為世熬煎草堂風颼颼有身堪晝眠鼻中作雷鳴雖夢未夢然幽徑尋芳恨不如蝴蝶隔墻知有花隨風飄别院得意過東家涉逺終須馬撲叢常畏蛇春歸在何日莫遣涴泥沙山水小畫為李充昭乃翁題劔江中心落白雨跳珠入船兩翁語懸崖墮石江影動蛟鼉穴深魚在渚寒山蒼蒼色古老藤稍雨重樹欲倒水鳥驚人沉水花冷半漂舵師嚇翁翁首掉野鼓一聲疑有廟兩翁停語忽砉歘水神騎龍恍惚出兩翁雄訶如霹靂神奔龍汨天地寂便乘風雲騎日月蹴翻崑崙涸溟渤回頭北斗望丹闕朱衣何人手中笏猛腦􅑷身獨擊鶻一翁氣方豪眼中之江不見矣寫之逼真摩詰氏題曽光表山水圖我恨不如江頭人茅屋四壁旁無鄰茅穿雨漏嵗一縳松葉為蓋沙為茵大兒五更催解纜去時冥冥天尚暗老妻走出呼小兒大兒小兒下幽磡小兒髻如椎年可十七八捩然汲水勝過獺平生見魚偏好殺穿於龍國恆探珠若遇鮫人敢笞撻輕風飄飄日卓午魚賣江村曬魚罟偃然一笑載酒歸人謂此實魚之虎橫江中心翻白波小兒船尾發棹歌白頭老翁喜奈何我有嘉客新相過十年不見鬢較皤矢口論事如懸河黃庭一卷讀已多老妻肘翁云靡他翁呼濯釜燒槁葉我見船歸置樽簋豈無大魚大如豕君不見良工畫翁畫客畫山亦畫水意在江心兩兒子一道清風圖為李侍御題張都憲畫張號一拙道人也御史于中持大斧誰有大竹大如杵破之萬箇破更酣須臾了盡千林許一林淡一林濃一林渺渺無西東伶倫縮頸驚卻走云此天公遺下之籜龍日邉白鳯下啄實一飽揚去超鴻蒙至今百鳥絶蹤跡獨占千載惟清風君不見一拙道人最癡絶漏泄天機好饒舌筆濡東海作硯池睥睨此林如一垤一匹練絹尚嫌少收拾描模當時了天色黭黮湘妃出雨聲如淚滴石窟掃天無雲地無塵六月凛冽如霜晨祝融凍僵火傘濕觀者如山踏氷立道人笑憨憨御史色不動青驄新被銀絲鞚清風且作歸朝頌夀山福海圖為太醫王銀臺作南山穿雲下日腳射日東海日不落山明海瑩天宇空南極老人住東郭越人低頭拜北面汗流走踣孫思邈唐虞國脉何須切官家調鼎我調藥南山髙東海闊莫莫朝朝候黃闥山如礪海如帶屹屹官家舊龜蔡翡翠圖二首鷊惜綬鸞信影孔雀愛金尾鴛鴦重鶯領在世安有秦西巴獮麑殺孩豫亦肯俯啄仰顧活須臾虞羅得女女秃頂嘴銜魚婢不得飫何異海鶴遇吞竫不如清饑學蟬飲露或飽土壤為蛙黽嗟哉象以齒焚千斤軀拳身得託為女幸又得魚休向蓮莖啄恐涴蓮房帶蒂腥猶勝羽毛或遺落著人冠上得人驚脊令圖二首妖鳥周公有弓矢邑中訛火畢方圖良工不管災祥事自在茅茨畫雪姑又破獍食其父鴟梟食其母彪虎一母生母去彪食虎維烏恆反哺維鴈行不補鶺鴒鳥之微友義良獨苦雖無華蟲文舌不逮鸚鵡飛鳴行搖搖急難亦堪武疾風一枝安百鳥誰敢侮題怪仙圖二首蟾蜍吹光接日月枯瓠氣升影滅沒爾頳我白雙被髮衣穿後裻腳不襪忽疑青天墮彗孛詭形怪影恣鶻突誰其幻之吾欲罰又秃帝委地卓鋭筆女兄磨研笑嘻嘻女初上樹摘樹葉笑女眇身如蛺蝶葉墮青石上下坐青石傍女如弄葉嬉揚揚吾當曳女訴玉皇女青論女女實殃冥搜上下繞女腸按一葉吟一詩免謫下界為人嗤胡為畫工聖得知圭峯集卷二十五
