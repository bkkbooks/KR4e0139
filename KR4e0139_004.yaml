body:
  text: 圭峰集卷四明羅玘撰序弭節重榮詩序始豫丙午歲春遊太學王清之時已得順天解來為同舍生恆就豫語清之亦誠浩博善反覆事情如指諸掌翛然有凌逼霄漢意氣而俯視諸碌碌纍黍拾棄餘依門戶者真鼠之遊于穴中而相銜以尾也故有旁睨而冷眼竊笑而背唾出則閧堂抵掌大聲曰是病風狂人邪而吾二人佯不聞自誓終其身不變是年秋豫亦得解清之來會取豫一詩為其祖某先生八十夀豫詩極醜厲而清之至今獨傳以為竒豫不知其何以或者謬與豫合愛而不知邪明年同第進士又明年清之入為給事中又明年豫亦承乏史院顧豫之尾瑣分量盈溢日食於太官寅而入焉無所為申而出焉則有卧而已矣而清之方目不暇瞬耳謖謖拾遺補闕以終晷向相與語者既次第蹈之莫豫與也豫獨得清之不以俯視者視豫豫亦足矣今清之被詔趨寧夏凡西邊軍儲得以便宜從事天子不能無望於清之也夫人之命一也捐之以與羣不逞者抗而為天子衛元元者軍軍之恃以生者食也齊民無食則飢且有救飢之政豫焉况軍乎况邊軍乎今天下之邊三北方最徑西次之而寧夏古朔方地西北其衝也所以裒積貯儲挹彼注兹使士飽而歌而憤思一戰是又在吾清之是行也豫愚不識天子意意其在此非歟清之行當過濬濬其家也封給事君方承顔于某先生膝下以豫詩考之先生今可九十矣古人以富貴不歸故鄉如衣錦夜行所以甚嫉夫仕而不歸者以著夫仕而歸者之榮也况清之將赫斯之重輟清燕之侍翩然自天而下弭節登堂而頒首出蹴蒲褰幃而鮐背見合三世人以言笑晏晏衣錦之榮抑其末耳都門外茵地以莞而執􅊦玉立林林者招清之以飲是餞清之也且飲豫曰子前與清之語太學何事人謂狂兹何不復狂序送清之行序成餞會中詩皆足清之行矣送蔣敬之歸省序敬之之歸上之俞其請也且以寶鏹賚使途有常餼水有行舟舟有棹夫關無滯譏清湘才三千里耳誠無難至者恩之被也渥哉而前此贈父河西君為編修封母為太孺人黃焚于丘拜瞻珠翟于慈閣無忝為人子别十有二年之稚弟突辨郊迎序鴈行之舊慰慈侍之代授已試之業無忝為人兄居幾何飛書告至于南海令君令君誠之其兄也無忝為人弟傾我腹笥于彼髦士無忝為州里師衣錦晝行至止山立輝其有光無忝為州里之重客敬之是歸徒歸哉然敬之其官史官也其祿常祿之外又益以太官之膳內法之酒也有大燕會又以中士班大夫而坐于門進謝于殿也一日二日講幃之侍興俯走趨衣袂襜如天光臨發誰也某也無所逃於帝心也然則今日俞且賚諸敬之其直俞且賚諸他司而姑以例云也邪夫傭於人而受直倍於族傭焉用力且與族傭等雖其主不寤也或雖寤焉而不之較也亦獨不忸怩于心乎敬之必不爾為也於其行也不敢以不告者豫敬之友也送夏先生之湖廣序懋齊夏先生蘇人也以連山歸藏之學授弟子于京師去來常數十人京師業是學者必自夏氏始名得其宗多以之階進取先生起進士為給事中至左右給事中數十人猶依依在門墻如未貴時先生之教亦猶昨也故名日益髙人日益親𢎞治甲寅十月詔以先生為湖廣右參議人皆謂天子多行先生言兹將觀其自行也行必以大大莫如湖湘故特以授榮哉而數十人者獨顰顣咨嗟奔相告語擇日時羣入謁且以賀起居班定有頃其立者如植趨者如傴默者如緘吁者如喙咸有所喪異其所以常侍側者先生亦蹙然驚焉急揖以退明日相與醵金大會供張饗先生先生酒半進而迭飲之因問前狀所以有執爵而告曰始吾二三子之旅而萃於先生之門也先生於吾之進也損之於吾之退也益之亨吾之屯擊吾之蒙迪以履導以謙困於行離以照之蹇於言解以發之大過不可包也小過可贖也吾於是乎少有革焉而又震以鼓動之節以品節之渙以蕩吾之鬱井以介吾之辨加吾數年吾之蠱惑似有瘳矣吾遁而歸家人異吾而賀曰爾何壯而豐也無乃晉見於君子乎爾之否而泰可冀也吾賁然咸來恆以為自今可以無妄為庶幾剝吾故而復吾新漸見乾坤之心乎今先生自此升矣則吾之睽孤有日雖憧憧同人亦何姤也先生觀吾其以為既濟乎未濟乎吾是以立而不知艮吾趾趨而不知鼎吾足視而不知所臨故默思而不遂所需故吁也先生於是受爵盡釂首肯而笑復有執爵者再拜請益先生曰子欲之乎請觀於兑之象足矣衆皆躍然拜教旅酬而罷他日有語是於豫者汪登也且曰願有序以送先生豫癸丑同南宫考天下士可謂知己然不能文也次是語使登持以獻焉送黎文淵還南城序建昌為郡屬縣四其首南城縣縣有城在於黎旴二水交鳯凰山之陽城南出通會門百二十里為南豐縣又百二十里為廣昌縣東出武勝門踰黎旴百里為新城縣而南城北下未三十里已為撫之臨川金溪二縣蓋郡之委也亦要會也故置戍衛以鎮遏不虞今去衛猶為守禦所元季偽平章擅割據之雄為偽都僭王號宣德中荆又國焉其雉堞樓櫓門社之傑麗臺池苑囿之髙深芻牧廪廄之富鐘竽笳角漏柝之喧羽旌纛幢之樹嬉遊歌舞之娛騎射弋獵之便殊有京國之態豈王都相仍於其處而然邪然觀其竒花異卉珍果嘉蔬酒醴之味直爭雄於洛陽姑蘇錢塘之盛要其土地之美山川之勝容有以召之也廣昌居上遊林箐蒙密瘴毒殺人新城差沃衍南豐多磽確地皆不能與南城齒而其民亦多老死農圃固不能如南城民尚通而善賈樂為逺遊薄海內外有之也吾嘗遊天下茍十室之邑三家之市吾可以張口飲醪闢囊為餼醉飽而嬉矣蓋吾里閭之人多也最後之京師南郭之南市有吾里人偶語者以為適然耳既而隔墻而呼吾里人也髙門華堂坐而談吾里人也吾驚曰噫何里人之多也吾舉順天旁午來賀且百人則南郭之人半焉丁仕隆擁重資而好文黎文淵扈輦蹕而多技皆於吾如平生歡吾職史事於今八年文淵老矣請於其長得與其子益國護校秉羽幢下歸歸則猶食官餉曵裾王門榮矣哉然浴旴水射遊魚登鳯凰山放紙鳶倚通會武勝門笑指負擔而入者曰三縣山氓來矣此則少時事也今虎旅司門無敢譁無敢闌入山川禁厲鳥獸魚鱉咸內物也寧復得爾為耶惟飲醇酒慶餘年得歸老以享鄉園之全盛招士隆輩亦歸使人謂南城人好遊遊而非忘返者於風俗不亦有助乎八月初吉偕仕隆來告别吾無以為贐也以此贐之夀鍾教諭六十一序長汀孟方鍾先生有賢子曰文俊登癸丑進士其試南省時豫實主司也優其文收之方其未試也私謂其儕二三子曰家君生癸丑今兹歲又癸丑六十其逢是為夀端茍占一第歸以為夀良宜咸壯其言而是之已而果然釋褐試戶部政時以新服孔嚴初志觖望居常悒悒未幾詔用言者議進士其聽以歸而文俊在遣中遂欣然告行二三子來謂豫曰鍾先生少有大志而業進士賈用不售自老於一校官而遜諸其子至文俊竟有今日之收訓信昌進教博羅年未至而疾以疾而請得請而歸歸而疾愈疾愈而至今日之躋文俊榮矣又得先生之夀而歸拜焉先生夀矣復得文俊之歸而榮焉所謂一時而衆美具也所敢聞於左右以去文俊遂為先生夀何如豫曰先生之志乎業乎賈而不售乎遜諸其子乎疾乎請乎歸乎歸而愈乎豫皆不得而知也豫少居田見老農焉預厥種覃厥耜又飭厥襫襏以時而藝焉畎之塞也或固之畝之疏也或溢之原而萊蕪之隰而沮洳之間視他藝之芃芃者則乃愕乃悔乃屬其子而代終焉退擇其町疃曰吾葵吾蔬吾􅤿苽尚可飽也而其生莫不翹焉秀焉扶疏焉而老農憂采薪棄之閉其戶而內觀也道之貞葆之道之腴味之閲月充充如有得也忘其所有事而不知也而子之代終也適有秋他日連連焉以車畢登於場再拜稽首于膝曰老農怪矣用其子而享諸吾農不如盍進杯酒為夀如子之言則先生之齒休且尊矣以其子貴休之萃也享老農之利而非其伍者也吾與二三子縻於是欲以杯酒後其鄰而不可得雖然不可虛也皆應曰然乃書豫言授文俊為歸夀之獻夀彭翁彥寬八十序彭之先世祖以夀考聞至越為王始以貴顯而其名皆能與世相為終窮更數千百年語夀者固未有賢於祖不獨彭氏也而越之貴彭氏迄兹蓋無之而他之氏族越之後如越者寧數百十而已哉彭雖微越不失為彭也故彭獨尊祖為彭宗越雖貴不與焉抑越之戰劉項間其得王也虎口之餘臠耳計其利害直以生易貴其貴也亦未能亢然南面稱孤固有可執而醢之道也使祖臨焉不以惡臭視之而恐其凂已也幾希矣蓋其趨不同也然莊周稱祖吹詬呼吸吐故納新熊經鳥伸以為夀是未免挾小數以攘竊機緘逆其天常為造物者之蠧聖人之道無是也及其厯年之數容或諺聞之過使有之其戚屬朋友臣妾亦有與之抗年而俱存者乎無也然則飲水露茹草木與深山之木石大澤之龜蛇處可也古者堯舜百餘歲文王武王皆九十餘歲孔子大聖也亦七十餘歲傳之所記百歲為期期於此而已矣亦未聞聖人者數百歲云也蓋往者不過則來者不續吾見天地之運於是乎息矣其可乎豫嘗持是説以祛厯世之惑且欲以告彭氏彭氏居京曰彥寬叟有孫妃于益國豫里益都也里人莫不與遊愛之而欲豫言其八十夀以是月六日晨持以獻豫知叟之欲繩祖武也亦明矣然其未得也有苦身吐納呼吸之難及其既得也有約居野處之窮而又戾於聖人天地之道又况徒聞其語而已孟子曰盡信書不如無書書聖人之言也且不可信而語庸妄人之所傳以神者也可信乎豫請叟觀於傳質諸羣聖人徵諸天之道順其常而為天下之大老亦一彭祖也已慶喻翁以善七十夀序三代井田之制既廢匹夫固有能與人主爭黔首以擅萬物之利而富擬封君者亦非必智慧豪偉桀大神變化以鼓夫天下也而世主亦嘗斬芟擉剔入於蓋藏隱密中期與斯民更始雖其戾天穴地之姦凡為民害者一切不貰而於此獨遺焉豈其足與吾抗而終莫可去耶抑亦有不可去者也均是人也傭於人晝而力作宵而索綯終歲而不獲數金或懲而自田其勤倍焉終歲而又不足其租之入又改而商則覆其舟幸以身免亦丐而已矣溝中瘠而已矣悲夫夫人豈欲自癘其身若是邪充其意也欲與人主爭黔首一也然而至此者田非其田也嗚呼世主其終復井田乎井田不復世主雖煦煦憂之亦末如之何也幸其有與吾爭者吾舉而付之使為之母不猶愈於坐視其無告乎中人之家聚十馬牛四十蹄此竒貨也而估不十金焉歲歉懸爵於國門令曰入十金者授必中人之家則天下皆莩矣何也合百中人而金不足也改而令曰凡入千金者授則固與人主爭黔首者也然則其爭也柳子所謂貧之母是也明主特患其不吾爭耳爭衆則母衆母衆赤子其有不安乎然吾觀凡赤子之於其母戀戀然喜其康且夀也否則悲號隨之不知兹之所謂子母云者特其號焉而已而其實則有不然耶豫愚不能決也南昌七十翁喻以善居京師資鏹纍萬而循循好施不倦豈亦所謂貧之母者歟是月既望實其夀期集來假豫言往祝者羣然也似皆欲其康且夀子母之説疑亦於是乎在豫欣然書之翁弟吏部君最名知言其將謂我然耶抑不然耶慶萬母楊宜人八十夀序楊宜人母於萬氏於今六十年教其子武略將軍南京水軍千戶鏻世其官三十年歲漕京凡二十五年鏻之子又子鏻亦垂老宜人享今封內政猶不假人鏻亦不敢問一意治漕事乃有能聲也鏻之先吾南城人其南京蓋官居也故其漕間歲一至吾遺吾以酒必曰鏻母手釀也吾飲之甘故鏻至輒問其年鏻每以康強對今天子之七年河決張秋歲漕大沮八年河復故道鏻獨先諸漕至則酒之遺也兼埕篚之將也兩幣吾怪焉請曰鏻之里舍有髙鏻母之年者曰今兹孟夏而母八十是屆觴以酒乎而隨以幣乎與文以言乎曰言也山澤之言木館閣之言腴木乎腴乎曰必腴也然則其以吾幣往盍丐諸鏻是以來幣里舍幣也吾曰而來宜也而母之育于楊也二十年楊之姑娣妹同閣而處紉而綴繅而緒織而縷幂而酒漿固無選也其未聘也孰能豫以命婦待之乎况宜人之秩其服熊羆其帶鏤銀緋之亞也而可以妄意希之乎及其歸于而父也無有姒乎娣乎東西舍之號為娣姒者乎今其在者蓋十無二三焉服命服而八十者必而母也亦有傑然武辨為之子者乎固而里舍之髙而母也然吾觀而亦自邁往當必有隮又每曰而母康強則封固不止是年亦未可涯也館閣碩儒往往藻繢粉飾當世事照及萬世如見此特餘泚耳吾為介紹可得也鏻曰聞此已覺津津腴矣漕綱嚴姑書之去待十年更為九十序以照吾室尤榮也送錦衣張侯出邏序歲聿云莫燕趙之間惡子弟食飲博奕費且盡思為冦偷益急每伺朔風塵起躍馬突出周道上矢聲搜然雖有賁育千夫而手龜足瘃飢虛困悴之餘亦不免戰掉失色伏而獻囊免患於瞬息間誠畏之也况南人素綿道逺而疲三尺童子可以制之其所攜者固其物也亦何擇於公私哉當是時懸人之命於手壯哉翼虎也而國門南出三途視他域尤多蓋河水不舟今天子貢道出焉故令甲三途歲遣錦衣支帥三人握符提衛士分出以邏其出必以子月望日又出三御史並臨之凡兵民之司皆受檄指麾從事期以靖冦寧民足國阜財而已今年中途屬張侯養直侯余友也少為武學生戰藝場不如志而抑就右階時尚為百戶也嘗屢戰建州諸衛得今官廉毅為其大帥所知以其名請乃有是命非常數也今日建纛出郊乘虎皮韉弓韔魚服僕姑在冰衛士屛息俯首不敢唾嚏不敢仰視就而子趨離而鵠立整若斧兀若尸人皆壯侯能戢士謂冦固在其掌中余獨知其建州之戰夜半率敢死士深入斬首獻軍門今兹禦人之冦固實健且趫也亦豈敢自謂強敵哉其出沒騰蹂必輕騎遊韁無所止舍亦豈堅營壘嚴步伐而悉衆以為重乎以豫觀之蓋出穿窬胠篋之徒一籌耳使道上之旅去其畏心并力支撑而生死以之則形格勢禁彼固無能為也尚勞天子爪士之出哉况侯斬將之餘勇視此輩蚤虱不啻也無著手處矣戢士亦其末事别筵有詩余總其意為之序送祁君宗規出知徽州府序御史郎吏也然其出按方嶽宣使監司雖以耆舊老成至其地亦必郊迎肅入以時謁見左右腋以坐問更端則起而對下巡列郡守必俯立迎道左庭參必趨謝守地惟謹至支郡之守與諸縣令則望塵而奔唱衙以入跽請而拜謝守地不職視顔色以退其下倅簿百職立廡下固已奪氣改容局蹐盤辟進退維谷而已矣外而介胄之吏奔走喘汗於塵埃中御史坐軍中不知也雖然御史豈故為是哉自天子巡狩之典既廢其勢必歸於此亦治體宜爾也然尊孤易危羣射四至往往蒙被譴過十而二三九載最陟亦多監司之佐即前日之左右坐者也或歲未及則出守郡國即前日之庭參而趨者也夫以前日居然受之今日自為之懦者於此有改行焉傲者於此有陵分焉雖有天下易治之郡吾見其難也祁君宗規得徽州獨曰始吾以進士出知唐山人意吾有愠色吾而不以進士視吾身思吾嘗為書生也於是為縣甚甘庶幾三年無愆尤既而召入為御史人意吾有矜色吾而不以御史視吾身思吾始去縣令也於是立臺端按廣西庶幾六年上下無愆尤今吾為守壤地千里而又託于王畿之內無宣使監司之察蓋一歲之迎而趨者一二焉其餘固吾殫其力而為郡日也向吾不為進士則山隂之書生耳求一命且不可又安有是邪於是其寮皆知君之安其官其去是而為宣使監司必思為守者不責其所難為凡為守者得行其志焉自宣使監司而入為部寺臺之長必思為宣使監司不責其所難凡為天下之宣使監司得行其志焉所謂無施而不可其在君乎徽之郡良未足盡君也遂相與交贊遊揚以君為可法使豫書之為送行序夀中書舍人沈君七十序中書舍人直內閣沈君以能譯西蕃書大臣薦之上俾教西蕃館生於今六年君亦年七十矣館之生聚而謀曰今兹花晨之明日甲子也又明日乙丑又明日丙寅吾師始生之晨值之孰有豚羜維俎孰有鴈鶩維刲孰有醇酹維釃孰有幣維篚盍登吾師之堂展以為夀衆皆曰是不可廢也如斯而已乎則又謀曰孰知賈其往貿綃孰了畫其往募工盍圖吾之所以為夀意以是日獻衆又皆曰是不可廢也如斯而已乎則又謀曰館在斯閣在斯臺在斯其盍往丐頌言為吾師夀於是分走丐焉明日駢來則又聚語曰吾師教吾如其子吾無伯魚之疑其子視吾異姓兄弟也吾今不敢以師視吾師請以父視之必得能言吾欲言者序吾意遂羣然入吾室請豫實不能也然重譯之書亦嘗知之大抵體尚左行如龍文如鳥迹或如蝌蚪或如蟲之字于葉蝸之篆于沙世惟不能用之人亦未始之見也見之有不畫肚箝口面墻者哉然則猝然囿而館食之出其文使業焉則必先譯其聲而後施於點畫偏傍之間聲既與吾聱牙詰屈是又長年習騎然且先畏之而怠者半矣又安能帖帖然據案以終業也乎加以為之師者自珍其能曰是不可以旦夕至或曰姑徐徐將自化或益迂其途以捍其入則其上焉者恃有他途進而幸以黜其下焉固日茍一日黜不黜其聽之也於凡入館莫不皆然而西蕃又古釋氏之教所從起其華嚴字母既足以傅中土流百世為切韻祖則其制為文字深祕竒奧獨諸蕃比耶其師之珍而矜倍於他師亦無怪其然矣况望能有以教子者教諸其徒如君者乎由諸生言之信有父之道焉子之於父不以尊俎為夀而欲其永長存圖固無助也詩傳則名附以傳其為永長孰與於斯諸生亦善夀其師者哉豫為之序送憲副張君之任陜西序地之涯為邊衣之齊而緑也亦謂之邊凡器物之旁肉通謂之邊然則邊之云者封疆之盡際外此則為侯甸要荒所不及先王亦不得而兼治之蓋越邊而求以為衣求以為器物不可也然物之壞也皆自其邊始故先王於此尤慎之而重為之防非憂邊之民不足以抗之為之憂也憂夫無以使邊之民抗之有壞而入內之道焉之為憂也邊之民其生而風土之鍾長而氣習之漸大約與之亦不相逺其山海與之相陟降而浮遊也其飲噉騎射漁獵與之相錯而便習也父內而子外也子內而父外也或其身之迭為內外也皆不可得而凖也而或者恃吾關吾堡塞在猶謂吾封域如完衣完器物然其亦不思之甚矣於乎邊圉之寄可視以為何如而獨付之武人况憸人之與庸人乎正速其壞而已西北之邊古已不與東南並而西於今尤為多警洮岷亦西之一面生蕃西羌之所窺覬而比亦伏釁孔深天子以為宜得憲臣之有威望者節制之以銷之於未萌於是以監察御史張君為陜西按察副使往即其任君前奉詔按甘肅邊臣諸不職者朝議服以為能蓋肅之距甘也五百里是為瓜州瓜之西古玉門關也而中國之地至是亦盡矣計其道里之虺蟠蚓屈於河山之間腰腹脊脅要皆敵也其穿而入也幾隧其入而薄也幾城其變也孰激之其來也孰導之敗孰為之殿罪孰為之魁君在道時顧瞻躊躇固有定算而後諸囂嚚者無所動其喙不得盡其辭焉稱曰能宜也洮岷尤近於甘羌之強不及於諸畨偏禆將校非大將尊重臣而副使之得久於其任又非御史暫臨比也天子之所以用君烏得無情乎或謂君端公之老者也宜在朝廷預政事其出非宜是之謂不知務凡器物於其旁肉之邊倍厚之然後可保其恆完而不壞用君於邊固以厚邊也庸非所以重君乎此非豫之言也其寮言之於豫者也且使書之為序以為君行贈送大鴻臚丁君之任南京序𢎞治甲子秋七月鴻臚寺少卿丁君應韶擢南京大卿仍其寺也於是自戶部主事轉而丞兹寺至擢少卿凡十年矣泝而同豫登進士於今十有八年其前一年同豫舉順天也蓋十有九年矣於時應韶年最少廣顙而豐頤頎然凝立而孑孑髙望而逺志不見其非豫愛也遂屬望焉曰是吾人公輔器也然惟識之私心而已矣及入部得劇司人舉難之應韶若無營為事至而不知其何以為之也於是有鴻臚之選蓋廷選也人又以為奪所宜居而處非其據應韶則優優乎素為之者自以為不如如良御之御車而自中乎疾徐然久之自不能逃冕旒之明而辭兩階之屬目矣今日之擢良有由也豫昔之望之庶幾其有徵乎雖然豫忍忘應韶哉夫鴻臚之職在北為宣上逹下之要樞在南為優遊養髙之地少卿為下大夫之秩大卿則中大夫金紫之尊北則少卿之務偏煩而南則大卿之政益簡以尊之位臨簡之政簡與尊相遭刻峭孤厲常必由之而天下之能事去矣守其位終身焉猶懼其蹶也况進而有他覬邪有能反是而乘靜焉以觀焉遇有得焉而蓄焉蓄既富焉而俟以出焉雖進而大有為焉猶履常途耳况今兹邪以應韶之壯且碩而精慎又若是於豫之説必有擇也其何觖於豫之望也邪豫日俟之而已因同年之别之而欲彚於豫之一言也豫於是言焉慈慶省迎詩序蔣母太孺人春坊右中允敬之母也本滇産也先編修君宦滇時室焉敬之所從出也兹老于湘為蔣氏夀母享今封則敬之前編修恩也敬之入朝於豫為同年且同官砥礪豫也居多姓異族也實同生也母也有母我之道焉𢎞治乙卯豫督敬之歸迎來兹而遂豫之一拜瞻以為快既而敬之以丁巳至不果也豫懊之意者清湘水土時物宜老之品絶天下未忍遽奪其素耶或依依桑榆人之情也而尊宿遲莫之年又怖於逺且險耶或姻婭婚媾之恐去其儀刑耶將孫甥孩稚之不勝其暖暖姝姝也敬之之不能勇也殆亦如是而已矣敬之今也自院而坊有青宫睿學之校有講帷迭更之班有國史之纂而尚方珍異時出疊賜日倍於前於是始悔其曩也之不勇然違省已七年矣具書告於其兄汝守君不俟報遽入疏請詔乘傳以歸豫歡甚因之寓告曰清湘之産誠美矣然不知孰與宫醪珍羞與夫四方水陸之珍萬里之行長江之險若可怖也然不知孰與滇南人馬履迹之跋婚媾孫甥之戀戀不能置也然不知孰與膝下子婦之懿夫惟無較品物之相形較則美惡之自明也無嘗天下之大險嘗則險夷之自知也無忖一體之分形忖則親疏之自别也敬之之歸其勇乎其又可隱於豫言乎庶幾母之覺而許之而至於斯也使人見且拜之謂有是母也斯有是子也為天下母之勸也不亦快哉諸别敬之者聞之合辭曰善咸賦詩一章命曰慈慶省迎詩書豫言為序瑶池寓慶圖序𢎞治甲子十一月二十日太倉毛太安人七十晨也太安人范姓春坊右諭德毛君母也君嘗迎至京獲恩封既奉以歸不敢復強至是厭于憲度無緣便私以遂其登堂之慶蚤夜倣徨跂而南望焉則呻吟以戚入而趨班則已退食自公亦呻吟以戚明日復然嗣子貞尚少也雅喻其志跪而請曰大人起居愆于素甚得微有大母之在念歟得微有婆娑迓慶之悔歟得微念兒之體孱不足以給使令歟兒實壯也君躍然以喜曰吾不識兒兒何可人至是果能是吾其置觴與豆于匭又曰吾其製冠帔與服實之于篋命僕于潞河之灣曰具舟則坊寮中允蔣君舟也召日者于衢謂曰為吾差吉則八月壬午之剛也凡既具矣君又曰然則何以寓吾意貞曰兒聞瑶池為王母居者其桃華實皆三千歲願大母之夀如斯以副大人意然必有圖焉君曰吾其為繪事之工是徵君又曰然則不可無述其事貞曰大人職是文事與其事者是也君於是以屬豫顧豫亦何言哉其告貞歸至之日拜太安人於庭下進而致辭曰大人飭孫之歸日吉時良以利啓行水道二千里餘無滯無虞實附同官之舟無詒大母之憂及其夀之晨也垂圖於堂發篋獻服啓匭出觴酌而進曰大人以孫歸為夀其祝百歲康強于曾大父有光惟我後之昌不知太安人於是其將惟貞之祝也足樂乎其必君之歸而祝也而後樂乎語有之雖有離憂亦樂也君其可以無憾豫因於序圖之末道之云李氏族譜序玉山之李氏祖紹興紹興之李氏祖青澗青澗之前無所考考自馬翅谷靖康之難永竒舉族殱焉宋諡忠愍是已而子顯忠以先歸宋免後屢以忠義奮為宋名臣晚乞祠居紹興紹興之李祖青澗是也顯忠薨諡忠襄子以讓徙玉山遂為玉山人玉山之李祖紹興是也以讓名遜於忠襄子次第三也而譜云孝宗賜金帶迄不見他恩功臣子理不宜爾或其志不樂仕而其徙也實避而遁歟至其十世尚多抱德而隱者間雖仕仕亦止郎吏州縣之官蓋天於韜晦之裔益培息之使厚而大發之故此其遲遲也至十一世敬敷始有方面大夫之位則所謂厚而發者此其權輿而玉山將復如紹興乎可必也敬敷在刑部主事時圖系忠襄而下詳其事于左而肖其像于右彰善表爵至於其子之行而止凡十二世為玉山李氏小宗譜分司於淮時又上泝古初而旁及於他支凡碑銘遺文皆在為李氏通譜連為一卷於乎敬敷之譜之宜也夫物未有萃極而不渙者紹興之所以有玉山也然則自玉山而復為其他又誰能禁之哉又必有為之祖者矣故曰譜之宜也雖然譜國史例也同一備遺意也古者有功德者有天下其次有國又其次有家特國大而家小焉爾而備遺之意因之忠愍忠襄以有顯功而為紹興之祖以讓又以有隱德而為玉山之祖則自玉山而遞為其他於無窮必有功德者為之祖也譜特備遺一事爾而其實不專在是也敬敷譜成丐豫序敬敷名寬今自貟外郎出僉雲南有志於世况其族乎故極論之如此夀丁母八十序古松怪柏多于顛崖斷岫嵌嶔巖廣人迹之所不至者亦性也地也人也天也天之生物氣獨先焉而功則後者豈無説焉夫物莫不榮於春而瘁於冬突焉而碩者不數歲則蠧矣松柏無是也非所謂性者歟郊於大國者其山童童則舉盡之矣孰仁之哉迹與力所不及亦已耳非所謂地者歟金礦于山珠蚌于淵腰絙篝火極百厄期必致之而海外絶域能言之鳥獸及書志所不録之珍怪亦皆有以得之若神施鬼設然其他可知己而亦得以逃斧斤之患於中國者非所謂人者歟若夫狂雷斧之䃸磹焚之金石為塵是之謂天固亦萬不什一矣吾故曰功則後焉而人之生也人之功則先之獨異於是五體完具氣遊其中宣暢液浹攝為太和性固夀也宫而居火而食匪夷匪裔不病不顛夀厥地也兵革曠百年之見癘氣杳沒齒之逢天之夀人亦多矣乃若寡爾嗜欲時爾飲啜衛爾形祕爾精保合導引遹回厥真是天地性固不能為而謀者反是周身皆斧斤也吾未見其全人矣故曰人之功先之焉噫松柏之夀天也人之夀人也顧可松柏為人謀乎哉吾旴風氣遒徑其人類多夀考出而家諸地者亦然可見者若丁母其一也母僑居京師崇文坊相志剛大其資于舊且相什伯教三嗣仕隆仕元仕偉親賢樂善如儒人豫家食時仕隆仕元迭往來商于鄉歲轉還焉而日益狎故習知母之賢然而未及見也今年春豫至京訪其家入而得其棖孰之敞靚焉坐而得其堂宇之亢爽焉揖而得其子姓之恭肅焉俯而得其臧獲之趨蹌焉有是哉母之賢也既八月豫戰藝場獲厠賢書之三日實母八十之晨鄉人有事于兹者欲豫言以為稱觴侑豫為説松柏之夀庸著母之夀人也匪天也以人而全其天也逸逸其觴峩峩其辨曰趙之英曰燕之彥祝耶頌耶言笑晏晏松耶柏耶孰曰豫諺圭峰集卷四
