body:
  text: 圭峰集卷九明羅玘撰序送余克審之新昌驛序吾邑四出皆山也山之盡為平疇疇之最中且隆為郡城邑附以治故鬻薪煮竹山氓可以不饑而田漁之利在平疇商賈之積在城邑人恥他藝能以走四方而士之養髙深藏者又不市故登仕之版視友邦差稀然名宦間出其聲獨彰天下皆知有南城也友邦或後焉豈惟顯曹為簿尉為館傅為關徼為委乘皆能因職就事以效一官奮曰吾南城人也曰吾為某公某卿之鄰且戚也故仕者不必多亦能為地增重以豫之所見則然耳不知前此何如也今年春余克審以藩之從事上銓司夏六月得丞廣之新昌驛其𨽻于縣則新興郡則肇慶也新興陳公嘗守吾郡有遺愛而肇慶又吾族在焉吾於陳公欲因以弔其墓而於吾族欲因以通其問也吾於克審能無情乎况四年春克審奉邦伯之命來祭先君之墓聞其晝之所經無呵郵徒暮之所次不黔館突而又豆登俎徹有嚴有序吾固心賞之謂其為使可不辱其主者也五年秋豫免喪道藩欣然來㑹間侍其長之宴豫也曽無幾微析哀之意見於言面豫又益賞之謂其為從事可不辱其身者也夫仰事於崇髙志少奪易至於辱身而銜命於道途氣少縱易至於辱主雖從事者纍百於前而詭曰無是紿我也而豫於克審迄不見其有是而竊疑焉豈克審之先大叔父二憲公之訓言在耳恐辱其先故不敢辱其身遂至於不辱其主歟將南城之風與友邦特異皆不樂仕進偶一為之者又顧籍愛護而必為地增重也夫人茍有增重之心必求人所難能者為之弔舊恩之墓過里人之廬又丞之職無有掣肘而不可為者或以為人皆能為不足為異而故不為也冬官李先生同豫餞其行也因與之言送黃訓術歸新城序有縣於閩關之北曰新城水北東流入彭蠡之湖山皆北面勢垂欲趨於湖者而縣之吏若民亦附於旴之郡以屬于省合諸縣圜界於職方之圖亦順其水與山之勢然若於閩無與者然民日食茶笋醢鹽身被絺紵伐木為薪斧材為宮取礪取鍛皆閩之産而疾癘禱鬼神旱潦禜雩磔魃囚龍又皆閩之巫也閩之地無曠野皆嵁巖崖壁上出雲氣而下湫潭昧昧中多蛟螭龍蛇之窟故魍魎魑魅倚依為怪毒其居民號為鬼區民亦不能不習為禳磔厭勝之術以與之抗久而人自為魔為蠱為魘人盡巫也奈之何哉新城與為接壤日用大半資焉其不漸為鬼區也亦幸矣况疾癘旱潦懸於冥冥出於倉卒不虞之頃而或牽於喙喙之衆論洶洶之羣疑雖智者不免於召其巫蓋有不得已也夫不得已而召之事定而遣之猶之可也若召而來而又屢召而屢來遣之而不以其道而至於忘所遣則呻吟尚以為儒而况不經妖誕之說將不淪胥於民吾不信也昔人過伊川見被髮野祭者而有將為戎之憂於乎吾亦為新城懼矣然則宜何如曰在為縣者為縣者宜何如曰在所司司之者隂陽訓術也黃子暘以宦家子來京師一舉而中臺司之考獲是職而歸也豫故以是告之甘棠聽政圖詩序淮安郡守徐侯在郡六年視淮民如子民亦戴侯如親父母聲聞四馳薦剡日至于朝民聞相驚流傳一辭曰侯去侯去君子曰侯奚得爾衆心如是古惟召伯民又愚不達亦冒傳曰去去召伯云郡將陳操謂其衆言召伯聽政甘棠去而人思伯移愛甘棠兹爾衆不達冒侯為伯脫侯去無緣生思恐久泯泯雖伯亦將不知盍圖諸亦名曰甘棠聽政竊比於周人庶幾惠有所寄思有所生也皆曰諾圖成當時名人皆詩歌之籍籍乎甘棠之詠憲副韋公淮人也與豫議其事豫曰日辟國百里詩所以美召伯也辟之云者開而廓之謂也一日紀其速百里紀其廣也開而廓之速而能廣當商季駟馬橫奔之餘而欲安坐而制之得乎必其有翕有張有鬼有神簡五辭于兩造正五刑於五辭將日紛然于甘棠之下而其鼠雀之徒號呼痛苦之情曽不思拔其樹戕其人空其地而後為快乎庸詎止於翦伐敗拜而已哉既而漸漸然洗其舊汚薰為太和是之謂辟民見其樹雖不欲存亦不欲拔睫外之一物而已及伯去為司空為太保而代之者未必伯也而後思伯之不可得見伯之所舍如見伯焉故昔欲拔而今不忍傷又歌詠之而其悔亦晚矣今侯亦有伯之心哉不然前日聞侯之去其不擠排之如欲拔去者幾希而况相驚相傳乎操雖賢何所利而圖之侯位亦未崇人亦何所阿附而詩歌之也往時侯為御史好直言今世無有以獒貢者安知其不有疏而淮堧瀕海之桑麻日益辟圖詩之作又其未去時去必為大官夾輔是期老而告歸載諸信史更千百年尚有談者如甘棠之詠不獨賴於是圖乃可貴也韋公曰然命操書以為序靜菴沈先生榮壽詩序監察御史慈溪沈君入院之數月能其官院之長譽之朝庶僚譽之百司庶府百司庶府日有求識君者甚欲相見君之尊甫何如人其以何教乃爾而靜菴先生尊重人方養髙味道慈湖之濱人或郵之若罔聞知益以教來督君如他日君用是畏惕勇邁躍躍院且欲薦之㑹江西清戎行院告代乃以君請上遂賜之璽書陛辭就道道出淮徐濟江入勾吳抵於越越君之土也能無信宿之懷况先生生乙巳明年甲寅相直為七十省拜預慶因忠為孝此其時耶夫有以成之之謂教施諸用之謂能享其子貴之養之謂榮齒尊於人之謂壽數者常苦不相遭也而皆適其㑹之謂時先生之教其教諸人乎抑家也則教之成邪君固其子也其弗成邪君亦其子也將若之何哉而遂别其為御史以能見譽於其僚與長而為明天子所屬任而曰吾將享其榮可乎君為御史院列十有三道兵食鹽鐵芻馬獄訟按糾之務紛如也更出而迭臨之而又省覲有定期地里有嫌避即先生雖百齡君有所便私不可也而况今敢必于鄰藩之行而因以省慶乎故曰數者適其㑹之謂時也古有求簡而失如教何生而無慧如能何或能可用矣而未必榮或榮可養矣而未必待皆乖於時者之為也故古之聖賢亦不能强于其間而沈氏父子之遭亦可謂盛矣豫君之部人也當離觴之末而司諫周君合在坐皆賦榮壽詩授君歸為先生祝豫又推教生能能生榮合壽而序之曰一時遭之盛也先生必笑曰然送賈生歸山東序壬子暮春中吉有偉一生欵門願逞其藝其入空裊裊疾風掠耳驚電耀目兵貴鋭先以矟隨以劒也其飛塵走石怒猊突地文虬過澗兵貴堅繼以刀夾盾也其輕車走坂鐵騎渡冰兵有鈍擊利奇以殳也已乃屏五兵戢氣挺身赤手渾脫游絲牽蜂飛炮下石顛倒辟易駛奔鳥厲蓋兵外之用也奇之奇也以徒搏終焉畢則出整冠裳趨入長揖而告曰盈山東武定賈氏子也世𨽻校扈蹕籍童習是藝壯遊吳楚諸州遇敵角纍百然皆逐北披靡雖然敢任匹夫之勇之豪也日既壯退然羞前之為恐終泯泯墮於無聞幸哀惻之賜硯池之餘滴則兹之覿實沒齒之寵光余既壯其藝又察其辭因歎世之食于武事者恬恬嬉嬉美食安坐酣歌淫佚何所不至嵗月藝場之試殆兒戲耳一旦有警神飛股栗遁逃無地亦賈生之戮民也况生喜文辭自言為商文公諸孫所器出其囊徐察院之文在焉與之言用旌其志賀監察御史鄧君考績序仁和鄧君良臣為御史既三年實𢎞治癸丑秋九月也三年於制為初考考必於其院院符吏部部考之亦制也院考良臣稱部亦如之大約皆謂良臣以明敏之資發優長之識稱所謂御史者雖然良臣獨稱為御史哉隨所任之無不可也始豫丙午冬見之崇文邸舍中退而忸怩者纍日歎曰吾安得如良臣乎明年同丁未進士進士三百五十人見之若有不克見者焉豫喜自慰曰不獨豫之不如也豫竊祿翰林已酉良臣亦選試于院庚戌為真御史尋被完城之命豫且歸矣壬子冬豫至京良臣已巡城西隅監內帑赫然有能名於時又出稽邊儲于湖南諸溪境上豫入自崇文間出正陽門外自德勝門出謁祀諸陵訝周城有新堊而周隍有新流本其自於人曰良臣前被命督為之間遇院中人必曰良臣傑魁人也及兹自湖歸朝不以家隨僦屋以居裘馬暗如也而出入休休然豫又喜自慰曰不獨進士不如也况於豫乎已而上其考考有今稱今稱稱御史耳其未為御史固進士也必稱於進士然後為御史其未為進士固鄉進士也必稱於鄉進士然後為進士前乎御史無乎不稱也後乎御史將必有大於此者其有不稱乎豫不信也其同官劉君公奇聞豫言與諸同官皆謂豫知良臣者來使為序况良臣方受命出按江西豫私喜邦人將蒙其休澤也樂為道之以俟壽王君六十序𢎞治六年進士録行諸進士之父兄名氏因得以傳自京師遍于天下今南大理評事慈溪王君父隱君名在録中慈之仕于朝者皆曰是吾邑之名能教子者也大理試儀曹其事修其行潔慈之仕于朝者又皆曰是隱君之教然也由是士大夫無不知大理亦無不知隱君者大理方為進士時制折遣進士之半歸不在遣者以得先效一官為榮而大理獨若有不豫色然慈之仕于朝者又皆曰隱君今年年六十是不得歸為壽然也由是士大夫知大理者無不知隱君之年亦無不知大理之急於其親也暨大理得南寺才迂十日之程則膝下矣時雖差後不猶愈於不歸乎况其始來也一布衣耳為人父於其子之歸自萬里而無有害災雖布衣亦樂也而况輿馬僕從充斥于庭自顛至踵冠服鞶舄亦一愕然更革而拜于前其心何如邪夫人自非狂惑喪心未有不欲其子之為士為大夫為卿且公也何哉誠有所利之也子無以承其志雖日侍於其側蚤夜刲牲以為養搔其痛癢以時興居之父其有不呻且嘯甚至怒罵而捽去者亦忍而已矣要非其情也况隱君躬為之不果而屬以為大理者哉即大理曠十嵗而不歸計當由士而為大夫隱君時則七十而為大夫父矣又曠十嵗而不歸計當由大夫而為卿隱君時則八十而為卿之父矣其心顧不樂歟而一觴之拜啓若非所急者而大理乃爾噫其真急於其親者邪方今求忠於孝爵罔及惡德而髙巖大澤間有封君焉未必非善教其子者也亦未必非耄耋而康彊者也大理試南宮豫時校其文遂為知已院中庶吉士其同年也將因之以頌隱君而屬筆于豫豫故道其實如此是嵗冬十二月之吉也迎養南還圖序豫友毛君世誠守髙郵𢎞治三年夏五月豫過焉世誠犒豫舟之人以壺飱而飯豫以糲糜不以粲進律豫以名教甚厲然舟之􅀈外已有蓋蓋下有輿輿傍列夫焉指曰用此迎子入吾舍與吾翁語今夕吾翁竚門須子來也豫不言解舟泛湖而去憮然思之世誠少豫五嵗擢髙科為大夫守天下要㑹之名州能不為吏事所困以其扁舟迎養其父此天下奇男子也而豫也營營奔走蹄踵半天下僅獲斗升之粟曽不得炊一匕以入吾親之口而至是銜恤以歸尚誠人邪顧愧赧之不暇又忍能侍翁之側而上下其議論乎已而又思之世誠始以舟迎翁以舟來縣大夫得無有供張之餞乎得無有鄰並長老亦送之而見者乎鄰之長老無有子若孫馳逐於進取之場如世誠者乎然未有以舟自宦所而來迎者是未可必也迎斯往往斯大夫餞之矣不獨於翁然也翁又奚以此自多惟其驚潮汐於錢塘詫靡麗於閶門睇金山窺鐵甕于長江浩渺之涯以望金陵淮南諸州沃野千里皆在步武之下而跂焉以瞰中原北仰宸極於黃旗紫蓋之間而舟之所次或菰蒲淺水星月之宵而其發也或金波萬頃初旭之旦風水蟲魚迭變於前而城郭山川一瞬息而異狀其胸中寧無灑然於物外者邪鄰之長老有未試嘗者歸皆可語之以寫其舟行之大觀而至州之樂必不以告人此則翁之老而壯也而世誠顧欲糜其友以為翁留豫雖咈其意然其於親也亦篤矣或者翁其曰若方有公事毋為吾乃爾豫意縣大夫餞未幾而又迎也已既九月世誠自州以書來曰吾翁歸矣有圖焉屬子以序豫依違至是三嵗又入院矣始克繹其舊說以補之云行曹便省詩序豫同年溧陽史君為户曹未幾月豫往訪之其寓舍之扉闔閽人辭曰出郊視外廏之芻之給之他日又往辭曰外之廙圮往苫塈之或曰監漕舟之輸也或曰發六軍之餉也或曰內帑之鋌鏹出納之或曰商賈之市折閲之期年道上之遇再焉立馬語未竟蓋振䇿矣豫歸三年其出勤勤意亦不異是豫來君又有遼海之命踰年始歸而淮南行曹當代自其長而下皆曰必君行乃可計其席蓋未暖而轍跡所至北東西皆一周及是始得南馭有舟行之安有攜孥之樂有風聲氣習之近於其鄉有時節水土之物以貢於其親况受代而可以歸不必請也則是行也自人言之雖若勞君自君言之適以便君也庸非幸歟昔禹之治水也八年於外三過其門而不入其身心之焦勞手足之胼胝方且乘四載恐上丘陵之未髙下淵泉之未深以盡水之變當是時禹真忘其家不知其親哉入門之小恭不敵天下之大患也又安知事機之㑹適于入門之頃萬一挫敗前功棄之則九州乃壑民其魚矣而身亦與焉况於其親乎况於其家乎禹之權此亦審矣而過門不入不得已也世之愛其親者復有賢於禹者哉而今之天下無不得已如治水之事而一官之職無司空之重且專人之勤事者未必禹也而有門不入則欲附禹以為名可不可也君今戾止淮南距溧陽尚五百里重以長江之阻意已視為門户間寤寐惝恍如將見封君安人焉旦代而夕歸矣不敢少附於禹而察其前之勤於事又若希之是其心有擇焉者也行且有日朝之士皆為行曹便省詩君擇於衆謂豫詩品最下也退而使為序送李君知華亭縣序陽曲晉分冀土也潼關秦分雍土也華亭吳分揚土也春秋之時晉鄰於秦婚姻之國且脣齒也然而亦各私其才量而官之客卿蓋亦無幾焉秦晉局其人而仕也亦舊矣矧吳擅其雄於海隅邈乎風馬牛之不及於晉也晉人且不仕於秦又焉從仕於吳哉言偃之宰武城吳人之仕於中國則有之矣彼亦就其師而學之因而仕焉耳中國之人固未聞仕於吳者也秦漢一再更天下非春秋之天下也吳非春秋之吳也循至于今其勢之倒置亦相懸矣盡中國之賦不能當江南之半盡江南之賦不能當吳諸縣之半古稱秦雍為陸海言陸地物産之富如海然吳海邦也其真海邪故朝廷官人之法可以治晉者未可以治秦不使以治可以治秦者未可以治吳不使以治而縣之長吏尤難宜得通經學古辨博之士為之我陽曲李君前以進士出知秦之潼關潼關大治而以憂去㑹華亭方虛其位而君適至遂承命以往且以旌其前功且以俟其後效有日進之象焉不待智者而後知也吾獨以為世各有所遭不獨於其人之賢不肖而已春秋之時管夷吾晏嬰子産狐偃趙衰之徒亦一時之雄傑也而皆沒齒局仕於其國其列國之山川道里未必周厯而遍觀也其民俗土風未必交互而試嘗也其才之所施豈僅足充一國之卿而顧不足齒於王朝邪由世之局之之過也今之仕者果盡賢於數子邪將亦比肩而已也如君之仕未五年既西而秦雍忽東而吳揚更數十年不知其超忽又凡幾其進而赫爾具瞻固不必論也而周遊壯觀亦過於數子逺矣然更秦漢以來其當世䓇爾真若可慕者而皆與物湮沒於無聞而數子者尚如有識其面然則人茍賢矣其身可局其善名固不可得而局也矧今非局人之世而君又有志於古而不局者乎君前治潼關主以凉法而濟以溫和蓋晉冀秦雍治體大約宜爾及是命縣之有名位者以豫之知君也欲以聞其政君笑曰凉之溫之與時宜之於是皆知君之果不局於政也相與合而餞之而屬豫為序賀監察御史白君考績序我國家罷諫諍之官以付之給事中付之御史御史又有仗前之糾有獄訟之鞫有幾微之察有城隍之巡有帑庾之視有考試之監有學校之督有軍旅之清有河防之理有鹽鐵茶馬之按有行營機宜之贊最大且重者則方面之監臨往得其人一方治矣天下凡幾方而往者亦凡幾人而天下之治繫焉則不獨局於諫諍間如給事中而已也有二醫於此其一專於攻尉者也其一攻尉湯飲兼者也癥也瘕也痬也集二醫焉必專者之奏功也分其功於兼者亦可也不然天下之願治尚多於癥瘕痬也皆兼者之功也人見其不屑於癥瘕痬也而曰是焉能攻且尉則狹矣不知專者嵗一收功焉兼者日一收功焉日之與嵗則有間矣御史之於諫諍也何以異於是吾友白君孟禽始為御史人皆曰孟禽西秦人博而文且鷙也其將以諫諍鳴乎既一年事至而徐徐以治操斧而剖竹者也二年事至而笑談焉恢恢乎遊刃於竹中者也三年事至略無睥睨之立解焉竹迎刃而破者也臺中人曰是何奇也而尚虛始之望或問之孟禽笑曰吾為親以有待也噫此殆非也蓋孟禽其知兼醫之大體者日一收功焉者也彼欲快於目前者反以專醫望之而欲嵗一收功焉宜為孟禽所笑矣雖然古人有五年六年不言一言為萬世重者其在孟禽歟孟禽考績于今兹其寮例有序以賀郭君廷用來使豫為之後之有重於萬世則天下皆賀之又重於兹賀也不知秉筆者又誰焉豫則非其人也南團曽氏族譜序寧都南團曽氏重修族譜曽氏之彥曰政賢倡其族而為之也曽於周為國君為聖人之徒為孝子於宋為名臣為文章巨工於皇明三魁天下雖庸衆人皆知之也周秦漢南方氏族未有曽也莽之亂大去其族于南居之今睦陂其胥宇之始也由睦陂析而為新陂為龍潭又析而為望仙又析而為市山為後湖又析而為下村為臨池為小源南團則自臨池徙之者也故是譜也名曰南團譜為南團之曽作也然則南團初無譜乎有之洪武中國良之譜贋譜也或用之恐久而失真故修之也奚據乎元鄉貢進士光賢之譜舊譜也近搜於敗篋中得之與諸墓之碑合族之甲曰是乙又曰是丙又曰是不得舍此而取彼也於凡南團始祖而下葬有墓墓有田墓必摹其碑田必稽其所某嗣也某絶也某昭也某穆也必附見于其下便考閲也鄉鄰之大姓墓近域田接疆雖讎也不以嫌而沮雖戚也不以清而阿必合其譜而訂之慮有怵於勢昵於私叨於財舍其田而藝人之田者也下村也臨池也小源也同縣也其㑹譜也易市山𨽻南豐其府今為建昌也望仙𨽻樂安後湖𨽻金溪其府今為撫州也睦陂新陂龍潭𨽻永豐其府今為吉安也凡為府者四皆逺數百里其㑹譜也難然亦無不厯也始於𢎞治元年迄今有成於時實五年也既成合族之人謀曰吾欲壽是譜而奚若或曰盍鋟之或曰金石可渝也或曰從古以來不朽惟文字皆贊曰諾曰其誰宜為或曰京師文之淵也遂來至又無所刺謁丐傳後世的然無疑者乃得豫豫慚甚然實居相邇也世相婚也讓至再且三而不得也傳曰國於天地與有立焉曽舊鄫國也去其國名而氏焉今不知其幾鄫也傳之言信哉豫其有幸焉以託於曽氏也已壽吳巨夫七十序司諫金溪吳君懋貞家有三老焉其一某其一巨夫於懋貞皆為伯父其一則懋貞之翁也懋貞在諫垣每思乃翁則及二老焉今年自仲冬丙午至季冬辛酉旬有六日耳二老於年相次為七十懋貞歸思浩然欲請以情拘於制欲假以事限於地與程㑹有關西之命途以疾聞俟詔于衛以書屬宗伯徐公言而以巨夫俾豫為序持歸以獻噫道岷江而入于海者出灔澦束瞿唐以下夷陵厯百險而後見夫平波漫流山雲開而水光風雨霽而景媚以為天下之險盡矣而弛焉弄其舟以嬉此猶未可以言海者也然而亦有至焉者幸也非道海之道也至於渺之以洞庭之瀰漫而不迷簸之以揚子之奔騰而不顛而後望之茫茫洋洋不以朝則以夕至矣是豈孤航獨楫之力哉必有為之先後者也今巨夫之舟其帆之影亦既割金山而下揚子矣况有前舟以導之乎吾當上太華之巔而望其􅋈于蓬壺之島也豫又嘗訝人之於宦亦海也以其舟旁午而道之而不思有膠舟焉以自覆溺於驚風駭浪下飽鮫鰐黿鼉之腹者不知其幾矣不能至海而反害之海亦可畏也夫而懋貞方以盛年負大才譬之舟則萬斛而新試於水者也乃能晦避於潛沱之隙以俟其定其能候風潮而知進退者邪他日有至於海者未必非此舟也故豫既以况巨夫又以况懋貞使知吳氏之舟一進焉一退焉皆終於至海者也而并以頌吳氏之盛送李都水之南部序南京都水員外郎李君豫為童時見之庠舍中蓋君初得解歸南豐道吾縣吾縣是嵗解荒老生皆走匿豫雖稚然已心趣敻脫好出見之不意君真古貌乃爾後三十年豫成進士官翰林歸自京師君亦以南京禮部司務居先太守君之喪于家始又克見焉而君貌加瘠行且老矣三十年間其在大學五試藝于春官凡十有八年為司務者八年豫每聞其錚錚有聲蹶而益奮間誦其歌詩皆雄健慷慨錯以奇雋有盛唐風至其幕署清風盥手則掬其井吏不敢以巾授而飲漿啜茗率供自私室內外交斬斬然豫意其豐碩壯武乃能如此將非復豫見時李君也及又見亦如之反甚焉噫遙以貌定豫已陋矣君既免喪北來已而豫亦至君已留司務工部制司務月朔當仗對班行私目曰么而癯者誰邪或曰李君也曰是吏不敢授巾者邪故班行於君獨了了君亦有以取之也君雖向老益以清苦自持祗出入禁闥瞻清光官達不達略無加之意而願每與違且是行也然丈夫生而依依丘壑服布韋茹蔬飲水竟與田夫野老同歸於泯泯者何限為大夫與元老大司空相可否承事足矣况乙夜之學方日孳孳或讀晏嬰傳而悲其不生於今世而求其貌似者㑹有召君時也君第往哉送陳君以照歸滇南序滇於廣為逺於湘又逺於京師又最逺以無勢位攀援之人行最逺之地又最難甥舅之情親姊弟又親而母於女又至親以親親之情彼已交向雖在萬里常如户庭悲喜弔慶不至甚相暌隔如日接膝而不知者其情真則其志鋭其志鋭則其力至又何逺且難之有滇人陳君以照吾友蔣誠之敬之其甥也敬之之母封太孺人其姊也今年奉其母之命來視其姊與諸甥也誠之令南海𨽻廣府則自滇而道于廣母之意先達於甥矣太孺人享敬之之封居湘又自廣而道湘不惟姊見其母甥且見其姊矣敬之為翰林編修居京師又自湘而至于京師不惟甥見其姊甥之兄弟亦相見矣兹又致姊與甥之意以達于母且自京師反於滇由是孝友藂于一躬水陸之行凡二萬里也惟從一羸僕館餼騎乘一無投牒以資人若甚難君若甚易非豫之所謂情真志鋭而力至者歟古者列國卿大夫家相婚無敢越境今天下一國也士易土而仕固有不得已而婚于他境其勢然也誠之先府君令于滇之河西故太孺人得以滇女女于其室至兹屹為蔣氏壽母而享其子之榮君與其母於湘漠無聞知特以太孺人之女于府君也多其甥之賢且貴號於鄉曰吾湘中之甥今顯于朝矣孟子曰行止非人所能也况君今日之行行且再萬里而可以為人事之適然者乎不知其天者已定于數十年之前所謂情真志鋭而力至者亦今日之理所有也君為人誠慤端恭殊不類介胄中人人創見之不問可知為展甥舅也於吾友輩丘君再成尤善豫亦不在所擯也於其别銀臺陳君為敬之序之再成又欲申其所未及以廣其見母之對俾母如見其姊與甥又知其素定於天也而無所追悔焉而屬筆於豫若夫江湍海潮南天之勝濁河太行大都之雄君自與滇人語之養氣俞先生挽卷序有令於人曰而父邪而祖邪其生也吾辱之其死也吾毁之雖不必辱與毁也而已讎之矣改而曰其生也吾任之其死也吾誄之雖不必任與誄也而已德之矣夫人之情一也亦豈好讎而惡德哉誄之興也有由矣酪漿醖於家而爭市者悅其甘也烏頭鬻于門而卒不售者惡其毒也人亦難乎立言者也抱鴟夷而號于門牢關而拒之善主酤者不為也勺溲以紿之斯甚矣執牘而號於門牢關而拒之善立言者不為也包藏以譏之斯甚矣孟子曰仲尼不為已甚誄之多諛也有由矣東鄰之寡母有司請於上而旌其門西鄰之孀婦立其子而詈之天下之不詈其子者寡矣而欲子之不為誄也難矣是故百斛之粟農夫之富也百鎰之金蓄賈之富也金石之文世家之富也居今之世而欲不貴於是也吾未見其能也養氣俞先生信豐人既殁之三年人之誄先生者至成卷帙其孫溥計偕來也實挾以行豫素善溥溥來丐豫序豫之序所以作者之意與時之好尚云爾蓋有感也然溥通三傳有氣槩終當一鳴於時先生其附溥以有知此溥之事也豫言其足恃也哉送范先生致仕榮歸詩序翰林院檢討掌助教事豐城范先生引年致仕歸其鄉豐城於時朝士為獨多諫垣涂卿元李充昭卿元之兄卿宜在臺為御史充昭之從兄充節在臺為司務熊文應為尚書刑部主事丁質純亦以祠部主事起復至於先生皆有連也合而餞之為一筵人詩一章豐城𨽻南昌季本清官如卿元熊成章官如卿宜適按廣東還闕下艾德潤為尚書武選郎中周公儀官如文應皆南昌也又合而餞之為一筵人詩一章南昌於江西為首郡其友邦也臨江則翰林學士禮部侍郎傅公撫州則翰林學士禮部侍郎徐公工部侍郎謝公饒州則刑部侍郎戴公吉安則太僕卿彭公建昌則翰林學士少詹事張公人詩一章而豫與直祕閣中書舍人洪肇和得諦觀焉因拱而歎曰盛哉先生自景泰庚午歌鹿鳴而來也計其時卿元諸賢尚未生也傅公諸先達尚縻于鄉也於今四十餘年諤諤朝端而天子寄以耳目前日之未生者也屹然鈞台而邦家賴有黃髮者在前日之縻于鄉者也而兹㑹也又合而咸在且賦其歸焉則先生於鄉邦之榮枯代謝忽往而忽來者已如逆旅之閲行人過客日付之無情而己而實亦無如之何也其於功名富貴曽尚足以之橫於胸中邪若夫諸詩擲之鏗然有聲者當長留天地間為不朽物先生明者也必躍然一笑曰吾其有賴於是歸也哉詩例有序卿元肇和以命豫豫故云圭峰集卷九
