body:
  text: 圭峯集卷二十八明羅玘撰詩五言律贈常州太守楊恭甫每遇毗陵客聲聲頌府公心如有神助政自與天通子信二千石吾今六十翁邇來無一字相見在秋風榮休卷為撫州謝千户題吾亦欲休去多君休更先手扶新削杖弓解舊彎弦却對寮為客翻疑身是仙五老尖上月夜夜照間眠夀澄江先生八十詩久共浮雲倦為霖記昔年分隂屯緑野觸石布平泉點綴皆形象卷舒無際邉夜深望南極已次少微躔夀涯翁先生六十五嶽氣完日重明麗正初夀星聚奎璧吾道此權與誰不登堂室多曽訂魯魚白頭王孝逸北面敢徐徐送王太守之福州建溪難椓杙黎嶺可捫天行路無多日居官動幾年心忘書郡最身要得民便不用磨崖石口碑容易鐫挽馬侍郎先生夫人詩嫁衣猶在篋翟茀只存圖篋啓逺追日圖披虞祭初天曹觸訃哭方伯得輀扶無復聞鐘起朝催學士趨沈侍郎七十詩陽羡城邊水征西廟後山氣應作雲雨公獨住中間昔道九州隘今隨一鶴間且當熙皥日春酒駐酡顔送户部張尚書歸南海御史大夫舊尚書户部新不如歸去好猶是自來貧壁有留詩句路無逢故人潮聲才入耳始覺嶺南身送工部洪尚書上京南都送司寇北部迓司空船底氷初泮馬頭花正紅班齊丹陛左朝罷午門東誰問考工記年來盡屬公夀尹老夫人八十詩世上西王母山中老縣君閣同周吉甫膝繞晉參軍宫錦歸時賜璚漿宴日醺黃州碑夀域吾意亦云云送上舍凃生歸新城生之尊甫豫友也今任海南故末及之燈火從鄰乞虀鹽得僕便眼空天下士足踏崖頭船數去心如箭思家日是年更堪䨥白髮遠在海南邊送少司寇張公赴召天子念南東中丞理大農隨機足扄鑰據案泛蒙衝詔下星馳火卿行馬似龍周囹已空寂好更著苔封送何司馬赴司寇召騶響來春騎酒空移曉船彩雲更紅日碧水與青天束矢鈎金事黃旗紫蓋邊不須登峴首行看有碑鐫題盟竹翁卷謝中府父也如公真不惡種竹作人看有酒對之飲抱琴於此彈但隨天旦莫肯逐世炎寒莫道無遺蔭參軍且轉官夀樂堂團團椿樹影細細藕華香天上神仙府人間夀樂堂無時不歌舞此日且笙簧便是長生術何須却老方送馮銀臺赴召詩唐人少陵杜虞氏納言龍官住兩都遍詩求百代宗金山渡頭寺鐵甕望中峯若度盧溝月可通書一封送丁驛宰之直河四水趨淮水南舟間北舟流行無晝夜來往自春秋能似阮青眼方為王黑頭萬金買竒術一味向人柔松月先生挽詩姑蘇一夜雨端為泣倉公太史夢中見使君歸去逢松枯月色淡火灺藥爐空更恐少微墜吾當瞻昊穹唐給事中挽詩待旦思投匭詰朝忙蓋棺於人皆是夢似此更無端黃屋住來好瘴鄉歸得安丈夫不難死孤負寸心丹送萬典史之黃岡城腳更無地門開直到江縣樓對魚市驛舍接船窗鳥立藏蛇竹蟻緣繫馬樁聽琴還聽笛不是故園腔送蕭舉人歸永州夀親不瞻䨥白髮已是幾青春曽作還家夢終非戲綵身南山天共老東海古無津此意誰應識瀟湘行路人送張元興歸鉛山鴈落雲低樹馬嘶風揚沙君今作行客吾敢詫詩家內史忙歸院兵曹蚤退衙殷勤一樽酒明日是天涯哭仲松東通政嚴父省郎泣佳兒老母悲俊才先帝識竒術病夫知淮上荒三徑松東喪一師是誰衰朽質吐納為之司挽羅永升母青眼詞林伯白頭國子師淚乾惟血繼心急覺歸遲熊膽曽嘗夜金魚未碎時東鄰有嫠婦傴僂更何之送毛維之歸省詩冥濛鳥飛疾亦未若君心夀域同天闊恩波似海深衣當笑時舞酒瞰醉前斟尚憶金蓮炬中宵出禁林送尤溪胡㷬司訓司訓千户之子職清終是貴路近即為家市有人㩦菌船多客販麻從前州號劍隔嶺縣名沙日日傳書至建昌千户衙送苑知縣考滿還盧氏家居瀛海側官任洛陽東縣劇民偏困心清政自通合編循吏傳薦奏大明宫三載方書最九遷殊發蒙送曹進士知貴池到江真幾里為縣可三年心自難忘蜀官還只住燕鶯花縈别酒楊栁夾行船向日登瀛客相期禁籞邊送周仁夫赴長沙司訓道大青天闊官間白晝長眼中礙衡嶽心底湛青湘詩到窮偏妙人難老更狂何時一樽酒風雨夜連牀馮户部員外父榮夀詩瓊州人報道過徐聞皇皇龍鳯文老剛緣子貴祿幸自天分春酒屠蘇氣宫花錦繡雲茫茫孤嶼上千里寄書勤送徐德章中舍捧詔金陵便省宜興閣老孫上方消息杳傳語落人間南國持旌去東吳衣錦還入門便繞膝登馬強看山可過先公隧荆溪第幾灣贈信豐余德洪入南雍詩滕王閣下路徐孺宅邊船夢到猶疑穽别來真是仙啖虀聊逐伴負弩􅍦歸虔不訝冰衙冷還留一半氊夀樂安謝宗伯弟紳六旬紳刲股孝子也犀銙黃金帶隔身圍幾遭號天原是癖肥義若為叨形與故山老名從何處逃難能步南極可有一星髙無錫華封君七十時其子員外慮獄過家便慶七品去年封七十此時逢子歸殊殺伐老自不龍鍾賔是毗陵守鄰為無錫農惠山泉似酒恐亦有僧供送彭世傑之廉州經歷臨川人百粵通丹徼孤城對海門珠光夜炯炯蜃氣晝昏昏但得參軍壯能令刺史尊明朝萬里别吾意欲忘言內齋為淦邑謝能順題溝平水不咽林密鳥無驚花笑因風動門開覺犬行詩成潛索筆燈滅暗移擎人亦常如此君何􅍦得名菊莊為陶處士作陶令公然醉生涯半草萊門從前日掩菊待幾時開山近還堪竹亭空只欠梅中泠有泉水欲引過江來送人之建寧衛經歷其父祖皆仕閩油帟瘴煙濕牙廂蠻語喧參軍心似水飛將臂如猿鹿向無人瘞蝨於知已捫閩官已三世不必論卑尊夀黃壁父母同六十相對時相語燈垂幾夜花吾於女共老天與子還家眼目南山頂心神北海涯不須髠白髮留取著烏紗和吳克溫直禁衛卒韻二首天街立爾矛夜直敢言休步急足連足衣鈎頭觸頭餓焦腸似線凍裂頸生疣終不思為盜竊君狐白裘又燎影晃霜矛周廬夜敢休足旋蟻上磨項縮鱉藏頭髮凍凝懸瑱盔拋勝割疣三邊幸無事霜重好披裘送姚治中歸納納乾坤大紛紛冠蓋多相逢齊道隱到老尚奔波京兆才三日臨川留一鞾彩衣是潮絹公也好婆娑送易世臧歸新喻包篚東南物京師天地中雲間瞻象魏馬上遇王公賔館金蓮炬歸舟紅蓼風古人别三日刮目待吳蒙挽錢太僕父吳山蛻骨仙遊神何處邊更越十餘載剛為一百年深衣扶老杖瘦石紫芝田詔許增新諡先生舊姓錢榮使夀親圖為郭廷用作離家十二載戀戀老萊衣樂浪從東去遷安便北歸銀魚懸白屋驄馬卸金鞿候吏如相信終朝莫叩扉鄉進士邊君豫友屈君之內弟也不得願而歸豫重屈及君詩以道意蠶食葉聲慣衣沾栁汁無久之天自定過去事皆虛得路歸瀛海登堂拜大夫便便盡經笥好在屋東隅送楊知舊歸關中秦語鄰兒得歸衫母線多離筵添許我行色去由他儘是家來近其如兄憶何定無勞齧指嵗嵗此婆婆長春軒為清江劉先生題竹密年年筍樹多日日花天應憐老景春且住貧家鄒氏律吹谷建溪鼓喊茶終須窺造化不似此生涯郭節婦郭郎中祖母也抱子哭夫日抱孫哭子年身危將纍卵心碎甚飛綿孤在千金重郭亡一髮縣萬鍾生不待秪買墓邊田童給事便省歸蜀百四十八嵗中分當此年相看似賔主人擬是神仙冠忽加頭上子方歸日邊丁寧焚諌草恐與蜀人傳送少師徐先生致仕歸宜興有鴈如鵬大南歸正趂公低飛無渤澥回首失龜蒙野水孤雲興白蘋紅蓼風丁寧後來侶吾已到吳中敦艮齋為清州胡居士題玉興根盤壯清洲枝蔓稠山於眼中老水向面前流世自多岐路吾非不繫舟韋編任三絶夜夜夢西周無題大隱隱城市逺遊遊帝都君今成老叟吾尚滯癯儒對酒情濃淡思家夢有無一聲天外鴈南去可相呼圭峯集卷二十八
