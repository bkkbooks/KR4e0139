body:
  text: 圭峯集卷十八明羅玘撰行狀故都察院右副都御史謝公行狀𢎞治七年夏六月二十三日庚辰都察院右副都御史長樂謝公卒於家其子鄉貢進士廷柱厯中書事得訃泣以聞上詔禮部遣祭工部遣官營葬事蓋公品正三階通議大夫實在廷大臣典禮亦宜之公諱士元字仲仁登景泰甲戌進士官戶部雲南司主事建昌知府厯廣信永平二府四川右參政右布政使至今官揚厯凡三十有七年𢎞治庚戌年六十七以疾請歸長樂疾良愈又四年疾復作至是卒年七十公自為童時已嶄然敻出即知為學嘗在鄉校陳祖妣中書舍人登之女弟也最名有識鑒過見公在羣兒中目光如炬喜曰吾恃此孫大謝氏又嘗於僧樓居陳夢大星起樓上寤而覺公於居以為公占既長通毛詩出入諸經子史為文詞非古不學場屋之習其餘事也故禮部廷試皆入髙等在部督通州倉首陳四弊大為部諸老所竒而苦於持正尤勇與閹人敵閹不勝忿欲中傷之幸其去而縶羣胥使織公罪不可得時崔莊敏公為少宰薦公於太宰王忠肅公以公才宜典郡遂以知建昌建昌民錯兵居穿窬夜舊六七發而兵官影庇不可爬搜民大困公至以它事恐兵官皆股栗自危姦無所伏郭內外十里不拾遺民日就饒溢乃大新學宫作禮樂器立觀德亭考射禮於吳諭德夢弼購書萬卷貯講堂江以南學為極盛新藩臬分司新驛屋及船郵亭如之以賔新城樓及櫓以戒戎新城隍廟風雲雷雨壇壝社如之以禮神祠李先生覯墓表黃孝子談節婦門以風俗皆其請而行之者也有圖曰敦化曰表忠曰勸學圖繫以詩摹流民間亦以風俗尤戚兄弟之相訟者多詩以諭之惟曽氏一詩與三圖今盛傳於人政大要於止姦南城民中得石像潛蒙以腐鼠置屋上鴉羣噪而啄之去來盤旋民佯驚集其鄰升屋下之以為神嫗叟歡趨如市公取其石碎于庭而止復有巫自魯來妖憑之言禍福如響公曰是濟人所神為靈哥者今越吾境何能為妖謂巫曰吾畏謝公吾去巫忽覺如常女子先時民刳于偽平章之虐宣德中荆國新去之蘄吏治多姑息而無良習嚚人骨至公猶欲來餂也懷偽券訟田宅者貫魚來而推其一人先入券粗見公即叱曰爾何偽乃爾民驚以為神而僚吏愕不知何以公笑曰吾見其券年踰二紀而券之紙今式也令吏試抱二紀前案驗紙式果然諸伺於門皆逸去比郡一再飢郡民始而謷然既而寂然若不知者公豫倡以俸金而富民爭開廩延糴不旬日而新榖升閉廩者十七八二佐自逺歸載酒飲其邸部使至過引諸已而善必歸之故終其任而胥𨽻亦不聞有所按逮者屬有疾日一入其寢死殯祭之而為之歸蔡教授死劉訓導繼之二室之嫠垂欲流公歸蔡於漳歸劉于蜀今漳蜀之人猶稱公仁者成化中大理卿夏公來考察江西列薦者四人公其一焉大約謂公崇尚風教庶幾於古循良而遂有父母妻之封九載郡民詣闕上書請留升從三品俸仍留郡諸生生祠公於學翰林學士張公為之碑公不可撤祠踣碑比去復立在信年殺於建昌三之二而治聲實相埓屬縣永豐舊冶銀閟久弗發而括人冦礦前去後至絡繹恆數千人曳行旅以任負掠民畜以食飲兵官素無肄而括人驍彍莫不聞皆洶洶自懾時厚公者幸公將代可去以避其鋒公曰見難而避無勇貽患於人不仁無勇不仁去將焉用之乃勒兵循靈山東並永平溪踰靈鷲山下趨之賊聞公至佯遁而留二三為誘諜不覺以真來白故我兵皆解嚴至則不壘而休于僧寺且炊俄而我邏卒與誘者遇易而射之左右白公公驚曰此伏而誘我也急招邏卒不及公自甲先出而賊伏四起呼聲動林木以筅遮公環而刺之左股為筅所中血流洞鞾柘陽巡簡者遙呼警賊曰我公也賊何敢殺天子命吏賊亦愕相視公猶裹瘡督戰如常所俘殺甚衆得其賊首乘勝破之公遂臨穴怒曰此禍穴也築之以絶窺睨公還未嘗言戰時事入朝補永平以憂不赴服除有蜀之命當分司東川東鄉縣者荆腋陜首猿巢虎穴之􅀈皆彎弓帶劍之民性於寇攘而亡命逋逃是主是來縣凡三劫而有司依違養冦為己地公曰盜鼠也飼貓於室而骨其足可乎於是蹤迹其所出入或捕或殺至數百人盜幾盡或曰縣可徙也公曰盜畏逺乎畏有備乎即逺百里盜有足也奈何不聽檄縣長吏因舊城甓之而浚其隍戍以土兵縣得不徙而迄今亦無變建始夔之僻縣也縣官擁虛名而實掣肘於其頑噤不得以符契從事惴惴尸素以須代不則剽攻於路不立主名以恐其來代者部使置為異域不幸往者餘五十年公偵知之徑按其縣廉得其魁窮治之黨解去比他縣在蜀六年上以全蜀非公不可乃進今官巡撫之時吐蕃大娃小娃生熟二夷相煽以變邊人告急公曰比其發吾不可包荒兵法曰致人不致於人不戰而屈人之兵吾用之乃托行邊繕亭障嚴斥堠選軍實若不知其為變者寇亦幸其未暴率其醜來獻羊豕羅拜道左曰乃今見天朝大臣吾生矣公褰帷徐行命譯者揚國威武衆一布一摩之去公因視邊庾虛實先是邊儲皆諸郡稅畝以充而姦民關節盤錯名為代輸實白著庾硿然公稽籍以驗數命官以考實得十三萬石有竒以紓邊飢己酉蜀大飢民流入會府日如蟻公為廣室於城內十餘區為粥以食之而勤滌其穢以防疫飲病者以藥葬死者以叢冢於東郭外給歸者以符使得傳食以至其處豫檄州縣於其日關白之行荒政事宜於屬郡而日夜規畫不遑暇食所親活數萬人全蜀以安公為吏善應變神施鬼設不可端倪始視之若越尋丈而揆其終卒無失尺寸遇事不顧利害必達其志雖雷霆在上屹然不動而一言合於道雖武夫賤𨽻必改容謝之羅一峯張東白二太史與公交服公改過之勇建昌學成夏方伯記之以處官事如家事嘉公真確論也然疾惡如仇著於性本故亦有危公者公未嘗見于言面公至孝居官兩迎父養事從父如父疾必嘗藥以進三弟終身不割竈自食俸入弟姪主之嘗一弟女歸裝具差不敵必買諸市弟辭不許聚食餘千指用數窘公自餟粥于堂以率而族之不能婚喪孤不能自食貧鬻屋者公力為之所又若沛然有餘其於親戚亦然嘗率其族之有力者葬其上世凡上喪建祠堂祀先旦望族以班見買田以祭而儲其贏以預不虞家居嚴以有禮內外斬然無敢疾趨謦咳者非甚疾秉炬諷誦永夜乃休尤好論兵晚亦好易作玩易軒初號約庵老更曰拙庵曰拙吾實録也所著有約庵稿若干卷藏於家詠史近體三百首梓行於時而或以吏事多公則隘矣公考磐以公貴封中憲大夫建昌知府妣陳氏封恭人磐考琬琬考鍾鍾考用弼祕德閟耀濬有本基其先越之上虞人福清在宋曰玉融州有曰齡夀者來官之遂籍福清國初自福清徙長樂故長樂之謝祖齡夀而始大於公公娶陳選部艮之女實翊公德子男三長廷柱次廷棐次廷最最縣學生也棐最之母實曹姓選而側室于公者女八賔壻鄒棖容壻髙均完壻李詢官壻黃謀填壻陳文試寅壻陳廷柏宜壻髙鏼𡨕在室謀文試鏼亦學生也孫男二本寬本忠孫女三桂慶幼未名廷柱匍匐歸就哭位哭已如詔葬公于雞籠山之塋則𢎞治丙辰嵗之十二月二十三日也舍杖泣來告曰先公幽堂宜有銘墓隧宜有碑國史宜有傳然而知先公而狀之非子誰也豫少侍公學十年公去郡又復十年先皇帝奄棄萬國自蜀來復與公會哭於闕下又四年豫罹憂家居公得請道郡歸郡之人空巷迓公至擁公之輿不可行操豚漿槖金來餽者爭隙而入公一無所受而今年春公夀七十郡之仕於朝者又為文集詩馳以為公夀及今又皆哭公盡哀焉嗚呼民可劫以術使德已也或惟愚者而智者難或惟近而逺者難今之德公者朝之士且然獨愚者乎三十年且然死且然獨近乎豫不通於古敢問公非仁者歟用是撮其槩謹俟立言君子銘之碑之傳之以為世吏勸云蕭母孺人行狀孺人姓曽氏諱掌珠泰和長溪人處士彥威之女萬安夏霄蕭莘夫先生之妻監察御史柯之母彥威父興甫興甫父祥卿莘夫父重山處士重山父某皆能以其家聲振於二縣中而彥威妻魏氏魏亦安成宗家內則世嫻故孺人生而柔慧夙成姆不能施其規矩教誨之益長而在閨學女事或時誦古書雖家人不能見其面姆以其女事示其宗親姝嫗傳觀嘖嘆達于疏屬或以為式竟亦莫能如也既笄歸莘夫重山素方嚴姑劉氏亦欲端冡婦於其初備設諸難以為試曽則徐隨應之如水注地莫不釃布姑大恱賀重山能為宗子得婦重山亦心幸老遺五稚脫有不諱可無戛羮憂正統丙寅疫果入室中姑姑劇又中重山亦劇又次第中家衆羣然呼呷門閾絶無屨迹雞犬飛逸不知其處或曰歸可避也孺人曰咄吾骨可碎吾足不可移惟與莘夫約吾入侍汝出掃除焚滌瘞吾出掃除焚滌瘞汝入侍無間疫勢乃大熾不可為卒皆斃凡南方諺禁疫喪哀哀且及哀者孺人曰烏有執舅姑之喪而不哀者乎哀如常斂殯葬雖草具亦粗以禮事既定所存惟重山所遺五稚暨孺人莘夫七人五稚於孺人叔也門戶狼籍不可支過者傷心孺人撫五稚叔或泫然而悲又忽而喜謂莘夫曰木摧折甚矣然根存猶可培也假我數年吾見其亭亭乎於是悉發篋實得布焉時五叔之寒溫而製以為衣得繒綺簮珥焉量門閥之宜而委禽以婚得金錢焉資之贄師以學視其學成焉者而又資之以進取鷇呱呱在褓若弗子曰吾所愛何敢視舅姑所愛矧其無所怙恃一蹉跌何以為解拮據倣徨綢繆補苴越數十年迄今一縷一鈎之復實於篋而他之畝割入戶者倍舊之二戶之口升入縣籍者倍疫餘之十莘夫遂埒封君至推擇為長掌區稅事五叔亦擁雄名嶄出邑里自能權子母為居積乃聚謀曰吾拊吾頭顱至吾脛踵吾居而廬出而騎坐而指使傭奴其吾能邪繄吾兄也盍以父視之亦吾嫂也盍以母視之兹猶總領日僕僕以佚吾吾奚以安曷若割而自食幸釋二人重負何如皆諾孺人不能奪然日猶為之點檢若初不懈人以為兄父嫂母謡之君子以為確論子三人伯升文仲御史季升廷皆遣學進士業御史登𢎞治癸丑髙第入翰林為庶吉士立臺三年最典恩封以月日計乃兹四月二十二日得家報白函疑焉剝之丙辰十二月十八日孺人歿此訃也年七十有三御史請奔歸治喪且謀諸伯季告先生率民逸民安民懷民用民表蓋孺人孫也將以某年月日奉葬於縣龍塘某之原瀕行玘比縣人也同遊于西涯先生門又嘗同院往臨弔御史泣謂曰人有言與西涯先生同世而不得一言以為重是自藏也況幸遊其門而不得一言於其父母是藏父母也自藏可藏父母不可先生忍藏吾母乎然吾母之行先生不知也今吾昏瞶不能一二數數一二子亦必能之吾將執是請幸賜之銘與殞吾身以報吾母有間矣玘哀之不能辭也謹狀張母太孺人行狀皇贈給事中張府君妻李氏諱兆明𢎞治十年春以其子刑科給事中文貴封太孺人制下給事於邸馳僕歸刻期數至日而孺人以二月五日歿其家亦刻日數訃至至之日給事袒括呌號弔者至及向之鄉之弔者泣語之玘往弔泣不已出一函拜且祈曰文必得子狀吾母以干宗工銘發函孺人父律鑑大父祖訓曽大父彥章皆邑傑魁名人而彥章父曰杏隱洪武中以其詩鳴母曰施氏又曰彭氏生母也二母侍律鑑終身惟鞠孺人叢愛稠息過甚膚體長養涵濡志全璠璵而孺人純懿警敏亦自天至達知古書操筆大小書矩正規完如法度士陋凡下里市鬻布縷不為為必輕盈淨潔蜩翼波紋鉥人目眥媒有入李氏輒見律鑑意色皆緘口歸府君幼實倜儻好學有令名邑里莫不聞一媒試言之律鑑喜曰吾壻也許之張故大家也孺人歸事方絲樊緒錯莫之適理府君日支門戶多外出罕內顧孺人裳不及閾言如之而日自就緒婢之慧者治麻枲羞酒食駑者豢牢豕豎牧羊犢者兼薪蒸備竈爨藝蔬灌果蓏者刈芻飼魚墾田藝稼者無雜傭張唇利口以徭公家各惟其器府君惟視成至數十年私用公輸貧賙喪賻子婚親宴廟祀日若汲井而出源源不知其自府君曰吾有庫藏吾有廩廥其如豫何謂孺人也初諸事事者日入見府君皆猥縮傴僂或至顛躓雖子姓亦然或有愆度即小不貰閭左局蹐無寧自便孺人口不言而意極慘怛至對案不食府君覺之為霽其嚴然終用是賈禍嘗疾尹叨齰其縣訟言聲於衆或以告尹尹怒設百穽意必殺覆其家乃慊會盜起縣界府君結族援以備也仇家揣尹意誣以不軌嘗尹尹喜舞煆之上于臺臺考無所得得釋出出即恚病死客舍孺人以舟迎喪歸藁葬町疃鬄髮誓必報又齧兒臂出血敕不報不葬給事明春秋三氏亦以賊不討不書葬復孺人孺人曰吾志也仇時方殺人人子弱不能讐以賄免孺人佐以健僕資遣之訟于京事下御史逮繫之置於法適給事亦得省焉孺人大喜大會賔客啓府君葬于隴至今過其門者皆拱手曰烈婦烈婦云乙卯給事持節南方得便省拜堂下孺人顧見命服忽掩面悲曰此女父之遺女也其靈承毋忝竟無幾微矜詫意婦以闕下事語則更朗言了了若嘗至其地而目擊之者其博見多聞近亦稀有春秋六十有一子給事而下䡆􅀈輕凡四人給事登癸丑進士至今官輕側室張氏出孺人亦如已出孫某某給事歸筮以卜某年月日葬於某之原嗚呼不以家憂其夫而以已之所愛愛夫之所遺者能也德也亦難能也而世或有之至於夫死于仇死已矣知有仇者寡矣或知之以遺其子者益寡矣而況立於其身復焉世復幾人哉玘誠不忍當時宗工不及於此也謹狀其槩且大者以告劉母太孺人王氏行狀孺人南京翰林院孔目封監察御史劉君之妻鄉貢士壬翰林庶吉士監察御史丙之母姓王氏諱某父諱某祖諱某王於劉為甲乙族翰林之父南雄府君初與某同為庠舍生有契義自託昏故孺人竟歸翰林翰林冡嗣南雄南雄自翰林庶吉士通判金華廉名為天下第一雖仕十餘年囊無錙銖不免凍飢遭母喪不能葬有欲來賻者億其不取而止以故一纍於翰林翰林無所取資惟授徒寸纍以襄事孺人始出於素佚亦即能躬爨淅宵治麻縷葛越以佐費食貧甘甚如嘗習然南雄一意砥礪名節無少內顧三女嫁具無所出襟鞶佩帨簮珥之屬皆孺人傾篋與之且終不以泄于壻家南雄所至宦邸徒四壁家屬悉歸集待哺翰林苦不能支又悉屏珍玩鬻金市米以給更十年翰林始以尚書舉于鄉教武昌進教武進官極散漫終與貧不能脫去賴孺人亦相忘節縮裒補以賔且祭子贄師女贄其舅姑必豐必潔又如世富溢者南雄竟以直道得禍英宗朝以柩歸獨事李宜人十年李年八十孺人亦年六十朝夕寢膳尚如始入劉氏時雖處久窶門內外未嘗見其有顰呻弗寧態人有乞假亦無有徒手而反者宗親喪葬非疾病雖暑雨泥淖不輟弔哭終其身華靡珍麗之物一無所御安成人至今無不服其為劉氏婦壬業學丙亦業學喜曰而祖而父踵胼此而食且六十年不可棄去壬丙同舉丙午明年丁未丙第進士改庶吉士入臺為御史按雲南道歸省又喜曰而祖詒而以直清令名海內莫不聞而父紹緒亦既孔艱而克念哉毋徒以溫飽吾二人為戚戚丙兹反命闕下適初考推恩得今封而凶問又即至丙方陛辭出督馬政駐於都門外也饗年七十有七卒之日是為𢎞治七年七月三十日適蕭循讓適彭宜塤適易正時凡三人其女也珙璦琮玹缺凡五人其孫也丙請歸喪且以某年月日葬於某之原而掩幽之石宜文以命世之豪必先以豫為之狀者豫丙之同年也同為庶吉士者也非優為之也嘗聞之丙也謹狀贈宜人王母劉氏行狀宜人姓劉氏諱某字月珠安福上城人隱君子仕泰之女贈長史某之妻榮府長史選之母也其殁也以成化壬寅三月之三日屬𢎞治甲寅以長史前官翰林檢討之貴贈孺人及傅王功成進官故又進今贈誥旨煌煌實燭泉壤凡再遭也長史在王左右弗獲捧以拜焚於墓下戰栗栗拜稽首言曰休哉臣母若復生其耿耿之光間嘗泣語豫曰吾母年止六十有九而已而在吾氏五十有三年相吾先君養吾祖母也如其母而吾祖母稱諸人亦曰是吾女也平居溫溫不見其有愠容妯娌恱之曰是吾同生也逮下不見其有厲色與叱吒聲妾暨婢僕曰吾父母也戚屬之多不能無向盛者亦不能無向衰者未嘗曰此姻也仰隆之此婭也俯薄之兄弟時而漸替于初則曰吾知恤其衰對吾先君也或以規或以諷終身不見裏言若嚴賔焉又曰吾選也慎典也慎恩也逢真也淑貞也吾母之子若女也慎獨也慎德也慎終也側室蕭氏之子也吾母合而字育之不欲以嫡庶辨皆擇仕族婚之與其所歸選娶於劉為冢婦諭德其從兄有大名次彭次劉監察御史其從姪僉事其兄次李給事中其叔父次曠為衆婦壻封主事劉來徴逢真夫義官賀孚晉淑貞夫某部郎中某逢真之子是為甥也又曰石橋縣之嘉地也吾母墓在焉兹二十餘年木且拱矣乃始克承休光儀式以次俱升職在有司謹奉如制於乎成矣然不及其生逢之吾終天之悲也人或曰必得吾子言後世知有吾母庶幾塞吾之悲吾子其何如豫不能拒也謹狀如右然亦具其言云圭峯集卷十八
