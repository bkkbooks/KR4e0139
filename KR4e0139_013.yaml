body:
  text: 圭峰集卷十三明羅玘撰碑嚴子陵祠堂碑庶吉士閣考作先生之生也富春山一釣翁耳既殁之後遂姓其灘為嚴灘瀨為嚴瀨至於職方所統也亦名先生之姓曰嚴州焉夫自有郡縣來已有此州其生人也不可以稊米計賢人君子豪傑之士著聲於世後先亦多矣而皆無敢睥睨甘心曰吾嚴人也凡天下之人聞是州之名不知其自於先生與聞先生而不知其寓於是州亦愚夫而已矣今夫倡優之劇里巷樵牧之歌至陋也而其羊裘釣臺侈為盛美嗚呼先生何以得此哉當漢之衰新莽之餌其甘如飴不拜揖於歆雄之列者中人可勉為之未足高先生也及真主出略其勢位以故人物色之躡履而來蕭然野意而故態即發心有水濱之寂寞而無大內之深嚴區區之榮利鷗耶鷺耶而已矣曽何芥蒂孟子曰我善養吾浩然之氣先生有焉雖聖人大中之道不如是也而氣節風厲要不可誣五穀三牲所以養生也而鹽醯不備豈全味哉然則地之名之止於嚴著其所也人之仰之通於世高其行也夫有功德於民者於祭法有祀則先生天下通祀可也况於嚴乎舊有堂在州治之東蓋其故釣處也今郡侯某修之來求碑之因論其事俾刻之而係以詞曰富春之山兮碨磊嵌崟白石齒齒兮桐江深先生不來兮廟隂隂江籬漠漠兮鳥下水荇泛泛兮魚沈香餌化石兮臺泐羊裘挂崖兮誰紉漢鼎􅑶危瓦兮龍戰野先生一絲兮鐵綆千尋我有君臣兮父子垂涎朵頤兮何心駕螭車兮驂虬紛拜舞兮夷猶倐然降兮風飀飀我民嵗嵗兮殽羞故內官監太監白公墓道碑先皇帝末厯思有以奮振更圖而興革勸沮先篤諸近于時光祿寺之劑錢隂漏入于中外乾沒者十二三睿志潛求所以代涖者難其人久之內官監太監白公江適還岐惠王之喪至自楚慎靜之聲籍籍聞于內遂詔解舊所涖諸庫事改涖寺事既至召酒人饔人庖人戒曰今以始毋以爾所主品置吾几日以童炊烹時其渴飢飲食之至旦日坐于門平量衡閲出內內以東入以西出給以西入以東出入毋比行毋偶立毋耳語毋僂步毋顰毋譁違比通關節為姦例有常誅不貸比日入扃封乃退既匝月姦朋故智敗解去寺之上下賀公以勤公有緒喜而母宗氏與兄鳳居涿渴一見迎之不至傷泣得嗽血疾尤旦旦酣事事不知憊遂下摧為瘻瘍醫繼繼至莫注手乃困卧連乞免會寺寮疏留止之今上登極賜蟒衣玉帶同列皆驚其異既而轉劇兩乞免得賜復監飲藥部寺誤疑為允旨懼公去疏留益懇公自分不可起乃乞骸歸私第上乃假奉御李懋長隨田雄以外事便侍其疾疾果不能藥正德元年五月六日遂卒年五十一上聞悼其以職死賜祭且賻其喪命左監丞鄭璽奉御王恭營其墓皆異例若以為勸者墓在城西香山之原葬以六月十二日母聞之悔不及生就迎又悔疾不及視危惡候以鳳偕孫鋼釗鋭鑄自涿來哭璽恭懋雄有父道焉故亦子哭公非上命在事然也及是亦會哭哀至與涿來者比公涿之韓村人父聚祖慶世居涿以選入給事預營衛聖恭僖夫人墳修大廟後殿建清寧宮功自長隨厯奉御以至今職先所服蟒衣先朝賜者也荷榮兩朝顯柄伊始而年不究用恭輩痌之恭號知文豫教內館時愛之出諸生上爾乃丐豫銘公銘已又丐碑其墓之隧夫恭也豈以豫文足徵于後也歟詞曰野焉舍來壺焉代食垂璫施施曳露白白匪其躬私廟建封築月遷嵗登帑實遍督萬里潛行岐魄反廟帝曰天庖豫嘉爾詔獰其若酣痀僂罔覺陟屺在書牀膚以剝死要歸全恤恩沕沕西郛幽堂蔚蔚檜柏故南京守備司禮監太監傅公墓道碑正德六年正月十五日南京守備司禮監太監傅公卒守臣以聞且請木請食其喪衰麻其子弟請封其墓而堂之詔聽遣官三祭賜寶鏹事不三月十日公已葬昭功祠隂矣公諱容字體仁松庵其號也春秋七十五廣之順德人曽祖某祖義悌父道達母何氏世名家公以選入內內書館者制館閣諸賢涖焉以肄中貴人之幼秀出者也例不以羣凡衆又以選入入日有譽動英宗知擢奉御掌文書憲宗嗣擢紀事奉御侍悼恭位下教官人禁中轉局郎侍春宮孝宗𢎞治初進司禮監太監賜蟒衣玉帶祿米日向柄用而於茂陵工甫畢又督懿妃金山工繼選永康大長公主婚褒賚有加欽遣有司祭公考妣以優公殊屬意焉一日以一函付公命乘南傳公請啓則留都璽書也拜舞辭即日行既至人無知者故事勳宿元臣扃閾內外為意向久之無何形迹隱然示大體乃交相説而公於殿囂遏嚚斂潰控奔又多潛為之所若嵗慮大獄無文之拘有疑積滯者意持之傾耳羣議在所則毁校脫梏者居多寂不居德以為色德音屢下郊迎宣讀既納諸函或訝之搖手閉目人多愧而去遂墅城南因山而垣稱垣而祠祠左為寺僧一童與談空焉為佚老計請額祠賜額曰昭功請額寺賜額曰永寧泣歎曰吾不能生事天子矣無何以疾請上憐公誠月有廩嵗有役聽公休官所談空僧即永寧居蠲其稅食之主公祀焉公從子豪入粟為郎傑千户也鳴璫貴人父母公者無慮數十崇卑間劇布中外南內殆十三相與曳碑礱之于墓之道來請刻辭豫春既銘公墓辭乃合辭言曰衆志潝潝旨味公銘然而閟幽孰愈昭揭于表表之觀公其謂何豫無能讓乃襲敘而詩之其詞曰踰嶺而燕居也木天業也孰師之龍之夔維從龍升乾清坤寧嬙娥環羅內則孔多載槖螭頭敷政優優玉匣黃腸玄堂之藏帝曰欽哉公其南來培柢培根有實無文永寧昭功百世祀公圭峰集卷十三
