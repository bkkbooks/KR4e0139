body:
  text: 圭峯集巻三十明羅玘撰詩五言絶句題杭州蕭醫官巻􅀢籥湏臾間元功奪造化比於戰昆陽此更論無價送雷生謙歸南城二首𤣥武湖心月太平堤尾風世人皆棄却好看入胸中又銓次吾収女離筵女别吾鄉人問行色可有杜詩無三友圖為門生吳廷亮作東風不知春西風不知秋相期翔風夜一洗羣芳羞七言絶句瑞麥詩有引馬生憲嚴生効金生鐸江都人也予昔憇江都三生者從予游别不見者幾年矣是月初吉渡江而南見予於容臺無他言也惟曰吾宰傅君之仁也明日復來亦惟曰吾宰傅君之仁及物也又明日見予如初予曰盍言之三生曰野有麥一莖而二穗野人持而獻焉意吾宰之仁有以召之也歟予曰噫是瑞麥也古之循吏則有之予當為生歌之三生者喜曰此三生之所以来也再拜稽首持而去詩曰笑數流言去去多飽眠無奈夜深何忽然一覺揚州夢聴得人間瑞麥歌夀楊名父母八十身上衣裳線縷縷眼中雲物白英英不勺慈湖釀春酒中朝已沸頌絃聲萱夀為車駕冒郎中母作桂子垂垂蘭茁芽託根原自傍萱花慿誰天上分靈種王母宫邊第一家潮中獨立松為雷廷亮題潮濺龍鱗海眼空風濤總與夜聲雄更憐獨立真誰友肯遇秦皇草次封五色菊為周少司題疑是仙宫五色霞仙人剪綴作竒葩又慿五桞先生手冩與工虞富貴家為楊國安題扇面瞑色先於樹杪懸船歸欲縳水亭邊今宵買酒不成醉猶勝田家只渇眠送任元之南遊平生海角與天涯逢着飄然即泛槎獨有高堂䨥白髪一囬思動一還家風泉閣為徳興項徳懋題閣外寒泉原自清泠泠慣與夜風争閣中黙聴人何在今日新添一兩聲夀劉翁七十詩乾坤一醉一醒中未是衰翁未是童把酒對君君自記百年百度醉春風和羅先生聞永升及第後三韻阿雲入落端無耗年矢催人暗有期浪聴兒童傳吉語阿雲已傍渾天儀右聞信上苑繁花可浪開花如有意亦憐才君王詔許才郎折昨日才郎在草莱右及第探花郎蒼蒼愈老愈慈愛誰意蒼蒼亦不慈奪却鳯毛何處去一生斷送與明時右除官集杜句送現昇歸作僧宫五月寒風冷佛骨中夜起坐萬感集僧寳人人明月珠弟子誰依白茅室蒲圻隂陽訓術龔君素不識慕名來求自云伯晟任御史云其方物以其非素相知歸之東風歸去一星官堂上東頭是豸冠如問翰林誰最健此翁老未入詩壇蒲圻馬文明以濟源訓導陞保寧蒼溪教諭亦慕名来求幾年清濟沁詩脾端為官家養桷榱恐是錦屏應飽看莫嫌来取棟梁遲送水南李十四金臺城中花鳥春月河寺邊多歸人濁河一日東風起萬里咫尺旴江濵送季省祭㩦子歸鄉考試碧油幢下黒頭公挾子歸去翺秋風江南一望六十里滿船載雨花溟濛紅梅圖為肇和題西湖殘雪候多時却恨前年被雪欺且學杏花紅似錦暫招鳴鳥到南枝二兎一白一黒圖衣褐之徒吾乆識炭烏雪白始驚看獨憐總有髙人處唇缺何曽怨齒寒灞橋圖為揚碧川先生題雪中驢背縮更縮門内主人招未招只恐有詩無賣處至今人説灞陵橋赤壁圖亦為楊碧川題如此良宵能有幾有船便合載坡公當時若只載歌舞安得於今在畫中圭峯集巻三十
