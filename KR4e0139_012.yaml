body:
  text: 圭峰集卷十二明羅玘撰記擬順天府重修譙樓記庶吉士月課順天府輦轂在焉於今為京師諸侯之朝㑹四夷之來王於是乎輻輳觀望焉故其官屬品式儀範獨出於畿甸諸府之上與應天等而其近且劇又過之况府𨽻於藩者比哉尊京師也府故有譙樓豫前以國子生法當投卷附其試過其下見其瓦壓于上級夷于下椽鐲棟倚有壞理洎揭榜入宴再過之仍初見也自是有繫籍不數日又過之無不仍初見者既廷對入院就款始稀過焉他日以事往入其衢見其翬飛鱗次丹堊漆髹之色蓋已迎吾目而改觀矣既入府尹某公指謂豫曰此吾之所以懼其壞而修葺之也豫因謂公曰京尹之職要有大於此者羣閹戚里所以資其驕樂者莊墅陂池園林臺榭果樹之封植是已其師相誇競日增月闢無有紀極求無噬於民者無是理也又况其怙恃請謁亂經敗度必遂其私而尹獨先當之者哉且雜以四方戎工商胥倡優蠻獠之屬處其地而異所𨽻故姦之伏也深而變之生也亟發其姦則有掣肘之患玩其變則有非常之憂而尹之政用以弊吾見尹之難為也樓之壞有急於此者乎雖然樓之壞而弗修則陋其觀損於治者小也而政弊不飭則弊日滋弊日滋則民日困嗚呼京師諸夏之本也而至於民且困焉一樓之修何補哉而前公為尹者弊亦仍舊也樓亦仍舊也革弊修樓自公始可書公使屬吏礱石書之某年某月某日也故平章哈喇公配王老老合壙記正統二年春正月河西涼州部平章哈喇公庫春以其族來奔西邊監軍中使魯安與邊帥議合乃驛至京師請留籍軍食聽惟是蕃漢水土不相和始至必疾疾已無他哈剌公竟以疾不起葬京城西香山煤厰村之原時妻王老老尚未入宮也以一逺人婦孀居撫八嵗之孤博囉即能脫去故習俾讀書華言教詔一以華風未幾以賢聞選入供奉稱㫖博囉亦備灑掃尋至掌閽闥遷職內廏以勞序纍擢少監至太監老老以勞能亦受今名內稱老於事者曰老老或曰年之老者故云母子厯事睿景純三皇帝今聖慈仁壽太皇太后皇太后皆謂老老羈旅族孤質木無援扃鍵啓閉一任不疑法中貴無外宅博囉以母老不任宮事盡以賞賚私錢營第一區于東華門側既成當成化二十一年疏請聽老老歸休賜金文綺為佚老費越六年年八十八卒是為𢎞治六年夏四月十四日也博囉請歸治喪三日哭輟哭拄杖跣立進二姪謂成曰往視吾父壙謂壽曰爾官人也往諏太人五月二十一日吾欲奉吾母合吾父葬也皆來㑹曰善遂如期舁柩啓壙即事仍辟去壤之黏膩者甓石之泐學者大施新功封溝門垣題表就式其位與力得為也又曰吾世為邊塞長先長老嘗貢天朝歸歎曰天不假吾樂土寄一足耶吾父幼即解意比長有名位志益決稍驅其畜帳南徙部人益疑屢摸索偵伺不得及是乃大樂雖未一奏勞裨酬萬一亦命也已尚幸吾母子依清光竊寵渥猶蛩螽之么麼得附砌入牀視諸叢灌草根之啾唧以伏以死者亦幸矣壽錦衣百户與錦衣潘百户杰為寮杰舊遊於豫博囉授是語於杰俾導壽來拜且乞記為之銘納于壙尚恐徂遠日就於無所表著圖託於不朽惟文字又乞不已乃為記其壙噫其三世役志向風至是有成真可俾以不朽逺人其亦有激也繼善堂記慈溪王氏繼善堂真靜居士之堂也居士之作歟其上世既已作歟質歟華歟崇歟卑歟其奠之位而面之方歟皆非堂之所以名也居士是培是殖本其深矣蓄不以發而發之於其子有儀曹郎中也旁達於其羣從之子有教諭也又有刑部主事也又有溧水訓導也鄉人遂屬目王氏或曰王氏繼繼善人出矣堂其取諸此乎居士聞之曰吾豈謂是哉吾氏居於斯也始於檢􅂒公合分裒離用樹丕基時則於唐為末紀鳴于復齊翁章圖砭過大放厥聲時則於宋為紹興再鳴於吉州文學被薦射科蜚坌英芬時則於宋為慶元大盛於蓀渚先生本兵翊謀燁垂宗光時則於宋為寶慶積於今六百年矣而藏器之重有彝敦焉封樹之壇有楹碣焉手澤之傳有籖軸焉若廬之圜也百武耳田之畔也盈井耳何恃哉恃此而已曰吾氏世繼以善也吾二三子之奰焉馳瞢焉往冒焉而竊祿其自足為善乎非此誰使之吾見鄉之僦廬者矣其先固朱户而雕甍也吾見鄉之治畦者矣其先固東阡而西陌也吾見操壺瓢而號於途者不諱焉曰吾甲乙氏之子也或曰某之鄉某之大夫吾先也然則吾烏得而不懼乎車惟前無覆者也故多覆焉未有監前之覆而覆者也若今之覆則多矣二三子其亦監乎繼自今子若孫其亦監乎監夫彼則思繼乎此也雖然吾耄矣吾不能以灌灌告約告之曰繼善然不若名吾堂是朝夕告也且告于世世也庶幾吾氏其完車也不尤愈乎他日書命郎中而以其語求豫記豫郎中友也烏能辭退而繹其語豫驚焉曰針砭也是固王氏之律令也不敢贊一辭焉歸之請鑱諸堂以為記警齊記警齊記豫記也豫為徐信夫記之也信夫何警乎豫知之警生於有心土石草木之無心莫之能有警其非動物故也雖動物之有心有有警者有無有警者有有警亦若無有警者鳥有之不能為巢居他之巢至其自為則墮卵殰雛焉是之謂鳩拙畜有之見虎而逐叢角而抵以遺虎餐是之謂羊狠獸有之見木而登且登且下而卒亦莫之能上下是之謂猶豫烏有之俯而啄仰而四顧鸇過之過也彈過之過也是之謂烏警其於人也在鳩拙為蒙為木强在羊狠為自罹於辜所謂有無有警者是也在猶豫為太蚤計為多心所謂有有警亦若無有警者也在烏警為常惺惺所謂有有警者也今夫鳩拙之與羊狠同於無警者也而世之人有以鳩拙自退者乎寧為羊狠敗焉後之懲者則又警之太憂持之太固於是有猶豫焉猶豫者悔釁之囮也猶豫之警非警也非固為警也有待焉然後有警焉其惟烏警乎是之為善警嗚呼信夫之警其亦有取於是也乎然豫又感夫烏微物也俯而啄取以養其生仰而警焉以避其害於烏可也而君子之居人上也其亦有俯而取乎則十目視焉十手指焉而害斯至矣雖有百警其可乎哉今夫龍非不昭然靈矣然以其有所嗜取也人得而擾之亦得而醢之若鳥獸然以龍之靈而豈無警乎警不足恃也或曰龍以聾取辱非警與嗜取之罪也則豫不能知矣然信夫方持是警為宰以臨嵊民豫記警齊者不可以不告復蘇公舊跡記𢎞治丁已豫同年天台盧侯以刑部郎中出知黃州府黃蘇文忠公謫居地也公嘗築雪堂于東坡今僅存地丈餘侯出過之喟然曰是淆於民不可公嘗寓定惠院遊乾明寺黃泥坂諸處侯問於民曰是兹何在民皆不知侯曰是不可已吾其究諸於是遷雪堂于府治之東與竹樓配使麗于公所可恆存也明年按地櫛驗院寺坂以次皆復遂亭其院曰海棠餘韻侯意若曰是崇公之詩亭其寺曰坡仙古跡侯意若曰是革異教一歸諸公惟坂亭無易名侯意若曰惟古之真是不可變黃人始眯若不知有公也既而晃然訝公復生繼又駢然欲從公復遊又若真有公也填郭溢郛或聚或散去而復來旋絡新觀若味飲食且曰舊之守多矣何寥寥乎不蚤吾復也又曰吾林有材可以為棟吾山有石可以為礎吾庾有粟可以食匠其貧者亦曰具吾畚鍤可以築堵具吾鬵鬲可以沃塗晝爾可茅宵爾可綯侯皆不吾預也侯則孔仁吾其何民遂相與礱石造侯願記之侯曰辭俚弗傳不可民曰盍徵諸朝侯曰吾自有記匪可施諸逺者大者志吾復公之跡實宜蓋指豫也夏六月乃以書屬吾守舒侯督豫記蓋舒侯黃人也先是與豫論侯是役也成民之所欲為而民不知既成又無德色於民有類古之為政者豫故樂為書之非以私同年也通濟橋記南昌江西㑹府也途之陸出于京師者由漳江以濟濟登西岸行十里為遞曰蛟橋西山諸溪巖谷之水㑹焉水之㑹溪故大以磯坻互激齧射不可以舟宜有橋橋圮矣不知其何時獨其名存且以名遞名其地橋固宜前有也其曰蛟南昌澤國也相傳多蛟螭窟其下蛟所在岸乃善崩又何擇於橋橋圮有由夫亦無庸考其時之近且久也獨惜夫㑹府之孔道也王事之期程商旅負挽之不獲已者冬而朝涉焉龜瘃之不可忍也猶可也夏而潦馮焉死者十八九矣噫橋固不可一日無也夫以不可一日無之急而曠于不可考之久有志之士固宜有憤然者而卒未具有舉者何也豈真有所謂蛟螭者窟焉皆畏而莫之舉耶將世之因循者多視人之患漠然雖有一舉之者而且莫勝其百咻之者也今太守祝侯至三年政以次舉遂將破衆論為之新建義官裘顯獨奮曰此民利也不可以勞吾守於是經始於今年秋七月壬子伐石於信伐木於鄱陽之山水船陸車以次畢集及其將事有告者曰是宜以鐵臭蛟之居蛟乃避乃瘞鐵于岸之家卧柵其上為空以行水者五高二丈廣殺高之六修視高五倍之上列石楹以憑臨盼者凡若干屋其東偏凡十楹守者室焉憩驂駐節於是乎在東西之道鏟隆實窪坦坦夷夷義井在右綽楔跨中無藉于官無斂于民以八月甲寅告成于侯侯至喜甚扁而名之曰通濟之橋志孔道也噫當不可考之久狃以莫之舉之習而能於五六旬之近成夫不可一日無之急且為人所宏達之觀而厯夫無窮之逺愜賢守欲有為而未及為之志不知於古人何如也意者世善之裔自與閭左異歟或伯仲唱和之有助歟余與其仲鴻臚鳳來善鳳來孝友好義聞于人人無愧為宋司直君之後顯亦宜然故有是作鳳來以書丐為記余因及之顯字鳳章號某云邵武縣學尊經閣記邵武縣豫旁近縣也然未始一遊之而登覽其山川考其志牒以求其故故其學亦不知其何始作作廟作堂凡為學作者宜莫不有記以未考故皆不詳其何時暨誰氏之作作尊經閣則今太守夏侯英也侯自延平移守是郡凡郡之有麗于政教者其廟其壇其廨宇靡不創初或葺治者學宮與其士度知之乃𢎞治壬戌某月日相率走庭下以是閣請侯曰其基安在曰未有也侯艴然不悅曰然則請何為曰西牆隂之廢地武人地也直十十金金旦入之夕其基也侯曰若然是無難者呼之至如數畀之乃合僚率屬發牆而營度焉芟蕪窒竇登其汙之塗燥而出之畚客土其上高加于舊五尺有奇材斬于山匠召于豫章之良而徒役于民之在官者明年某月日閣成左為學舍右如之前為饌堂在舍之左登經于高樓士孔安况遺壯觀于萬斯年韙哉斯舉也乎其武人也者其何知惟德侯之畀金曰吾受金也實藉是其學官與士必曰吾志在尊經然何力之為微吾侯何能為是其知縣必曰是吾事也顧吾於事塞微吾侯何能為是其同知下判判之下推官亦必曰是亦吾志也然微侯何能為是乃合以走使于京師屬豫記噫豫行天下見郡有是閣矣然亦不盡然也縣有之殆或自兹始且守俯為之皆異事太史氏宜書書之同知某通判某推官朱彩知縣姜桂教諭某訓導某皆欲記是閣者書法例當附附焉進士題名記庶吉士月課進士題名有記舊也不竪于他而樹于太學重其事告後賢也不命于他而命諸侍從文學之臣志職業也不木不金而惟石之鐫酌厥中壽其傳也甲必第名必次數必撮其凡視黃榜也而其下必注其貫若經别互誤也必紀其年月日貴考實也必冬官卿督之所有事也而凡此一皆上命之昭厥度也皇明自洪武辛亥開科迄今上御極之二十有三年丁未為年者百有二十為科者三十有五率由成憲益畏益祗罔敢越作于時春天下士集于禮部者四千有奇以士論故詔集廷臣議酌南北中之數而平準之南損二北損二以益于中蓋以地計而不專於文藝而論始定暨合而試之得三百五十人三月乙卯又合前此遺於廷試者偕進之于廷上親䇿以體統紀綱制度之目越二日丁已上御奉天殿傳臚賜費宏等三百五十人進士及第出身有差揭榜長安左門外翼日賜宴于禮部乃録以傳某月某日詔工部如故事於國子監立石而命臣玘為之記臣以為厯代科目之得失錯而我皇明極其醇厯代人才之賢否錯而我皇明極其盛凡此先正述之備矣所當記以告諸士者二曰懼曰愛而已懼斯惕惕斯戒戒斯不為有所不為雖欲如其人焉寡矣愛斯慕慕斯效效斯為有所為雖欲不如其人焉寡矣蒙不潔而之市人趨而避之懼其近已也觀前之記不有蒙不潔之類者乎幸懼焉爾襲芬芳而之市人皆集而親之愛其近已也觀前之記不有集芬芳之類者乎幸愛焉爾懼於彼而充其不如彼愛於此而充其必如此吾告諸士止於此矣夫監諸前人以成德自為也非為人也非為天下國家也而德業由以成焉事功由以建焉天下國家賴以安焉此名之所以題而記之所以作也亦既有補於今矣由今而後觀是記者純乎愛而慕焉榮矣人不爾釋也一有懼而惕者斯辱矣人亦不爾釋也雖有孝子慈孫安能為之謀哉無他人心之公卜之爾嗚呼榮辱懸殊具在一石之間可不慎歟又斯記之所以作也亦明主所以奔走天下英雄之微意而人不自知者也諸士其擇諸臣拜手稽首謹記休寧縣察院記察院者御史行巡居之所也休寧縣舊有之而不知其始大庾張君天衢來知縣事政既大行廢以次舉乃𢎞治乙丑春正月偕簿馬文入相之以耆氓邵大倫金萬全王希逺從相始自堂堂制弗稱而休寢側處其東君曰撤之徙于斯步出南四筵曰象舫而屋焉穴牖而延天光兩廂其傍翼而屬于寢又步出南殺舫筵之一曰堂於斯而矩其南修三筵廣五筵髙殺修之二曰以為臺臺之左右騶𨽻蚤夜宜有舍也曰對屋之步自臺而南得如臺之修者三曰門焉蓋儀門也回自門之北縮其修之廣者四曰築之以為道又步出南得如道者半又曰門焉蓋外門也而垣之匝于後者分自二腋始門左右有池焉汙焉若兩喙之張曰窒之其涯隆焉若龜之伏曰夷之而其牖之曲如磬折左右列者衆曰悉繩而直之衆喜君曰未也吾之長二胥吏有事于院者不有棲乎乃度院外之西曰於斯屋之文顧衆曰誠如是備矣遂相與蕝之而始事焉越明年正德丙寅二月成又明年丁卯六月君以最留涖諫事于南六月矣而文屬倫全逺來請記倫以圖見如君初語者噫記誠宜也君以意象告夫居於是者也休於寢而思思而弗得則徙倚見舫焉則感而通遇牖而光入焉則觸而明旦日坐于堂而敷以出之肘腋之下趨走唯諾之吏舉以人色應有棲息使然也觸而思以棲息夫舉縣之民者亦多矣記可無作也然豫觀之昔之即影求形者多見于觀風懷古之豪而豫之記也偶辱于躊蹰摩挲之餘則君之窒喙之張也覺曰兹容有饑夷龜之伏也覺曰兹容有姦直磬之折也覺曰兹容有寃吾將如何而休寧之民其永無憂矣於乎記可無作乎故曰記誠宜也或曰推君之意以告夫天下使皆休寧顧不廣歟豫曰然古之人言之文斯傳傳斯天下後世矣豫亦何能請以俟後之記是者康樂公新廟記正德四年十二月壬子豫作晉康樂公廟成高二尋有咫衡倍之縱縮衡倍之一東西廡又第縮之門又倍縮之山藻丹雘醲醨視其處所使董事千户李廣暨趙祥傅隆韓恩張軌金恩張承宗呂受二余均立楊福周金華張啓升王文器陳紹文余楚仙又分廣之事者廟舊東出極隘陋就敝巫據之多像鬼其中民惟神鬼至忘神公也千户張佐以豫職也五月壬辰發憤來言狀丙申往驗果然奪欲大之而南出焉而費無從出止九月子舍來輸供乃市材閏月庚申始工十月庚寅昧爽竪焉屬有光如虹自南郭浮屠蜿蟺騰貫其上萬口歡然方駭譟值留鑰羣公以介來張綵匝發偉已則且矣俄而靈鵲四翔羅集噪沸亟多至掠人肩而飛可執也異哉豫於是惕然有思乎公不當祭法歟非豫職歟異不疊警於豫歟又誰警歟噫又可徒作歟作且有記記在廟廟在城南杏華村北五山書院記新昌縣東門之外有山焉曰五山世初未嘗知之也自大司馬何公作院其陽儲書焉取山名名之曰五山書院公出時與羣公合處而㑹言然後是山稍稍見知于人然限於高位達尊斯已矣天下固未之盡知之也况後世乎公患之與豫言曰凡物之者興則有壞其當吾院之壞吾亦奚恤耶顧是山兀然見取於吾譬之一人焉始吾未之速之吾泛然塗人之無傷也一或速之入吾室而饗之未盡一爵而徹其俎以去無寧愈於無速之乎哉吾之憂也何以異於是豫曰公書所儲幾何必五經其尊也五經所載幾何必五行其樞也五行所配幾何必五性其大也方公之未為院也固已蘊之為德行行之為事業天下人知之是崇是信及院成而名之天下亦間知有是山者其不以此也哉然今天下之人方屬望于公公亦以天下為已任而欲遽釋公以休於此吾恐其未也亦曰詒其後之人焉爾無他也若夫宵斯肄斯載籍叢委惟經是尊燭影中森然五山也既而外膠中炎蓬勃鬱塞則必坐以待旦闢扉而觀之巘上鋭而岫中疏旭曛穿而昈明雲物過而宇淨景觸情生神與數㑹金剛木柔水濕火燥仁以靜壽智以動樂禮以為門義以為路其宅土也其幹信也指每一屈而道存焉山之為助不既多乎後是東南之陬有賢者作曰非何氏子吾不信也然則是山也殆天作而地藏之以遺何氏乎山如有靈當食饗斯院世世矣固未有壞而徹去時也不然白鹿嶽麓烏能無壞壞而復興興壞壞興相尋於無窮其斯所以無壞乎公奚宜憂公大說曰是又在吾後之學者爾請書歸鑱諸院以規之重建紫陽書院記正德五年春監察御史沈君奉命出按南畿秋九月至歙下令曰教何基某于鄉先生紫陽書院徽國文公祀焉公非兹鄉之鄉先生乎明日吾將拜院下及寅推官張鵬知縣李彥先教諭宋炫訓導鄒紈陳廷用相之縣丞王思敬主簿李鏘典史朱明實翼以從而程文則以氓庶從者次同知王斌又次通判王汝卿殿甫入興俯畢盼而顰出而望得佛宮焉又顰曰烏用是為哉鵬曰業巳袪徙之須日月耳彥曰材浮于川石斬于山甓陶于麓縣則任之然將奚畫而可君曰然他日召斌汝卿進鵬彥授圖焉則中像公勉齊西山配是為祀祠祠東折而南為企德之堂堂南為廡遂為東門門內折北為尊德性之堂堂兩翼為棲士之舍東門折而西為內門門西為西門門內折北為道問學之堂堂兩翼為棲士之舍西門北為廡廡北為遺愛之堂堂折東而合于祠之西祠階之南為道道半有塘亭之曰活水遂梁而達前為道以直屬于內門之外至外門為衡道迤東少南為坊而止乃曰吾去爾思敬爾鏘爾明其相彥也爾文以義名民也兹非義歟爾惟始終可又進炫曰董學御史黃君吾寮也實尸教事爾上其事宜也已而太守熊君至鵬以告喜若已出曰吾恃彥健彥曰府公不以部使先事嫌而惟志成民教而吾顧尼之謂何呼文問狀文方按圖事事慮爽錙銖彥說越明年夏五月院成太守率屬仍以宋穆陵賜額榜升祠以告成事顧鵬彥輩歎曰部使導吾與若也為古之師帥盍德之德之奚若使傳傳奚若記於石永也遂以炫來屬豫記豫亦幸以名附也不容以非其人辭乃次其事為記使歸勒之圭峰集卷十二
