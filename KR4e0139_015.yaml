body:
  text: 圭峯集巻十五明羅玘撰墓誌銘存菴處士傅君墓誌銘閩人存菴處士傅君卒吾友謝邦用亦閩人來為丐銘恐世不知有君也它日邦用嘗為予論閩人士亦髙君行言君有弟瓚盲盲廢棄也不能業作凡家有盲子名為坐食父母雖甚愛服食不以齒它子習為恒君獨喟曰人自求盲耶其亦不幸而已矣奈何割恩至此推其温美于瓚而反取粗糲服食之與行於庭遇闑階必相必掖有急則負之以走長當分異君黙計其産不足給數口終當復合如初姑然之而惟自居積服賈市便宅里度既可忽召瓚與其數口歸人不知其何也君謂瓚曰吾與爾老此課其子業皆有經嫁其女一人于士族瓚實慧善以口鼻嗅啖金銀珠貝手摩錦綺繒縠布縷定估值髙下即明目者不如亦佐君理其家君時呼飲導之笑言自遣以卒日人以方諸陽亢宗云閩於八郡為會府號十萬戸山皆四際而逺且童貧病而死者艱於得木為棺君倡于鄉月施錢買棺置僧寺中俾一僧主出納書于籍嵗稽之以杜欺行既久閩幾無土親膚者其酣於義如此見人難急之如拯焚溺至解乃自營其性然也然能慎所與處不輕假人以色故有言於人人自為勸沮退為善者亦多子鼎㓜有殊性閩之占經據席授子弟者相望君意屬即嵗納金幣日羅酒食恐不慊即意非所在雖招鼎不以徃也故鼎之成不獨於文一舉即魁八郡為解元𢎞治己酉嵗也今業太學厯中書事聞訃實尾邦用來再拜出狀盖君諱琦字希玊祖童考祐年十二時通大誥補社學生得復其家事父母孝沒能以禮葬祭之而律家如官府屐齒之及存尺寸號曰存存方寸以留耕意也配黄氏子鼎之上有㫤孫男震亨謙亨泰亨吉亨孫女潔敬年六十七𢎞治八年正月己酉為卒之日其葬以某年月而為之狀者鄭進士希大也狀與邦用論合是不可使世不知之也應銘銘曰存匪在明不見是圖凡今之人手口拮据攖爾兄弟椎髓剥膚髑髏髐然忍充盃盂惟忍匪存存于心始凡父母愛亦及其弟彼生不辰天奪之明彼將何歸爾非其兄既見其生不忍其死矧有委壑有不顙泚有盈其藏視弟視鄰陽為不知亦獨何人嗟存之人兮而已反其真於何考徳兮我銘其墳韓孺人陳氏墓誌銘文昌韓孺人陳氏隱君汝美之妻進士俊之母俊試通政司政有賢名未第時予識之夏職方氏遂亟見之朝不見者幾日矣職方曰其母訃且至子徃弔之俊泣曰吾母殁期為𢎞治八年八月二十八日及今已九月也吾其乞歸以月日塟塟有銘銘舍史氏奚為之者職方遂以狀來曰孺人諱五妹字惟正大父均父環襲慶柘業獨出它氏而環尤以嚴勝僮奴苦笞撻弗能堪孺人時童女也嘗從容乗間諷止環乃大驚識為竒女隠選右族之良遂歸韓氏韓自孺人入姑之顔面無日不愉懌僕婢之供事無事叱箠子之學膏火不絶於夜嵗之積餘倍他日隣之東西室無有凍饑徙死者成化戊子髙雷盜起民相帥桴海入境避日集里巷物估驟踊斗米至百錢韓氏廩日啓也孺人戒守糶者毋増錢而留其無糴者飲食之於家盜定得歸者衆海舶之至包篚寓謝之物嵗嵗有之丁未夏有舶遇颶漂焉盖私入島夷互市者也浮尸與匵相錯薄于岸匵皆珍貲民泅水争負其匵尸或枕匵相鈎不得脫則擘而盪去之孺人自閾以緡置隱君手曰急以是募瘞諸汎汎者不則魚鼈之食或腐而解耳吾不忍也隠君嘗恚民有侵其地者欲走府訟孺人固争之未幾侵者家覆以其地復尤不能有其田半歸韓氏隣少年醜其妻之疾也謀出之孺人以計召之至恐以禍得不出而其疾亦瘥今􅑷􅑷健婦矣縣之嫠婦與姑居者一日姑怒有從旁譸張之使訴婦姑過韓氏暴婦罪且由以入縣孺人曰而訴婦縣必置婦死婦死誰與而居也誰食而以終也姑寤大悔罵其旁人曰爾誠人邪幾導吾死逺近有孤女或孺人不聞聞必以資嫁之至有閭左冒韓氏婿者及聞孺人疾劇奔走問視日屬于門殁之日以母哭之亦數十人子五人儉嚴俊倫价儉丁酉貢士俊進士也倫亦業進士女三人某某孫某凡三人孫女某凡五人享年五十六塟縣某山之陽於乎職方方考訊寰區之内而覈其實以佞應者懲不貰也顧自為鄉人佞哉宜銘銘曰幾五紀身女妻婦母自童徂嫗内則孔富樂脫野莩取尸魚腹嫠有慈姑媢有徤婦孰孤無父今有乳哺惟徳無逺太史誌墓鄭母葉氏墓誌銘予試京時主鄭綱氏之隣因識綱綱從弟瑛徃來綱所又識之間造瑛瑛以父禮主客茗盌飱簋饌具飭甚予心善主饋者然無可輒發退以語綱綱曰瑛母手作也問其姓則葉氏其鄉則錢塘也自是善瑛瑛業進士予亦業之實疎瑛不知也固推焉若能為之指示者與予游禮日加既數嵗盡得葉之世祖徳父盛母沈氏所以籍京婚鄭氏之故與其在鄭也刲股以愈舅孟純疾又刲以愈姑宣氏疾舅姑殁執哀三年為孝婦勸夫納小妻小妻生二子如已子櫛東家整整為良妻教瑛蚤夜友勝已以學瑛以詩經中𢎞治乙夘順天鄉試為賢母予心存之謂其永長存食報享瑛貴無疑丙辰之臘予道遇綱服朞而容戚問之曰瑛母以十九日棄吾仲父年止六十仲父哭之哀過既而忽作曰幽野百嵗叟死三日埋山麓木少拱已矣況婦人乎吾妻幸死輦下有史氏可附以聞瑛也與羅太史㳺可無圖乎又曰葬以明年五月庚申吉辰也必於崇文郊之魏村社從吾先也又曰汝弟玹琦雖庻亦汝母子汝妻車氏汝母冡婦也汝姊秀貞汝妹秀清秀容汝母女也秀貞夫錦衣舍人陳鉞秀清夫鴻臚舍人庠生趙昇秀容夫金吾指揮李珵汝母壻也及汝之女素蘭汝母之孫可悉誌于墓無遺瑛諾以授友人李進士瓚狀狀至是始成瑛捧入吾室再拜泣以丐予銘銘曰妬女通疾舅姑有疾於歸何疾去前通疾惟舅姑疾宜天不疾而遽斃之疾嗚呼茍有令名疾斃不疾鴻臚寺署丞羅君配朱氏合葬墓誌銘鴻臚寺司賔署署丞羅廣容諱𢎞南昌豐城人其官則鴻臚而職實主贊英公軍事凡在軍二十有六年始掾宣司司最其能舉入部部選入軍為史史主書然其次貫魚于上多或不良于書或私作過發反于部為恒英公且總羣帥羣帥事當闗白行止牘籍日填委倍它軍公察廣容視前史覺差無留滯且訥寂安安意獨注不輒比他史例釋去故自冠帶除順天府照磨所檢校在事如故檢校乃帶銜也是時予始仕以同姓故急得假其副騎羡卒走于途實逸典度外廣容亦不少虞自累介意後或作難色以是觀其厚有士氣至坐其邸出漿沃渴酒辟寒食實饑無厭倦俾予如歸忘客寄則又其配朱孺人助之也廣容日凡三鼓起候于公門飭細戒𤨏公出入白趨出上馬抵軍休必以瞑雖盛寒暑不廢至不了其邸舍箕帚所在而飭其孟子昇仲子冒以庻事館師以教季子晹則多朱之主暨晹冠乃齎之歸試於鄉即學于學雖隔越數嵗即無興懐召見其割季㓜之愛亦夐殊特可厲流俗予歸北來朱以十五年三月十二日疾殁年五十八廣容見予涕泣不已時亦風痺痿跛曳垂奄奄至是果卒則七月十八日也年止六十官止於署丞公悼如失左右手軍中亦有知而嘆息或泣下者昇先卒晹奉喪歸與昌謀合葬於縣某山之原晹奮冒圖吾親使有知幸有會適此吾孝也於是錄伯塤下振旅振旅下雅仁李氏為其曽祖祖父母某某某某某為朱之曽祖祖父母適萬郎中子欽曰遇奴適楊主簿子翺曰婉秀適江貴曰娩秀適周通判孫楫曰冬真側室鄭氏出曰轉奴曰足珍為其女曰山曰夀曰仲曰季為其孫男曰端曰良為其孫女曰洪氏為昇婦曰周氏為冒婦曰丁氏為晹婦朴軒則其别號也泣拜授予曰願賜之銘予辭晹又泣曰晹痛晹父母俱客死於此不幸也幸無靳而賜之銘乎是其不幸也安知其非幸也耶予乃銘銘曰冠耶笄耶天作之合耶起于藩耶登于仕耶仕而陟耶畢婚嫁耶而未之或暌也是之謂同生既而哀耶差池其死耶而卒能歸也同其藏有閟其光維其後之昌武畧將軍辛君配劉宜人墓誌銘𢎞治十六年十二月某日廣徳州知州辛禮葬其父武畧將軍母劉宜人于隆慶州三里河北岡之原先期走京師底其同年太史氏南城羅玘拜且泣曰吾父母行應銘行未可遽一二數其大宜莫如己巳之變吾父以永寧衛副千戸先受戸部檄峙粻于榆闗待車駕北征以事治見知至期遂當翊扈及師潰土木吾父收散卒退保昌平之西崦與大衆合為營謀以遏敵衝衛皇陵且連聲為京城援既而永寧陷吾母以二婢一童奴約吾兄弟於背由間道匿薈蔚中夜行晝伏得縁居庸西絶巘猿懸而下底澗谷饑將藤蔓齧之推糗餱餌吾暨婢與奴凡三晝夜始聞人馬聲就之乃吾父營也相與抱泣且喜衆亦驚聚環觀且喜或賀辛氏微吾母幾不血食矣事平調守隆慶遂為隆慶人天順己夘従鎮朔將軍武强伯征大同斬敵功當叙遷會武强薨受銀幣之賞進今階比終其身口不言當時事於乎此吾父母之所自立者又曰隆慶兵後戰骨暴原野雖郛郭不免吾父哀之買地于厲壇之側舉收而瘞其中曰使從其類不足又廣於北山之麓俾可繼永永取羡木為棺貯之以竢徙葬者之求急賙饑食死賻行資親舊卒恃以濟有差州有别宅曰此可館師郊有三墅曰其入以備日給餘儲之曰贄在斯乃遂以吾學曰爾其以是繼吾固安良鄉之緒業國初都憲考功二祖大鳴于時而二邑吾故土也故云然既已又泣曰吾父母生長北陲未嘗凌江涉湖觀南天之壯吾為廣徳時一嘗迎致之太常陳公侍郎王公文可徴也而後竟以廣徳累嵗庚申就辯於南都而八月二十一日吾母歿年七十八十二月八日吾父亦歿年八十於乎哀哉安知非以吾之陷於罪辟念不可逭而致然耶不然無能身親視兹含飯其亦將誰諉耶不即殞滅延兹三年未敢輒葬必獲不朽言銘其圖以贖乃出檢討石邦彦狀示予曰子其銘諸按狀將軍諱剛字行徤祖志友父英以靖内難功至羽林衛副千戸改永寧衛贈武畧將軍母贈宜人姓李氏宜人諱某字某千戸銘之女子男五人福嗣千戸娶劉氏繼紀氏禮知州也成化丁未進士娶戸部尚書李公女繼周氏禎千戸娶龎氏祥娶楊氏繼馬氏祺娶張氏女一人適隆慶衛千戸梁􅀈孫男十五人某某孫女六人曽孫男四人某某曽孫女四人其大都與其所述合邦彦顧佞者哉銘烏乎辭然曰不朽何敢爾銘曰禄官如之何訓忠娶婦如之何存宗孰不有言曰為當然而囏而艱孰不曰難將軍宜人同心異身忠全宗存宜人將軍憲憲令人千古此墳處士胡君配沈氏合葬墓誌銘髙安處士居石頭街曰胡君源會卒配孺人沈氏以𢎞治己未正月十八日先卒至是為癸亥二月六日相距凡四年子某卜甲子某月某日合葬於後龍山之陽某子行人司行人鎮實君孫也方在任投狀來乞銘盖石頭胡龍口胡也自龍口之遷石頭曰永亮於君為祖永亮生克忠克忠娶某氏生君君㓜在輩行獨難為比敵克忠心異之隂計曰是不可以凡兒儷資謀徃畧旁近若將求焉者實密以覘得石城沈氏喜曰不獨其世且無踰其良即聘室君即孺人伯朂其父也初胡之先李唐厯宋最名為有顯人至元不欲仕又不欲暴白媒其禍乃詭跡於理學中曰吾子姓類與舉子學背馳至君始改奮曰此非其時邪乃館師以瑞學期進取賔講友習前去後至奴飯馬芻悉具充甚人益便來後亦間有顯者然惟上髙黄少宗伯在館最久顯亦獨著四方名勝士茍過石頭則多君之主至有迂騎數舍欲以觀君者君始總家政時亦善居積積貲貯榖至鉅取貸者不豫計其愿姦虚實或留物為質惟其劵之出卒值嵗祲劵空存日耗鑠晩遂坐困而好士樂賔一踵其前不少殺孺人揣知其意常百方補苴恐見圭角傷其完美其為人有識鑒繩墨在中不知彼已隨方應之操筆作書縱横如志人以精楷善之要未為盡知者嘗自營室畫形於堵集匠戒曰寸視尺尺視丈囘旋八方得成失毁吾室法也匠如言果見壯觀乃服至他小器物亦然南方偏境孩婦不識弓矢君偶得是器試射之每五六中見者大駭傳以為異時守劉公端方設城府簾陛斬然於庻衆獨髙君以湥衣幅巾遺之招為鄉飲大賔不赴或旬月不見則存問寢食何似或踰年則必招致郡閤問政所便所不便然常以疾辭雖疾惡過甚而恥言人過故族行以至閭里内師外慕隂悔頓悟而改行者多有之居常嘯咏徙倚終日不以事物攖心常曰使我能無内顧者吾妻也瑞屢就舉竟不償君志而老養終事賴之人稱為孝子仲琰叔琳季璇皆先君死女二人適劉球蕭㫤孫三人長即行人壬戌進士次銑次錚孫女三人曽孫三人享年八十有三孺人殺其四焉鎮奉命祭淮王使歸以朝紳視葬似於君奮發不負者銘曰寧人之負逋甘其身之窶顧若有餘有相者賢則惟其然世澤之延吁嗟乎天河東運使陳公配梁安人墓誌銘安人梁姓諱一真故河東都轉運鹽使司運使陳公配也曽祖某祖執中父景致與公之祖某父某相望為臨川隠君子二家選所宜婦與所宜婿以安人歸公公家浮游山下舟車日夜屬於門率十家之口留一人力作治蔬圃餘丱髽斑白並販易走窮裔絶徼務倍蓰歸誇為長雄煽成俗不可變公幼自奮拔力問學為進取業業精在師師必逺詣而浩博又在羣書不能無費費無從出則安人篋笥至無遺儲繼或織作以佐無倦且恚致公一意所治遂以詩起於鄉登成化己丑進士授主事得工部虞衡司遵化鐡冶者司所治也職次當監其厰厰傳有妖類能殺監者前所殺者喪始發公即代公亦惑安人後至叱曰何物祟鬽乃爾奕奕吾修短不有命乎乃在祟邪即日入居之冶之徒皆免大辟囚編管使自貰者雖狡獪實無所挾竟日枵腹奄息垂絶至踐㪅得休出竊銖兩匿股胯間貿餅餤茍活以為常公每㢘得將置之法安人曰此饑莩耳胡庸湥治戒僮僕毋以是事聞公公考三年封安人公改刑部廣東司陞員外郎郎中司例訊錦衣親軍所𨽻獄怙勢倚援盤糾叵測徤吏即束手公益向徃不以難沮每私語公毋輕當死獄有死獄當是而其家人恐秋期迫即壁狀伺公起朝出潛入投金銀器數事標名其上而去會安人出料理門閾覺急追捕送公所用事閹欲假公手以獄殺無罪貴臣快忿者公怒忤之出禁偵事士偵公以中傷而安人日料理如常實不知閹所為逾月竟不得毫毛釁去間歸夜過小孤諸子在側會風起簸浪觸磯石鬭怒湧扁舟顛頓隙解水噴入敗不瞬息舟工呌呼鬼神投牲牢擾擾安人陽陽無苦敕諸子勿怖曰頃當定須㬰風旋南舟少定隙亦復閉無他兩隨公守福守泉暨陞河東則以公老且病慮或非常自家三千里疾馳至則公已疾踰月卒果如所慮以喪歸自始嫁比公卒志成公美不以内政煩公公亦悉心任付俸入度支喜慶凶賻貧賙疾問公若罔知而所居室庭湫或曰更之亢隘或曰闢之宏皆不答因故易敝主于棲止則已在遵化及部教二子威嬰得今臨清夏守為師雞鳴呼起習誦誦已出侍講席入就飡飡已出肄文辭夜炳燭使誦公入顧笑頷呵呵晨出復然有問者曰然夏常語人曰昔云嚴父今見嚴母在泉州又得方秋崖教如夏亦初不以威嬰進與年俱少弛贄方與日給併寮之子皆曰於我乎供之若今禮科左給事中王文哲其一也威果由庚戌進士授某道監察御史嬰由癸丑進士授南京刑部主事而庻子淵教亦如之將踵兄之為者平生哀人之急而先諸其近者收堂姪姑于母家室而業之直族彦春子老生垂死于堂兄之寃而完其産溥恩持義而行之以機宜故所發不蹶事髙于一時而流聞於人人甚多𢎞治十六年十一月十六日卒年六十七主事先某年卒惟御史侍易簀亦以使廣便道得在省其天乎威娶甘氏嬰娶胡氏千戸女淵娶鄒氏助教女女某適知府徐用濟季子庠生徽慶孫某御史卜某年月日葬某原而當反命闕下乃以吏科左給事中吳懋貞狀來乞銘玘前趨闕過堂下擬拜因痰衝不果拜於乎不果以是終邪是宜銘況承乏史氏銘曰入陳輟耕前已後庚連癸三登甲第仍仍臺省彚征維夫子榮以陳有聲可謂曰能廟食陳牲有永厥靈矧其髙塋浮山英英汝水瀯瀯樂善先生墓誌銘𢎞治元年十月九日東河樂善先生劉君殁子吏部主事約拜官之夕走訃適至捧以泣袒括奔喪孔棘以上聞故稽其行得訊國史諏以某月某日食葬兆用歸居其柩於縣苦山之先塋樂平程楷正之狀其行以俾南城羅玘銘故事銘必誌其世系功謚年爵于為後考先生諱觀字子瀾隠士也無諡鄉人迹其實號曰樂善先生輸粟得階承事郎世東阿曽祖郁祖思明父臨晉教諭璉母吳氏配蘓氏子男五人長曰紓次曰純約綺綰女六人三既嫁三在室孫男二女二皆服衰視窆先生於臨晉為冡嗣臨晉兩登太學先生始侍後於其歸也迎於家臨晉視家籍倍蓰驚曰兒乃爾强人意得以不憂終四弟寛信敏緝調劑翕和甡甡向進而昌黎丞亨業儒有官禄人皆曰先生成之弟亦曰吾兄也正統戊辰伏濟溢虎窟壊張秋隄張秋天下漕津也重足待塞竟浩漫㒺措手先生時署醫學入白計所司竟用其計泝舟虎窟之麓投薪木三徃返比塞隄成噤不言天順丁丑齊饑米商射利價騰踊先生亦船粟徃糶下其估至為黠丐所掠卒不較而反徧飼羣丐人或以癡目之微笑曰然戊子又饑有詔官出粟賑貸者先生出粟應詔猾胥索門戸無厭難其檄方伯袁公杖胥授今階東海張弼世方珍其書有東阿劉郎好義之句旌其義也辛夘徳府以親藩出殿于齊大臣便宜出官鹽以濟用而清河簿獨乾沒扳援主出納為姦强先生為所由需厚賕不能得厚誣之闗節糾結如亂絲紛不可白先生欣欣廢産以償齊人無少長咸覺其寃壬辰殍尸載途購募徧瘞猶男女異坎髙其封纍纍今有可見者平生過於友愛仲弟好酗一旦誤傷脇弟驚怖奔逸不知所為先生神色自若無一語誰何弟得自定如初蒞僮僕莊而温箠楚未嘗及其膚亦不假以辭色人有所貸不意其必償察其終難償者隂折其劵嘗為子婿費不給宋麟者納吉千緡怪之曰償前所負也其于學不于章句於大義嘗讀宋史至岳武穆傳閉目不視久之從弟獲鹿司訓幹質之邑黄司訓黄曰噫吾鄉老人猶裂編擲之地幹曰可怒在檜編也何尤因持論不相下主事從傍徐曰家君之惜在武穆此老之怒在賊檜論遂平君子謂惜出於愛怒出於義先生仁勝故愛發耳始從先人居苫山徙學宫傍又徙狼溪又徙苫山之東今墓在其隂焉主事同余舉丁未進士援恩推進士禄禄先生于家幾二年俾慗遺食數新其榮與行均將不止此嗚呼此主事之悲以丐余銘也銘曰黔守廬用蠱譽末受祉食以子不有躬漕之通匱厥槖野無骼不責逋人樂輸允若兹昌其嗣百世有懐尚曰樂善先生於是乎在惲進士妻蕭氏墓誌銘𢎞治十六年十一月十二日進士惲巍妻蕭氏諱愛卒於京師之邸舍明年四月巍得例請因以其喪歸葬常州府武進縣某山之原某月某日抱男一人汴弟女一人玉秀視窆將發京師憤泣曰巍必使後世知有吾妻愛名不然巍負愛也即為書述其曽祖某祖某父祓母趙氏祓起胄監知東莞又知藍山晩乃得愛愛之故以愛名所以愛愛教愛出常故愛知書嫻禮為蕭女魁暨十五歸惲惲方屯邅遭舅喪灾連綿不可以家徙江巷田廬廬且再燬不能輒廬至葺茅溝塍上居者移時安若髙屋奥室無病色惟務資遣巍入學宫贄師營學乙夘獲領薦書上春官遭繼姑陳氏喪能以禮襄其事仍仍多難中尤總衆律下節調其服食惟適以俟巍歸惲又覺將革前之沓沓者辛酉冬力主相巍北行巍莫能奪值其臘倍寒舟冰車雪砭傷胚疾入膜特甚壬戌巍登第釋褐甫四日果索席卧日益憒憒然猶屈强支吾摸汴弟入懐不置家人奪止之即復然延至是與巍訣訣已卒年三十其訣語孔哀不忍聞亦不忍述也書成偕同年庻吉士貴溪畢汝舟入吾室泣且拜曰夫人死命也死于客亦命也其無庸悲獨悲夫吾妻以宦室息女入衰門支衰且難而且俾衰垂有可觀固不必及享且不逮見可哀已惟能圖其不朽庻幾塞吾哀將惟銘是託汝舟亦曰是其度謀審湥將不可變終不得讓乃為銘曰娟娟柔質辭順即逆而不顛躓有志有畫宻其有櫛如棟斯磶在百獲一以夭殯客蒼蒼靡詰祈夀幽石御馬監左監丞博囉墓誌銘𢎞治十一年冬十一月上將明年郊凡郊法駕以鹵簿從鹵簿馬萬駟太僕不與焉咸出于中廐之良御馬監是也監之官太監下少監少監左右監丞夙戒䖍恭訓飭奚厮箕以剉塵菽以火熬櫛鬛膏騣比物齊毛窮殫日夜或時辟易調騁鑿冰以濯以飲則多丞主之右監丞博囉以七十猶在事然卒以是撼頓得心胃疾氣壅逆膨脝阨塞口張呼呷徹晝夜從子成錦衣百戸夀更迭入侍有以聞太皇太后者亟遣宫監來視且賜銀半鋌市善藥然醫工烹粉和劑成夀捧以進歠輒嘔出或掉首不歠勢愈劇狂悸掠髮羌語夀驚曰是返本候也急以毳䝉身首擁出私宅闔扇張帟藴火床下熨臍摩足達旦至二十五日屬纊絶卜以十二月某日葬城西香山煤厰村之塋博囉西域涼州部人也正綂丁巳甫八嵗以其父平章哈喇庫春來内附留京師庫春死與母王老老選入宫備灑掃成化丁亥進長隨出理外廐乙未進奉御甲辰進至御馬監左監丞乙巳遂至太監移理北廐廐稱治太皇太后時皇太后賜銀五鋌綺一帛一旌之先皇帝亦如太后之賜而銀殺其二焉今皇帝之初左遷復為左監丞宿衛六十有二年在職凡三十二牝牡驪黄駑驥汗血飢飼渴飲痒搔瘏療真其生知性能處得其據而死其官前老老之喪斬斬一依喪禮知丐余銘今其葬也奚宜泯泯無聞況夀哀哀誓必得余銘銘曰雛離紇干翰飛戾天天閽天閑居之盤盤鵕䴊之冠且毁且完老而大還吁其安安錦衣千戸張養直墓誌銘𢎞治十年六月二日壬申葬錦衣衛副千戸張君于安定門外永安莊之塋君諱浩字養直和之含山其故居紳福鏞能周氏其曽祖祖父母任氏其妻恩思其子蘭蕙其女四十有八其年而五月十三日其卒日也是旦退朝入衛坐㕔事方處分羣校環侍見君目直喉咯咯有聲已而流沫如注布地上知惡候急畀之歸歸及堂目已瞑大夫士大驚徒步不及騎徃哭者相屬于道或叱其傳之者以君為未死或謂君剛憤觸事咈心死君嘗遣恩居學學進士業亦就予學於是與游游久遂知君沉毅涵養畧善書能歌詩與游者皆煒煒名士西班者武階也有麤亢酗饕婪諂附貴勢者輒疾之若汚穢然會遇不揖揖或避之不與之坐或不與之語慷慨方剛克自竪立不依倚有名聲多識博聞者即蔀屋布韋僕僕亟拜不辭亦時相其急窘以貲為緩其禍平生不蓄姬侍公退閉戸坐軒中小蒼頭亦不得入人謂之張閉戸云而當官涖事則迺張膽掀髯出觚露鋒威嚴如神立解糾紛觸犯賈禍不顧嘗與予言己亥建州之戰夜半突入敵營斬敵首血刃獻軍門辛丑與敵戰沙嶺運矟俘馘勢如風飛予聞壯之冀州朝寨營者降賊遺種屯焉賊廋其中巡徼吏士知不敢近詔宻以君徃君自他境發兵約旦日會方會老賊迺羣老嫗負孩比比立墻外若將掣肘吾兵狀君命縛其二嫗考之得賊所在麾兵射矢進圍登屋發瓦下取七賊送闕下盖卒前之閱月也君自結髮即知名閻御史典學政時品藻明甚君為武學生獨竒君稠衆中荆庻人之獄戴尚書實便宜君在行亦才君坐與語曰奚謂武弁乃有是人乙夘計吏之來詔君提卒䕶以入黄御史自院出與事事者也既偕行數月大驚君之介約為兄弟以歸其為人重皆此類君之母實阿保崇藩于太皇太后宫崇既就封母隨而父百戸君留京君思母養父兩致其至比殁請之崇迎喪歸葬而百戸君適以老乞君代先皇帝立授君副千戸雖用母保崇功然君兩戰邊陲已自小旗為總旗矣矧重以百戸典武銓者亦以功賞相副服上之明兹之卒也亦廑太皇太后悲賜白金一鏹佐喪焉君子於是又知不獨人士之惜之也將葬恩黟面斬衰造予泣灑灑口吃無聲俯拜不能興予曰而來欲銘而父邪乃興再拜跽以請予亦哀不能辭銘也銘曰南氓京戎京府其東而西其宫奮以武功匪専保崇傷于剛公暴殞其躬有樹其風亦曰令終兵科都給事中屈君墓誌銘𢎞治甲子今上益勵精于治於時給諫二三老成慮逺而防屹然示之以重故一切過髙􅊣治之説無縁而入其助𢎞多而吾友屈引之亦在列上且屬意焉然以是八月病銓司擬通政入請上寧他授以竢入九月病腫自股上侵臍至十日丁酉卒卒時無一語惟以處順境寡竒節無補于時未獲以厚禄養垂白父見隕壯子為悲吾輩方私痛之耆舊有識則又所惜者大意不在引之也初上改元新進紛紛入大言沓撓新政時引之同吾為庻吉士每聞每頷之及為禮科給事中同列蚤夜伺揣有封事顧寂不動一旦脫然勸御日講射游觀曰是大繫世故吾何可無言遇灾異置其苛細條興利除􅊣數事事下禮部議倪文毅公嘆賞即是其議以覆崇王就藩久聖慈仁夀太皇太后憶及語上上擬發使召大臣臺諫諍不得引之以輕離封守一語寤上上立為止自禮科陞兵科右給事中又轉吏科給事中遂陞兵科都給事其職與兵部長共本兵屬敵大舉入塞首將提兵至榆林以敵退聞敵實自它道入内地張甚而永順宣慰彭某黠酋也幸有急興事上言欲帥所部入助戰引之謂同列曰是國體也乃劾將帥逗遛請降詔責之而駁某無勞逺方助順詞婉而厲將帥懼至𢷬敵營以勝奏凱歸而四方亦由是絶他覬將家者子聚麀禠職者攀戚畹謀復起而越人吕紀者畫工也暨一二兵官相繼内降注授要職則大憤不食次第率言者排之内降絶遂不復續最後鎮守河南太監劉瑯請柴夫舊制柴夫者名為夫實入銀于官以備爨薪者而數則視其官之品中官例無之而瑯請至四倍于尚書數乃獨言祖宗制柴夫為庻官養㢘助爾中官無當得之例上為殺其半朝野悚息交以為賀居禮科凡兩使而在兩廣能挺與奥援敵卒直金尚書秦公之誣兵科一同考禮闈得編修孫直卿趙與錫諸多名士家貧既仕以禄入佐養與育以緩其弟子耕販力然畛域斬然真不愧其座右所書其詞讀之凜凜可以起懦居常讀書要自胸中無留礙雖字書小數亦體切古法至到於其著述珍重不汎畀投或有得假其籍冊者字批句注醒人心目異甚盖亦有夙成焉童丱時已為鄉衮郎中邊公所竒而妻以孫即元配侍郎女也曽祖貴自鳯翔徙家任邱祖慶父忠封給事中母張氏贈孺人繼孫賈氏如張封子郊孫某郊轝喪歸葬縣某原月在仲冬日以某編修李宗易曰舍銘引之史氏直筆不宜如是予曰諾引之諱伸號蠖菴又號東莎居士年止四十五體素羸而専以養勝今若此非其養之罪也悲夫銘曰毓爾生爾親玉爾羸砥爾行爾身諒爾直竢爾成爾君夫何爾天不夀爾年是之謂奪爾之全圭峯集巻十五
