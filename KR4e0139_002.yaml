body:
  text: 圭峯集卷二明羅玘撰序敬齋珍苑序敬齋珍苑敬齋之所珍者在焉然必非曰敬齋之所珍者在焉而已也凡為敬齋珍之者皆在焉其蓄富也故曰苑也苑也者蕃育鳥獸草木之所古者天子諸侯與庶民共焉者也而珍之為物也其産也逺或至于窮髮不毛人迹所不至之地蠻夷魑魅虺蜮之區而其近也非千仞之崖則不測之淵耳故其取之也非有有死之心以主於必往之先非有無生之氣以決於臨事之際即往往且不利如是者又必其朋其羣窮歲月焉而一人一日之力固無足議為也然猶有徒死焉者不得也有幸而生還焉者不得也是其為賈也或十萬不啻必百萬或百萬不啻必千萬而遞相高也何怪乎故雖以天子諸侯之尊且富亦不得似鳥獸草木然以苑蓄之況其下者乎然亦何急於天下國家乎是以君子不謂珍也惟夫去人不逺而取之甚易三尺之童得服習之至體其全雖為聖人其無難而究其用雖堯舜禹湯之治天下國家不外乎是則天下之珍蓋在此而不在彼彼固無所挾而與以爭雄也況夫放之彌漫六合而無間夫何苑之足多乎而敬齋兹所謂苑蓋自其一人一家所有言之非通論也敬齋泉人姓傅氏字時庸尚書戶部郎中好學而文生平所著甚富有志于世而竟以未顯死是編也集制䇿一敕命三序説記十一贈詩六十其子刑部主事浚又附以祭文行狀銘表挽詩百餘篇凡百七十篇彚成之冠以今名所以志其必充至于苑而後己間來求其説於豫豫觀世之士孰不知此之所謂珍者重於彼之所謂珍者哉而或以之附進取媒利與祿至朝得而暮已忘之如傳舍然顧於彼之所謂珍者乃其相與為膠漆而不可解然而卒以禍焉者相籍也於乎使其觀於是編庶乎其亦少沮矣乎則是編也其亦有裨於是也乎送符君知溧陽序豫自丙午歲遊體齋先生門因得以友瑜之賢賢而久縻於鄉者亦因以知其名若符君觀張君文最著者也是歲張君果以春秋薦來已酉符君又來明年試禮闈以禮經為第五人對大廷第進士豫丞會於先生之庭未嘗不訝其昔之否而今之亨也退私念曰是將為諫為臺不亦不失為部寺未幾豫以憂去比免喪北來先生以得請南歸今年春豫同考禮闈揭名得張君喜其與符君無負素知於數年之前而先生亦以五月還朝符君張君亦來會座側張君謂豫曰知符君之為溧陽乎豫愕不知所謂先生之弟中舍君曰符君試政工曹奉使遼藩清勤之譽播于政府故凡遼藩制當再委者不及其歸兩以簡書沓委之君遂留二期而銓司例以進士名在甲丙中甲丙皆外補乙雖公出槩以其為規避不限年亦用甲丙例外補之豫聞而嘆曰噫是何怪哉天下之事不可得而知也夫符君之縻於鄉也先生知之鄉之人知之雖豫之疏且逺亦知之然遂謂君與十三郡之士角而必於一薦則妄也而況於魁禮闈乎況於第進士乎雖君亦自未敢以為必然也既而薦于鄉魁禮闈第進士而又歷年之久練達之精清勤之著人以其為非臺諫部寺之選亦妄也而況敢必其外補乎雖君之退抑其思亦不至是也況先生與鄉人素所厚望者乎天下之事果可得而盡知也耶今君之為溧陽也其謂如始薦於鄉至為進士之時乎亦多見其如縻於鄉之時也昔縻於鄉積而至於進士之達不知今之縻於縣後當何如也亨否循環行當見之張君起揖曰子之言豈惟符君天下皆然請於先生先生命書為送符君序送參議吳君之任湖廣序吏科左給事中金溪吳君懋貞擢湖廣布政司左參議將行鄉之仕于朝者例於道有祖懋貞尤鄉之望也又屬豫序之以為後徵噫豫固非卜師星史者而能豫處其後之云云也假卜師者曰懋貞他日其入為司寇乎星史者又進而曰懋貞他日其至于冡宰乎其然乎其不然乎皆非所以待懋貞也懋貞有志于古者也書曰天討有罪司冦職也懋貞嘗為刑科也固嘗言之果能使罪者必入而寃者必出乎又曰天命有德冡宰職也懋貞嘗為吏科也固嘗言之果能使明者必陟而幽者必黜乎未能也人或從而尤之必將復之曰吾誠不了天下之大孰罪而孰寃也而況吾非職與司冦共出入者也吾誠不了天下之大孰明而孰幽也而況吾非職與冡宰共黜陟者也吾職在言言之而已耳其可也今則異於是矣湖有六道懋貞必處其一焉而可亦曰天下之大乎民之罪者寃者與寃罪之易位者士之明者幽者與幽明之易位者不知之是謂不明知之而坐觀人之出入之黜陟之其所以出入黜陟者固同列之官也而亦豈司冦冡宰乎亦曰吾不敢與之爭也或曰是非吾職也吾職在戶口稽之而已矣吾職在錢穀督之而已矣曰吾事畢矣則信乎前日之言言其職而已矣如是而即如卜師星史者之言然耶他日亦必自出入之自黜陟之人言不聞也則非所謂天命天討也豈志於古者之所以為司冦冡宰乎哉懋貞必不爾為也豫故豫為鄉人道之且以堅懋貞焉恩封榮慶序餘姚恪庵毛居士𢎞治九年三月朔旦蒙恩封霸州知州封之命下自闕下霸於闕為近其子今刑部郎中世誠在焉得之不敢宿於邸謹授使者歸餘姚至之日居士拜命焉即知州也然以豫度之餘姚時號多軒冕亦有封知州者乎更二年郎中召入部為員外郎一時環觀上下亦有以知州封其父者乎夫知州外官也於制必九載乃封以進士補者或三歲而召或四五歲而召而踰是者或終不召召者不及封不召者不獲封而獲九載封者則非進士也然則非知州父之難於封也為進士父之難於封知州也豫嘗過高郵郎中時為其州與豫同年也來視豫覺其聲呷然而容薾然豫甚訝且戚然不敢以究而時往來于懷耳及復來會則其去高郵也久矣方來自霸之日也覺其琅然盎然視舊若過焉因思高郵之會其亦勞于州之政而已矣然則非進士父之難於封知州也將州之政雖才進士如郎中者亦難乎其九載也然亦惟郎中身親之故其在霸州也即以書來曰為吾父侈大之豫不果為者三年且告歸歸且四年及來兹又一年矣而郎中適有封魯之命魯東南孔道也使事告成軺車在岐歸止之分毫釐之差耳其無介然於懷耶吾不信也因追綴其意而補之使郵歸以獻距其時至是凡八年又以見非獨進士父之難於封知州也雖為之言者亦難於言也送江編修得告歸省序庶吉士月課人皆有親也士大夫重於去其親義也而得省者什一工商輕於去其親利也而得省者什九是豈義之禍於人哉勢有所局也勢泥於此情伸於彼可也夫人之生少壯則必其身之富且貴也及其不遂而衰莫矣然後惟其子之望業乎儒望其達於朝業乎商望其叢乎貨業乎藝望其行乎時其心一也而儒為甚其有舉乎鄉而有獲焉則高其門閭矣又角於春官剔於大廷而有獲焉則冠蓋至矣又進而縻好爵焉不數歲而封章錫矣名稱易矣千金之富三牲之養何以易此哉當是之時望其歷資之心炎炎然也何暇為會晤計區區之省覲豈吾親之情哉如孟子所謂志養者亦有之矣士大夫之省其親者什一亦其自然也而或者以工商律之何哉今年八月太史錢塘江先生法當得省以狀聞詔可之而某日别其僚將就道故余因是以發士大夫所以難言之隱以解衆之惑且以誦先生之勇然先生亦人中之什一者也詔使禱雨有感詩序成化丁未大旱計其地則自京畿以逹於幽并雍豫青齊之境於地為至廣計其時自孟春二月至於夏四月於時為最久禾不得以按麥不得以穫乃至皇上焦勞徹樂損膳出御便殿齊小大羣臣震恐肅栗罔敢戲豫敬天之渝然也上又思惟山川鬼神逺罔聞知乃詔廷臣奉幣祝分走羣望而少宰劉公當北嶽暨醫巫閭羣使既出乃戊午玄雲翳空伏雷殷殷雨乃降尚未洽也己未又雨庚申始大雨霑足上乃弛齊羣臣始復常視事而羣臣各以逺近為先後反命闕下劉公豫鄉人也往私覿之公為余道曰始陛辭出張掖門外黃埃濛濛千里不見蒼翠色牛羊齕枯稿老者泣婦人啼有荷擔而立者何暇問種植事也既雨禱還下及數里仆者起稿者茁折者條青􅀢之色橫眥交睫耕夫滿野而謳歌之聲蓋己洋洋乎盈耳矣嗚呼休哉豫因起贊曰公獨不見景鐘乎其有聲甚大也擊之而無杵與操其杵而不擊者均之不能發其聲而語人曰鐘之無聲豈不過哉今夫天地之氣升而為雲降而為雨其固然也至其鬱而不升且降也甚於鐘之藴其聲而人之精誠一有感觸而遂至於升且降也甚於杵之擊況於至仁之主與夫精誠之使其操杵而擊當何如哉公曰然同時覿公者皆有詩因使豫書前言以為序玉堂齋宿聽琴序成化丁未孟秋上將禋享太廟翰林於職為最親於地為最密故先事之日內閣元老畢肅羣寮入院齊袚應時而院𨽻夷滌掃除闢扉布榻謖足屏息以須事事於是負者挈者舁者擔者沓然而至褶褆毾㲪充牣於西廂之下筆棲於床茶宿於竈或琅然高吟或默然危坐或盍簮而談或隱几而寐雖動靜不同而凝神滌慮積其誠一也俄而莫炊輟煙鳴鐘啓夕羣動畢斂萬籟俱寂衆起而散各投所佚余亦入室就枕而休焉忽有聲作於鄰壁之間琮琮琤琤泠泠汀汀乍斷乍續乍細乍大若亂水赴壑而潨然齊奔若輕飈入竹而飀然發戛織女裂帛於休機宫官鳴玉於衆躅而皆不足喻也余謂童子曰此何聲也女知之乎曰隔窗丈人有物一事縱延三尺而徑咫餘上有列星而腹窪然絡以素緡踦以雙趾黟然其黑硿然其形以爪劃之鏗其有聲不知其他也余曰噫此琴也女何見焉曰從其隙而覷之耳余乃攬裳而起排其戶而啓之強請丈人得而鼓焉始則呦呦而沸裊裊而延舞幽谷之柔風碎高枝之零露怨而不怒傷而不激丈人曰若亦知此也耶余曰此猗蘭操也方今主上渴於登賢矧獲大聖不知其何如尊榮也請置此而更其操於是切切凄凄若訴若泣羈鳥噪而思林縲猿哀而靡脫憂深患迫誰控誰告丈人曰若亦知此也耶余曰此拘幽操也湯網解而庶類咸亨周圄空而萬姓大悅矧今至治之世而吾未聞聖人穽也吾願子更之良久紐軫促絃易商為宫未成曲調先覺雍容渢渢乎優柔而不迫洋洋乎浩蕩而無垠耳既灑然心隨以清神思恍惚如遊舜庭余曰至矣哉盡之矣昔有虞氏奏此而景星出慶雲見天下之民含哺鼓腹而不知帝力之何有也丈人意或者其在斯乎曰然遂乃抽而槖之使童子出戶而視焉漏已午而宫門闢矣遄起肅恭趨而將事聞猗那清廟之九奏而猶琴音之在耳也退而次其語為聽琴序送福建按察副使余君之任序凡御史居臺中閲章奏例不擬請外遣故坐是無所假緣自便至有曠數歲而違其省侍者是謂休其勞而鬱其私或病孝子焉至其拔擢非二於太僕則丞於大理或議於通政皆內僚鮮有外補而老以練歷者是謂崇其名而損其實或病志士焉吾友余誠之居於是三年母太孺人居遂寧阻以劍門之險弗獲迎以養鬱而殆病者數矣方擬請解歸今年夏四月忽有福建按察副使之命人皆駭然曰異哉誠之大喜曰是天假手當軸者之私我也是當軸者之愛我也人曰子弗能二耶丞耶議耶而顧曰愛孰愛乎曰夫惟無軋于人也則傲生以遇忤則折無拂于行也則惰生以應紛則冗無邇于民也則暗生以照物則昧而求以令終也得乎吾兹幸有軋也以鎮傲有拂也以起惰有邇也以滌暗伐吾之病益吾之長所得多矣而他何足計乎故曰愛我也人又曰凡有以與人也過其分曰私而子之受兹與也實不及焉而亦曰私可乎曰吾前之别吾母也中士之拜吾母也兹歸之拜吾母也中大夫之拜吾母也吾不意兹之得拜吾母也吾母不意中大夫之拜也不然必遲遲焉而需內次焉吾安能忍不請以歸耶則中士之拜吾母猶昨也故曰天之假手以私我也君子於是知誠之於練歷也厚其取也薄曰志士也於省侍也重其進也輕曰孝子也同年又喜夫吾榜有志士也又有孝子也而又合於誠之之一身吾榜可賀也使豫書之因以為誠之之行贈貞堅餘蔭詩序歙節婦吳之汪其孫成丐豫序其貞堅餘蔭詩百餘篇凡詩之言言節也其節也先皇帝實録載之然而未有今名也孰名之篁墩程學士名之學士歙人也高其節以厲俗故名之繼而姑蘇沈石田圖之且大書焉石田方有聲於南服凡山川之勝風水蟲魚草木之華實變怪譎詭之觀莫不畢斂之毫端以神其胸中之雋以為無窮之託而況夫風教之所繫者且比郡也其亦烏得無情哉由是貞堅餘蔭之名遂流聞于吳越間往往入于吟壇詩社而為咀嚼之品假成也於此而豫有矜心焉必將曰吳越方今擅天下是亦足矣則固無所影響于兹也或不足于今之世而必曰古之人古之人則必將求如古之立言者而後可傳也噫亦孝矣然今舉天下猝無其人也況於兹乎如徒圖充止于吳越之人則兹固其地也而其傳或庶幾也或來宜也且今天下之言勤生與日晷相競然必曰歙之人而視捐錢營無益至惜靳若捐生然亦必曰歙之人則成之至兹行半萬里也於時日為甚曠無乃病其勤執贄于達人之門也捐費良不資無乃鬱其生而成必為此者其亦超然出乎其俗者哉不然篁墩名之石田圖且書之吳越之名流詩之彼且閟之國史録之彼且欲刋之曰是皆病且鬱我者吾人安得而和之況得厠名其間哉而何及於傳否乎成亦可勵俗也不獨汪也汪夫仕榮死時才二十四奉孀姑撫乳下孤即成父也年八十餘而家日盛後之觀史者自當見之此不書别吳獻臣詩序吳獻臣蔣敬之皆廣西人與吾並遊於宗伯丘先生之門於今為同年吾三人者豫年幾倍之而貌且寢二君不以是疏於未第時其豈有見矣乎二君德器才藻要不類若是之年者吾之望之若敵國然不敢迎之試也即之若同生不忍舍而暫違也吾方倚二君以為重而獻臣出知廣之順德獨先去矣噫吾有愠乎無也雖然慍吾之私耳用以仇獻臣不亦酷乎館友蘇伯誠順德人也其任為飲餞主實宜城東月河寺南轅者兹發軔其為飲餞所又宜歐陽時舉酒素酣詩素放其道送行意又宜而吾與敬之經營於樽俎間獻臣歡如也而諸君詩興亦從而迸出縮者蓄暢者盡情境可狀也豫時不能詩誠畏之矣方欲以文支離之則正之敬之已為之丘先生冷針在可無讓乎獻臣曰茍可以裨吾行者聽豫思之政可也而老於世故百鍊而不衰者孰愈於時舉於是請諸時舉語之風土亦可也然稽於書不若經於目經於目不若土其鄉於是請諸伯誠語之二人者既不吾拒吾之愚也為得計揚揚然不能藏其矜矣或曰敏可矜也訥可矜乎罰上上或又曰人之遺獻臣也以一人子之遺獻臣也以衆人賞上上蓋浮豫大白者二焉或又曰政不在嘵嘵亦不在皎皎嘵嘵者窮皎皎者汚訥靜象也明公之母也或可以佐政卷成書于端蓋不得已也豫豈敢哉送高司訓之任靈山序今天下之士於藝場之習惟閩中為專蓋非其父兄師友之所源流必其里閭之所鼓舞也故其民之材質可以自見者恥為其他而必趨于是以為貴久而成俗其幸遇焉而取高第為達官者亦易之不以為詫僅而常員冗職洎一命之榮者亦無所榮辱詆羡於其間而或窮以齟齬者固咨嗟悼惜之卒不至於訾而笑且排焉一藩之郡八三年大比制數九十名閩與莆居其什之八餘六郡取足而已至於上春官䇿進士亦視以為差其專而成俗有以哉高君惟崇閩人也今年自南太學來謁吏部選吏部偶銓注之乃往訓導靈山靈山廣之僻縣也訓導官雖清然於地為極散居僻縣在散地閩人視之固亦窮以齟齬者耳其仕于朝者茍知惟崇孰能不惜之豈不以惟崇為閩士數十年其業非不專也其為士也尊府僉事君實選於衆子中而命之其材質非不可以自見也自僉事君而上三世皆進士為給事中為别駕為丞為教諭為訓導又幾人其源流非不深且長也以可以自見之才承深長之澤而又鼓舞於專習之俗蹈夫常利之轍惟不至達官則亦已矣占一第而常冗之員固可坐而得也曾謂於其九十名者亦不可得浸尋以瀕於老僅拜一散漫之官而又于窮僻之鄉同地也同業也又得無介然於懷耶吾友鄭叔昭為豫言其事豫聞父老言景泰中僉事君來督學其教到今可誦也而靈山得其子教之惟崇固為失矣靈山獨非得乎取諸此而加諸彼又造物之妙不可得而知之者也叔昭喜書豫言以慰其行送侍講學士劉君歸東川省慶詩序城之東南隅有溪焉其原出于西山之麓注于大內太液之池釃為支流而徑于此涯多柳多柏錯以槐榆陰壓壓與水接錦衣袁氏宅焉石以假山洞其中而亭其上為都城水木嘉處侍講學士東川劉君仁仲得請歸其鄉閏月十日豫與倪舜薰八人餞之豫善袁氏擇勝而得是焉初亦適然耳無他謂也既而酒行甚歡略我賔主其隙或循溪羣行或席涯雜坐而仁仲獨俯溪以觀水即涯以蔭木其觀也覺首肯肯有逺跂意其蔭也覺足踆踆有俯躅聲豫酌爵飲之曰飲斯何跂也又酌飲之曰飲斯何躅也仁仲笑曰跂吾默求其原而躅吾微探其本也吾之身譬則水也木也吾之二親譬之原也本也微吾親何以有吾身無吾身吾何以有今日乎吾違二親十年矣故吾講幄之班虛之曰他日可綴也東宫之講讀輟之曰他日可續也史事之簡命委之同館曰可畢事也萬里之途赤日之暴劍門之險鳥道之危曰吾不知也唯曰二親明年之壽吾不可藉是以一日逭也故遇水觀之且跂焉遇木蔭之且􅀈焉吾急故也吾有觸焉爾八人者於是大喜豫之善擇勝也且合辭言曰微此何以發吾仁仲之真豈天遺此以彰吾仁仲之孝思耶不可無述遂各自為詩一章以志斯會之遭也且以為其行贈詩成書名氏于其上舜薰工部郎中錢塘人清苑傅邦瑞左春坊左中允姚江翁應乾官如舜薰在禮部任丘屈引之兵科都給事中湘源蔣敬之官如邦瑞在右坊丹徒靳充道左諭德鉛山費子充左贊善俱左坊豫南城人官尚編修也以齒差長優之讓為序云送胡君世榮知清源序𢎞治己酉春三月同年胡君世榮出知山西清源縣余知清源世榮不足為也奚而知之世榮羽林世胄也屬當廕指揮僉事其品四其階明威將軍其祿食歲三百石其服金紫其班立丹墀之西視東墀下大夫為敵歲時宴賚必階與外之武辨懸隔丈夫官至此亦榮矣然必其先世當天造草昧之時揚義旗分主憂奠厥鼎趾而後退食其報本宗代序乃克預焉不則勇先賁育未易以唾手取也其難又如此而世榮顧乃讀儒書衣儒衣入揖講堂下為諸生求所以修身治人之道以待彚征此其志何如也凡人困躓必改圖而世榮再進再屈不少悔及成化辛卯始舉順天上春官積十餘年而終不與主司之的人皆曰是將志怠盍亦自還乎而乃遜官其子益勤肄習京師學者日造焉坐於門闑為榮歲登其良數人入列省寺世榮淡如也乃兹丁未同余登進士試戶部以選授知兹縣縣受難治名于昔而人之愛之又每為之出難知世榮揣知輒逆閉其言言之亦不答而理行甚勇嗚呼勇誠是也天下無不可治之地清源獨久辱兹名何辜耶人亦孰不欲富貴而世榮遲回迂左如此而畢竟至於是何耶世有似偶然而實非偶然者不可不察也天其或者假兹縣以彰兹人之異授兹人以洗兹縣之辱而機其妙於窅窅之間乎脫清源得他令辱未必洗世榮安其常為衆人也蚤矣胡為昭天機之妙此揭揭乎天加意於其始有不加意於其終乎余故知清源世榮不足為也行用勇矣是月戊寅實維其行從之遊者裒然畢集而有序請於余余同年也書其所知者賀監察御史李君考績序李君晦之自某人入院為御史居三年三年蓋初考期也凡考先某院最之符部部最之具以請事既下類陛引詔各復其官御史某官也乃復院院之寮賔之醵飲如初上禮飲必有言以華之然必以館閣者貴之也雖然又例必醵首豫擬誰某氏俾賔自擇之而晦之乃主豫醵首嘻然笑曰是謂市之弗售曭乎困而以例起者耶晦之曰然醵首曰館閣之英鋭於氣而疾於志其蓄也若海而其發也若蒸故其意之所放沛然而手之所摹也油然而周煥然而章於凡人之意象性情尊德美行儼乎其前是以貴之也今夫困也者則其年且長矣其觸之而縮也其肩也其搜之而無所得也其頭之童也其比之而不合也其齒之豁也由是有狐疑焉由是有首鼠之心焉故其發也萎然而不遂披披然紛紏而無倫而於人也暗然而無光寂然而不揚請置而更諸晦之曰夫衆之病夫困也者其槩也而吾之取之也其已試也吾濟水道之衝也而涯之比舍吾不佞綽有標題焉彼之以例起道吾濟也見之呼舍之人曰誰之為之歟舍之人以吾對曰盍語諸行將索之禮部矣明年宴禮部握手道所以宴之人逮今以為口實焉噫何其神也吾又安能舍以他求哉醵首不悅終置之會晦之以病告歸至是復起竟必如前請豫曰詩不云乎如彼飛蟲時亦弋獲言幸中也晦之所以永懷于兹而違衆也然請遂違衆置所以登隮者而推晦之納諸聖賢之域豫亦幸中焉則困頓不振之言亦君子所不棄也晦之喜復諸醵首書以為序恩榮省慶序宜興古陽羡州也多藏粟蓄緡之室然不以是為多軒冕圭組蟬聨魚貫以代食者始右之門地尊宿享有子封者右之往年豫謁味菜翁入其郛亦僅留半晷然豫有意也輒已得其俗之槩如此翁今學士吳克溫父也克溫邇豫居婚媾之來見焉舊故之飲參焉得其人也亦多矣府軍衛賔李文盛始尚需次生也克溫朝夕道其父耕樂翁之賢不置豫意其門地之兩當也豫歸克溫亦移南院豫復來聞翁已封如文盛官母孺人矣於是宜興享子封而為豫所知者凡二人二人者非其俗之所右者耶豫未遍歷其地閲其人是未可知也姑以豫之所知者言之耳及今文盛來謁告歸豫曰何歸曰吾違父母六期六期令甲當賜告告既下且行至必以臘臘除前五日吾父夀辰也假告及蚤六閲月吾母七十之觴亦及舉矣今及吾父亦幸也已豫曰子邑有耕夫乎與販豎乎與寒畯士乎父母慶舍其業也芻新羞瘠進其瓦缶強顔以為悅其恆也雖然未盡釂而業次失矣父母已顰顣矣顧豈越歲違時而若子耶然而若此者其粟與緡日營營而不足也子曰幸宜也抑子慎無薄兹衛賔乎子之邑藏粟蓄緡之室幾何矣父母慶其子也亦有天子賜告而歸者乎文盛曰無之受豫言書之以歸為慶送楊名父知崑山序大丈夫胸中固八九雲夢也而其宫居粒食燠絺寒裘亦衆人耳無竒也至於與人商論恂恂反反韜鋒閟頴必有稽疑而無獨往每出於好事者之下好事者亦俽俽意得屧履一世直欲排開古初面語夔稷不知其真遇夔稷而與處不譁亦必自謂過之而世之膚中者不察每右好事者譸張其虛談刻畫其實效補苴掩護至敗不悔大丈夫遇之如觀技兒之作劇神施鬼設魚龍曼延電霍猋馳可駭可愕非不捉握天機熒惑聽視也然知其終於幻耳故不與之角逐於口舌瞬息之間而吾之含章括囊人知之可也人不知亦可也一旦時可以為事在我責豈終示人以朴哉試以民撓則嚚吾而殿之以循良進以激揚弛則玩吾而鎮之以肅清納以論列激則咈吾而時之以獻替出以方鎮利害懸矣吾無旬宣之則乎入以廟堂隆汚繫矣吾無燮調之節乎恢恢焉隨其得為之分而操其應物之衡人難其易而我易其難人異其同而我同其異若素履然高冠大轂而不揚揚其色豐草長林而不戚戚其容蓋其胸中素定然也萬一驅好事者以從事幾何其不僨以禍天下乎噫為政者果在多言乎四明楊名父之在同年也質而少華靜而寡言人皆曰兹人大丈夫於其知崑山也人皆曰器大用小非宜豫知其無不可也語以大丈夫之事與羣公别之送張用載南歸詩序豫至闕之又一月太史徐舜和别訓術張君用載詩二章君新喻人工科左給事其伯兄也豫往過之見其詩和者十餘人他日過之倍焉又再過之又倍焉大要言君起詔例無麗于欽天之試館兄之館無羈旅之懷雖罹疾疢羣醫危之而起于越醫終底於勿藥之喜或推而深之言其始之疾也未必危而所以危者醫之有意于利故危之而越醫之所以能起之非有能實妙而起之無意于利因其未實危也可起而起之也豫又以為疾危道也謂非出於天不可也胡為可以無意于利之越醫能起之而必先以有意于利之羣醫以危之耶又胡為不于其前不于其後而適當其受命之隙耶噫彼冥冥者果無意乎哉豫知之喻楚之南境也楚之俗鬼且機著自古矣今喻之名能禍福者凡幾廟廟之祝有幾巫巫之籍于縣者凡幾族族之衆幾何其飯也粲飱人耕之其飫也鮮肥人畜之其衣也輕純人績之人病則曰吾馘而業魔幸其瘥也則曰吾丐而修齡及其敗也則改而曰而酬吾之弗稱以是日朘於人不嗛也而人亦實甘心焉噫其果馘且丐耶然則喻之有意于利以危生人如羣醫者多矣君兹歸喻無有曰馘與丐耶則已矣而猶有曰馘與丐耶君有不思前日之危君者乎觸之而不思者不智也思乎彼矣而不思禁乎此者不仁也而君豈若是乎故曰出於天也雖然天之於人也常略焉若君宦家之秀賢者也是亦責備之如此不然如君之官盈天下而亦必屑屑焉亦瀆矣給事君笑曰有是哉録以為詩之序館閣榮壽詩序往時毛維之歸東萊夀其親也封檢討君甫七十太孺人年亦幾此而其官尚檢討也故其請也亦止得同庶官之典而已維是單車千里之行紺衣登堂之拜而一時宫賔學士闃然希聲所賴比肩之寮歌詩之又得今太子太保大學士西涯先生之文在帙俾萊之人士見之爭歆競艷日駸駸乎仕進之途若不可禦者實自毛氏始亦榮矣積於今十年二老之夀相次八十矣而維之又以請也其官則侍讀矣綴講帷之班侍皇太子日躋之學特從內批降不踰晷繼又有乘傳續食之命焉於是乎其在途也有車以載有僕以騶有候人以迎而其遇館也以休而進飱也以食比其至而登堂也有織文鳥章之賜衣有玳瑁寶銙之賜帶以服而於是乎以拜以舞有詹事府少詹事左春坊大學士左庶子左右諭德左右中允與翰林院學士侍讀學士侍讀侍講之詩以懸于庭萊之人士於是乎又再見之必從而諷誦之不知其亦僅如向之歆豔而已而抑或有加乎夫欲上人之心人皆有之不知其亦或有希兾以是夀其親者乎其果然乎未也就有之必如維之向也之典而後十年始進於維之今也之典時則維之歸且夀也典有加矣則元老之詩也則又必如維之今也之典而後十年始進於維之後也之典時則維之又歸且夀也典又有加矣則天子之詔也夫然其可以驟至耶又況人事之不可知也耶豫維之同年友也慕躡先生之軌為之序使萊之人士觀以有考也夫其亦有激也夫圭峯集卷二
