body:
  text: 圭峰集卷五明羅玘撰序送蔣誠之知南海序同年清湘蔣誠之出知南海同年在館諸君作詩志别而俾豫序之蓋其弟敬之同在館也誠之領辛卯鄉薦敬之丁酉發解至丁未同舉進士自辛徂丁後先上春官亦既差池矣而畢竟至是乃同有獲其可歸之偶然也耶天生仁賢為世道計非以榮其身昌其家而已也嘗思是科未入棘先二日天晦霾雨雪先一日夕滌霽四鼓入試天無纎雲達旦益朗午溫入酉風士既出復大風雨雪洎二試如初三試又如之試已風霾相繼晝冥若有物為之自知貢舉下遞相贊慶以為休徵在院至和所召必有非常之應於其間者既撤棘兄弟同薦名者誠之敬之出西粵涂邦祥邦玉出南粵石邦秀邦彥出趙郡陳宗之亮之出南畿家自為耦八人焉噫亦異矣哉余不通於古前此有是否乎兄弟之同生固若牟麥之同樹然其地同雨露之滋同其耔耘之也又同然其登也則不能無秕者矣而况合院之士兄弟之同試則有之矣而四家者獨爾其盛何耶詩曰伯氏吹塤仲氏吹箎言相和而和也豈其和之積也極其盛而先於同試之士與隂陽之數八則成卦樂器之數八則成聲將國家至和之運在兹而八人者適當之也唐虞之時髙陽氏有子八人為凱髙辛氏有子八人為元數皆以八而親則兄弟也而治實賴焉兹八人者將為凱乎將為元乎誠之與有責矣南海之行且别也烏足置齒牙間而為輕重哉雖然余之私見則然耳故因而道之非通論也諸君智炳余先其製也豈無出此者乎送南京太僕寺少卿鄭君之任序尚寶司禁中署也其扉與黃閣對置在掖垣之西其職在章璽符契凡渙汗之頒門關之信百官之籍將帥之征行信使之稽驗咸與有事焉有大朝㑹有大祀事大行幸則乘輿之導斧扆之侍在諸侍從先其寮自卿而下恆僅四五人每以寵元老帥臣之𦙍子為之間自諫垣入者廣數十歲乃二三人而吾同年鄭君體元其一焉乃丞也今年夏四月南京太僕寺以少卿缺請乃以體元往補之則非銓司者所敢以擬也明矣古之人有言曰天子明見萬里之外况朝夕左右曾幾何人邪而顧容以擬為乎朝夕左右者不留以朝夕左右蓋必有出於朝夕左右之上者矣體元於此其可不知也哉內之太僕外之苑馬馬之所有事者也而折衝禦武之威寓焉今之據清要地者往往視之以為冗曹又若輕塵焉眇其為鄙事至或臨轄而按督之例侮其末屬於庭中以為戲樂於乎此何為者邪抑能驅虎豹犀象以與敵人從事也而無所事馬歟要之非也易其所可辱者而辱之以標異其隆重而已耳可笑也已而不知其官之威日以削奪其心日以茍一二有志者又畏避脫免不得已以㳫衰憊病之老充之而事之必至於末如之何當寧所以勤勤也雖然非改而崇重其官不可崇重其官非自其長二始不可崇重其長二之官雖朝夕左右之臣又烏得而靳哉豫也仰窺末光有得焉於同年之餞體元也敢以為告於乎體元其念之哉具慶榮夀詩序𢎞治甲子春貴州右參議翁先生走疏請歸休于鄉其子禮部郎中應乾為上之上可其請乃進江西左參政以旌之以為後勸然其年已望七矣熊恭人年亦如之而方留於應乾之養故兹先生在姚江恭人在大都而五月戊戌則大都之慶也子夀其母也子且憶其父也妻且憶其夫也如親至姚江焉安知是日也不自姚江父憶其子之夀其母也夫憶其妻之受其子之夀也而遊神於大都乎七月壬辰則姚江之慶也父且憶其子也夫且憶其妻也如親至大都焉又安知是日也不自大都子憶弗獲夀其父也妻憶弗獲夀其夫也而遊神於姚江乎是其仗精神之感通為㑹合以志意之真實為孝慈者其拜舞之蹁躚觴豆之豐崇而不以志養者視此何如也然則姚江之距大都父子夫婦之間夫何萬里咫尺之有或者應乾迎先生於此以偕恭人之夀號於人曰吾其縉紳之具慶者其如先生方幸脫紛囂而復就紛囂何未可也輟其官守奉恭人歸以偕先生之夀號於人曰吾其里閭之具慶者其如先生之乞身也方諉應乾以為報稱之殿何未可也然則如之何其可也古稱良史智足以通難知之意文足以發難顯之情為得職而兹應乾之意可謂難知矣情可謂難顯矣應乾嘗肄館中也於其能通之發之者又不知也乎若豫也者濫竽者也其亦有不知也乎然其能者應乾嫌於自彰也噤不以言若豫也者知重同年也且同業也不嫌於濫竽也欲强而附焉於是作具慶榮夀詩序邀同年且同業者凡某人詩以繫之納諸應乾俾以為獻應乾之意與情其亦於是而少暴矣乎無也便軺省慶詩序葉太安人晉江趙氏八十夀母也以其子戶部員外君為主事貴獲今封晉江南方海山樂土也子女孫曾盤旋膝下致水土鮮甘宜老之品敻易君遂不得以其私水陸萬里迎致京師恐奪所宜居為嫌及今夀期屆邇則王事孔殷無敢祈請又以其初不遂迎致為悔方倣徨亡羊莫之為心乃今月某日上以海南島夷就俘實沿海諸戍將士功詔君發金幣往賚之海南古珠崖地也計其所經舟至維揚由岷江入番湖泝贛江踰庾嶺西道也絶瓜步入吳中泝鵝湖踰黎嶺下閩中折西而漳而湖東道也均孔道也顧其行者其土何鄉也土乎閩則固道乎閩而已矣則固君之家門值焉命之下也則固有先聲于其兄弟者焉兄弟知之忍能不以告太安人乎太安人有不喜而刻其至乎况於君之既至乎其僮奴有不操篲以俟潔除餉牛食豕以待烹擊者乎况躋堂而真進匕筯乎其姑姊妹之在他族者有不企踵以需其期乎况真於慶餘而旅酬乎是固若天子知之私有所假貸君也或君孝思之至而天固有𡨕㑹者存邪不然當遣之官如君者亦容有如君之心者而皆莫之及而卒值君何也夫人有所甚欲者而或以投畀之雖其偶中之亦未可欺其不知而已其報也今君將何如其報哉故於其寮之請序便軺省慶詩也敢私朂焉某月某日其稱觴甫畢候也尚促事事歸朝毋緩送曾君知登州府序登州古曰暘谷堯命羲仲宅之以寅賓出日地也今其事廢天子守臣治焉其職主於上宣下達愛育元元輯寧邦家者然而既居其地則所以祗迓陽光導先淑氣而布之天下要自不可以百郡比宜得髙朗竒偉士為之而吾友曾君貫辰適當其選君嘗以書經魁江西登進士入刑部為主事進副郎至郎中居中閲章奏慮南畿大獄蜚其英聲於人耳人以得見之晚為憾者滋多兹之去也尚書白公如去左右手同官倀然若褫燭於閣去硎於庖而吾鄉人與居方若飲醇醪頓覺撒而覆其卣寧能無私憾於登民邪吾意登民尚未必知君也昔蘇公文學聲名遍天下兒童走卒殆亦知之而其守是州也父老之來迎者猶恐其不如馬使君則登之僻在海濱其民之陋而寡聞豈其自古而然邪亦饑渴之人入市㕓而過烹炮煿炙之肆嗅其羶薌非不知其美也然以未試嘗之於此而遺以簞食豆羮又豈烹炮煿炙之足嗅哉父老之德馬而少公其或以此及公召還蓋未閲月也民始覺其薰漸之不終而憾其去之速乃知烹炮煿炙既入口吻終為竒品而饑腸渴胃寧可得遲遲而飽餐也邪今距其時已數百年其民之陋宜亦於是而少瘳乎而饑渴之望飲食雖百世皆然也然恐以君為竒品嗜之而不忍釋而君或如蘇公之召此則登民他日之憂也其去思之碑與堯典同不朽是則同官別君之意而豫瑣瑣贈言亦有光榮矣乎是為序送朱君知廣西府序王者之視天下猶其身也首居百體之上冠以尊之髮日沐櫛而面日盥頮之耳之懸也有瑱焉口之脂以澤其燥皆為其近於首也觀視之先不可茍也此下則項領臂掌脊背腰膂胸腹臍胯洗濯必以時日無脂瀋之澤焉然槩而蒙之以衣曵之以裳束以袴私蔽膝以瞂納踵以舄而後體之容充以莊也然其髙卑煩簡輕重隱見之序亦察矣故其集羣后於闕陛而不病其冗布百職於天下而不病其渙侍衮冕者不自以為眤殿荒服者不自以為疏知其皆同是天下也如首之至踵同是身也今天下雲南為最逺雲南所𨽻廣西府又最多瘴癘而幽阻物産無珍竒而蠻獠雜擾易煽以變譬之於身其亦膝踵之間乎而世之擇利自便者目為惡地商不以貨來吏必以計脫至屢歲虛其市廛空其廨舍是知芘其身付其膝與踵不恤也萬一風入而痺之蟲螫之將舉體顫掉固未有可避而能居處也尚書庫部員外郎髙安朱君為太守當往是府人有意君不懌者君笑曰是何傷哉方今闕廷之下公輔之器甘下僚𤣥黃之文甘裏服而吾之堅徑非犀革吾之遒韌非組絲以是為舄猶恐納時而踵决也顧猶睢盱於冠衣上體之用其將不為叨餮之人乎吾不為也吾往矣都諫祝君聞君言喜吾黨之士有恬退者屬筆於豫使為序以贈送楊德慧改任隆德縣序吾少時就㑹府試府城附治之縣其宰單騎青衫從一二胥吏日旁午走街中吾意其為臺輿末屬貌慢之問之其人曰吾縣宰也吾以其紿耳罵曰爾以吾為真不識宰邪吾之宰衣緑袍黛鞾袴出乘髙輿張蓋其上前驅翟巾紺綬以呵掖輿之徒如雲也天下之宰一也彼豈貴於是耶其人曰是則子之宰必進士也進士為宰不於孔道不於臨轄之衝不於藩國之都不於戎衛兵鎮之交所以貴名器蓄鋭養髙為公輔之潛地名雖宰也實則非也若吾臨轄之衝則以胄監為之也丞簿之積資者為之也呵之可也箠之亦可也倅二得而轢也武辨得而侮也子之宰豈吾之宰齒邪吾思之朝廷之所以體羣臣者如此古未嘗有也士其有不奮者乎今之用進士為宰異於是曰孔道以之詰姦宄臨轄之衝以之給百需藩國之都以之緝不恪戎衛兵鎮之交以之捍彊禦蓋以異材待之然天下孔道孰愈於江都揚之府治焉轉運治焉漕師又治焉戎衛以屬視我也楊德慧以進士為之宰人之東西過者皆曰其詰急也其捍尤急至觸武人怒以訟也可謂材矣上之人皆許之曰剛可謂知矣然而銓司猶拘拘焉執嘗算曾未聞有進秩之旌至德慧有乞身之請僅改隆德以佚之而已則所謂待異材者果如是邪曾不若蓄其鋭養其髙於安閒之區如吾少所見者尤有以激人之奮也雖然君子視其身如器既鬻於人則惟人之所置而已置之靜則佚置之動則勞無不可也吾友王清之嘗謂德慧為堅剛之器若然今養之於佚地停息既久一日發於硎而以之剸解吾見天下無完牛矣必德慧也德慧清之厚者吾又清之厚者也為之作送行序送劉君知寧國府序𢎞治九年春監察御史劉君出知寧國府君光人也少侍其先太僕公學於京師舉戊戌進士知揚之興化改徽之績溪入臺為御史巡解之鹽法又按蘇常四府皆琅然有聞于時至是朝議以寧國大府也必君行乃可孔子曰丘也東西南北之人也夫以東西南北而賈人逐逐焉是龍斷者之所為賤丈夫之名不可得而辭矣而為世道計者則又恐其厯之不周而日力有不足也何哉五方之民山川限之風氣局之言語之不通嗜欲之不同同川浴者被以冠裳則憂處營窟者舍以宫室則悲世固有不可以身試入而徐徐曲為之所則未有不可擾而馴者也是故惡夫迂者為其泥於此而病夫彼也是故惡夫隘者為其執於一而律夫百也此聖人之所以達於政其取於東西南北也有以夫光天下之中土君生之京師北土也君從而學焉始政於揚東南之衝於是乎在而徽又江以南也西之地起於解而東南之地盡於海濱蘇之地是也計君之周流翺翔望嵩髙窺太行睇恆碣以臨渤海踰大河瞻岱宗出淮泗以放乎江漢之湯湯而東西南北之觀亦庶幾乎孔氏之觀矣然則斂而尸此一方是猶秉照天之炬而置於一室也其不亦彪炳旁射以出其光采矣乎久置於室無是理也同臺諸賢惜君之别而使豫言其大要後亦將有考於斯送蔡君之任南京刑部貟外郎序豫既第進士顧視同年皆天下之英也而時方競師唐人以為詩詩日相角而品日髙中書舍人蔡從善又獨為衆所竒一時父母耉老慶索之父母耉老戚索之逺出游者索之園林勝賞者索之山水草木蟲魚圖畫者索之不則人不以為絶卷不貴焉及今為員外郎於南也得刑部人有竊議法吏非詩人所宜居者豫獨恐法吏不盡皆詩人也詩之狀物髙至於日月列星之繫而其入深也達於淵泉散於風之吹噓雲之浮游雷霆之剝擊雨露雪霜氷霰之降墜昆蟲草木之生生無窮大之為海為嶽為山為川微而入于秋毫纎塵之不可見變而為日月之薄食颶風為鬼颷為祲為雷之砧斧星之墜也為石為肉為狗為老人或雨而為血滄海之堙為桑田為息壤為飛來峯其為祥也在天為慶雲為甘露在地為醴泉在物為芝為麟為鳯而於人也宫焉以居器焉以用冠裳焉以章其身符璽權衡焉以信羣而相害也則城郭焉以守兵甲焉以一暴亂祭於廟以報習於學以漸陶而又病其拘也有壺矢博奕蹴踘之具魚龍曼衍角抵之幻至於怪而為神仙服食吐納之術放而為孤雲野水之觀水巢石穴之居樵之斧漁之歌農之鼛鼓巫醫百工緇黃之流烏蠻白狄之方物紛如也然必皆羅致之為詩之囊中物隨取而用焉而後可以言詩又必和以五味使可咀也調以五聲使可聽也施以五采使可觀也嗚呼詩豈易為哉使其移是心以臨天下之政乎何有而况法吏政之一事耳烏足以盡之豫故恐法吏不盡皆詩人也從善行歸過其家省其二親而同官以贈言見屬從善毋遲遲於庭而遄即其所有事使為法吏如發蒙然天下於是信之而重詩人望以為政自吾同年始不亦可乎聫芳類稿序豫讀五代南唐書見其一時以文學自見者如宋齊丘其自待以為司馬遷相如揚雄復生不過也及讀其所為文調皆鄙俚可笑而其所著化書尤凡近無稽下伍野巫市卜而牽合附㑹得罪於名教者獨多又况其下者乎乃知衰世厄運干戈漁獵不獨其政之足疵民之不幸而文亦因之以萎苶不振也悲夫宋有天下百年至於慶厯元豐之間可謂盛矣而海內文學之士泉湧而出雖其將家子弟亦學為文章衣白衣從進士舉而將帥類多通古今以至羈縻之帥築學宫召名士教其子弟如楊日儼父子者則文章氣化亦必積治之久而後盛且治也今天下之治餘百年宋不足論也人有不談詩書者為世僇辱三年大比將家子或登髙科至四遐羈縻之鄉邇來亦然不獨內地而已以豫所聞貴州宣慰使宋從俯則於文章詩賦攘臂敢為之間能流傳四方其意欲與中原大家相角逐寧至通古今取科第者之足言乎其弟如晦隱君也秀而亦文從俯與之迭為唱酬積數十年遂成編帙有所謂聨芳類稿者所以志其為兄弟之作也今存於家要其歸雖未必盡皆醇於道而確然以不朽然其世雄遐方不為所變而又以其家學播宣敦睦之風為左袵者之赤幟以風動之蓋有禆於世道非細也視彼築宫教子僅獨善其家而又不知其果能與否史猶以為賢者亦逺矣嗣使君浩然從俯子也綽有父風痛二父手澤之存於是稿也間授於鄉進士周鸞來京師請豫序鸞曰是將刻於梓也豫隂怪遐方之有是族既有是兄又有是弟既有是父又有是子將必庶幾我中原世家乃已是不獨宋世所無雖古亦未有也而况於衰亂之世乎非今積治漸濡之久何以得此豫故樂為道之從俯名昻號省齊如晦名昱號宜菴蓋昻必俯而省其政昱當如晦乃宜於隱其取義亦精矣嗚呼讀是稿者慎毋以其姓同而槩謂其為化書也慶繼志周君榮夀序尚書工部郎中周希源家本安成也有宅盈廛有田連陌有僮之指百任其耕桑置不問一意營治官事亦不遺書稽其勤惰贏縮有兄希冲七十一翁也則蚤夜在念鄉人至必訊其體之羸碩食飲之增損意志之欣戚一人言然他人至又訊之答如其初則抵掌笑躍或時語其寮及邑人與旁邑人之在仕者其人反也則選水土時物輕毳溫貂薧鱐湩酥暨尚方珍異包篚而致之歲必四五發復書至則又笑躍以示其寮及邑人與旁邑人於是人皆曰郎中之重其兄也皆曰郎中之不顧其私也相與喋喋譽郎中且曰郎中之重其兄必其兄之賢也今天子之八年詔聽民入粟補官翁應詔時年甫七十郎中則笥冠匣帶篋衣一襲歸為慶郎中亦方竣東封事北道濟還反命濟南歸水道也顧瞻興思恨不翼而飛揚者歸與豫道悵嘆久之兹將營夀都于閬實以簡命往閬雖西南偏地然水行必南安成可掠而過也郎中又笑躍出都門就道邑人及豫旁邑人迫而餞之郎中曰若知豫心之樂乎或曰郎中顯曹也封建榮命也安成便道也其亦無耀于里閭族屬乎登眺故丘而徘徊乎易其田葺其廬而授算於僮奴乎是不知郎中者也人之於人也盍覘其素郎中所以蚤夜念訊諸鄉人而致其物凡以為誰也有喜而逺必慶必不至於近且忘其亦嘗誰慶乎覩物而興其思必不至於面而若塗人然其亦嘗誰思乎所謂素也今則可息念而晤無訊而見匪致而達追慶絶思光溢宅里喜延庭柯樂其可涯也邪郎中曰他人有心豫忖度之子之謂也若假威以夸毗營營以殖其私是故衣錦晝行於鄉者之所為也吾有吾兄在何敢爾惟取子言於歸日與吾兄誦吾兄亦知言人也送裘從事榮歸慈溪序裘從事給吾院事二年吾始見之若屏之樹于前及揖也若杵下便旋焉以側立曵其衣之裾也若輪趨而登階攝齊焉若鳥羽之厲俯而白事若不能出諸其口趨而出也油油然其直也若矢不見其非儒態也吾怪焉居久之微覺其吳語也問之則慈之大姓行人君之從父也而𨽻之慧者附耳語曰是其口常吟哦者他𨽻又曰儂見其誦文而首肯之或反脣以訾也吾益怪焉曰其無乃隱情匿志而為是邪抑不得已而藉是以養邪抑窮無資而姑有所待邪抑有不直之誣而陷於是邪他日頎然冠衣入吾室則士服也曰吾奉詔入粟得此雖然亦欲速湔前汚耳而行人君亦繼至請曰吾敏何追從父也從父衣儒衣二十年兩與浙士角而剛過甚卒見汚衊吾之族老督來兹幸亦湔洗今將歸矣仁者亦有以哀若人乎則吾裘氏九鼎也吾曰信哉吾所謂不直而陷焉者是也然兹冠衣亦榮矣請以冠喻表之冒者織絲為之縠也裏之檠者緯竹為之筐也鐡以綱之使固焉漆以黏之使合焉絲出於蠶繅之而又絡之𤣥其色也而後始可以織焉竹産於山伐之而又剖之以為曲薄也而後始可以緯焉鐡自礦而至於可以為綱煆煉之功不知其幾矣漆自割而至於可以為黏煎熬之功不知其幾矣而冠工之功皆不與焉然則冠之成也其難矣乎然或誤而泥塗涴之蠅蚋之汚玷之則洗濯之拂拭之未害其為完冠也猶可鬻也而昧者遂棄置焉不亦謬乎從事今已濯冠而冠諸首是知其所以難而重是冠者歟行人君首肯而笑書之納其歸囊若將為裘氏喜幸然吾恐從事或反脣以訾吾言陋也夀錦衣杜侯序唐金吾將軍張萬福年八十餘始知名至今老生腐儒不敢蹈籍武人者坐此而長鎗大㦸之徒亦藉口以詫夫執毛錐子者况冷灰復然尚可為廢棄者也綴諸師尚父之後老而壯哉若今之天下一技一能各投其任無有冒焉以居容以議為者况在天子之左右一黜一陟之大者乎雖有延齡百輩其如陸贄何陽尤宗當與其弟日夜酣飲負其癡甥以遊何至出聲言天下事萬福雖欲立竒以取名將何所賀乎又將誰拜乎將瘖瘖終此老夫而已矣其墓隧之碑不出百年匪狐狸之茵則樵夫之礪石耳况於其身况於其名乎乃知政用不臧適為好名者之資而已而盛明之世雖豪傑無所發其名也錦衣杜侯景暘生淮壖萬福所嘗窘許杲破陳莊遏希烈之地也其亦以列校起如萬福者然其征南苗行北邉逼西羌過繩橋踰飛棧出入刀牙鋸齒水山流沙弱水窮髮之區大小戰百十合視萬福立功淮泗土中逺甚而僅得一千戶人以為食報薄也今距萬福賀延英時特九年而略無衰頽意朝夕朂仲子行人君如束溼遇人時出驚人語使當貞元時安知不有延英之賀乎然行人君玉立人表將世其家萬福蓋無之以此易彼孰得孰失萬福得無憾邪獨其祿食七十年未嘗一日病夀九十此則侯或同也豫於行人為知己而臘之乙巳侯誕日也劉彭張三子與行人遊最舊不欲闃寂舉夀觶謀於豫豫方讀萬福傳偶屬而比之亦春秋意也所以進侯者其亦有在哉送光祿韓君歸姑蘇序光祿典簿姑蘇韓君應奎未貴時豫遇之于丘文莊公座始不知其誰也與公論當世人某可相某可將尤以正氣直道知幾有晚節者為賢至於與世浮湛依依在位者則欲求其面而唾之豫甚驚此何人也敢於公側如此及公嘆兩粵雕敝有將來憂君矍然泣曰先公亦嘗憂及於此豫因悟君為都憲公子起揖定交私幸都憲公之令德宜有若君者為之後也君退豫與公言都憲公之去江西也幾五十年後之好名者亦嘗更其置制矣然輒更而公私輒蒙其害畢竟還其舊乃始帖然而人亦無賢不肖自以為不及也其亦偉然大丈夫也哉有子如君可謂不死矣後君得選典光祿寺簿豫入教內豎亟㑹之于東安門察其意沉沉若睡曩之飛揚跌宕髙視一世之氣索然無有豫不知其何以頓異也豈其官切禁近法當若是訒默邪抑豫非文莊公不足與言邪豫疑至今則君已請休來告歸矣囅然喜溢顔面復以語文莊公者語豫豫始悟若人也奚以光祿為矧所謂典簿者邪其必有苦心咈志之鬱銖較合㑹之愧興俯走趨之辱蓋前之簿業已為之後之簿將不為乎以君之正氣直道不少假貸如此其又能為乎知幾又君素以賢夫人者此其所以速歸也往時宦家子仕未逾時往往亦有歸者或以惰慢或以驕蹇或以佻儇或以汚墨求如君歸者豫亦未見蓋其教之不豫而豢養之過也於此見都憲公之教於家其賢於人亦逺矣不獨其豐功偉績之在天下也學士守溪王先生大合鄉人餞之謂豫江西人德都憲公必厚其子也使為之序豫烏能序君然知而今而後宦家子知所以仕而歸矣京邸迎養詩序濱州舊未有進士則雖人盡仕也烏有朝之名流未有名流則雖人盡翁也烏有封君未有封君則州縣之官日迎其親於道人不知也烏有振動朝端而人為之歌詩者此在秦臺之井未浚前時也秦臺者相傳秦皇帝東遊人築而候之臺久不陊美木豐草蓊然其上每旦日光穿射而紫氣鬱鬱土人以為神或俎豆之而所謂井者臺之神見夢於農夫而使浚焉者也始望氣者言州之佳氣蓄於此臺發其下當有井井浚水行厥徵人彚征及果浚而濱人猶憧憧未之信也已而王朝言四人者與豫同登丁未進士朝言入禮科為給事中餘皆布列中外為顯曹癸丑朝言弟朝儀又繼登焉入為行人於是濱人士大神臺之靈於濱又嘉望氣者之善言徵而徵之發實自王氏焉少者將矯其翅逐朝言鴈行而飛揚老者皆企踵庶拉朝言尊府為封君也非復昔之濱矣朝言正色立朝侃侃天子亦嘗知之擢為尸科左給事宦名日起蔚為士元朝儀亦載驟駸駸不失故步人皆曰秦臺勃鬱之氣其始發當如是及封君以迎至人之跂而望之不可及也及其逼而即之也蔚如彪如若可掬也而又不可窮也又皆退而訝曰噫所謂秦臺者將在此而不在彼也庸詎知夫朝言兄弟之成不出於此而彼之夢與徵者其適然歟又庸詎知夫王之先不有隱德伏慶積於冥冥久而發其發也必一革其故而新之使吾君新得濱之士為用濱之士新得入朝為名流而吾人新得與濱士馳驅上下且見濱之新封君而景行之為一時盛事不獨為濱之重輕王氏之休祥而已也故一時在諫垣者皆不容默吕君丕文為倡從而和者合若干人不能詩者一人豫是也然以謬當史氏乃為序送蘇君江西提學序江西頃數歲不知何忽異也嗒焉損其聲稱十六七天下之人雖隂自數之與他方匹指將屈亦必復伸畢竟曰不如也乃止焉雖然自吾視之亦以為不如也然吾亦有見焉巴蜀亦南方地也其去中國獨逺其附於中國獨後而其顯也獨先江西於中國視蜀為最近當蜀顯之時不聞有江西也然而不以其不聞而遂害夫後世之顯者蓋山川之氣孕靈育秀厚蓄以有待也後閩亦文學崛起嶺南一旦以相業鳴日南極海徼也亦有以相名者而江西尚前日之昧昧而已矣雖曰天其相之蓄而有待而亦誰其信之及歐陽公出以古文為世宗師文信公之忠在萬世則夫世之能事孰有大於此者而其人所在之地烏得而不重且顯也哉又况文章節義一時淵焉林焉於此天下又得以其顯之先者傲江西乎亦其發之遲也固有大而盛且久者存焉耳此理之常也故我永樂宣德之間猶彬彬號江南鄒魯太平之休不無有助是時不獨吾江西之士自以為差强於天下而天下之人亦必自以為不如也若夫今則大異矣而吾之出而仕者亦既隂察而寤之蚤夜恐恐焉以自退而其岸岸焉遊於學者殆必不聞不寤也能不冒其昔之聲稱以嬉以傲天下乎正自損耳吾懼焉幸吾友太史蘇君往督學轉移覺寤之機又在君也君去吾於此而謹俟之有來謂吾士也今蜂然若追奔焉以成仁取義為的求至之而又痛自磨洗毋為鈎棘軋茁逐時之好以射進則如歐文二公者且將復出君門下矣江西聲稱之損其將不自君之張之而復振乎館閣諸賢皆以是望君賦詩為别吾又望之切者也又特為序雲谷詩序凡山之四竪中虛若剖甕側立或甌臾仰張或環委而缺其外或舟衡或梭修谽谺空洞可呼而應者南方皆呼之曰谷雲谷者吾未一遊之不知其何似冠之以雲若曰雲凡谷無不雲也其孔竇湫潭多龍蛇蟾蜃土石之怪蒙翳落籜藴崇沮洳之蒸皆足以出氣為雲瀰漫靉靆覆冒乎谷中有蓋有幕巘則有巾岫則有屏麓則有茵朝暾晃之有錦有繡有彪駁之文章飄風蕩之有飛絮有白衣有蒼狗有鐵騎突過有冠裳巨人有輕裾仙子千態萬狀怪幻譎詭而天地之極觀谷之人得而專之故有與之徜徉相忘而厭棄百事者彼誠有見其來無窮其取無禁而亦無患也然雲無心物也以其無禁無患而取之是謂有心不逃其名而反以名人至詩歌之不辭則為太多心雖然有禁有患者而世方逐逐以取之其果無多心乎吾閲其詩于二憲趙公有感也公以吾竊史筆使序谷在新建清淇熊仁山實號雲谷者送華君之任杭州府推官序杭州府推官無錫華君前吾建昌府推官也吾免喪入闕時錫人士皆來問君吾曰君方瘠如臘黯如土炭眉髭垂欲髠念而飲食之乎室如縣罄囊委於地人遇之蹴而不顧也念而賙之乎吾皆為若謹致焉皆愕且笑以吾誕謾亦滋甚或以為謗吾遂言吾邦兹有益國之役大閹突以暑來邦人漫不知也旦集吏出詔詔見入匭則已麾旗竪表升屋引蕝百人雷呼若翼飛若蹄躪瓦裂破竹塵飛蔽天屋下婦走兒顫墮井溺竇尫痎在床喘息待盡雖雞狗亦辟易無所遁處也卜祝令曰皇命垣於東脅東人賄垣於西脅西人賄都科曰吾欲赭彼林吾欲陶彼壤何以奠吾治何以伐吾礎或曰潔吾館或曰具吾饔飱或曰馬幾騎或曰皂幾人或撲吾里胥里胥匿或詈吾令簿令簿匿時吾邦君亦惴惴自懾一委于君君請自持蕝戒東西人毋入賄賄有常誅蕝定度林相壤館傳騎乘皆以制正無侈無不充具有常供於是民不苦徙工徒不偏勞庖人廩人不告匱乏閹始少戢其欲削其威矣而踰月不寢食斥所有以佐官費者君一人而已此吾以君之實告顧誕且謗哉君治不止是也皆釋然道君為錫增重以為當受上賞得殊擢也而君兹竟仍是官於杭州以去又皆屬君宗弟濟之來需吾言以慰噫賞罰陟黜吾賤不得而預知也或者吾邦僻而下君雖力於治主者未必知即如吾者雖言君又誰聽哉而杭兹為天下最上之人所注意耳目也况其為士也彚出而多聲鳴言必人信焉君無變吾建昌者以臨之名譽通顯之機錫人可安安焉無為君戚戚矣圭峰集卷五
