body:
  text: 圭峯集卷二十三明羅玘撰奏議為分豁薦新事臣等自履任以來謹奉本寺年例薦新品物遞年按月按品差官供薦戰戰兢兢每懼後期有乖宵旰孝思之誠慿仗天威兼資成憲水陸無虞依時而至常免愆尤實為過望本年正月內據香橙園户葛川關等連名狀告內開各係應天府上元縣北城等鄉民洪武年間編充本寺薦新香橙園户遞年九月分例該供薦八月末旬本寺差官賫送自初及今嵗復一嵗不期正德四年冬月以來氷雪異常香橙樹株盡行凍枯連根無存恐誤供薦欲告準令夏末前往蘇松等府産有去處轉買本寺難便準信當差鋪排傳隆就園踏驗與告相同已行準令自往轉買充薦至七月初十日續據各告稱到前項地方轉買其香橙樹株亦皆凍絶又欲告給批文前往江西浙江等處轉買臣等思得事體重大若拘常例不稍變通必致誤事遂一面具呈南京禮部知會一面給批著人往買至八月初六日各告仍復空回羣然悲號自旦至暮若不能生臣等聞之亦皆倣徨無措即欲依其情理奏請分豁其如初告之時止差鋪排一人踏驗其園户俱係應天府上元縣人民橙園亦係該縣地方以驗到之人當土著之衆户且無刑威又非管轄事易朦朧安可為的况其告往轉買之地既云蘇松又謂江浙本寺雖給批文設或公然在家至期執批告給故為情狀幸準分豁在理容亦有之且或前樣果品於成熟之時街坊市井猶有轉相買賣者則是本寺徒信下人一面之欺不顧祖宗百年之法罪固難容心亦何忍為此隨將前項事理一一開具移關應天府轉行該縣查勘務以不欺為的續準應天府關稱上元縣申據本縣北城鄉里長總甲供稱香橙樹株委的凍枯盡絶葛川關等委的六月內前往蘇松等處及七月內執批前往江浙等處轉買空回重甘結狀等因備關到寺臣等看得去冬氷雪南京城內官寺民居園林樹木凍萎殊甚至於竹最堅徑耐寒亦皆枯絶况夫柑橙橘柚之柔脆宜暖者其先枯盡無從採薦宜也又况蘇松江浙地理聨屬氣脈不甚相逺而非閩廣炎方之比其氷雪大抵皆然橙株枯盡無從轉買亦宜也但臣等思之若係上供之物時有闕乏在陛下覆幬之仁固將憐而宥之而此實宗廟薦新之品又當聖孝假廟之晨是何敢覬覦陛下有所重輕於其間哉實惟臣等司薦之官誠意之未孚私心之多慝致傷和氣天降之罰而又依常襲舊不能先事蚤知豫令葺蓋編籬塞墐户多方以護之以致如斯是誰之過歟彼園丁下𨽻則至愚而無知者也又何預焉如蒙乞敕禮部議處止將臣等明示譴罰或寬斧鉞之誅明敕吏部按臣等官職之崇卑事權之正二在任之久近或原或降或削其官職與以歸田里則臣等不勝欣躍感戴之至緣為薦新事理未敢擅便為此具本差協律郎王古玄齎捧謹具奏聞為宗社大計事臣少實迂愚漫不諳事壯而登仕其愚如初今已老矣自分與愚終焉而已矣思天下聰明才辨之士何可勝數而或沉冥牖下或困滯下僚或不霑一命者在在有之顧臣之愚乃獲竊祿先朝備員侍從又於陛下登極改元之初自翰林侍讀超升南京太常寺少卿僅踰二年起升本寺卿又踰年轉南京吏部右侍郎臣又思前之任翰林者雖文華卓越十倍於臣而猶循資歷格進寸退尺有白首終身汨沒者臣獨何人六年之間驟進如此謂非陛下天地曠蕩之恩可乎臣又思感恩之極人雖至愚茍有一得之見自畏一身之死懷而不為明主吐之及至老衰病篤而畢竟以死是畏死而不免於死徒感恩而不知報其恩其果得為忠乎又果得為智乎使死而有知也寧不悔於地下乎且臣之所謂一得之見非指四方盜賊衆人目前所謂急者也亦非隱微而潛伏也左右大臣所共知也百司庶尹言官所共知也閭閻小人外至荒服夷狄所共知也或畏死而不敢以言或以非其職而不得以言或卑且逺而不獲以言或懷祿保位而不肯以言甚或乘隙市姦以媒非常之貴富而幸人之不言為已地者焉斯亦可為寒心也哉何也陛下受太祖太宗列聖之付託以天下六年有竒於兹矣而地久天長萬夀無疆固將自此始也然亦必如祖宗有所付託如陛下陛下乃無負祖宗所付託也不知陛下今之將所付託者何在耶前日賊瑾之謀逐榮王借使當時顧命大臣以死助陛下諍留榮王張綵雖狡急於助逆彼知有天潢血屬之在肘腋其敢萌是心乎是無血屬之在肘腋足以召亂明矣幸天啓聖衷卒殱滅之瑾滅之後可保決無瑾乎若綵則今班行中未必無綵也何以明之凡以公呼瑾者起此輩保能不以事瑾者事之乎綵獨惡著而先發焉耳賴列聖神靈俾瑾綵識膚慮淺其迹易見萬一有操莽者出於其間不知何以殱之自古人主之孤立其危若是哉宋之司馬光婁寅亮其豈非忠於社稷其卒有賴其言不可用歟伏望陛下蚤堅宸斷為宗社計之以繫海宇臣民之望以絶姦雄睥睨之心然後螽斯衍慶麟趾肇祥舉先王歸藩之義正元良主鬯之規斯萬世之長䇿也亦愚臣垂死圖報萬分之一也臣言至此惟知宗社不恤其他故不文不文故不諱不諱故傷觸權姦多傷觸多故中傷啖致罪辟以至於死臣亦甘心分內事也臣瞻望闕廷不勝激切屛營之至為此具本專差義男某賫捧謹具奏聞為蚤定宗社大計以絶窺覬事臣於去年四月具本差義男羅某齎奏內開向者賊瑾謀逐榮王當時顧命大臣不能死助陛下諍留榮王致使陛下肘腋之間無一血屬之親足以召亂彰彰有前驗也故舉宋司馬光婁寅亮之故事以瀆天聽兼備責諸臣蕩無廉恥阿附賊瑾之狀而又發其後日乘時觀望不忠之謀冀以感動宸衷即賜施行以慰海宇臣民之望以銷姦雄睥睨之心然後螽斯衍慶麟趾肇祥禮遣歸藩爰正主鬯臣雖譴死固其分也是後寂然不聞示諭臣料必是後宫儲祥將次彌月臣之私喜旦夕望之及今踰年更無影響徒聞大盜並興遍布天下連數十城所過如洗運河兩岸焚劫殆空前日縳殺方面明日射死將官近於楊村剖剝參將王昶夫楊村去京城幾何而眼空如此臣謂國本不定姦雄睥睨今何如哉前月二十三日湖廣陽邏地面傳來流賊執殺右副都御史馬炳然臣初疑似之間以為副都御史九卿之二也且非受命征勦之不過遇之而已而輒殺之則九卿之長遇之必殺也九卿之長敢殺之則公侯駙馬伯遇之必殺也是尚知有朝廷威令哉而朝廷左右尚為有人乎而臣亦備員九卿之二亦在賊必殺之中誓當不與此賊俱生賊生臣死賊死臣生也亦痛夫國本之未定而睥睨之萌漸不可遏已至此也然尚斷然不信傳來之言忽於今月十三日申刻迎接炳然之吏王廷昌回報云親斂炳然之尸面劈一刀而去其鼻身中兩箭而傷其肋臣即跌仆在地口鼻流血昏暈沉冥如同氣絶臣久不以妻子自隨止慿一二小童扶摩灌飲至曉略蘇目今便血如流筋骨已解氣息奄奄死在旦夕尚恐賊窮生計魚遊釡中火燃水沸且喘息須臾之命百方搜索或至擁如盆子者一二人焉馳騖中原誘聚不逞百姓愚頑未明逆順諸將狐疑益見逗遛事機一變成敗分焉自是二三大臣雖欲竊假包荒養髙之名以庇其私門桃李之黨如數十年前恐未可也而陛下尚欲與數十近習為講武之舉寧有暇哉臣敢於未死之前披瀝肝膽再申前請伏望陛下斡乾轉坤少垂睿覽立召皇親公侯駙馬伯府部院寺大臣翰林院科道多官考司馬光范鎮韓琦文彥博呂誨包拯趙抃諸臣之議棄短取長酌古凖今藏鋒斂鍔隨事據理假代九廟之勤渠兼兩宫之奉侍體祖宗之意而不懸定順昭穆之意而無即真專候椒房之芳快覩前星之耀納庶衆於不識不知之天褫姦雄於如雷如霆之下則臣即誅死猶生之年亦甚樂也臣不勝憤激屛營之至為此具本專差義男羅秀賫捧謹具奏敕旨為乞恩休致以全殘喘事臣年六十六嵗原籍江西建昌府南城縣人由進士除前任不開外南京太常寺少卿欽升本寺卿正德四年六月二十四日到任又自本寺卿欽升南京吏部右侍郎正德五年十月十六日到任通理前任扣該正德七年五月二十三日三年考滿緣臣自少卿到任已應六年省祭之例不敢便私陳乞即咨本部起送間準本部咨為議處給由事準吏部咨內開南京大小官員應該三年者暫令在任管事候事寧之日通行查照起送赴部聽引等因到部除遵依外今照地方寧靖臣雖舊患腸風便血盜汗痰火虛弱等症不敢毫釐有所顧惜隨咨部起送前到徐州前病發作停船調理一十九日臣實切於赴闕遂輿疾陸行隨處醫治至山東髙唐州愈加寒熱併攻告醫調治三日恩縣又告調治一日至涿州血下如注痰漩嘔出不止告醫調治一日又恐遲延勉強上道至良鄉縣琉璃河地方痰壅昏暈因而墜地慿衆扶入寺中就炕煴蘇又行至地名舊店忽然一跌衆皆驚愕扶擡擁入民家百方營救半日人事始通方覺左肱腕骨痛如錐刺即同折斷遂致十分沉重半身麻痺不仁寸步莫能舉動即雖告縣撥醫調治料亦決無可痊之理但念臣久積戀闕之誠不敢從省祭之例而一意考滿之行臣非不急於仕進也忘狗馬之病由數千里之程冒日漸而北之風寒臣非不急於趨事也然而咫尺國門不得一瞻天顔其命分之寒薄而不足以奉寵渥被光榮者從可知矣又將尤誰哉如更遲疑慿仗市醫曰可愈已亦曰可愈醫曰漸安已亦曰漸安千希萬覬貪生惡死交戰於胸中不知踰六之衰軀纒積嵗之痼疾遂衝隆寒新加傷氣血曽復幾何而可望其持久必至一旦溘然以死是時囊已空矣從者散矣所在縣官不過上其事曰某官死於此其事畢矣誰負此螻蟻微骸歸葬故土哉就謀身言之不得為智就為臣言之不得為忠就為子言之不得為孝天地間一罪人而已矣道路間一遊魂而已矣又安能自默自諱而不為明主吐之哉伏望陛下天地父母憫臣逆旅之中瀕死之苦乞敕吏部將臣放歸田里俾正首丘或念臣先朝侍從講官未忍即棄止令臣還家養病以便醫藥萬一更生復來供職效尺寸之勞圖涓埃之報臣不勝感戴天恩之至為此昏迷中具本專差義男羅秀親齎謹具奏聞伏候敕旨圭峯集卷二十三
