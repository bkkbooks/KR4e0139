body:
  text: 圭峯集卷十六明羅玘撰墓志銘工科都給事中李君墓志銘𢎞治十一年三月十四日豫友工科都給事中李充昭年四十六卒于官前二月二十一日豫過其邸扉羃羃四闔中切切作微語叩啓之蓬首曳屧面黳喘呷失聲久强瞪語豫曰昨趨朝傷甚今逆氣矣又七日過其外直廬𨽻遮入則已鈎幕延頸急須豫入曰已二宿於此可筒酒乎剽脯乎啖我也覺其神志荒亂急按之其膚如寒冰而爪及其骨豫驚而促之歸歸十日又往候之方以藥汁沃兩股股腫達臍如冒鼓至掠其肱則已如槁木猶掣而諱曰行瘳矣至是日知不可起乃遺書謝父母昆弟無一語及其妻子而逝士大夫往哭如市明日罷朝聚語者半或曰使夫人無死吾見敝車羸馬以朝者充昭嘗使寧藩郤王金人知之故云或曰使夫人無死吾見慟哭裂麻者充昭居諫垣不欲瑣瑣言言必驚動當世不然終不言人望之故云下至閭巷小夫亦有嘆惜其死之遽者蓋其為人沉默寬裕持重知大體不衒皎皎名給事刑科時周王與行臺大臣交惡詔往訊之豫於其行發數難以觀其意曰以宗室尊王以移任處大臣則釋矣既至果然升工科右給事中又轉左給事中嘗處分畿內籍地戚里大閹斂手割正寂無影響成化末豫與之同以進士改庶吉士今致仕吏部尚書公其從伯父也方掌吏權第宅在西長安而充昭顧僦屋極於東委巷中日夕閉其舍兒不使與鄰兒接杜其或譸張也人問其故曰吾見權貴盈溢親戚子弟鮮有不同敗覆者後尚書去位完名不汚充昭助之居多平生喜追晦庵書法久乃逼真尤善為詩多至千餘篇文殺大半焉嘗從容語豫曰羅充升評吾文與子軋語已啞啞笑自負豫戲之曰奏議似宣公即當至矣蓋知其有待大也孰謂其遽止於此邪充昭諱漢號方塘南昌豐城人曽大父伯行大父端輔大學生父資志封刑科給事中母羅氏封孺人妻張氏子僎𦙍侣三人僎先三嵗遣歸代養𦙍以喪歸癸亥年十一月初七日葬縣治龍窟里之原葬當有銘程正之以狀來督豫銘末綴云充昭母娠止八月將疾夢人遺大書曰哭考以今驗之哭考者考哭之也嗚呼哲人死生其果有異哉銘曰家失賢子國失良臣子失嚴父婦失良人嗟乎充昭而反其真封戶部主事前光祿寺監事張君墓志銘君諱海字本東上世有以戰功授太原左衛千戶遂為太原人某君曽祖也某生某是為君祖某生禮娶范氏生子五人君為季末九齡而孤家故以居積食家衆君曰是殆浸沉吾宗弗利盍更諸遂以通春秋遊郡學升太學謁選即授光祿寺珍羞署監事以剩員改良醖署幾九載以不良於行請老乃以子天相戶部主事初考恩封戶部某司主事階承直郎娶陳氏側室龎氏孫氏子天相天敘天祿天秩女四人壻教諭姚文相百戶安完王等孫玉麟主事出監德州倉實奉以行十七年十一月以疾殁於署年六十八始疾侍藥暨屬纊斂殯主事得以身輔情行其禮明年輿歸太原某月某日葬秋村之先塋主事從吾游者也泣走使屬御史陳邦瑞狀扺豫銘且奮曰吾先君肇開有張弗竟厥志以遺末小子獲承丕休顯封伊初惟獲戾宜叢明誅而移釁於先君惟仁人克裒顯錫之銘則張氏榮於世世其毋墜于肄院初今太僕陳公為御史與君同里閈結髮厚善竒主事幼慧卜師主豫豫乃不忍違因善君時在署已給事先皇帝郊捧胙者六嘗郊已傳問署官何名何敢諦視乃爾君對曰天顔咫尺詳諦致審爾寺簡經筵供事首儀觀次間習又次音吐班行舉無踰君者十常九與萬文和公偶於几側注視君驚語尚書尹某公意其初無留意於君尹曰業在拔選列偶值他格行以非次待之而公爵君者三居太學時選入內帑名曰厯事典出納案籍者也再改從御史者按山東寺人以驕而御史例以威空人舉破調改禮去署家居旦莫惟于主事役役己酉乃起於鄉己未第進士距十年皆君孑孑單􅐒劵給其給濟人遇不能償則已太原當會府潞人馬彪入携貸輸官期於潞償比至鬻子取貨布諸庭君問狀驚怒裂劵去同舍生周晟貸如彪死子股吏于官或誅股可償也君掉首取劵且焚且嘆曰吾徒知其父之貸不知於其子之償他比彪晟事多坐是時亦匱乏則以儉勝之而於賔所過逢頻頻開尊啞啞笑嚼移日醉益欵欵時出歌詩口讐經義為樂嘗以主事故獲侍今大宗伯張公飲公及他賔語三傳疑僻弗能平君從旁旁緣曲徴殆盡公愕曰老經生也賦詩旌賞人亦於是浸知主事其成之自所謂肇開有張信然於乎今已矣豫義奚容以不文辭銘銘曰化儒於戎譬彼為菑其穫伊薄俟其為畬為畬為田沃為膏腴凡始于菑莫艱厥初世食乎儒有開其誰贈淑人謝母墓志銘淑人諱貞姓陳氏吏部文選主事諱艮之女都察院右副都御史謝公之妻大理寺評事廷柱之母今贈評事初考恩也吏部世長樂大家自其身又能飭新家範為閩中冠故淑人得以充其殊質為閨女士每遇訂昏之族雖時顯盛吏部輒拒免有欲嗾媒入議者媒輒搖手作難避去及笄有試議謝氏喜曰吾壻也家人疑之曰吾必是女貴凡子碌碌徒亂人意何為及歸謝謝有積嵗卧疾母媪淑人於世次祖姑也憊極昏眊而鬱為燥烮侍問少拂逆則椎槶器物叱詈動牆屋諸婦縮匿他處則獨以身當扶掖缺伸抑搔疴癢手滌中裙厠牏襡衾篋枕時匕筯進飲食能順適得其歡心垂盡獨呼與訣曰古云唐夫人孝不意復出吾門若所以為祝者公自戶部知建昌建昌為閩北門實孔道而近嘗迎父封君暨陳恭人至而府適多虞又時受檄辨他府獄出輒涉旬月不及時侍乃悔迎嚬呻自尤淑人曰何苦乃爾吾顧駑庸非婦邪吾養若養也公乃安居嵗餘别歸泣且贊曰孝婦孝婦尤善成公美屢脫簮佩倒私篋於未貴時致無急貸於人居官得一意踊邁往行其志在蜀行院有屬帥時公出行大賂入為關節立命僕揚其賂物於官以杜後公實大人不逆人欺美言來嘗亦傾耳聽納為恆嘗偶值過屏後聞之驚立待公入問曰何為姦人所賣公既骯􅗣自信掉首呵不聽後果然公悔始賞其識鑑公兄弟四人志終其生共食有寡妹亦招以老食口日益佐以俸入且匱淑人身自節縮為倡曳長覆短常使無見綻裂傷公酒醯臡臘具按故法而酌以新意人效之不如也公三男八女淑人生評事及女賔容完官凡五人男廷棐廷最女賔宏寰信六人皆庶出廷最則學生也鄒棖髙均李詢黃謀陳文試陳廷相髙策陳璋凡八壻謀策璋學生陳文試則監察御史也本寬本忠本厯孫男凡三人桂京莊銓孫女凡五人曽孫男朂一人也淑人於所出與非其所出其所自出與非其所自出其已貴與其所未貴一無差殊厚薄意於評事則教勝於愛焉內外宗之孤嫠與婢僕之孱耎者則多恩之勝故公每語諸人以為惟其能人亦咸敬讓曰惟其能公卒之某年為𢎞治十七年五月二十一日年七十有九卒訃至評事為位於寓舍哭玘往弔哭評事舍杖輟哭拜曰廷柱歸以某月某日葬吾母於雞籠山先公之兆而忍無銘吾母乎玘少從公學銘奚辭銘曰父竒其女姑感其婦夫賢其妻子德其母誰其集兹於人間世再世食封以齒受祉矧有令終歸從乎公吉其後之逢髙平知縣栁君墓志銘𢎞治戊午八月某日髙平知縣栁君卒明年河南都閫王君以狀請豫銘其墓曰君諱豸字廷直開封睢州人曽祖某祖父某某母馬氏也娶鄭女鄭死繼黃繼劉子瀚孔昭江泗女孟德仲言叔容季功孫男芳英女加一人焉其幼也以竒童名總角舉於鄉登成化壬辰進士出知襄垣貶丞岐山再貶會川衛知事復知髙平以母乞終養至是幾十年年止五十墓在某之原云時豫以歸亟不果銘癸亥豫至闕王君申前請益急曰吾嗣子金書壻仲言矧吾少同里閈且同學也最知君君在襄垣未一載會蒲州守去御史薦君遷補之命既下襄垣民詣闕請留先皇帝重違其意詔君仍留襄垣提學沈公重律以德政碑之未幾一召入臺為仇家所中且入乃以貶去在岐山為撫巡所知薦知咸陽以不附中貴人之在鎮者又逺貶會川會川者西南夷徼也君欣然提身萬里往比近地居既久瘴與夷習無能為苦會今皇帝改元恩復髙平踰二載念屯遭坎坷雖急忍度終不利於仕母日就老力請歸歸終日幃下飭養事事已惟歌詩以遣有謫蜀録和唐音憨菴稿以見志曰憨菴乃自號世謂漫不省事為憨云余曰世卒為了了戕人性本故多事以擾而仕尤害大世患少憨者耳君果憨乎吾其追銘之暴于墓上銘曰有往斯譽有譽斯舉有舉斯沮舉不勝沮是以齟齬削落既屢與魑魅處復其處所退則無忤天地逆旅惟名不腐太學生李顯忠墓志銘昔先大夫之喪豫奔過淮撫淮中丞李公出下舟弔益卒助挽舟速豫奔豫感之公卒其子世蕃以太學生見豫京師語移日及當世可指切事即如藉蒺藜幾無須㬰寧處至古人英風義烈又若彍風鞭霆亟欲追以從事為快豫笑曰是復見公也念公守青治最天下隱德多此其發也乎遇學諸生談生必曰生髙蹈逺志人也其在秋試衆必擎而讓曰是其先登然比收士輒遺生生亦憨憨掉手去歸杭遇時感觸不覺仰鼻噎息歔欷距踊即傅翮而飛者聞人步履聲遹斂如恆為家生事治即不隳其學學益贍賙恤洽不匱其藏藏益實嘗一往循銓之次名已上會母陳夫人之訃至儕輩類須內批出乃發則官人也尼生生頓跌詬叱已而袒括噭號跣走歸不顧先是鄰有不戒于火者公之綽楔燬延沿燼其廬豫適道杭一日馳三驛暝薄錢塘呼𨽻問生𨽻曰是竹竿巷李生邪今方除火所始究于所止靡遺一礫悉棟而瓦之矣豫悔失竚觀之及今其仲士魁以中丞張公狀至泣曰吾兄今閏正月十二日死矣豫悲愴久之考狀與豫耳目所及差合獨公疾生刲股和粥食公豫不知也於乎孝哉遂次其年三十五正德二年十一月某日葬龍井山之先兆公父贈青州府知府禎為其祖禎父紋中為其曽祖張孺人為其生之母夏氏其妻許氏其側室而嬰兒崑其子也為之志而舉其字曰太學生李顯忠銘之銘曰古非刲股刲偶而斃竒子之刲刲可範世世可多有亦可夀之子何弗然天難忱斯萃軒居士墓志銘安成湯村劉氏漢姓也自長沙定王子思侯侯安成即湯沐之至不侯入編籍中亦仍所居村曰湯村而典物多存類能出圭角以自殊别其析布旁近為支族皆綴湯村景泰中忠愍公以節顯萃軒居士布衣也鋭志貫合羣支逺能系之而知其墓生能名之而識其系族之人皆曰是劉氏行譜也與公同有功湯村者豫少識公孫寧鄉知縣絢省闈中比仕又因絢識刑部主事祥豫慕公甚每訊之得悉公又因公得居士焉寧鄉嘗曰吾宗逺者數十里近亦無慮十里而墓强半在湯村每寒食祭僕馬充斥必於居士乎館之極童丱所欲如往欣欣為導指不以老輟其始亦力學欲自表見多坎坷沮乃教其子時瞻又沮繼以時表時章皆連沮益憤如遇敵決戰弗郤至時望果舉進士官南京營繕主事所居几閣星厯風角諸書出遇後進小生立頃皆能隂處其終身間發一二雖名専門莫與角中鄰之祟晝日歘弄形聲甚久之闖入其室呼之如呼人又如人處分之明日鄰來曰祟去矣大要其軀癯古勝中又骯􅗣敢往諸隂幽詭賊類自鑠然常持不校亦寢物之怨懟為生僅自給而樂為人給禍脫急往往副其求至自窶乏則泊然安之嘯歌止於自適而閒率至到至今刑部日龍誦之於人至有賞者焉享年七十有八以正德二年八月二十三日卒卒之日族之逺近與鄰嘗德之者率奔而泣比殮拊柩盤躃至失聲者若營繕不獲視疾又不獲候纊息其容弗悲乎悲而不圖為不朽不徒悲乎圖不朽而弗之當世之不朽也者而顧以豫銘豫果足不朽乎然不能拒為之志其行與其曽祖某祖容父節忠母彭氏妻王氏其子時瞻時表時章時望凡四人孫男凡七人孫女箇秀一人其葬以某月日於某原其字叢英其諱萼其於縣官則大賔也而銘之銘曰斂有多智以豐其羸施沛有餘懲其不試以其子嗣亦酬其初其在厥宗如冠有緌旒以綴之今其已矣克紹伊誰維後之思樵隱先生羅君墓志銘君諱富字宗弼先字宗禮石岡樵隱其號也與豫同出豫章徙廬陵廬陵徙泰和武溪再世曰義可徙蜀江生世賢世賢生貴祥貴祥生德源德源國初布衣論事謫遼東赤籍中老得歸是生公器君父也籍移南京公器當補以妻劉氏子宗謐暨君隨僑居上新河君時方晬已而弟宗敬生公器素挾易教閭里知名至則帥特為易伍俾仍儒故得便自教於家而君始丱已為文章奪人眼目宗謐舉應天髙等文鋟為式君亦入為學生宗敬乘其後森出人萃目矚羅氏宗謐死宗敬無有與室者公器大戚慟傷悶體尫弗支舉事屬君君示若無難者以為順適果婚宗敬愜公器公器垂絶喜曰吾恃而而死已矣宗敬繼死母亦傷而癱兄弟妻之嫠者二兄女之孤者一姊之贅者一蜀江之鰥嬛日就食母卧床褥危君君取諸戶門舊之日需者與新之日益者角㪺豐約厨具篚實竈婢舁夫不絶肩手然節縮以度內無狼籍外無宿負盡晷而止宵則焫燭講誦琅然孤嫠欣欣閨閣晏然母喜癱去人以為考感所致凡四舉輒蹶母且沒喪之力乃憊因削去前鋭不復言乃為督學戴莊簡公所强重傷公心為一出復蹶公諷校官弛條約縻君君百方求去會中風暈始得告公猶劄府以病可復若不懌君者及可公已去乃已自以為天貰我曰吾以付吾後之人時子鳳學將就緒故云遂顔堂及號曰自守日闢門內問禮者凝然如師質曲直者居然如官不辭吉之諸宦部院達尊皆迭與過逢常據上賔位若樹堠然不移故司空蕭公雖素寡合亦崇君一人金陵古都隈隙處宿廟覡家旦熱吹喧晃以衒衆聞君過悉闔扉屏息居左有蕭公祠他日過之神來馮巫巫猝神語稱君正人遍命禱者禮君君遇休燕居圭植儼然自牖窺者以為神人其逸度髙調空人甚性復善飲每酣或仰月長嘯誦出師表赤壁賦李杜詩以見意為古文瞑目沈思至微頷瞪目則信紙迅揮而就冠時已為西蜀李宗伯所竒然不自什襲藏於家者僅自守齊一集鳳以進士推莆一迎君養周翠渠莆巨工也以得君為晚託石岡樵隱為內交焉子男四孟鳳今試監察御史叔鶴有志古學仲凰季鵬蚤夭女一贅髙價均劉出也孫男二曰相曰材孫女二曰蕙卿曰葛卿正德二年五月某日葬於鳳邸春秋七十劉先君沒葬江寧縣賈家山鳳與鶴將以十二月十五日奉合藏焉鳳著狀泣來丐銘始鳳應進士來京師君旦夕縣憶豫文夀之而鳳乃他屬歸大咈即命匿其檢於乎豫尚忍辭銘也哉君居左右彌滸皆豫里人言君為人以父事仲父公立食其子孫二世挈族父求良四嵗之孤自蜀江名且植立之視公立之世於妻之家始終經紀之厚葬其父拱所翁同日舉其四喪土中蕭貴貸錢至老不能償甘以女償立灼券罵貴如罵𨽻人歸女俾贅曰毋汚我毋汚我少與樓浩梁信相友善成化中疫流信家殺人勢轉熾戚屬斂跡竄避門無扄者獨日三四往為溉除薰灼旬日手斂七棺瘞諸野浩老而獨召館之九年朝夕與對食死時家且疫尸橫竪閾中獨為之終事嫁其孤女方十嵗者竒行焯然在人耳目古陳郭之流與是應銘銘曰以多垂趐而沮其騫栖木得顛有窺區寰奕局屢遷弋何慕焉人也弗諒可磨斯言草亭逸人墓志銘草亭逸人吳氏崇仁人也居白馬嶺下比晚縛草為亭託以老焉年六十三正德三年十一月十八日卒仲子學生鎬季子訓科錫視屬纊孟子監察御史鉞奉命理軍事于浙越明年正月始克聞訃哭哭哀劈踊疲憊脧毁幾時不絶乃晨夜乘傳反命畢奔歸迂道白下以志銘委諸玘玘曰子來豫嘗誰銘誰嘗曰豫能銘人乎雖然不得曰嘗誰銘人而遂不銘而翁也而翁用薦起官序班先豫在館者八年已褎然老成能導豫升降陛戺别識掖闥觀闕名額指目班行誰某隆殺疏數其所宜施豫德之間以為言輒蹙額曰吾先南城也且今相距幾何哉而乃自為異邪居既久備見大老皆耆年倦勤諸藩國冊制外大蠻夷詔命將帥行師璽書除拜封章代言檢就則以下之看詳彭文憲公每呼曰吳序班以為何如對曰得則公曰以是頒出或覆視之曰吳序班手書乎欣欣頷之而已修文華大訓宋元資治通鑑公必引以自助及修憲宗實録丘文莊公喜得之日引之與語如公引者録成遷翰林院典籍喜謂玘曰天順初嘗有官此者舞其柄以窘府部幕司至不能一朝居府部羣公出怨言懲是顧用頽墮者至今若尸寄然事遂弛今吾酌厥中存體要耳既而幕司果羣聚驚語慮罹當譴咸以為憂居數月覺無苦又咸以為喜文淵閣藏書數萬卷標目亦數帙或問之矢口縷縷如注先是館寮一人假考訂私丐史冊擬竄易其先世之穢未成覺之乃赧銜至骨則設譎間于炎炎者曰典籍扄鑰在其手恣取已好入其室左右希合左驗之乃乘在告諷吏部貶為義烏主簿而丐史者遂栩栩快其志鉞泣曰不知也玘又曰𢎞治初致郊齊羣屬咸集院豫二人入夜語於奧時張宫保言事忤仇黜南部語次及而寃之不虞張仇遍置偵偵白仇仇怒遹起大獄意置二人豫幸脫而而翁亦乃困至是今已矣鉞遂拜且泣玘亦泣鉞出狀發之與考其世得諱庭桂曰吾父曽祖也來自南城者也得諱日升曰吾父祖也贈順天治中者也得諱衡與某氏曰吾父父母也自治中至山東參議而封宜人也先諶氏繼趙氏曰吾母也而趙則吾錢鎬錫所自出也鎬生浩再生演吾父孫才二人也又拜且泣曰惟諾銘吾決以嵗十月某日葬某原嗚呼逸人名孜字景賢與其六書古近體詩天下人能知之其所自立亦可曰天下人知之乎其身則仕而其性則逸也否則惡止於是哉而亦惡取斯困哉古士有易名如曰逸人庶幾來世有考銘曰吾惡乎悲逸人乎人之大賢與誰不已與而誰則為之所人之不賢與無乎其自取而誰非已忤其命也與噫夫如是而能不失其故吾又奚悲之而銘其墓封南京工部虞衡司主事吕君墓志銘封南京工部虞衡司主事吕君諱祥字世吉號素菴前鄉貢進士也隱士文夫之曽孫封刑部郎中子榮之孫前庶吉士䕫州府知府晟封宜人俞之子贈安人俞封安人姜之夫吏部郎中杭州府知府䕫之父年五十八正德六年七月十六日以疾卒訃至杭䕫刻晷奔歸與弟龍夷益臯卨治喪已又治葬得吕塢先塋吉卜十二月二十六日又吉乃走僮水陸犯晨夜以狀屬曰公愛䕫世遂知有䕫公脫遂銘䕫先君後世由公知有䕫先君孰愈愛䕫豫勞僮館之退考䕫州甫自翰林出官刑部時夜邸舍有光起庭中䕫州駭曰何祥也已而君生因名之蚤有竒氣姆抱置書几硯牀間必笑睨拊摩若略意會及遇兒嬉弄具則又凝眸端視了無解心既就外傅日革童心養端騖逺年更月異史考經通占疏書義積成篇章分晷寸隂如有角逐䕫州憂其憊曰兒休矣而與䕫州游者又咸望吕氏不止䕫州䕫州嘗免喪趨闕下舍舟而陸留家於淮而君與母居則晝夜誦明日又然居傍駭之老者嘆婦人嘻曰竒哉斯童䕫州官䕫君時己任戴冠則以侍以學於䕫志不試于鄉以自沉久之䕫州倦休寓上饒上饒附郡縣東南要衝也使車部使者車日旁午君遂不能隱其賢一日提學鍾公迅馳至急索曰祥出祥出取學簿注一名去䕫州躍然喜曰兒出矣敦迫之試江西試中試禮部入太學告省歸屬䕫州卧病腹弸弸垂槖急者六月醫相戒避君惟籲天祈代至勿藥人以䕫州更生歸君然亦以是謀割宦情依杖屨而又恐戚䕫州䕫州果怒强為一行抱卷納禮部陽陽歸曰吾親何年吾作三公邪尚出邪自是終䕫州宜人之世生事葬祭屹然為邦邑矩範䕫第進士仕南京今上即位恩用䕫官封南京工部虞衡司主事䕫守杭值上太皇太后徽號恩加正四品服兩恩薦至䕫如制函冠服歸至則一服之北面稽首謝謝已襲藏之笥或問之笑指笥曰世守是儒其衣冠終身焉其諸竒邪靡曼禁不以目吕永豐故大家族屬繁身先之故不令而勸家衆夥器使之故不勞而集非倉卒處分未嘗不坐學易軒取易玩之興之所至亦未嘗不吟醫藥羣書未嘗小之不觀觀未嘗不究而試廢疾病者丐已病未嘗不應應而輒效效而來輸直者未嘗不叱之故有素菴稿幾卷學易軒稿幾卷藏於家其已行於世者試效竒方幾卷也及今之卒至有泣下者焉學易軒君所構者也孫振宗振武振德振英振逺振澤六人孫女寶珠珊錦四人銘曰宦則海然彼濡彼溺濡也阽危溺也泯迹亦有夙知望洋而懼永終厥身不及溺濡於乎賢哉我銘其墓徐信夫墓志銘信夫姓徐氏名栒嘗為嵊南靖二縣大夫矣豫於屬則師也官之則已疏名之則已倨故於其生也惟字之正德己巳三月乙巳年五十六卒於官其子學生煥以其喪歸嘉定謀以某月某日葬某之原來乞銘豫亦字而銘之而其曽祖剛祖瓊父復母張氏配龎氏女某孫喬郎備載狀以來且曰煥也至南靖不及吾父生訣者五日痛痌每隙側聞胥皂泣於庭騶泣於廄士來弔者亦泣曰邇冦之薄吾境倐柵吾邑為壘以戍介胄吾民為兵以待戰冦覘知遁去吾父吾子吾田廬微吾宰誰賜之今天奪吾宰吾寧不悲或又曰吾世輸縣過山錢以脫箠楚幸今二期無輸輸又將自是始吾是以泣又相與執紼舁上道泣不忍去或舉槖則訝曰槁葉若是乎又泣煥也哀遽中幸以是慰豫曰子嘗侍官嵊乎曰然知涖政公勤德威並立之褒乎曰比考功所以録而嵊志志之也知學庸冠冕之鋟乎清風祠之録乎嵊志之修乎曰舉吾父之所以為嵊也語已自是泣不絶曰就縷縷語無越一循吏耳可置此而他言乎昔吾祖殁吾父哭之晝夜不絶聲涕盡而繼之以血及吾祖妣歿哭之亦然吾氏老若斯少若斯曰吾何能如鎮傍有二梁舊木也圯輒水人以死吾父率先石之至今人曰吾可以無水死矣思之至是泣曰吾其何如煥也於是避嫌焉諱之如忍何又曰吾父能以其詩當吳豪故其集曰隨意已登于吳詩之壇然終其身不能一快志于春官能常惺惺以警多足以支倉卒之變無愧乎警齊之號如禦靖冦之類是也然不能使其身歸老于牖下皆可悲也幸撮是以銘豫曰諾銘曰志也輒乖以沮才也方乘以施其乘也微而又數竒以蹐之將尤誰而吾銘之孔悲故知縣王君墓志銘君姓王氏臨川浯溪人處士思敬之曽孫教授汝為之孫監察御史常之子知海州顯之弟判廣南府改寧波盛之兄初筮知興業縣以母憂去改宜都縣在任凡十年去位居亦凡十年正德三年十二月二十有四日年七十三卒孺人楊氏先君五年卒子男淮府學生渶南太學生女嫁金溪學生胡拱華孫男讓蚤卒解南太學生孫女大玉小玉明珠渶在大學得訃哭瀕奔輟哭走豫乞銘歸卜某年月日葬縣某原以圖君不朽豫少學臨川善君時御史君在院黎宜人亦居燕邸海州初舉進士侍焉君與廣南以名肄學法不當得侍學城府府距浯七十里而君於家次當主田牧食其衆蹄踵走交道僕僕然然猶自課課及廣南嚴毅甚遂連枝秀發成化甲午江西榜揭聨名其上明年乙未黜禮部業太學結詩壇屹為天下士勍敵而輒試輒黜如乙未者五遂懲而恚曰進士為吾治民耶吾治民也曳廣南入部掣銓簿部注通判當廣南注君知縣當興業興業猺獠地也至則請免逋租千石鑿敗山石以利輸道縣因通其有無故蕪為豐氓蠻便之比至宜都則稽廢墜民以縣南津不橋告考風俗得五世同居趙氏也問所疾苦甲曰荆之屯兵曰疆與吾田錯而侵方酣乙言如之丙丁言又如之君喜曰吾知所以治宜矣於是橋南津請旌趙氏復侵疆患日見割削去而便日增以六載考告曰吾疾作矣歸而海州最先歸繼廣南自寧波歸歸白叟嵗時遊宴雁行班如也人以為竒豫癖習問天下吏治偶及二縣皆最君於乎於此可以觀君矣君諱昌字必懋東溪其號也銘曰玉則出櫝屢梏而鬻錦則在几再易而製而祖而父而父而兄而侍幽扄重笏重簮孰謂非生故南京守備司禮監太監傅公墓志銘正德六年春三月十日葬南京守備司禮監太監傅公于昭功祠之隂永寧寺之右曰昭功曰永寧皆上寵公賜額也初孝宗簡于肘腋得公來南付以留鑰公感知遇事麗兵民便宜大以驛聞小以意制寢機拔萌化囂成寂泯厥聲迹時隂便之凡南畿嵗欽慮獄則守臣則部院寺咸視公色可否公主其疑者咸厭衆心或至宣諸言公亦默然退自念曰奉若欽恤謂何吾何敢居纍厪宸翰褒諭益怵惕冰淵矻矻恆以弗任為憂遂以疾請上憐公誠月有廩嵗有後俞公休官一僧至左覺義為永寧寺主以主公祀制下之日蠲及稅焉從子豪入粟為郎傑千戶皆宜役公而公以是年正月二十五日疾劇卒春秋七十五矣而豪傑以豫遣歸未視屬纊也公廣之順德人曽祖某祖義悌父道達母何氏世名家也以選入掖庭肄內館業有器幹英宗擢奉御掌文書憲宗擢紀事奉御侍悼恭位下轉宫禁教書擢春宫局郎孝宗𢎞治初進司禮監太監賜蟒衣玉帶祿米憲宗茂陵英宗懿妃金山二功成繼命選永康大長公主㛰褒賚皆有加上新即位賜又如𢎞治初焉至於欽遣方嶽之臣祭公考妣蓋異典也公性于儉朴平居慢藏誨從者之廋振衣誤羮翻之涴家衆縮項蒲伏股掉掉公顧訝曰爾何為第去意氣晏如也鳴璫貴人重德成就類隮德位皆父母公至是哭亦如之且以聞於上方徯恤典也而又來屬豫銘公諱容字某號某銘曰學之斆之以蓄厥施龍飛則隨宫月夜白委裘之側鞠躬屏息夙興仗行東有啓明折旋陛扄帷幄孔嚴傳宣日三有堂有亷維南有鑰惟以休樂噫公不作圭峯集卷十六
