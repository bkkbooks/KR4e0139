body:
  text: 圭峰集卷二十一明羅玘撰雜録論天下之政出於一論曰天下之政其理未嘗不出於一也顧其勢常不出於一也雖然亦不可使之不出於一也不出於一在易是之謂否其君之者之責也相君者之責也欲其出於一也吾有理而已矣勢不吾恤也彼天下之人皆有心也有心則有欲有欲則其必於遂也亦其勢焉耳矣欲之在人其之善也十一其之不善也十九以如是善不善之相懸則各一其一於其父子兄弟之間蓋有不相能而相傾者則凡可以逞其不善而遂其欲者復何恤邪而况可以遂其大欲者乎則其至於是焉幸吾之不一而入焉亦自然也嗚呼君臣之間亦可畏矣孔子曰為君難為臣不易蓋謂此耳君知為之之難凡可以擇相而防其入者何不用也臣知為之之難凡可以正君而捍其入者何不用也吾見君臣上下交相與以成其一而已矣吾可以優遊暇豫以為吾之所得為而無所妨矣彼旦旦焉幸吾之不一而入焉者吾無隙也吾無以招之也彼自懲而退也一人之不入也千萬人之不入也千萬之人天下之人也然後天下之政出於一也在易是之謂泰謹論理氣本無先後論曰在天成象在地成質在人成形氣也而所以成象成質成形者理也所可見者氣也所不可見者理也日也者月也者象也山也者川也者質也耳也者目也者形也如使人之徒指日也者月也者山也者川也者耳也者目也者而問焉曰理與氣孰先必將應之曰氣先何也其見於所可見者勝也遺乎理者也不可與語也如使人之究日之燭乎晝也以陽焉月之燭乎夜也以陰焉山之峙也以靜焉川之流也以動焉耳之聽也以聰焉目之視也以明焉曰理與氣孰先必將應之曰理先何也其究於所不可見者勝也泥於理者也雖可語而亦未可深與語者也其必曰陰陽判而晝夜分矣然必晝夜其陰陽以宣焉動靜别而流峙定矣然必流峙其動靜以彰焉聰明賦而視聽得矣然必視聽其聰明以發焉知乎此其語日之象也必陽也晝也語月之象也必陰也夜也兼焉以至星宿風雷之類莫不皆然也語山之質也必靜也峙也語川之質也必動也流也兼焉以至昆蟲草木之屬莫不皆然也語耳之形也必聰也聽也語目之形也必明也視也兼焉以至四體百骸之微莫不皆然也而後庶乎可與語天地人之理與氣矣可與語朱子理氣本無先後可言之旨矣謹論君子上達論曰君子者亦人而已矣而以為有異於衆人者何哉曰衆人見有所謂物與我也孟子曰禹思天下有溺者由已溺之也稷思天下有飢者由已飢之也衆人見有所謂臧與否也孟子曰茍善其禮際矣斯君子受之衆人見有所謂利與鈍也孔子曰老者安之朋友信之少者懷之衆人見有所謂難與易也孟子曰舜之居深山之中其所以異於深山之野人者幾希及其聞一善言見一善行沛然若決江河莫之能禦也則夫君子無物無我無臧無否無利無鈍無難無易也蓋如此曰然則君子者其亦稿木濕灰而已乎曰非也蓋自慈愛以為吾之仁而已是仁也即天道之元也辭讓以為吾之禮而已是禮也即天道之亨也斷而必行以為吾之義而已是義也即天道之利也知而弗去以為吾之智而已是智也即天道之貞也易曰君子體仁足以長人物無非我矣嘉會足以合禮否無非臧矣利物足以和義鈍無非利矣貞固足以幹事難無非易矣故曰君子上達進夫天之道矣無人也否則汨汨於物我臧否利鈍難易之間則人也下達事也衆人之所為也終亦必小人之歸也謹論策擬策問一首問孔子答子貢之問政欲存信而去食非謂食之真可去也所以甚言無信無以信諸其民而不可為政焉爾在易中孚之彖曰信及豚魚其於物之蠢然者且猶信之况於其民乎求其所以為信之道考之周禮六官之職具不誣已夫何後之言治者乃曰民不可與慮始可與樂成則是朝四暮三之術可施也信亦何時可行之有又曰化之而不示其所以化之之道易之而不示其所以易之之道無亦愚其黔首而已矣果何事於信乎且莫信於徙木之豫金矣而論者謂其有果於殺之禍莫不信於雲夢之遊矣而當時乃有將兵將將之較信果可信以為安乎有以信為救飢之術者非之之説是也然則江淮之飢洊矣蓋不減於曩昔關陜之一慘矣而其民之轉徙流亡乃不至如彼之甚者議者以為恃有朝廷之大信堅忍以待之而果卒活于銜命之使者之救之也信以救飢斯其驗矣非之之説其果是乎或今昔異宜不可行於昔者顧可行於今歟夫惇信明義隆古之世為然而秦漢以還始有不足於信之説無乃隨其世之升降而升且降之而信有所謂循環者邪審然今之世古之世也何其幸歟然而存信以結民心儲蓄以預荒政古今之同條共貫者有幾古今之相戾者幾何不必泥於陳迹而因時制宜又未必無其術焉諸生毋徒諉諸氣數之方隆而莫之講也傳老先生傳老先生靳氏名瑜字廷璧鎮江丹徒人也少為諸生至貢業太學未有是號也始自經歷溫州府時府時周守城府高耽耽視諸幕僚諸幕僚類戚施刓劘甚先生至不知也晨入揖事當治治之旦日復入事又當治又治之或符下行縣上馬去不顧僚避積歲沓不舉或叵測貽身災者守試符之亦行不辭事已內符退入舍卧僚至問弛張方略云何應曰唯唯至移語他事已守聞驚嘆以為不可及延入閣與為禮呼老先生云曰老先生云者非其年之謂也尊且師之謂也由是府之人皆如守之呼曰老先生下縣之人亦呼如府之人溫人道丹徒語故丹徒之人亦呼如溫之人守去再易守不樂與後守居去溫家居十年以歿有二十四年矣以子少卿貴纍贈至太常寺少卿兼翰林院侍讀光顯矣人亦忘之過其墓式其閭者亦止呼老先生云少卿發應天解及第第三人踵豫入院與有麗澤之雅得先生於隱度中意退然不勝衣懦者也而其治溫又健乃爾其治陳清戴堂事即勇者不如而隄沙園塘以利溫民皆不與其貌肖者壯哉大抵溫海邦也疾風駕潮齧岸墟其田稅歲苦民虛輸之者十四五而海外雜蠻夷貨視內地伺便鷙攫之舊置磐石金鄉暨溫三衛以戍其帥類世傳暴悍叨餮武人而附府者尤飾文假法睥睨吏治為蠧螫莫制其山奧海嶼則民以險豪吏以逺略因循醖釀至不可忍則坐以逆聞聽上制置均為患本堂永嘉民也垂當坐先生急謁部使請曰堂誠謀逆邪畏囊頭荷校就獄死耳且罪止堂而草剃禽獮之非宣德惠養意脫獸困跳踉如溫民何吾請往招堂即日單騎緣澗谷覔抵堂所呼堂出曰我靳經歷也來活堂堂驚出且數且諭導至府獄具遂脫堂族他如堂豪喜洗刷一變清所謂為蠧敢往者千户也聞人已聘女美以奴齎衛牒來訌曰吾妾也府實弗任與衛為異同下以觀先生先生知狀引左證了了垂上清窮急入賄賄至輒出益窮自輸伏辜女獲還聘夫武人悉栗栗戒母邇府府益肅無事沙園者平陽瑞安界地也田墟不知其始堤成水可泄蓄歲有秋民輸外食且足今所謂靳公塘者是也其治要在利民完安之而剗除其疵癘雖或時攝守事如即真然以無營為釣取亂其心益嚮往期溫無遺便乃已僚恥日殿莫能班或危以禍或左諷以嫌卒不變用能成其志成化中朝京師會判去溫人志屬之狀入部舉請代幾僅絲髮許以不一少動意止判初不入于心故當其時忘得之家居溫人過必入候致水土物比殁移以候范恭人不衰少卿宦朝溫宦遇之兄弟也至語舊無不曰吾老先生且曰宜祠而爼豆之恭人以𢎞治乙丑冬殁豫目見溫人哭之哀焉庶幾古所謂循吏者方其在溫年餘五十矣而少卿未生恭人念垂老而孤買姬入室姬實士人女也急得金以緩禍者覺之反恚恭人遣姬且以金去戒恭人毋為是戚戚已而少卿生如持左劵必其有後立靳宗于丹徒少卿嚮為名臣且有子延慶將世其家矣益驗先生所謂仁人者於乎先生於世為仁人於靳為宗子於溫為循吏於國為名臣父昔太史公傳循吏敘世家其法具在遵是數美仍其號為之立傳以質諸君子君子曰誠以感人不諼仁以迓休則延其然其然不然其誰復當言哉雅素子傳雅素子張君諱文字經載臨江新喻人也𢎞治癸丑以春秋登進士第選入刑科為給事中儕輩􅀈其有喜色問之曰吾遇明君吾用春秋時也事先皇帝十餘年中改兵科進工科自右而左又進都户科皆給事中今上改元九月八日卒于京師高坡巷邸先是奏進新政五事語中皆陳變更乖刺特驟力詆內降害政若親與閹戚家為仇敵者賴上寬明僅奪季俸豫往唁之門者報曰昨夜不食若又為奏者風㩧之顫索卧今且汗之子去及更往則君卒矣公卿大夫士嘆于朝胥吏嘆于署儓𨽻武夫亦有嘆于道者皆曰直臣云亡豫悼之甚不忍聞焉君嘗以核實邊儲三出當往貴州也豫作威鳳吟别之而以鳳居守為終句意戚畹結中膠固競煽威焰惟君足鎮之云比至未魯以女苗叛于貴貴用兵君言兵在得魯耳購馘之宜而苗獠脅從多蒯刈之傷生無益在蜀屬蕃族擾松潘餉運斛十金妄級紿賞陳奔靡誅君以蜀憂方大為獻議者十𢎞治中最先論元夕張燈下有司治具典庫中官以逸樂玩弄惑主聰劾及諸司迎望風指當按上方嚮治為頓減之會外戚有罪當廷謝陽疾而以子代之俄而乾清宫災君引春秋宣榭火著戚臣驕滋謂逼厥災火焚宫此其徵歟明年敵大入雲中鄜延將迫內地朝廷戒嚴尚書文升請集廷議君疏柄臣耄師或輿尸易所謂凶代以倪嶽戴珊劉大夏張敷華可其靣折人多此類鑄錢議起中外洶洶入五議一曰某二曰某三曰某四曰某五曰某而大要歸之以節儉既而新鑄果如議不流皇莊户督類左官退校無賴竄名於是乎漁獵之上不知也君上言曰邦本在是當存先事之戒凡所指切時囏身任獨往若嗜欲時惟一人在班行長身修髯旭旦罷朝步出掖門錦衣冠幘禁旅閽人必驚覸竊語曰是何翹翹者邪名能高下古今作者之品遭母喪朝之名能文辭諸體殆備焉而皆託諸石戴盈舟焉以歸母弟用載嘗薦入京有癰貫腮潰洞齒齶血漬牀席垂絶君與寢扶掖盥滌召醫迭入最後越醫至君與語作曰是可生吾弟矣藥入果然性樂與人遊會豫談必移日出自廣西還為豫言古田距藩城才七十里猺至支解二員尊官而當國大臣不以挂于口寒心哉豫以為議適然爾及今閲其遺草已附六事入奏此其一也其制狼兵如嗾犬獵策尤良於乎誠臣憂國固如是太史汪君志君墓年夀世次葬日月備矣而雅素子之號未著用載丐豫傳之行于世贊曰孟子有言有官守者修其職有言責者盡其忠士之處草莽有不以是自負與以是疵人者乎及其出也身自為之有能酬其所負而不為人所疵者乎書曰非知之艱行之維艱天下皆是也孔子曰言顧行行顧言吾以為雅素子其庶幾乎胡液楮傳為謝解元作有輿圖之半輪者實胡液楮氏之族也其地疆域明其求物産居民焉無有也有之亦若繪圖然分十二牧主之十二牧曰烏木蘭氏十曰白象胥氏二烏木蘭氏實貫穿于腹裡之界白象胥氏乃于外夾持之然實同受轄于金丁氏焉金丁氏固故能拜力隨機卷舒橐籥以風四方當是時祝融氏司令欲以炎威威天下天下之民賴是卒亦無苦及祝融氏退十二牧亦倦于勤斂而退藏于密待時而動雖然十二牧惟白象胥氏骨鯁臣也使十二牧微金丁氏與白象胥氏久與胡液楮氏同解體矣烏能與祝融氏爭衡哉坦然翁傳坦然翁姓劉氏名山字夀之蜀之珙人也别號柏亭父浣進士授行人再遷御史翁少侍養居京遊司正劉公門劉公少許可惟重翁屬望之景泰初大壩夷酋叛大兵西征御史在遣卒於行營遺命以門户百指纍翁遂罷應科舉將命惟謹猶時竊間肆力於學因得旁及天文歷數譽益延都憲李公匡聞之諷郡辟為陰陽正術衆方難翁行翁乃誦程子存心愛物之言欣然往應辟衆至不知所謂其謁選示弟有詩鄉人傳誦以為詫既視事先時郡漏隳于積差候測移刻翁正之司漏不敢爽也始此郡時苦諸偷守檄翁提兵清邏諸偷局蹐濳逸他郡會罷所𨽻兵皆爭留焉有詔城大壩翁受牒董役事役夫集自四境衆聚狡獪條疏而姦作每伺官之當代者於隘而剽掠之及翁去反相率贐餞數十里外涕泣羅拜而返守大賢翁府署庫廩有作一以屬翁致守陸公淵之偉矣考功展哉君子之奬凡郡疑獄多翁之讞積歲健不承者感翁開悟皆頓成案郡卒有為民占其田者自分於翁有宿怨逆不得直翁得狀判歸之鄰素酗酒者一旦大呼詈翁人問翁所處翁笑曰彼方為酒所苦吾寧罪酒乎羣惡少掠其蒼頭賣民間數歲獲之或從臾翁訟翁笞其蒼頭使即所事已而笑曰吾訟畢矣翁天性孝友深得父母心母蚤世事繼母無懈二弟一妹翁所成立也嘗擕妹北上艤舟絶岸妹戲而前俄墜水中翁驚愕不覺俱墜其水深不可測加天寒裘重沒入不見蹤迹觀者皆駭頃之持妹而出論者謂有神相云蜀俗兄弟壯且婚多割竈自食翁深恥之然不欲傷母弟心志悉讓其田宅御史之死王事也向二毛其施弗究翁痛之作永思堂于家歲時率子婦拜祭以為常平生不談人過至於教子則毅然正色反覆於綱常倫理習章句業進取未嘗及也尤懇懇以堯言桀行為規其為詩工敘事黜險怪其作字必楷正諸子有適其書問先學行而後起居官雖卑而不少逐流俗有所乾沒一日奮曰與其縻此而栖栖豈若干于吾身耶成化丙午遂得解因復自號坦然翁取其於世纍坦如也仲子武臣以鄉進士遊京師名士善者十九與南城羅玘締為文盟其文剝去時好追登古先名譽登進若非身事然觀其子信其父古之道也玘敢僭傳其事為善教子者法焉贊曰蜀去中原獨逺兩漢文籍之興蜀士大有聲而竒瓌遺逸之民以逺不世見獨今坦然翁困於鄉里小官哉老泉斂響不振以遺軾與轍鳴也獨坦然翁不能文也邪噫蜀真逺也邪張節婦傳節婦新淦暮膳郭師孟女玉峽張洪本妻蒲臺訓導鑑之母監察御史芹之祖母也年七十八殁當𢎞治庚戌月在仲春日為草八又明年壬子二月二日葬柿坑之塋厯十有八年為正德己巳御史銓得南院蒲臺亦解教事來就養豫往也語次必嚬呻曰鑑欲夫子之有言也已則嗒然御史來也語次亦嚬呻曰芹欲夫子之有言也已則嗒然他日又來入狀曰微芹祖母無以有芹父况芹乎芹父豫不及今徴夫子言傳之後世安知有芹祖母又安知芹緒之幾絶而復續乎言已泣豫辭又泣蒲臺歸二年至是二月訃來豫往就弔位御史泣言若昔者而益悽豫退討狀玉峽張著自勝國前人故曰古張又曰庫張謂假貸之便若取諸庫然洪本父曰季徹其兄也季徹死洪本奉母李氏嗣家政而屬有家厄日用隱憂以李故鬱鬱弗忍泄未四十死蒲臺方脫襁褓固在厄洪本者所欲居貨中則節婦譬則櫝也先抉揭之攫取惟其便乃入李以言具為婦急捐姑雛他奔狀蹤迹祕譎而隱約李姑不疑日改而新之緒蝟刺百出使可覆驗覺李微動隨嗾妁來節婦罵逐妁去截髮泣三日籲天自誓曰吾所不為張氏鬼者有如皎日李乃寤間亦發恚殿其惡曰吾今執女告縣官然終以愛掩止節婦計曰彼欲逐我乎厄斯子也而已耳果厄斯子乎利吾有也而已耳假令真能不拔一毛而顧於吾重者毫髮蹉跌吾與張氏存者幾何吾今掃地赤立則何如於是聞奪一墅去守者告曰墅去矣曰知之繼聞發一廪去守者告曰廪去矣曰知之或扼腕曰可訟也搖手指蒲臺曰有是在積數歲至無所可奪可發而蒲臺亦勝冠或又曰可使商也補前之匱乎曰吾聞業不遂者改業之况幾賈大禍而幸脫者乎然擇之莫儒為宜乃齎送之金陵就周户曹學學七年然後歸遂就庠舍而御史適生命曰芹志更業意也御史在乳而母死哺藉擕扶一惟節婦稍長知學常以一缸膏坐之於紡甎側永夜誦緯成師之贄或於是乎取之鄰之婦熏而為夜作為鐵石心者亦多有洪本有寡妹門户絶李以虐子之蕩覆無所於歸也且慚不以言節婦節婦心知之於喪李之日迎與同食者終其身距今里閭傳之若前日事蒲臺用戊午貢授今官御史亦以是年領賢書登壬戌進士官福州推官而至轉於院蒲臺之封亦用其貴居院敢言人所不敢言凛凛樹英烈風要之忠節一道也其亦有所本也與豫舊史氏也為著節婦傳以俟後徵焉贊曰立人之孤而世之與起人之死而生之孰神乎曰必起人之死者也然則孰難乎曰必立人之孤者也何也循古之方而用之而人偶生焉觀者孰不驚以為神乎而或使復為之其又可能邪若夫非自少艾而白首出萬死而一生而人之孤未有可偶一為而立者也故曰立孤難耳亦何貴於人之驚以為神也乎曾子謂可以託六尺之孤而謂之君子於乎若節婦女中之君子也與贊石山先生贊為安成周舉人祖作爰有主者朔者栖者延頸而盼者其有知者至杖而侍者其甚有知者榮者華者節而幹者其無知者至破崖而下者其甚無知者其有知者若會于無知者其無知者若倚于有知者皆環萃于主者以其有知若無知無知若有知而前知乎無所不知自不知其若是之不可知而為有知無知之始也噫有象而垂之者其容有知乎然吾不知其意之所擬亦將隮之于不可知之也與工部侍郎沈公像贊啓前鋒以導衆介運太阿以芟多蠆立亦幟以召諸豪築京觀以瘞羣叨乘其可為之幾固嘗盤礴于斯既而動以抵牾敵蝟來疵則焉往而快其所如蓋世惟貴乎有志又遑恤其乖暌既事往而機息亦競羡而追思位亞鳲鳩其進也實銖積而寸絫志同倦鳥其退也忽距脫而毛遺今胡為公是昨胡為公非覩公之像或者其似究公之心似者其誰清軒贊蟒衣玉帶也者凝然而坐于隅也吾初不知其在朝亦不知其在野胡為乎來乎其諸誰之儔歟人曰本漢之裔曰清軒翁幼實竒童乾清宫隨飛龍肄內館師羣公鼓五絃之疏越助虞舜之南風既馳騖乎薊北遂騰踏乎雲中暨殿西陲厥聞彌彰狀元有碑君子有堂曰雨而雨曰暘而暘孰為夀俊為帝尊事孰有勞績為帝明揚既而烽息燧滅爾界我疆於是乎誕教于家克敦厥族本系支連有位有祿倒屣賓賢宵繼以燭天子曰休來歸自西留都居守天子命之載瞻斯容有父兄在既孝既忠天子有賚鄒竹所贊為翰林孔目祖作人亦有言曰其康齋孰得其門維鄒竹所得館為賓榖其後昆可知其人我友其孫而出其真我贊之云雷南坡贊神之肖不肖繫于工之工不工人既望而識之矣衆之崇不崇繫于行之修不修大賓之位亦既居之矣名之傳不傳行雖修矣不足恃也况於其他乎繫于評之者言之文不文噫吾何足以任此哉潘竹西贊流離寄寓遂有冒姓同事忌毁遂有謫戍姓還于初謫復於舊加初詵詵增舊岸岸東階執法西階薄違公樂委蛇樂寄樂歸公哉公哉潘安人贊笄歸時微黽俯匪怒苴􅀈綴綻以植門户鼎鼎造新去去革故有峩惠文有赫祈父歲時廟食不祧之主西崖贊為周遜舉人父作崖之巔高不可緣鶴巢何年崖之旁可棟可梁翁有山堂崖之下翁稼沿崖有流翁或出遊翁善飲酒以賓以賢于崖之前翁少孝友今老白首可祿可封翁之令終今日西崖委蛇深衣未為翁是未為翁非謝彌堅行樂圖贊號賢樂眼中紫雲時在都下心中白雲父在家屐齒之苔經笥之藝髙山流水蒼梧翠筠賢者樂此其在斯人遁齋神贊陳舉人之父臨川人孔取敏而好學傳嘉積而能散師古則簣土成山善施如流泉赴澗山成而木生焉學博而文出也澗會而水滙焉施博而德大也然猶以為文不若羲之畫施不若泯其迹想希夷於羮墻以大丘為鵠的姑肥遁於蓬齋之下挹其遺容吾於是乎太息遁齋孺人贊生如在彪固之門幼如鞠於李丞相之所得所歸如太山先生侍於膝者又如閬中諸陳特未覩其垂魚而入也噫象服是宜抑其末者耳御書贊繁星麗天暈豹在野亦有文章以嚇觀者亦如皎日赫然中天文龍威鳳交騰翥焉皇閟玄墳羲示顯畫有一于兹光景夜射日明于晝乃晦于夜彼寧匪文文在斯下鼎湖雲愁號弓者誰此惟羮墻如將見之白蛇貫牖雲風電雨或有雷霆天命下取無為州判李君贊孫時修貢士求腹盈盈以笥經而困于大橫羣振振以飛雍而莫之與京倅無為之郡射有為之聲民以為赤子之於母自以為夏日之於氷蓋立功自古亦言其次而知止於理真若實榮嘻子承其芳孫踵其武族食其田仰斯容而興思亦羮墻而僾然乎陳訥菴遺像贊其孫景賢求仙逰人不以其盈勺此注彼或待舉火或平如砥譽日斯邁匪局於邇孰懼過差孰敢欣喜人亦有言惟太丘似人亦有言趾户牖美難興者衰難能者齒辨之峩如公豈如斯而已也跋跋臨汾劉氏族譜後臨汾劉公修宗譜一編居守留都時留都大夫士莫不獲觀焉亦莫不嘆公之質也有識者亦莫不因以覘公宗之將盛也而知言者又獨賞公雅好斯文獲萃於斯編也公臨汾人也上世當草昧初𨽻尺籍播遷南北靡恆厥居形影相弔保厥孑遺以有今日亦天也遑恤其本始所自出哉及公既貴盛而作斯編也或謂臨汾他有劉氏矣取附麗之彼若夜蟲之就火也公曰咄詩不云乎原隰裒矣刺血漬骨得父骸焉贋可亂真也吾忍為是以負吾先哉自吾父祖始可也噫公豈太古之民歟何其質若是也公同産三人同産之子遂十人今位執金吾者二賓軍府者一待魁春官者一廩郡庠者一諸孫十人泉湧出而燎方揚也盛矣哉且公幼肄內館有偉名既親肘腋出殿邉陲以文飾治故一時天子之股肱侍從之臣與方州外大諸侯四方逢掖之士篇章之唱酬功業之紀述斯編之序贊彪乎炳乎窮日之目力而莫能究也非公篤好之何以至此君子於是合而評之曰質以培之故其發也盛焉文以章之故其盛也傳焉是故文質備然後天下之事理於宗祊亦然公得之矣跋謝以中鼓動天機卷同寮分韻賦催盆池荷花詩是卷成之四日以中辱以示豫豫老不自量𨽻古四字以志斯會之竒而慶斯蓮之遭也噫蓮以靜也諸君欲其動焉諸君所處亦靜地也抑不知天將息其動機亦如諸君之待蓮者以待諸君乎理有同然盍思以豫之因以中以告跋陸氏家藏東坡玉鼻騂公據卷東坡恐李方叔賣所遺玉鼻騂為之立公據以便之公據劵也世多多公陸氏之先得而藏之豫獲觀于京邸因感而推知前世凡鬻賣莫不有劵矧田廬之重謂之世業不言可知獨不知馮道當時習于賣國國尤重也亦嘗有劵否當與千古有志之士質之附于是卷之末跋送詔制進庫臣既修庫作龍函中兀之為詔制設也思欲遍檢羣簿書分類標年以便部家考閲因得取國初迄今詔制貯之函中未能也時時太息之考功主事林孰告曰句容致仕知縣楊鉞家實有之適句容縣丞缺昻同邑人也乃俾以禮求録之至是始克成謹用登貯正德七年四月五日也題黃堂楙績卷後右黃堂楙績一卷首有四大字即卷名也釐為十二圖圖各有名按名為詩數十首而括以一序在圖之右字之左大約美廣府太守伍公而作作者皆廣之逸民也豫考牒志唐宋璟宋張鑑皆以知廣州有惠愛民為立石頌德豈廣之民樂於德其長上而坐以成俗邪韓退之志李翺祖楚金之墓有云刺史不恱於民其去官相率歡譁手瓦石需其出擊之民可擊刺史邪誠亂民矣刺史抑何人也漢尹就討益州叛羌蜀民謡曰寇來尚可尹來殺我尹真甚於寇而殺其民之若是邪民苦其吏而甚之之辭也借移璟與鑑也於此民亦忍擊之而苦其來者乎廣不幸而得是刺史與尹其俗信厚矣亦甘為之立石以頌乎由璟而前無為之始由鑑而後無為之繼廣之人亦難乎為其長上者矣宋碑時已奏罷張石之文疑亦鄙俚無可傳可傳亦不必石即如此卷可也公之子寧波守朝信俾豫厠名其後嗚呼豫亦何恃也哉題西樓卷後工部郎中新喻傳君命豫題其西樓之卷豫曰樓重屋也以其在居之西偏故曰西樓邪曰然南方多暑雨地氣上沴以糜敗策笥中之百物而什器亦蒸解其膠漆至不可用惟樓以貯之則免耳斯樓也其亦然邪曰不吾兄今少宗伯其少也讀書其上而吾少也亦然今其圖籍具在將以付吾後之人世守之俾知自吾二人者始也卷之所以作也豫曰嘻其始也於樓讀書於樓貯物書不如物及其終也物盡樓頽名傳在書物不如書樓之品于是乎在豫烏得而低昻之哉跋何進士御題後古之君子入君門鞠躬如也如不容况至君所乎過位色勃如也足躩如也况君在乎君命召不俟駕行况君親臨之而有所聞乎今制策進士于奉天殿丹墀內則至君所非君門矣上皮辨臨軒則君在非虛位矣御製策問人賜一首則天顔咫尺天語丁寧著在耳目非特君命召而已夫君非天也而古人動以天目之門曰天門非以其入之難乎闕曰天闕非以其至之難乎位曰天位非以其近之難乎顔曰天顔非以其見之難乎語曰天語非以其聞之難乎恩曰天恩非以其得之難乎彼幽逺之民有終身不登刺史縣令之堂者則其謂之天也固宜而進士者其初固其伍也徒以其尺寸之長傳贄焉一旦入君之門至君之闕近君之位見君之顔聞君之語受君之恩而疇昔顧瞻如在天上者今皆得於身心耳目步趨之間則其倐然自拔出於凡民之上亦甚逺矣不然均是民也其所以仰如天者固自若也而或者乃欲誇人曰吾才也固當然也吾誰欺欺天乎於乎進士亦可以自思矣蓋繼今以往皆報君之日要不敢有遺力焉而能匹休古之君子不也今𢎞治六年春三月當策士上如故事賜毛澄等三百人進士及第出身有差賜同進士臣何垕侈上之恩也奉所賜策問裝以巨軸置以髹函拜稽首言曰此天語也用將寶藏之垕江西新城人直𢎞文館舸齋之曾孫荆藩長史子方之孫鄉進士燮之子今刑部尚書椒丘之族孫翰林編修臣玘之友也孝而友剛中而巽外其有志於古君子之事君久矣顧獨不知今日之遭遇而已拔出於凡民之上哉而其圖報之效期之以赫赫要不可窺而遲之以悠悠當不可窮也三百人人各有賜問非所知不以志垕臣所知也故志之且以俟焉跋歐陽公墨迹歐陽文忠公文章為世宗師人無賢不肖皆知之不謂其能書也而實能書趙文敏公書法近世罕比人亦無賢不肖皆知之不謂其能文也而實亦能文一因大以沒其小一因小以沒其大於此可以見人之擇術不可不審也况於所以為人哉豫閲公手澤數幅于水部郎中永豐王君有感焉故公論之後之鑒者其亦有警乎跋二尹曽英氏寶藏先世孝友卷長溪曽處士挽章一册狀表銘序皆在焉鄉先達諸公所作也其孫少府仕于廣陵豫罹外艱南奔以疾羈于其傳舍中出豫觀之編帙解落先後倒置豫且正且觀蓋自宣德庚戌至是六十一年矣雖金石之堅不能保其必存而况盈尺之素與蠧蟫爭日月者乎是又見曽氏之世其家非以他物也然自今考之曩時鄉之文獻若是其盛處士之賴以不朽蓋不繫是册之存與不存而是册之存賢子孫之所以能不忘其先也雖然聞世德於家為實為本根雖尊敦彞劵之重於家不免為華為枝蔓嗚呼曽氏之藏不獨是册斯可已啓代樊都尉定馬冢宰親啓伏以地連豫土同氣相求班綴明廷言歸于好雖秦晉之不相及世猶締婚况將相之為同寅禮可義起恭惟太翁閣下朝廷柱石人物權衡為宋蓍龜驚潞公而欲拜繫唐輕重儼中令之復生再惟親家座右夙間鯉對寵寄虎賁瞻梓及橋光前啓後能不滿假無矜伏波奕葉之隆顧善引援俯念補衮褵䙕之舊蔦微得托灰冷復然且令孫女蚤藉翠竹蒼梧之蔭實惟蘭茁其芽而小兒者未解瑤翻碧瀲之章所謂民鮮克舉然所幸者慶衍仙源故其儀之得此嘉耦倘得依于綘帳鵠虎之譬當明漸可從遊舞雩稼圃之言自訥自天作合榮我實多伏念某相庠晚學二室末賓叨肺腑于本支功豈橫行於冒頓司瓜牙于肘腋分踰食邑於舞陽差穀薄陳九物之儀引領拱聽千金之諾伏願自今伊始詒厥孫謀白首殿邦百辟仰師臣之躩躒赤心許國二家樂聖世之升平盟如可寒言猶在耳所有世系合行謹具于左代樊都尉納采啓伏以日月際重明之會乾坤當再造之期四方寧而車同軌書同文二姓合而女有家男有室恭惟太翁台席暨親家座右退公多暇於頷孫相攸本期於燕姞外雖示無適莫內實暗寓權衡遂使素無中雀之微能亦獲叨占乘龍之妙選祗承布諾庸藉氷言歲甲子之司權月大火之在次遂敢託於錐薦忽乃忘於耦辭言以為徵玄草餘竒之是借禮雖不腆寶藏羡賜之儲供是非比擬於委禽今則相將於奠鴈親迎諏大梁之吉上章剛輳乎攝提納采用降婁之柔屠維適冠乎協洽豈克耳仰星天而揖俟蓋突辨因年矢而每催蹶里八鸞敢竊肅雍之遺響渭梁百兩幸追籍輅之芳塵天釐女士封縣君足矣列侯何必臨光世衍雲仍於宗袥繁焉素公甘傳魁紀情浮於物書不盡言伏惟鑑照劄與友人論舊事劄同鄉同年同業臭味之同意氣相許又同苐南北相去略差池爾一旦不相信遂者異世然何哉意者前之同偶同而相許者偶許邪或吾子自處已躋于至誠無偽之域而視吾輩若亡若存之小人不足信邪不知何忍以暗邀人心之大惡筆之于紙且以告于君而相加也春秋書亂臣賊子亦其人去世已久姑取之以垂戒萬世而非即顯戮于市也而吾子之言果行則族誅之罪吾固不得而逃矣賴先帝明聖寬而宥之遂使首領獲存于今而尚得與吾子遨遊于吏隱之地是先帝奪吾于吾子之手也明矣借曰彼人者實首焉是彼之辭也彼嘗語人曰吾子時以文學名于諫垣諸章誰敢居非獨此也今兹其人雖死而朝之大夫士憶而誦之猶昨日也果誰可辭邪昔陸抗信叔子之不鴆人千古以為美談吾固不敢為叔子而吾子於抗如何哉蓋棺事乃定吾固當勉之吾子其明目熟慮以應方來可也丈夫事在磊落掀天地而置死生禍福于度外伯夷頌所謂一常人譽之則自以為有餘一常人毁之則自以為不足其足為大丈夫乎久不接論因地相邇偶發素所欲言惟吾子思之吾當自此閉口吾子幸俱忘之罪過罪過書寄西涯先生書生違教下屢更變故雖嘗貢書然不敢頻頻者恐彼此無益也今則天下皆知忠赤竭矣大事亦無所措手矣易曰不俟終日此言非歟彼朝夕獻諂以為當依依者皆為其身謀也不知乃公身集百詬百歲之後史册書之萬世傳之不知此輩亦能救之乎白首老生受恩居多致有今日然病亦垂死此而不言誰復言之伏望痛割舊志勇而從之不然請先削生門墻之籍然後公言于衆大加誅伐以彰叛恩者之罪生亦甘焉生蓄誠積直有日矣臨緘不覺狂悖干冒之至圭峯集卷二十一
