body:
  text: 圭峯集卷一明羅玘撰序太子太保兵部尚書馬公榮壽詩序初鈞之東南隅望氣者以為有異氣焉鈞今太子太保兵部尚書馬公之鄉也公以宣德丙午生生而有異質識者遂以其兆歸公公之為童也日臥凡兒百十于地下識者又無不曰是異人也相與保抱之屬望之後二十有一年公果起賢科登進士入臺為御史遂為按察使為大理卿為副都御史進都御史為兵部侍郎進兵部侍郎加太子少保十有五轉而至今太子太保歷事睿景純三皇帝凡四朝而至于今皇帝始大用為元老所至秦晉閩楚淮遼蹤跡遍天下而握兵居中也為多上之賜金賜幣賜楮幣賜少牢賜宫錦者前後無算而蟒服之賜殊賜也所事所與事事與人所事者日之所接漚汩塵坌乎前亦莫可記憶而凡四海九州蠻荒絶域之人人莫不慕慕莫不恨其未見公也蓋公在仕凡四十有七年其遭遇如此亦榮矣孰不榮公年亦七十有二矣而形神日益彊亦壽矣亦孰不壽公以為是不可望而及曰公異人也然不知世固有竊位而榮全軀而壽者矣是何足以異公哉不觀河之源於火敦乎繞崑崙萬餘里合百川而出之其破山穴谷萬雷入地之勢甚可畏也何物巨防而能保其終無穿齧激射之患哉及其遇砥柱也則泊然安淰然沉釃而下焉常流等耳非河之至此而頓能殺其勢也以砥柱障之也而天之將昌人國也亦必有黃髮之老殿乎其間卷婁暖姝而實齦齶鋒芒觚稜廉隅坦坦夷夷施施干干而卒然臨之屹乎高不可踰可以銷患於未萌而用戒不虞其亦砥柱者乎若公是也謂公曰異人也其不在兹乎是公所以為邦家之榮國脉之壽而謂為公一身一家一鄉之異者其然耶其不然耶凡公之屬吏熏公之久者類能言之而又歌之遂以為公壽而欲永永其傳于千萬祀使南城羅玘序之壽弋母太孺人八十詩序弋母高太孺人八十詩𢎞治十年十月五日癸酉成明日甲戌聨為大卷又明日乙亥壽期也用樂導入弋氏壽于母所及門其有豸衣山立並扉烏革而拱迎轡而肅入者必尚潔也於母為季子於豫為丁未同年於朝署之列為監察御史其未召入也令束鹿有聲畿輔間為循吏而其未為束鹿時使東方為名進士在太學為魁然名人是則吾今日之趨壽者無不知曰是母也教使為之是教吾友也吾是以有今兹之詩而以為壽或曰尚潔於母為末娠季生也則尚潔代人也代為晉鄙晉人言焉然吾觀天下之季生者無不么麼尾瑣纍綴而眇凉其肌膚委和之既薄而鷇翼之力又衰也尚潔兹其么麼耶顧甚碩其尾瑣而纍綴耶顧甚壯然則非其季生也耶其繫諸母也不獨其教然也故夫赤也束帶可使擯於賔客㸃也不揚幾見失於聘賔晏子寢而楚侮潞公壯而敵驚九尺十尺之軀古無重於國乎而亦非人力之所能為也母典焉是母也宜有今太孺人之封而天之厚之常在有功於國者又宜有今兹之壽雖然吾不謂之壽也名壽為上身壽次之崔山南高祖王母年高無齒飲乳而康寧是之謂身壽陳文惠公之母教子之嚴至於捽之碎魚而不顧人曰嚴母也到于今誦之歐陽文忠公之母鞠公以四歲之童而至於為世宗師人曰慈母也到於今誦之是之謂名壽今母有歐之慈而又兼陳之嚴其名壽固有在矣崔之身壽足論乎詩凡八十篇意錯出而未會於一必有序也豫拈而為之䨥壽圖詩序䨥壽圖方廣盈丈餘下繫以詩中坐服熊羆者一人配坐者一人嫗也服如之左侍者一人服亦如之右侍者一人豸服也被褓而嬉者一人豫不知其何也就視之坐服熊羆者其顛皤然而容渥然於錦衣致仕潘侯惟肖豫於是益意求之侯之孟子千戶杰其左侍而亦服熊羆者歟仲子監察御史楷也其豸服者歟千戶之子炳炳之子嬰兒也於侯為曾孫其被褓而嬉者歟前此十年豫憶飲于其庭壽所謂六十矣今其尊匜罍簋具在佐食者若酌而獻侍者若㪺而趨豈七十其遭也而又將飲如前歟而見是圖於豫者又炳之婦翁張君也豫以是語張君張君曰然豫益愕而重有感焉侯在天順間偵事最號知名于時新取太阿之柄於人手而持之其再礪之鋒電㸌而日光於偵事者乎寄焉吾意朝椹人胸夕碎人首蹴躅髏於地糞丸耳其在于今天定而還之侯也而天何貰侯如是哉或者天其亦悖乎於乎此張湯之所以宜有後而世儒昧焉仰疑于天至今譊譊也夫天固欲豪猾者如虎狼虺蜴之毒其類乎刑之所設正所以禁之也而湯之所詆詆此輩耳則湯實與天者遊而天之福湯非私湯也昔於湯也不私而顧今私於侯哉由是觀之天顧世儒姑息茍且之見足以盡之哉侯之榮名於湯逺甚殆食報而未究者而吾與千戶御史游陰閲其四世人可侯可將可相即嬰兒亦英物也而亦駸駸何難張氏乎況張氏徒一安世而不能回遷固之筆吾哀之使潘氏世世有如安世者持盈引長之則史氏者固宜以世家待之何至如遷固以如是傳湯哉而世儒因習譊譊者亦可以頓息矣是則豫所望也然固因張氏之盛而推本湯母之賢得思齊詩之意而兹侯之成立金宜人亦有助焉圖之配坐者是已他日傳播之盛亦將推而及之乎固吾作史者之家法也敢豫以告圖與詩稱壽事誠末事東坪吳氏族譜序民之初生固若瓜瓞然嘗觀圃人之藝瓜也歲畜其種常百倍焉時至而種之勃然而生也秕者固半矣生而礫之閡者莖固翹蟻而穴者苞固萎又半焉繁則從之析之疏則從之足之此圃人之所敢知也若其葉之沃然脂蔓之虬然蟠懼其脆而飄風折焉此圃人無如之何也故曰百苗之春不如一實之秋也日至之時瓞於咫尺瓞於尋常之間不能瓞與瓞而黃落者蓋無算矣其固有稿其瓤以嗣歲者矣天地一大畦也造物者圃人也人則瓜也人之有族猶瓜之有本也天下之族亦多矣其有盛有衰有嗣有絶也猶其生之秕者半飄風之害也一族之有盛有衰有嗣有絶也猶其一本之或瓞或否或斗石之似之不一也至於造物亦有時而病猶圃人能於始而不能於終也然吾嘗見割瓜之本者矣明日圃人抱腐瓜而棄於道而人之於族路人也且不知其出也猶割也而未見造物者之棄腐人何哉南城東坪吳氏徙自西蜀閬州所謂一府君諱宣者其始祖也今居東坪仕版之屬銓曹産籍之係民部皆不在其縣人下其先伸倫伯仲又族之白睂者也患其譜之無修幣聘朱晦翁先生圖而新之豫因往嘉津謁族適東坪吳氏子憲綱乃吾族叔祖阡長逸清之孫壻也談飲間備述社倉書樓先賢遺跡因出其譜牒而求序於豫豫方慨世之割其族者猶瓜之割其本也伸倫非獨不割也且將培之凡培瓜必盛瓜族偶同也請試培焉以觀其何如送熊君考績還光化序漢既過均至光化北岸始得平地陸出襄鄧皆康莊逵衢挽牽車牛以臨中原然其南岸尚皆山也次水之山且硱碖礧砢錯以壤地為穀城為竹溪為房縣更入數驛則環連縷結巃嵸崒嵂陰森蔽翳莫可名紀西極利閬南接䕫巫東盡荆江天下之大藪也故中原阻饑民相望是流入采拾草木實以茍須臾往往其常也然而至是乳下漢水茫洋未易以亂必息肩焉夫以蚩蚩之氓什伍相聚椎埋剽敓不謀而起而況朝人而莫鬼者稯稯而處濈濈而譸其真甘僵焉莩於路而為鬼乎於乎吾固為天下先事而憂光化也聞往時其為縣者或一歲而罷或二三歲而罷皆民訐而譴黜之耳雖然吏墨而沓罷之宜也而憂天下者獨不可豫重其人乎萬一倉卒之際而且罷吏為乎吾不謂其計為得也吾嘗過襄鄧境上得光化於馬首指顧中而益憂之不暇問其為縣者誰也於今十年來者皆傳縣有城城環以堤堤樹以栁有粟數萬斛川有新梁學有新廟祀有壇津有舟廬井有伍伍有兵里有邏其信然耶光化可以無憂矣而亦豈非中原之福乎問其誰為之曰知縣熊君為之也噫其熊君自為之耶熊君用光化之民為之也然則前之為中原憂者光化也今之可以無憂中原者亦光化也前之訐其長上而譴黜之者光化之民也今之聽其長上之用而可以無憂中原者亦光化之民也於此可以觀熊君矣吾所謂重其人者蓋如此君來考績吾核實之果然君豐城人也豐城之在仕者壯其縣之有是人也於其反也屬吾言以送之館閣壽詩序今言館合翰林詹事二春坊司經局皆館也非必謂史館也今言閣東閣也凡館之官晨必會於斯故亦曰閣也非必謂內閣也然內閣之官亦必由館閣入故人亦䝉冒槩目之曰館閣云有大制作曰此館閣筆也有欲記其亭臺銘其器物者必之館閣有欲薦道其先功德者必之館閣有欲為其親壽者必之館閣由是之館閣之門者始恐其弗納焉幸既納矣乃恐其弗得焉故有積一二歲而弗得者有積十餘歲而弗得者有終歲而弗得者噫其豈故自珍哉為之之不敢輕而不勝其求之之衆也豫恆恨乎是欲有求焉而不果也而豫友黃舜臣之尊翁寬夫隱君以是歲年六十舜臣謀於豫欲合館閣之詩壽之期在五月望前之一日於時為甚近而豫邑居京師南水道五千里於地為最逺以甚近之時合至難之求而應最逺之地豫為舜臣恐矣未踰月也舜臣來喜曰吾舉得之矣而以示豫豫讀春坊自諭德而下舉無遺者驚焉又讀翰林自檢討而上以迄學士亦舉無遺者曰館閣之詩盡於此矣乃大驚茫然不知其何以然也舜臣曰何驚也彼皆未得其道耳吾見其難也若吾入尊者之門屨不敢踏閾有聲焉刺既入而斂容屏氣須其出焉出吾吐實也無張主焉他日見於館不敢私睨也遇於道不敢私語也日造焉而閽人辭焉欣欣然而無怒心退而臥焉又思往也而無怠心吾是以易豫曰誠如是也移之以養生而壽可得也而況於詩乎舜臣躍然起曰吾知所以壽吾翁矣書於詩之後馳歸以獻吳母李安人挽册序臨川吳母李安人福建轉運同知中立之母工部主事顯之之祖妣也顯之宦廬時安人殁顯之服應期不得奔歸以其服視斂殯葬泣于邸又不得以其服喪于家又恆泣僚之能文者哀之或為之詩比入朝朝之館閣臺寺之豪皆其所與游或與之同為進士者見其容戚或問之顯之以告又皆誄而詩之入見尊秩大臣或其鄉先生仰告焉鄉先生又無不為之誄且詩者由是冊日益增詩日益富顯之尚不以是逭其戚也他日出之以語豫曰祿縲也祿之絏人也甚於縲之絏身也吾為祿絏有祖妣之生而不能一日養殁而又不能視其入土也吾誠人也耶吾棄器也噫向吾不為祿絏則固與吾鄰之子農且圃日羞其甘鮮以養生有大故得以送死也今皆付吾鄰之子矣吾雖挾是冊將安追尤哉豫曰得諸此而失諸彼者勢也子試觀之子之鄰衆矣其得誄其先與得養生送死者孰多曰必得養且送者多也得誄與養且送者孰傳曰必得誄者傳也得傳與不傳者孰榮曰必傳者榮也然則子之為祖妣所得者榮也彼或挾其所得而與子易則何如顯之超然自得曰不願也因默不言而書豫言于冊之首八十偕壽序踰七十十年更十年為九十是曰八十八十古曰大耋也吾城金斗窠有翁𢎞治九年年八十四月十四日其日也越十有六月是為十年十二月十一日其嫗也亦然再越二月是為十一年二月吾始為序序成之日又必越三月始克郵至其室而縣之蓋夏五六月也吾於翁生也後且籍于郊少不得亟造焉壯而奔走于四方未能悉翁也今也縣頌翁能盡翁乎然比其東西之鄰選之或十室焉或百室焉或數百室焉能如翁壽者蓋鮮矣又兼嫗焉雖舉吾城未有也盡吾四封未有也而況於其鄰乎就有之彼無子焉旅於京而言於吾也吾烏知之彼無從子友於吾而為之請也吾又孰從而序之耶前此吾邑之達官封其父若母之偕老白首浸淫恩波沃然燁然吾猶及見之亦一時之盛哉而今之生封者誰耶雖然吾為今計之其在身也官不必達得其父母之偕壽斯可矣其在父母也封不必得得其子姪之皆在仕斯可矣其在吾鄉人也不必躋諸堂以為壽得見於文字間斯可矣然則序亦不可無作也曷為吾作乎吾友西華教諭其從子也為之請也其始英公掾吏朝夕為吾言焉繼而姚江驛丞以事至又言焉吾欲見於文字間是以作也掾於丞為弟均翁子皆在仕翁號榆庵姓夏氏嫗熊姓也相翁六十餘年今偕壽云送郭君知上海縣序進士盧龍郭君出知上海縣縣人在闕下者合而送之郊且重縣之得君也屬豫言之人皆曰上海東海地也盧龍地瀕北海同一海也鹵瀉鹹鹻其水土同潮汐颶風以時發作其氣同魚鹽蒲葦其産同在畿輔比赤縣其所𨽻同無宣使監司之轄其官之得行其志也又同以其生而習見者之同而治其所臨者之同行見郭君政之成也豫又將何言君耶雖然君亦遽謂其信同耶君自是而往三千之程舟是馬也至之日掀蓬而四矚焉離離芃芃者稻也無謂其艾蒿也煙之濛濛者墟聚之㸑也無謂其野之燒也聞其㩧然閧然者市囂也無謂其逐駭鹿而噭譟也帆之翩翩而織乎中流者糶舟也布舸也無謂其氊輈之幡也入其市而歷碌然者文茵紈綺之肆也無謂其故供張而迎令也坐其堂而訴牒倥偬者膚受之訴也無謂其真椎埋而剽攻也是蓋不俟終日而已較然矣其果同乎哉晨而六百二十里胥集焉吏以漕目告則三十餘萬石也君思之盧龍其亦有是乎君思盧龍之所無則知上之所以用君者非以其同也上非以其同而用君君顧以其同而治上海哉豫始欲不言兹亦不得不言也請君擇焉送太守舒君之任建昌序建昌府撫信邵汀贛之中也減贛之曠幾撫之饒逺信之衝鄰汀之僻與邵並閩楚之喉焉酌諸府之中號為樂區南城附郭縣也近撫信次水而多商新城南豐負邵廣昌逼贛與汀山岫域之惟力耕之民故天下當無事三縣之民不出封疆而食其土之入以傲乎南城逐逐于外者及其有事廣昌先受贛汀之寇南豐新城次之而其鋒亦無至於南城之烈然籍鄉兵為之戍行齎居送其受毒猶寇也獨汀漳瘴氛掃境而入南城以逺而蕩渙之其毒民以札差減于三縣三縣廣昌特甚又其競奢以角負氣而嚚至撾登聞為常事若有以鼓舞夫二縣者以故戶口日益耗而二縣亦隨而受其敝南城自古迄兹幸無之然其湮井百闕竈千餘徙廟學隳浮圖鏟隆實窪築為王宫由是燕語載路袒裼蹴踘于晝褫衣禦貨于莫胠篋剽攻于夜今有之他縣不與焉然而增賦重役不出十年亦當與南城俱告困矣然則惡在其為饒且僻也哉而亦何異於曠與衝也乎雖人盡商也固無補也而亦何必寇與瘴之毒也乎如是而猶冒焉曰是樂區也其果樂乎嗚呼繼今而為之吏者亦難矣況於守乎哉當是之時而槩以為守者當之其患亦未易涯也然則諸府之急賢守也有若建昌之急者乎由是觀之雖以舒君之賢天子固不得而靳而君亦不得而辭也或吾邦樂區之名天亦未忍遽奪之也耶是蓋吾之私以為慶而其刑曹諸寮又喜夫君之利器遇盤錯而將試也試始吾邦以吾邦人當役使序也故序之送知縣平君之任寧都序贛十縣縣無兵戍故無城隍寧都無兵戍獨有城隍水多飛流奔湍行崖峽間人堰導之縈椒絡麓以田故多磽確少良田寧都獨平川漫流其兩涯渺渺多良田無縣無倉卒之寇或縳殺長吏為恆獨畏寧都民兵如虎以其善矛也莫之敢近其解荒自古矣而寧都臺省侍從之臣踵緣而起不見其為贛屬也然而積數十年卒不以治聞或曰其豪酣於鬪多仇獄或曰其胥性於訐持吏短長以獄市或曰其纎民飲恨至骨為思譸張為幻其俗詛或曰亦其官之不職也而其師儒則曰自吾教是縣業成而登于朝者幾人矣典史則曰吾無盜丞與簿則曰吾無逋租知縣亦曰吾寅而衙酉而休吾事上官無敢喘息吾無立異惟吾下之為或問之曰其當然耶曰非也吾非進士也無若掣吾肘之多也至閲其官之籍自令甲出進士為縣幾年矣寧都迄今果無之吁其可怪也已進士其真足為縣若是耶令甲之行也其亦審處之而要其後之有成無弊耶或造化者姑以寧都試其妙固將顛越吏部之為而亦有在耶審然也夫物烏有久而不復者乎鬪乎訐乎幻且詛乎亦將當吾平君乎平君亦可諉曰吾非進士乎司諫胡君刑曹董君恆惜其縣之可治而不治為其縣人憂也今也抑又何憂乎而豫比縣人也固不能不為二君頌平君矣於其行也序以發之送知縣張君之任德興序饒之饒也以彭蠡鄱陽之漁浮梁之陶餘干之沃故曰饒也若夫德興東偏之縣也去彭蠡已二百里矣與其境隔絶故無與鄱陽之漁土不及其精膩故無與浮梁之陶地勢隆而上仰不飲其潤故無與餘干之沃然則謂非饒之𨽻縣可也雖然無與其漁民不見異物焉無飄飄起蕩心其性願無與其陶則民無外交而不淆於五方之習其俗醇無與其沃則民不厚望乎歲而惟其力之勤其業專凡此亦有饒之道焉雖𨽻饒亦可也而或為之吏者欺其願虐使嚚之鄙其醇汩使漓之厭其專撓使分之則饒之諸縣皆可辭饒之名也而況於德興乎天順成化中聞有吳尹矣又有鄧尹矣是時饒之六縣考功上計以德興為最自是歲淪為殿至今也然則縣非能饒饒在吏耳問之是二尹皆進士也其殿則非也嗚呼吏凡以進士其庶乎而況尹其長吏乎二尹之去德興繼而尹者不知其幾也而進士至是始得張君焉其距二尹之去於今三十年矣何其久也夫物之窮久則必鬱積而思變變之來也必乘其會三十年乃一世矣或者此其會乎而德興自是可以無愧於饒之𨽻縣將復如二尹時乎抑或過乎人之望治也猶饑渴者之於飲食也二尹其始飲且食之時也不必其美也而亦甘之也今則必其美也而後甘之也君其亦審於此而已矣此京尹張君意也太僕張君意也禮部程君意也諸君縣人也要豫言君之别豫舍是亦何言哉送虞部郎中王君天申歸永豐詩序虞部郎中王君以病請于上歸仲子叔子侍豫曰子侍父畀有腋舟有碇藥有常嘗膳有常視無阽無虞永豐其可歸也人曰子過矣君未甚病也君前以行人司副使淮又使蜀便歸拜其二親使節不可稽于家而驅追上道今雖位郎署而私心鬱鬱寐若寤咽若吐步若趨思若忘怔忡上下醫至以病診君亦曰吾病也吾見吾親解矣噫君豈真病夫哉豫曰高哉君之獨病也余嘗閲東西閨之籍矣某也咳某也疽某也頭之痺某也目之眵某也齒之疰某也痰之衝常十二三矣然而騎于道以納刺飲于室以娛賔坐于署以叱咤以鞭笞嬉于郊之亭池館墅以竟日纍纍也此無病也自以為病者也若黃馘而俯行躬乃磬折跛曵而越閾病于踰垣喘呷以趨班實爾匍匐此實病也自以為未病者也自以為病者安知及其既病也不自以為未病乎自以為未病者安知方其未病也不自以為病乎以是二者日循環於胸中則於其身日且不暇又暇思其親而病乎哉豫故高君之獨病也人又曰君雖以病行而又嫌貽戚於其親諉曰以二子歸而學於學且冠且㛰以為親歡不欲以病為名歸也豫於是益高君夫仕逺違其親而思情也而未必病病矣藥之乎則已矣而未必輒以請請而歸矣而未必不曰吾病歸也則其親有不戚戚者乎而親且病矣然則思其親而以病歸者其難乎哉而能以病歸者豫見君也而其人亦可知矣豫是以益高君也衆皆翕然評豫言曰諸贈言意率類是遂録以為序虛山卷序虛山卷安城劉氏虛山翁卷也卷有說有記有銘有詩大約象翁於是山也翁之子工部主事君遇豫于清源以卷請曰為吾翁序之豫未嘗謁翁登虛山之顛顧瞻是山求其何以虛名也凡天地間之有形足以有容而無所容於其中者謂之虛徒有其名而無其實者亦謂之虛莊子之虛室虛舟虛牝足以有容而無所容於其中之虛是也左氏之虛器徒有其名而無其實之虛是也若夫山者土石之積物之有形而至巨者也況夫草木生之禽獸居之寶藏興焉其何虛之有哉然豫嘗見夫山之出雲氣雨下土澤萬物釀豐年使吾君之倉廩實府庫充吾民之足衣足食而基是太平誰實為之山是也而山方且塊然寂然若不與焉則夫天下之至虛莫山若也翁今居是山泯然與世而相違讓美于其後昆以利濟乎天下而晦其迹焉是知象山之德實而為虛處虛之虛者也噫可謂善處虛矣其以是為名烏得無情哉前之作者既已矣後之繼作者尚躡豫意以足之庶幾可語於虛山華贈卷後序是卷也美沈君廉夫江西持憲之得體也何椒丘倡詩張東白序之李白洲大書之三公江西之人傑也天下信之由是和者日衆而是卷遂聞于時豫丙辰秋始得是卷于京邸已而索者踵至豫亦欲因以充廣之郵之二朞而已亡其處矣戊午豫歸留僕遍訪之已未春始克持歸豫緣是知人之重之抑不知人之重君何如也然意君之卓卓如是雖微是卷其豈終寂寂乎特江西之屬邑其豈無深山邃谷人跡所不至之境乎抑保其無强梗弗率與王度為敵者乎萬一得是卷而觀之庶幾知有是持憲之臣又知有是鄉之長老為之襮白于天下後世或蹴然驚惕然愳而頓革為良民則是卷亦非小補也豫故喜而繼序之留其副而以歸諸沈氏費子充送弟子全南歸詩序子全行乎舟至維揚由瓜步下吳會泛錢塘泝桐江以出三衢而越懷玉乎將泝岷江入彭蠡上上饒之江乎倭遲乎紏緊乎至將何時乎事有適然幾有偶變吾不能知非徒吾不能知雖子充亦不能必知之望庭闈而指數乎至而拜且興乎談輦下之達觀乎致嫂兄之念父乎母乎諸父乎諸母乎以及娣乎姒乎鄰叟嫗之來勞苦迎而笑與之唯諾乎解包而出其粉黛乎或佩帨乎􅉅蘭乎此其人事之恆雖吾暗能知之而況子充乎然昔之人探禹穴至于觀舞劒器之微皆觸類推物而長若今京師者禹穴而已乎梯航之輻輳䕫樂而倕工一劍器之精妙而已乎而其所長其可量乎而況子充之急其成吾嘗私睨之若大冶之笵巨鐘然其憂之甚勤而愛之甚至今方脫于笵而登于業簴之上其有不鳴者乎鳴而有不總衆樂而出之者乎不然子充冶工也詩以送之何為乎而諸和者與吾之序之不幾為無稽之言乎送都閫文君之江西任序江西都指揮使司統衛四所十有一衛以南昌名者二治會府南昌地也以贛名治贛以袁名治袁所之以地名者亦治其地凡其所在大抵皆要害也贛暨南安背負大庾而信豐會昌犬牙入于南粵之奧區袁吉則湖湘之脅洞蠻實口張噬于安福之􅀈永新則先嘗其齦焉鉛山甌閩之北門也撫建厄其西牖與贛犄角之吳越以饒信為唇齒而江淮湖漢舟師必爭之地者南昌也由是推之古者有作類為民防百數十年良亦有賴非徒設也今則異於是矣春耕閩粵者彼曰良民也秋入贛建翼然而虎巨寇也臨瑞頻年白晝飛刃于譙門且曰吾某也吾某也而守臣懷印踰垣為得䇿揚聲襲撫按壘近郊遊羣之四出也迎犒者室空遁竄者屋燎而昔之所謂為民防者果安在哉將時與古初異耶而尚爾設何也抑主帥者尸其位而掣肘于其間也耶胡不易置之而務得其人乎國是既定於是不愛尊碩之臣俯從緝綏未數月也又以文君大章為其都指揮同知往踐其位所謂主帥者君魁傑人也以武科舉聲訇琅然嘗以京營贊畫協副凉州左參將守莊浪入主京營而獨當一面折衝乃其任也亦輿論也顧抑而就是豈吾君與吾相不知君哉時有緩急事有經權出宿將以壯民防救時也寇殄民寧克回古初則君之促裝時矣錦衣魯侯景章與豫均江西人壯君之行而兾其遄歸也别之以言且以為期云萱壽榮慶圖詩序萱壽榮慶有圖焉其下方有詩百篇篇有名焉或翰苑之英也或臺省之豪也或中祕之嶄然者也有獻之日月焉月之二十五日庚申也有所獻之廬焉闕東之蔡氏也獻于七十之壽母焉河南左參議元鼎刑部員外郎元敬之母屠太淑人也太淑人結髮歸先山西右方伯公起家登進士揚歷中外備嘗艱囏躋于大僚元鼎元敬繼踵先武方將聨翩奮飛莫知其止人曰二妙也誰則為之則其為婦也固婦也有遺道耶為母也固母也有遺儀耶凡婦道行於夫而母儀式於子蓋亦閨門內則之修女德之常雖懿而弗彰雖盛而弗揚也然或夫與子也遇其時也上以成其正君之功下以宣其裕民之澤則典禮所加婦以夫榮母以子貴三代以來未之或改也是制也聖人之制之也夫聖人者豈過為其情矯以歸於厚哉原本推功不使有遺焉耳則夫天之原本推功固亦當於聖人者不異也今太淑人得於制者始於孺人繼於宜人恭人而淑人夫人蓋馴致而已矣其於所謂天者壽考康寧又奚賴於人之頌且禱乎哉圖詩既具來請序于其上故論其理書之送劉君知豐城縣序𢎞治壬子冬十一月進士麻城劉君士約以選授知豐城縣于時在朝凃侍御卿儀李司諫充昭縣人也屬豫文以為贈豫史氏也惡乎辭昔晉張華博物善推步見斗牛之間有劒氣當在豫章之墟於是以雷煥為豐城令煥掘獄得寶劒後遂名其縣名其江皆曰劒云至今好語縣故實者誰舍劒也夫劒利器也質于礦成于煆銛于硎堅于淬也而用以臨紛結解焉宜于武事居多而賢者佩之亦以自勇處大事決大疑以取況焉故曰賢者國家之利器也而一縣雖小其理同非利器臨之可乎而君起家世官剛直之質有養也而又問學以煆鍊之磨淬十年之久至以三傳魁南宫裒然頴脫凛乎芒刃新發於硎向試矣比於劒器不亦勇且利乎又況際今天子剛健神武萬幾獨斷庶政斬斬日新凡軟緩不任廢事之吏一切罷去而守令率用廉介清强之士為之而君得為兹縣是以劒器用劒縣也而可以為偶然乎夫子笑子游為武城宰曰割雞焉用牛刀戲其善用刀也君今其亦善用劒哉君至之日觀于理而計于心曰夫昔之掘不掘與劒之其有其無不可知而今有其名不可誣也則藏其鋒斂其鍔躊蹰而四顧焉使人雖易視之不恤也蓋吾劒猶在也有俟之之道焉若直以其掘而去曰劒不在是也而惟吾劒之為揮霍上下以快其無前之勇而炫乎一時之觀曰彼惡敢當我哉則將無是劒矣夫子於子游門人也故以戲教豫於君非有素也故正言焉君慎勉之哉䨥壽重封詩序戶部郎中古田羅志仁為主事時獲封其父為主事母為安人及進員外郎又進員外郎宜人之封而宜人方樂志仁之迎也就養於是歲壬戌之秋封君年六十矣而兹癸亥之夏宜人亦如之一時盛美咸萃羅氏諸善志仁者叢聚而謀之或曰物之偶而無差池曰䨥而事之一再遇曰重壽而若斯可不謂之䨥乎請名之曰䨥壽封而若斯可不謂之重乎請名之曰重封衆皆曰然或又曰專於壽而遺諸封是謂忽于恩不可專於封而遺諸壽是謂昧于福亦不可請合而名之曰䨥壽重封可乎衆又皆曰然由是䨥壽重封之詩泉湧而川至好事者至語之曰詩林又以其富且麗也或曰詩府蓋多之也謝邦用謂豫曰子志仁宗人也如是而已乎豫固竊因有所寄意焉今天下之平久矣家無後期之租則邑無呌囂之吏其民安其民安故夭札少而壽考多署有法守之吏則朝有道揆之公其賞信其賞信故誅罰少而恩典多以是二轍日推移而默運于寰區之間器大而其厚者自將兼得之而亦莫知其端若志仁無怪也而諸君子又當休暇之期方將斥其鳴國家之盛之餘者便旋焉以有擇則兹固其恢恢乎遊刃為林為府之地哉豫觀之志仁者古田積古勃鬱之氣蒸滃堛坼而首出者也其所以拔起其䝉昧而登聞于世俾後先炳炳不朽者果藉是乎抑末矣然或是詩也自足以不朽也則更千百世知有所謂林與府者亦其盛德大業之餘美志仁為其親亦豈所不欲哉因以是語邦用邦用頷之請書以引諸詩之首圭峯集卷一
